function renderAsigAplicNotas(){
  var body=document.getElementById('enc-body');
  var t=cats.tablas.find(function(x){return x.id===aplic.tablaId;});
  var p=cats.plantaciones.find(function(x){return x.id===aplic.plantacionId;});
  var opNombres=aplic.operarios.map(function(id){var o=cats.operarios.find(function(x){return x.id===id;});return o?o.nombre:'';}).join(', ');
  var resumenComp=aplic.componentes.map(function(c){return (c.item?c.item.nombre:'')+' · '+numFmt(c.cantidad_base*aplic.factor)+' '+(c.item?c.item.unidad:'');}).join('<br>');
  body.innerHTML='<div class="seccion-titulo">🧪 Confirmar aplicación</div><div class="form-card"><div class="resumen-card" style="margin-bottom:1rem;"><div class="resumen-row"><span class="resumen-key">Fórmula</span><span class="resumen-val">'+aplic.formula.nombre+'</span></div><div class="resumen-row"><span class="resumen-key">Ubicación</span><span class="resumen-val">📍 '+(p?p.nombre:'')+' · '+(t?t.nombre:'')+'</span></div><div class="resumen-row"><span class="resumen-key">Equipo</span><span class="resumen-val">'+BOMBA_ICONOS[aplic.bomba]+' '+BOMBA_LABELS[aplic.bomba]+(aplic.bomba!=='inyeccion'?' × '+aplic.numBombas:'')+'</span></div><div class="resumen-row"><span class="resumen-key">Volumen</span><span class="resumen-val">'+numFmt(aplic.volumen)+' L</span></div><div class="resumen-row"><span class="resumen-key">Operarios</span><span class="resumen-val">'+opNombres+'</span></div><div class="resumen-row"><span class="resumen-key">Fecha</span><span class="resumen-val">'+aplic.fecha+'</span></div><div class="resumen-row"><span class="resumen-key">Componentes a usar</span></div><div style="font-size:.82rem;padding:.35rem 0;">'+resumenComp+'</div></div><p class="hint" style="margin-bottom:1rem;">⚠️ Al confirmar, esta cantidad se descuenta del inventario de inmediato. Queda pendiente de validación por un ingeniero.</p><div class="form-group"><label>Notas (opcional)</label><input type="text" id="aplic-notas-input" placeholder="Instrucciones para el operario..."></div><button class="btn-primary" id="aplic-finalizar">✅ Asignar aplicación</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderAsigAplicFecha()">← Volver a fecha</button>';
  document.getElementById('aplic-finalizar').addEventListener('click',guardarAplicacion);
}

function guardarAplicacion(){
  var btn=document.getElementById('aplic-finalizar'); btn.disabled=true; btn.textContent='Guardando...';
  var notas=document.getElementById('aplic-notas-input').value||null;
  var lbAplic=cats.tiposLabor.find(function(l){return l.requiere_formula;});
  var payloadBase={asignado_por:usuario.id,tabla_id:aplic.tablaId,tipo_labor_id:lbAplic.id,formula_id:aplic.formula.id,bomba_usada:aplic.bomba,volumen_aplicado_litros:aplic.volumen,factor_escala:aplic.factor,fecha_asignacion:aplic.fecha,notas_encargado:notas,estado:'pendiente',validado_ingeniero:false,duracion:'dia'};
  var ordenesPromesa=Promise.all(aplic.operarios.map(function(oid){
    return from('ordenes_trabajo').insert(Object.assign({},payloadBase,{operario_id:oid}));
  }));
  ordenesPromesa.then(function(resultados){
    var primeraOrdenId=resultados&&resultados[0]&&resultados[0][0]&&resultados[0][0].id;
    var movs=aplic.componentes.map(function(c){
      var cant=c.cantidad_base*aplic.factor;
      var nuevoStock=(c.item?c.item.stock_actual:0)-cant;
      return from('movimientos_inventario').insert({item_id:c.item_id,tipo:'salida',cantidad:cant,motivo:'Aplicación: '+aplic.formula.nombre,referencia_orden_id:primeraOrdenId,usuario_id:usuario.id,stock_anterior:c.item?c.item.stock_actual:0,stock_posterior:nuevoStock}).then(function(){
        return from('inventario_items').eq('id',c.item_id).update({stock_actual:nuevoStock});
      });
    });
    return Promise.all(movs);
  }).then(function(){
    return from('inventario_items').select('*').eq('activo',true).order('nombre').get();
  }).then(function(rows){
    cats.inventario=rows||[];
    return Promise.all(aplic.operarios.map(function(oid){
      return from('notificaciones').insert({titulo:'🧪 Aplicación asignada',cuerpo:usuario.nombre+' asignó a '+(cats.operarios.find(function(o){return o.id===oid;})||{}).nombre+': '+aplic.formula.nombre,icono:'🧪',leida:false,para_rol:'operario',para_usuario:oid});
    }));
  }).then(function(){
    showToast('✅ Aplicación asignada. Inventario descontado, pendiente de validar.');
    renderFormAsignar();
  }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='✅ Asignar aplicación';});
}

function renderAlarmasRevision(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">🚨 Alarmas de campo</div><div class="loading">Cargando...</div>';
  from('alertas_campo').select('*,usuario:usuarios(nombre),tabla:tablas(nombre,plantacion_id)').order('creado_en',{ascending:false}).limit(50).get().then(function(rows){
    if(!rows||!rows.length){body.innerHTML='<div class="seccion-titulo">🚨 Alarmas de campo</div><div class="empty">Sin reportes todavía.</div>';return;}
    var iconos={plantacion:'🌱',plagas:'🐛',infraestructura:'🏗️',accidente:'🤕',emergencia:'🆘'};
    var nombres={plantacion:'Plantación',plagas:'Plagas',infraestructura:'Infraestructura',accidente:'Accidente',emergencia:'Emergencia'};
    var html='<div class="seccion-titulo">🚨 Alarmas de campo</div>';
    html+=rows.map(function(a){
      var p=a.tabla?cats.plantaciones.find(function(x){return x.id===a.tabla.plantacion_id;}):null;
      var ubicacion=(p||a.tabla)?('📍 '+(p?p.nombre:'')+(a.tabla?' · '+a.tabla.nombre:'')):'';
      var f=new Date(a.creado_en).toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'numeric',minute:'2-digit',hour12:true});
      var esEmerg=a.categoria==='emergencia';
      return '<div class="orden-card" style="'+(esEmerg?'border-left-color:var(--rojo);':'')+'"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem">'+(iconos[a.categoria]||'🚨')+' '+(nombres[a.categoria]||a.categoria)+'</strong><span style="font-size:.72rem;color:var(--gris-3);">'+f+'</span></div>'+(ubicacion?'<div class="orden-meta" style="font-weight:700;">'+ubicacion+'</div>':'')+'<div class="orden-meta">👤 '+(a.usuario?a.usuario.nombre:'')+'</div>'+(a.descripcion?'<div class="orden-meta" style="margin-top:.2rem;">📝 '+a.descripcion+'</div>':'')+(a.evidencia_url?'<div style="margin-top:.4rem;"><a href="'+a.evidencia_url+'" target="_blank"><img src="'+a.evidencia_url+'" style="max-width:140px;max-height:140px;border-radius:8px;border:1px solid var(--gris-2);"></a></div>':'')+'</div>';
    }).join('');
    body.innerHTML=html;
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderPermisosRevision(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">Permisos</div><div class="loading">Cargando...</div>';
  var headerHtml='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">Permisos<button type="button" onclick="renderEmpleadosMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Empleados</button></div><div style="display:flex;flex-wrap:wrap;gap:.4rem 1rem;margin-bottom:1rem;">'+
    '<button type="button" onclick="renderEvaluarComportamiento()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">🤝 Comportamiento</button>'+
  '</div>';
  from('permisos').select('*,operario:usuarios!usuario_id(nombre)').order('creado_en',{ascending:false}).get().then(function(rows){
    if(!rows||!rows.length){body.innerHTML=headerHtml+'<div class="empty">Sin solicitudes de permiso.</div>';return;}
    var pend=rows.filter(function(p){return p.estado==='pendiente';});
    var resueltos=rows.filter(function(p){return p.estado!=='pendiente';});
    var estLbl={pendiente:'⏳ Pendiente',aprobado:'✅ Aprobado',rechazado:'❌ Rechazado'};
    var estColor={pendiente:'var(--tierra)',aprobado:'var(--verde-mid)',rechazado:'var(--rojo)'};
    function tarjeta(p){
      var ac=p.estado==='pendiente'?'<div style="display:flex;gap:8px;margin-top:.6rem;"><button class="btn-sm btn-completar" data-aprob="'+p.id+'">✅ Aprobar</button><button class="btn-sm btn-cancelar" data-rech="'+p.id+'">❌ Rechazar</button></div>':'';
      return '<div class="orden-card" style="border-left-color:'+estColor[p.estado]+';"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem">'+(p.tipo==='medico'?'🩺 Médico':'👤 Personal')+' · '+(p.operario?p.operario.nombre:'')+'</strong><span style="font-size:.72rem;font-weight:700;color:'+estColor[p.estado]+';">'+estLbl[p.estado]+'</span></div><div class="orden-meta">'+(p.folio?'🔖 '+p.folio+'<br>':'')+'📅 '+p.fecha_inicio+' a '+p.fecha_fin+(p.motivo?'<br>📝 '+p.motivo:'')+(p.evidencia_url?'<br><a href="'+p.evidencia_url+'" target="_blank" style="color:var(--verde-mid);font-weight:700;">📎 Ver comprobante</a>':'')+'</div>'+ac+'</div>';
    }
    var html=headerHtml+'<div class="seccion-titulo" style="margin-top:0;">'+(pend.length?'<span style="font-size:.75rem;color:var(--rojo);font-weight:700;">('+pend.length+' pendientes)</span>':'Solicitudes')+'</div>';
    if(pend.length) html+=pend.map(tarjeta).join('');
    if(resueltos.length) html+='<div class="seccion-titulo" style="margin-top:1rem;">Resueltos</div>'+resueltos.map(tarjeta).join('');
    body.innerHTML=html;
    body.querySelectorAll('[data-aprob]').forEach(function(b){b.addEventListener('click',function(){resolverPermiso(this.dataset.aprob,'aprobado');});});
    body.querySelectorAll('[data-rech]').forEach(function(b){b.addEventListener('click',function(){resolverPermiso(this.dataset.rech,'rechazado');});});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function resolverPermiso(id,estado){
  from('permisos').select('*').eq('id',id).get().then(function(rows){
    var p=rows&&rows[0];
    return from('permisos').eq('id',id).update({estado:estado,revisado_por:usuario.id,revisado_en:new Date().toISOString()}).then(function(){
      if(p) return from('notificaciones').insert({titulo:estado==='aprobado'?'✅ Permiso aprobado':'❌ Permiso rechazado',cuerpo:'Tu solicitud de permiso '+p.tipo+' ('+p.fecha_inicio+' a '+p.fecha_fin+') fue '+(estado==='aprobado'?'aprobada':'rechazada')+'.',icono:estado==='aprobado'?'✅':'❌',leida:false,para_rol:'operario',para_usuario:p.usuario_id});
    });
  }).then(function(){
    showToast(estado==='aprobado'?'✅ Permiso aprobado':'❌ Permiso rechazado');
    renderPermisosRevision();
  }).catch(function(e){alert('Error: '+e.message);});
}

function renderResumenNomina(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">📊 Historial nómina</div><div class="loading">Calculando...</div>';
  var hoyD=new Date();
  var primerDiaMes=new Date(hoyD.getFullYear(),hoyD.getMonth(),1).toISOString().slice(0,10);
  var nombreMes=hoyD.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
  Promise.all([
    from('asistencia_registros').select('*').gte('fecha',primerDiaMes).get(),
  ]).then(function(r){
    var registros=r[0]||[];
    var porOperario={};
    cats.operarios.forEach(function(o){porOperario[o.id]=[];});
    registros.forEach(function(reg){if(porOperario[reg.usuario_id]) porOperario[reg.usuario_id].push(reg);});
    var html='<div class="seccion-titulo" style="text-transform:capitalize;">'+nombreMes+'</div>';
    html+=cats.operarios.map(function(o){
      var regs=porOperario[o.id]||[];
      var resumen=calcularResumenAsistencia(regs,primerDiaMes);
      var horasExtra=0;
      var porDia={};
      regs.forEach(function(reg){
        if(reg.modalidad!=='extras') return;
        if(!porDia[reg.fecha]) porDia[reg.fecha]={entrada:null,salida:null};
        if(reg.tipo==='entrada'&&(!porDia[reg.fecha].entrada||reg.registrado_en<porDia[reg.fecha].entrada)) porDia[reg.fecha].entrada=reg.registrado_en;
        if(reg.tipo==='salida'&&(!porDia[reg.fecha].salida||reg.registrado_en>porDia[reg.fecha].salida)) porDia[reg.fecha].salida=reg.registrado_en;
      });
      Object.keys(porDia).forEach(function(f){var d=porDia[f];if(d.entrada&&d.salida) horasExtra+=(new Date(d.salida)-new Date(d.entrada))/3600000;});
      return '<div class="orden-card"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem">'+o.nombre+'</strong></div><div class="orden-meta" style="display:flex;gap:1rem;margin-top:.3rem;"><span>✅ '+resumen.trabajados+' trabajados</span><span style="color:var(--rojo);">❌ '+resumen.faltas+' faltas</span><span style="color:var(--tierra);">⏰ '+resumen.retardos+' retardos</span></div>'+(horasExtra>0?'<div class="orden-meta" style="margin-top:.2rem;">💰 '+horasExtra.toFixed(1)+' h extra</div>':'')+'</div>';
    }).join('');
    body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderNominasMenu()">← Volver a Nóminas</button>';
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderPagarSemanas(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">💵 Sueldos</div><div class="loading">Calculando...</div>';
  var lunes=inicioDeSemana(new Date());
  var domingo=new Date(lunes); domingo.setDate(lunes.getDate()+6);
  var semanaInicio=lunes.toISOString().slice(0,10), semanaFin=domingo.toISOString().slice(0,10);
  var numSemana=numeroSemanaISO(lunes);
  Promise.all([
    from('usuarios').select('id,nombre,sueldo_base').eq('rol','operario').get(),
    from('asistencia_registros').select('*').gte('fecha',semanaInicio).lte('fecha',semanaFin).get(),
    from('pagos_semana_estado').select('*').eq('semana_inicio',semanaInicio).get(),
    from('pagos_extra_estado').select('*').eq('semana_inicio',semanaInicio).get(),
    from('config_app').select('*').get()
  ]).then(function(r){
    var operarios=r[0]||[], registros=r[1]||[], estados=r[2]||[], estadosExtra=r[3]||[];
    var cfg={}; (r[4]||[]).forEach(function(c){cfg[c.clave]=c.valor;});
    var tarifa=parseFloat(cfg.tarifa_hora_extra)||70;
    var estadoPorOp={}; estados.forEach(function(e){estadoPorOp[e.operario_id]=e;});
    var estadoExtraPorOp={}; estadosExtra.forEach(function(e){estadoExtraPorOp[e.operario_id]=e;});
    var html='<div class="seccion-titulo">💵 Sueldos · Semana '+numSemana+'</div><p class="hint" style="margin-bottom:1rem;">'+semanaInicio+' a '+semanaFin+' · Tarifa hora extra: $'+tarifa+'</p>';
    if(!operarios.length){html+='<div class="empty">No hay operarios registrados.</div>';}
    html+=operarios.map(function(o){
      var regsOp=registros.filter(function(r){return r.usuario_id===o.id;});
      var resumen=calcularResumenAsistencia(regsOp,semanaInicio);
      var sueldoBase=o.sueldo_base||0;
      var total=resumen.trabajados*sueldoBase;
      var est=estadoPorOp[o.id];
      var pagado=est&&est.estado==='pagado';

      var porDiaExtra={};
      regsOp.filter(function(x){return x.modalidad==='extras';}).forEach(function(reg){
        if(!porDiaExtra[reg.fecha]) porDiaExtra[reg.fecha]={entrada:null,salida:null};
        if(reg.tipo==='entrada'&&(!porDiaExtra[reg.fecha].entrada||reg.registrado_en<porDiaExtra[reg.fecha].entrada)) porDiaExtra[reg.fecha].entrada=reg.registrado_en;
        if(reg.tipo==='salida'&&(!porDiaExtra[reg.fecha].salida||reg.registrado_en>porDiaExtra[reg.fecha].salida)) porDiaExtra[reg.fecha].salida=reg.registrado_en;
      });
      var horasExtra=0;
      Object.keys(porDiaExtra).forEach(function(f){var d=porDiaExtra[f];if(d.entrada&&d.salida) horasExtra+=(new Date(d.salida)-new Date(d.entrada))/3600000;});
      var totalExtra=horasExtra*tarifa;
      var estExtra=estadoExtraPorOp[o.id];
      var pagadoExtra=estExtra&&estExtra.estado==='pagado';

      return '<div class="orden-card" style="border-left-color:'+(pagado?'var(--verde-mid)':'var(--tierra)')+';"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem">'+o.nombre+'</strong><span style="font-weight:800;color:'+(pagado?'var(--verde-mid)':'var(--tierra)')+';">$'+total.toFixed(2)+'</span></div><div class="orden-meta">'+resumen.trabajados+' días · '+resumen.faltas+' faltas · '+resumen.retardos+' retardos'+(sueldoBase?'':' · ⚠️ sin sueldo base configurado')+'</div>'+(pagado?'<button class="btn-sm btn-cancelar" data-despagar="'+o.id+'" style="margin-top:.5rem;">Marcar como pendiente</button>':'<button class="btn-sm btn-completar" data-pagar="'+o.id+'" data-total="'+total+'" style="margin-top:.5rem;">✅ Marcar como pagado</button>')+
      (horasExtra>0?'<div style="border-top:1px dashed var(--gris-2);margin-top:.6rem;padding-top:.6rem;"><div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:.8rem;font-weight:700;color:var(--tierra);">⏰ Horas extra: '+horasExtra.toFixed(1)+'h</span><span style="font-weight:800;color:'+(pagadoExtra?'var(--verde-mid)':'var(--tierra)')+';">$'+totalExtra.toFixed(2)+'</span></div>'+(pagadoExtra?'<button class="btn-sm btn-cancelar" data-despagarextra="'+o.id+'" style="margin-top:.4rem;">Marcar extra como pendiente</button>':'<button class="btn-sm btn-completar" data-pagarextra="'+o.id+'" data-totalextra="'+totalExtra+'" data-horasextra="'+horasExtra+'" style="margin-top:.4rem;">✅ Marcar extra como pagado</button>')+'</div>':'')+
      '</div>';
    }).join('');
    body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderNominasMenu()">← Volver a Nóminas</button>';
    body.querySelectorAll('[data-pagar]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var opId=this.dataset.pagar, total=parseFloat(this.dataset.total);
        var payload={operario_id:opId,semana_inicio:semanaInicio,semana_fin:semanaFin,estado:'pagado',monto_pagado:total,pagado_por:usuario.id,pagado_en:new Date().toISOString()};
        var existente=estadoPorOp[opId];
        var accion = existente ? from('pagos_semana_estado').eq('id',existente.id).update(payload) : from('pagos_semana_estado').insert(payload);
        accion.then(function(){
          return from('notificaciones').insert({titulo:'💳 Pago registrado',cuerpo:'Tu pago de la semana '+numSemana+' ($'+total.toFixed(2)+') fue marcado como pagado.',icono:'💳',leida:false,para_rol:'operario',para_usuario:opId});
        }).then(function(){showToast('✅ Marcado como pagado');renderPagarSemanas();}).catch(function(e){alert('Error: '+e.message);});
      });
    });
    body.querySelectorAll('[data-despagar]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var opId=this.dataset.despagar;
        var existente=estadoPorOp[opId];
        if(!existente) return;
        from('pagos_semana_estado').eq('id',existente.id).update({estado:'pendiente'}).then(function(){showToast('Marcado como pendiente');renderPagarSemanas();}).catch(function(e){alert('Error: '+e.message);});
      });
    });
    body.querySelectorAll('[data-pagarextra]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var opId=this.dataset.pagarextra, total=parseFloat(this.dataset.totalextra), horas=parseFloat(this.dataset.horasextra);
        var payload={operario_id:opId,semana_inicio:semanaInicio,semana_fin:semanaFin,estado:'pagado',horas:horas,monto_pagado:total,pagado_por:usuario.id,pagado_en:new Date().toISOString()};
        var existente=estadoExtraPorOp[opId];
        var accion = existente ? from('pagos_extra_estado').eq('id',existente.id).update(payload) : from('pagos_extra_estado').insert(payload);
        accion.then(function(){
          return from('notificaciones').insert({titulo:'⏰ Pago de horas extra registrado',cuerpo:'Tu pago de horas extra de la semana '+numSemana+' ($'+total.toFixed(2)+') fue marcado como pagado.',icono:'⏰',leida:false,para_rol:'operario',para_usuario:opId});
        }).then(function(){showToast('✅ Extra marcado como pagado');renderPagarSemanas();}).catch(function(e){alert('Error: '+e.message);});
      });
    });
    body.querySelectorAll('[data-despagarextra]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var opId=this.dataset.despagarextra;
        var existente=estadoExtraPorOp[opId];
        if(!existente) return;
        from('pagos_extra_estado').eq('id',existente.id).update({estado:'pendiente'}).then(function(){showToast('Marcado como pendiente');renderPagarSemanas();}).catch(function(e){alert('Error: '+e.message);});
      });
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderPrestamos(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">📝 Préstamos<button type="button" onclick="renderNuevoPrestamo()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nuevo préstamo</button></div><div class="loading">Cargando...</div>';
  from('prestamos').select('*,operario:usuarios!operario_id(nombre)').order('creado_en',{ascending:false}).get().then(function(prestamos){
    var header='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">📝 Préstamos<button type="button" onclick="renderNuevoPrestamo()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nuevo préstamo</button></div>';
    if(!prestamos||!prestamos.length){body.innerHTML=header+'<div class="empty">Sin préstamos registrados.</div><button class="btn-back" style="margin-top:1rem;" onclick="renderNominasMenu()">← Volver a Nóminas</button>';return;}
    var ids=prestamos.map(function(p){return p.id;});
    from('prestamo_pagos').select('*').in('prestamo_id',ids).order('numero_pago',{ascending:true}).get().then(function(pagos){
      var html=header;
      html+=prestamos.map(function(p){
        var pagosDe=pagos.filter(function(x){return x.prestamo_id===p.id;});
        var pendientes=pagosDe.filter(function(x){return x.estado==='pendiente';});
        var restante=pendientes.reduce(function(s,x){return s+parseFloat(x.monto);},0);
        var filas=pagosDe.map(function(pg){
          var ns=numeroSemanaISO(new Date(pg.semana_inicio+'T00:00:00'));
          var pagado=pg.estado==='descontado';
          return '<div style="display:flex;justify-content:space-between;align-items:center;font-size:.8rem;padding:.3rem 0;border-bottom:1px solid var(--gris-1);"><span>Pago '+pg.numero_pago+'/'+p.num_pagos+' · Sem '+ns+' · $'+parseFloat(pg.monto).toFixed(2)+'</span>'+(pagado?'<span style="color:var(--verde-mid);font-weight:700;">✅ Descontado</span>':'<button class="btn-sm btn-completar" data-descontar="'+pg.id+'" data-prestamo="'+p.id+'">Marcar descontado</button>')+'</div>';
        }).join('');
        return '<div class="orden-card" style="border-left-color:'+(p.estado==='activo'?'var(--tierra)':'var(--gris-3)')+';"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem">'+(p.operario?p.operario.nombre:'')+' · '+p.concepto+'</strong><span style="font-size:.72rem;font-weight:700;color:'+(p.estado==='activo'?'var(--tierra)':'var(--verde-mid)')+';">'+(p.estado==='activo'?'Activo':'Liquidado')+'</span></div><div class="orden-meta">Total: $'+parseFloat(p.monto_total).toFixed(2)+' · Restante: $'+restante.toFixed(2)+'</div><div style="margin-top:.5rem;">'+filas+'</div></div>';
      }).join('');
      body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderNominasMenu()">← Volver a Nóminas</button>';
      body.querySelectorAll('[data-descontar]').forEach(function(btn){
        btn.addEventListener('click',function(){
          var pagoId=this.dataset.descontar, prestamoId=this.dataset.prestamo;
          from('prestamo_pagos').eq('id',pagoId).update({estado:'descontado',descontado_en:new Date().toISOString()}).then(function(){
            return from('prestamo_pagos').select('*').eq('prestamo_id',prestamoId).get();
          }).then(function(todosPagos){
            var todosDescontados=todosPagos.every(function(x){return x.estado==='descontado';});
            if(todosDescontados) return from('prestamos').eq('id',prestamoId).update({estado:'liquidado'});
          }).then(function(){showToast('✅ Pago marcado como descontado');renderPrestamos();}).catch(function(e){alert('Error: '+e.message);});
        });
      });
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderNuevoPrestamo(){
  var body=document.getElementById('enc-body');
  var opO=cats.operarios.map(function(o){return '<button type="button" class="op-chip" data-id="'+o.id+'" onclick="seleccionUnica(this)">'+o.nombre+'</button>';}).join('');
  body.innerHTML='<div class="seccion-titulo">+ Nuevo préstamo</div><div class="form-card"><div class="form-group"><label>Colaborador</label><div style="display:flex;flex-wrap:wrap;gap:8px;">'+opO+'</div></div><div class="form-group"><label>Concepto</label><input type="text" id="pr-concepto" placeholder="Ej. Préstamo personal / Anticipo de nómina"></div><div class="form-group"><label>Monto total ($)</label><input type="number" id="pr-monto" min="0" step="1" placeholder="Ej. 600"></div><div class="form-group"><label>Número de pagos semanales</label><input type="number" id="pr-pagos" min="1" step="1" placeholder="Ej. 3"></div><div class="form-group"><label>Semana en que inicia el descuento</label><input type="date" id="pr-fecha" value="'+new Date().toISOString().slice(0,10)+'"></div><button class="btn-primary" id="pr-guardar">Registrar préstamo</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderPrestamos()">← Volver a Préstamos</button>';
  document.getElementById('pr-guardar').addEventListener('click',function(){
    var opBtn=document.querySelector('.op-chip.sel');
    var concepto=document.getElementById('pr-concepto').value.trim();
    var monto=parseFloat(document.getElementById('pr-monto').value);
    var numPagos=parseInt(document.getElementById('pr-pagos').value);
    var fechaIni=document.getElementById('pr-fecha').value;
    if(!opBtn){alert('Selecciona un colaborador.');return;}
    if(!concepto){alert('Describe el concepto.');return;}
    if(!monto||monto<=0){alert('Captura un monto válido.');return;}
    if(!numPagos||numPagos<1){alert('Captura el número de pagos.');return;}
    var btn=this; btn.disabled=true; btn.textContent='Guardando...';
    from('prestamos').insert({operario_id:opBtn.dataset.id,concepto:concepto,monto_total:monto,num_pagos:numPagos,fecha_inicio:fechaIni,estado:'activo',creado_por:usuario.id}).then(function(rows){
      return from('prestamos').select('*').eq('operario_id',opBtn.dataset.id).order('creado_en',{ascending:false}).limit(1).get();
    }).then(function(nuevoPrestamoRows){
      var prestamo=nuevoPrestamoRows[0];
      var montoPorPago=Math.round((monto/numPagos)*100)/100;
      var lunes=inicioDeSemana(new Date(fechaIni+'T00:00:00'));
      var pagosArr=[];
      for(var i=0;i<numPagos;i++){
        var sem=new Date(lunes); sem.setDate(sem.getDate()+i*7);
        var esUltimo=i===numPagos-1;
        var montoEste = esUltimo ? Math.round((monto-montoPorPago*(numPagos-1))*100)/100 : montoPorPago;
        pagosArr.push({prestamo_id:prestamo.id,numero_pago:i+1,semana_inicio:sem.toISOString().slice(0,10),monto:montoEste,estado:'pendiente'});
      }
      return Promise.all(pagosArr.map(function(p){return from('prestamo_pagos').insert(p);}));
    }).then(function(){
      return from('notificaciones').insert({titulo:'📝 Nuevo préstamo registrado',cuerpo:usuario.nombre+' te registró: '+concepto+' — $'+monto+' en '+numPagos+' pago(s) semanales',icono:'📝',leida:false,para_rol:'operario',para_usuario:opBtn.dataset.id});
    }).then(function(){
      showToast('✅ Préstamo registrado');
      renderPrestamos();
    }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Registrar préstamo';});
  });
}

function renderNuevoBono(){
  var body=document.getElementById('enc-body');
  var hoyD=new Date();

function renderAsigCosechaSurcos(){
  var body=document.getElementById('enc-body');
  var t=cats.tablas.find(function(x){return x.id===cosecha.tablaId;});
  var n=(t&&t.cantidad_surcos)?t.cantidad_surcos:12;
  cosecha.surcos=[];
  var botones='';
  for(var i=1;i<=n;i++) botones+='<button type="button" class="surco-btn" data-n="'+i+'">'+i+'</button>';
  body.innerHTML='<div class="seccion-titulo">🧺 '+(t?t.nombre:'')+' · Surcos a cosechar</div><div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;"><button type="button" id="cos-todos" style="padding:4px 14px;border-radius:20px;border:1.5px solid var(--verde-mid);background:var(--verde-tenue);color:var(--verde);font-size:.78rem;font-weight:600;cursor:pointer;">Tabla completa</button><button type="button" id="cos-ninguno" style="padding:4px 14px;border-radius:20px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.78rem;cursor:pointer;">Limpiar</button></div><div class="surcos-grid" id="cos-fsc">'+botones+'</div><button class="btn-primary" id="cos-surcos-continuar" style="margin-top:1.25rem;">Continuar →</button><button class="btn-back" style="margin-top:.75rem;" onclick="renderAsigCosechaTablas()">← Volver a tabla</button>';
  document.querySelectorAll('#cos-fsc .surco-btn').forEach(function(b){b.addEventListener('click',function(){
    var num=parseInt(this.dataset.n);var idx=cosecha.surcos.indexOf(num);
    if(idx>-1){cosecha.surcos.splice(idx,1);this.classList.remove('sel');}else{cosecha.surcos.push(num);this.classList.add('sel');}
  });});
  document.getElementById('cos-todos').addEventListener('click',function(){
    cosecha.surcos=[];
    document.querySelectorAll('#cos-fsc .surco-btn').forEach(function(b){cosecha.surcos.push(parseInt(b.dataset.n));b.classList.add('sel');});
  });

    cosecha.surcos=[];
    document.querySelectorAll('#cos-fsc .surco-btn').forEach(function(b){b.classList.remove('sel');});
  });

    if(!cosecha.surcos.length){alert('Selecciona al menos un surco, o toca "Tabla completa".');return;}
    renderAsigCosechaOperarios();
  });
}

function renderValidar(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">Validar aplicaciones</div><div class="loading">Cargando...</div>';
  from('ordenes_trabajo').select('*,tabla:tablas(nombre,plantacion_id),formula:formulas_aplicacion(nombre,via,categoria),operario:usuarios!operario_id(nombre),asignador:usuarios!asignado_por(nombre)').eq('validado_ingeniero',false).not('formula_id','is','null').order('creado_en',{ascending:false}).get().then(function(rows){

    var html='<div class="seccion-titulo">Validar aplicaciones <span style="font-size:.75rem;color:var(--gris-3);font-weight:600;">('+rows.length+' pendientes)</span></div>';
    html+=rows.map(function(o){

      return '<div class="orden-card" data-oid="'+o.id+'"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.92rem">'+(o.formula?o.formula.nombre:'')+'</strong><span style="font-size:.72rem;color:var(--gris-3)">'+(o.formula?o.formula.via:'')+'</span></div><div class="orden-meta">📍 '+(p?p.nombre:'')+' · '+o.tabla.nombre+'<br>👤 Asignó: '+(o.asignador?o.asignador.nombre:'')+' · Operario: '+(o.operario?o.operario.nombre:'')+'<br>💧 '+numFmt(o.volumen_aplicado_litros)+' L con '+(BOMBA_LABELS[o.bomba_usada]||o.bomba_usada)+' · 📅 '+o.fecha_asignacion+'</div><button type="button" class="btn-sm btn-completar" data-validar="'+o.id+'" style="margin-top:.5rem;">✅ Validar</button></div>';
    }).join('');

      btn.addEventListener('click',function(){
        var oid=this.dataset.validar;

function tabOperario(tab){
  ['asistencia','tareas','pagos','op-notif','perfil'].forEach(function(t){var el=document.getElementById('tab-'+t);if(el)el.classList.remove('active');});
  pararRiegoTimer();
  if(tab==='tareas'){document.getElementById('tab-tareas').classList.add('active');cargarTareas();}
  else if(tab==='asistencia'){document.getElementById('tab-asistencia').classList.add('active');renderAsistenciaMenu();}
  else if(tab==='pagos'){document.getElementById('tab-pagos').classList.add('active');renderPagosMenu();}

  else{document.getElementById('tab-op-notif').classList.add('active');renderNotifs('op-body');}
}

function inicioDeSemana(fecha){
  var d=new Date(fecha); d.setHours(0,0,0,0);
  var dia=d.getDay();
  d.setDate(d.getDate()-((dia+6)%7));
  return d;
}

function renderPagoHorasExtras(fechaRef){
  var body=document.getElementById('op-body');
  body.innerHTML='<div class="seccion-titulo">⏰ Pago de horas extra</div><div class="loading">Calculando...</div>';
  var lunes=inicioDeSemana(fechaRef);
  var domingo=new Date(lunes); domingo.setDate(lunes.getDate()+6);
  var semanaInicio=lunes.toISOString().slice(0,10), semanaFin=domingo.toISOString().slice(0,10);
  var numSemana=numeroSemanaISO(lunes);
  Promise.all([
    from('config_app').select('*').get(),
    from('asistencia_registros').select('*').eq('usuario_id',usuario.id).eq('modalidad','extras').gte('fecha',semanaInicio).lte('fecha',semanaFin).get(),
    from('pagos_extra_estado').select('*').eq('operario_id',usuario.id).eq('semana_inicio',semanaInicio).get()
  ]).then(function(r){
    var cfg={}; (r[0]||[]).forEach(function(c){cfg[c.clave]=c.valor;});
    var tarifa=parseFloat(cfg.tarifa_hora_extra)||70;
    var registros=r[1]||[];
    var estadoRow=r[2]&&r[2][0];
    var porDia={};
    registros.forEach(function(reg){
      if(!porDia[reg.fecha]) porDia[reg.fecha]={entrada:null,salida:null};
      if(reg.tipo==='entrada'&&(!porDia[reg.fecha].entrada||reg.registrado_en<porDia[reg.fecha].entrada)) porDia[reg.fecha].entrada=reg.registrado_en;
      if(reg.tipo==='salida'&&(!porDia[reg.fecha].salida||reg.registrado_en>porDia[reg.fecha].salida)) porDia[reg.fecha].salida=reg.registrado_en;
    });
    var dias=Object.keys(porDia).sort();
    var totalHoras=0;
    var detalle=dias.map(function(f){
      var d=porDia[f];
      var horas=(d.entrada&&d.salida)?(new Date(d.salida)-new Date(d.entrada))/3600000:0;
      totalHoras+=horas;
      var hE=d.entrada?new Date(d.entrada).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true}):'—';

      return {fecha:f,horas:horas,texto:f+' · '+hE+' → '+hS+' ('+horas.toFixed(1)+'h)'};
    });
    var total=totalHoras*tarifa;
    var pagado=estadoRow&&estadoRow.estado==='pagado';
    var mesInicio=lunes.toLocaleDateString('es-MX',{month:'long'});
    var mesFin=domingo.toLocaleDateString('es-MX',{month:'long'});
    var rango=(mesInicio===mesFin)?('del '+lunes.getDate()+' al '+domingo.getDate()+' de '+mesFin+' '+domingo.getFullYear()):('del '+lunes.getDate()+' '+mesInicio+' al '+domingo.getDate()+' '+mesFin+' '+domingo.getFullYear());
    var hoy=new Date().toISOString().slice(0,10);
    var esSemanaActual = hoy>=semanaInicio && hoy<=semanaFin;

    var html='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">⏰ Pago de horas extra<button type="button" onclick="renderPagosMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Pagos</button></div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;"><button type="button" id="pg-ext-ant" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;">← Semana anterior</button>'+(esSemanaActual?'':'<button type="button" id="pg-ext-sig" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;">Semana siguiente →</button>')+'</div>';

    html+='<div class="form-card" style="text-align:center;'+(pagado?'border:2px solid var(--verde-mid);':'border:2px solid var(--tierra);')+'">';
    html+='<div style="font-size:.8rem;color:var(--gris-3);">Horas extra semana '+numSemana+'</div>';
    html+='<div style="font-size:.85rem;font-weight:700;margin-bottom:.75rem;">'+rango+'</div>';
    html+='<div style="font-size:2rem;font-weight:800;color:'+(pagado?'var(--verde-mid)':'var(--tierra)')+';">$'+total.toFixed(2)+'</div>';
    html+='<div style="display:inline-block;margin-top:.5rem;padding:.3rem 1rem;border-radius:20px;background:'+(pagado?'var(--verde-tenue)':'var(--tierra-tenue)')+';color:'+(pagado?'var(--verde-mid)':'var(--tierra)')+';font-weight:700;font-size:.8rem;">'+(pagado?'✅ Pagado':'⏳ Pendiente')+'</div>';
    html+='</div>';

    html+='<div class="form-card" style="margin-top:.75rem;">';
    html+='<div class="resumen-row"><span class="resumen-key">Tarifa por hora</span><span class="resumen-val">$'+tarifa.toFixed(2)+'</span></div>';
    html+='<div class="resumen-row"><span class="resumen-key">Total de horas</span><span class="resumen-val" style="color:var(--verde-mid);">'+totalHoras.toFixed(1)+' h</span></div>';
    html+='</div>';

    if(detalle.length){
      html+='<div class="seccion-titulo" style="margin-top:1rem;">Detalle por día</div>';
      html+=detalle.map(function(d){return '<div style="background:var(--blanco);border-radius:10px;padding:.6rem .75rem;font-size:.8rem;margin-bottom:.35rem;">'+d.texto+'</div>';}).join('');
    } else {
      html+='<div class="empty" style="margin-top:1rem;">Sin horas extra esta semana.</div>';
    }

    body.innerHTML=html;
    var btnAnt=document.getElementById('pg-ext-ant');
    if(btnAnt) btnAnt.addEventListener('click',function(){var d=new Date(lunes);d.setDate(d.getDate()-7);renderPagoHorasExtras(d);});
    var btnSig=document.getElementById('pg-ext-sig');
    if(btnSig) btnSig.addEventListener('click',function(){var d=new Date(lunes);d.setDate(d.getDate()+7);renderPagoHorasExtras(d);});
  }).catch(function(e){body.innerHTML='<div class="empty">No se pudo calcular tus horas extra.<br/><span style="font-size:.7rem;color:var(--gris-3);">('+e.message+')</span></div><button class="btn-back" style="margin-top:1rem;" onclick="renderPagosMenu()">← Volver a Pagos</button>';});
}

function renderDebo(){
  var body=document.getElementById('op-body');
  body.innerHTML='<div class="seccion-titulo">📝 Debo</div><div class="loading">Cargando...</div>';
  from('prestamos').select('*').eq('operario_id',usuario.id).eq('estado','activo').order('creado_en',{ascending:false}).get().then(function(prestamos){
    if(!prestamos||!prestamos.length){
      body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">📝 Debo<button type="button" onclick="renderPagosMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Pagos</button></div><div class="empty">🎉 No tienes préstamos ni adelantos activos.</div>';
      return;
    }
    var ids=prestamos.map(function(p){return p.id;});
    from('prestamo_pagos').select('*').in('prestamo_id',ids).order('numero_pago',{ascending:true}).get().then(function(pagos){
      var html='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">📝 Debo<button type="button" onclick="renderPagosMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Pagos</button></div>';
      html+='<p class="hint" style="margin-bottom:1rem;">Tienes '+prestamos.length+' préstamo(s) activo(s)</p>';
      prestamos.forEach(function(p){
        var pagosDe=pagos.filter(function(x){return x.prestamo_id===p.id;});
        var pagados=pagosDe.filter(function(x){return x.estado==='descontado';});
        var pendientes=pagosDe.filter(function(x){return x.estado==='pendiente';});
        var restante=pendientes.reduce(function(s,x){return s+parseFloat(x.monto);},0);
        var proximo=pendientes.sort(function(a,b){return a.semana_inicio.localeCompare(b.semana_inicio);})[0];
        var numSemProx=proximo?numeroSemanaISO(new Date(proximo.semana_inicio+'T00:00:00')):null;
        html+='<div class="form-card" style="margin-bottom:.75rem;"><div style="font-weight:800;font-size:.95rem;">'+p.concepto+'</div><div class="hint" style="margin:.2rem 0 .6rem;">Monto total: $'+parseFloat(p.monto_total).toFixed(2)+'</div>';
        html+=pagosDe.map(function(pg){
          var ns=numeroSemanaISO(new Date(pg.semana_inicio+'T00:00:00'));
          var pagado=pg.estado==='descontado';
          return '<div style="display:flex;justify-content:space-between;font-size:.82rem;padding:.35rem 0;border-bottom:1px solid var(--gris-1);"><span>Pago '+pg.numero_pago+' de '+p.num_pagos+' · Sem '+ns+'</span><span style="font-weight:700;color:'+(pagado?'var(--verde-mid)':'var(--tierra)')+';">$'+parseFloat(pg.monto).toFixed(2)+' '+(pagado?'✅':'⏳')+'</span></div>';
        }).join('');
        html+='<div style="margin-top:.6rem;padding-top:.5rem;border-top:2px solid var(--gris-1);display:flex;justify-content:space-between;"><strong style="font-size:.85rem;">Resta por pagar</strong><strong style="font-size:.95rem;color:var(--tierra);">$'+restante.toFixed(2)+'</strong></div>';
        if(proximo) html+='<div class="hint" style="margin-top:.2rem;">Próximo descuento: semana '+numSemProx+' ('+proximo.semana_inicio+')</div>';
        html+='</div>';
      });
      body.innerHTML=html;
    });
  }).catch(function(e){body.innerHTML='<div class="empty">Error: '+e.message+'</div><button class="btn-back" style="margin-top:1rem;" onclick="renderPagosMenu()">← Volver a Pagos</button>';});
}

function renderCartera(fechaRef){
  var body=document.getElementById('op-body');
  body.innerHTML='<div class="seccion-titulo">👛 Cartera</div><div class="loading">Calculando...</div>';
  var lunes=inicioDeSemana(fechaRef);
  var domingo=new Date(lunes); domingo.setDate(lunes.getDate()+6);
  var semanaInicio=lunes.toISOString().slice(0,10), semanaFin=domingo.toISOString().slice(0,10);
  var numSemana=numeroSemanaISO(lunes);
  Promise.all([
    from('usuarios').select('sueldo_base').eq('id',usuario.id).get(),
    from('asistencia_registros').select('*').eq('usuario_id',usuario.id).gte('fecha',semanaInicio).lte('fecha',semanaFin).get(),
    from('pagos_semana_estado').select('*').eq('operario_id',usuario.id).eq('semana_inicio',semanaInicio).get(),
    from('pagos_extra_estado').select('*').eq('operario_id',usuario.id).eq('semana_inicio',semanaInicio).get(),
    from('config_app').select('*').get(),
    from('bonos').select('*').eq('estado','activo').get(),
    from('prestamos').select('*').eq('operario_id',usuario.id).eq('estado','activo').get()
  ]).then(function(r){
    var sueldoBase=(r[0]&&r[0][0]&&r[0][0].sueldo_base)||0;
    var registros=r[1]||[];
    var estSemana=r[2]&&r[2][0];
    var estExtra=r[3]&&r[3][0];
    var cfg={}; (r[4]||[]).forEach(function(c){cfg[c.clave]=c.valor;});
    var tarifa=parseFloat(cfg.tarifa_hora_extra)||70;
    var bonosActivos=r[5]||[];
    var prestamosActivos=r[6]||[];

    var resumen=calcularResumenAsistencia(registros,semanaInicio);
    var totalSueldo=resumen.trabajados*sueldoBase;
    var pagadoSueldo=estSemana&&estSemana.estado==='pagado';

    var porDiaExtra={};
    registros.filter(function(x){return x.modalidad==='extras';}).forEach(function(reg){
      if(!porDiaExtra[reg.fecha]) porDiaExtra[reg.fecha]={entrada:null,salida:null};
      if(reg.tipo==='entrada'&&(!porDiaExtra[reg.fecha].entrada||reg.registrado_en<porDiaExtra[reg.fecha].entrada)) porDiaExtra[reg.fecha].entrada=reg.registrado_en;
      if(reg.tipo==='salida'&&(!porDiaExtra[reg.fecha].salida||reg.registrado_en>porDiaExtra[reg.fecha].salida)) porDiaExtra[reg.fecha].salida=reg.registrado_en;
    });
    var horasExtra=0;
    Object.keys(porDiaExtra).forEach(function(f){var d=porDiaExtra[f];if(d.entrada&&d.salida) horasExtra+=(new Date(d.salida)-new Date(d.entrada))/3600000;});
    var totalExtra=horasExtra*tarifa;
    var hayExtra=horasExtra>0;
    var pagadoExtra=estExtra&&estExtra.estado==='pagado';

    var bonosQueCalifican=bonosActivos.filter(function(b){
      if(b.periodo_fin<semanaInicio||b.periodo_inicio>semanaFin) return false;
      return (b.tipo==='equipo'||!b.umbral_minimo);
    });
    var totalBonos=bonosQueCalifican.reduce(function(s,b){return s+(parseFloat(b.monto)||0);},0);

    from('prestamo_pagos').select('*').in('prestamo_id',prestamosActivos.map(function(p){return p.id;})||['00000000-0000-0000-0000-000000000000']).eq('semana_inicio',semanaInicio).get().then(function(deduccionesRows){
      var deducciones=deduccionesRows||[];
      var totalDeducciones=deducciones.reduce(function(s,d){return s+parseFloat(d.monto);},0);

      var total=totalSueldo+totalExtra+totalBonos-totalDeducciones;
      var todoLoAplicablePagado = pagadoSueldo && (!hayExtra||pagadoExtra);

      var mesInicio=lunes.toLocaleDateString('es-MX',{month:'long'});
      var mesFin=domingo.toLocaleDateString('es-MX',{month:'long'});
      var rango=(mesInicio===mesFin)?('del '+lunes.getDate()+' al '+domingo.getDate()+' de '+mesFin+' '+domingo.getFullYear()):('del '+lunes.getDate()+' '+mesInicio+' al '+domingo.getDate()+' '+mesFin+' '+domingo.getFullYear());
      var hoy=new Date().toISOString().slice(0,10);
      var esSemanaActual = hoy>=semanaInicio && hoy<=semanaFin;

      var html='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">👛 Cartera<button type="button" onclick="renderPagosMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Pagos</button></div>';
      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;"><button type="button" id="cart-ant" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;">← Semana anterior</button>'+(esSemanaActual?'':'<button type="button" id="cart-sig" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;">Semana siguiente →</button>')+'</div>';

      html+='<div class="form-card" style="text-align:center;'+(todoLoAplicablePagado?'border:2px solid var(--verde-mid);':'border:2px solid var(--tierra);')+'">';
      html+='<div style="font-size:.8rem;color:var(--gris-3);">Cartera semana '+numSemana+'</div>';

function haversineMetros(lat1,lng1,lat2,lng2){
  var R=6371000;
  var toRad=function(d){return d*Math.PI/180;};
  var dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function marcarAsistencia(tipo,modalidad){
  var hoy=new Date().toISOString().slice(0,10);
  var ahoraDate=new Date();
  var ahora=ahoraDate.toISOString();
  var retardo=false;
  if(tipo==='entrada'&&modalidad==='labores'){
    var minutos=ahoraDate.getHours()*60+ahoraDate.getMinutes();
    retardo = minutos > (7*60+30);
  }
  var payload={usuario_id:usuario.id,tipo:tipo,modalidad:modalidad,registrado_en:ahora,fecha:hoy,retardo:retardo};
  if(modalidad==='extras'&&window._extraHoyId) payload.horas_extra_id=window._extraHoyId;

  function guardarConUbicacion(lat,lng){
    if(lat!=null) payload.lat=lat;
    if(lng!=null) payload.lng=lng;
    var chequeoZona = (lat!=null&&lng!=null) ? from('config_app').select('*').get() : Promise.resolve(null);
    chequeoZona.then(function(rows){
      if(rows){
        var cfg={}; rows.forEach(function(r){cfg[r.clave]=r.valor;});
        if(cfg.rancho_lat&&cfg.rancho_lng){
          var d=haversineMetros(lat,lng,parseFloat(cfg.rancho_lat),parseFloat(cfg.rancho_lng));
          payload.fuera_de_zona = d > (parseFloat(cfg.rancho_radio_metros)||800);
        }
      }
      return from('asistencia_registros').insert(payload);
    }).then(function(){
      pintarMensajeAsistencia(tipo,modalidad,ahora,retardo);
      showToast('✅ '+(tipo==='entrada'?'Entrada':'Salida')+' registrada'+(retardo?' — con retardo':'')+(payload.fuera_de_zona?' ⚠️ fuera de zona':''));
    }).catch(function(e){alert('Error: '+e.message);});
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){guardarConUbicacion(pos.coords.latitude,pos.coords.longitude);},
      function(){guardarConUbicacion(null,null);},
      {timeout:6000,maximumAge:60000}
    );
  } else {
    guardarConUbicacion(null,null);
  }
}

function calcularResumenAsistencia(registros,primerDia){
  var hoy=new Date(); hoy.setHours(0,0,0,0);
  var trabajadosSet={};
  var retardosFechas=[];
  registros.forEach(function(r){
    if(r.modalidad==='labores'&&r.tipo==='entrada'){
      trabajadosSet[r.fecha]=r.registrado_en;
      if(r.retardo) retardosFechas.push({fecha:r.fecha,hora:r.registrado_en});
    }
  });
  var faltasFechas=[];
  var d=new Date(primerDia+'T00:00:00');
  while(d<hoy){
    if(d.getDay()!==0){
      var fStr=d.toISOString().slice(0,10);
      if(!trabajadosSet[fStr]) faltasFechas.push(fStr);
    }
    d.setDate(d.getDate()+1);
  }
  var trabajadosFechas=Object.keys(trabajadosSet).sort().reverse();
  return {trabajados:trabajadosFechas.length,retardos:retardosFechas.length,faltas:faltasFechas.length,trabajadosFechas:trabajadosFechas,retardosFechas:retardosFechas.sort(function(a,b){return b.fecha.localeCompare(a.fecha);}),faltasFechas:faltasFechas.sort().reverse(),trabajadosHoras:trabajadosSet};
}

function numeroSemanaISO(fecha){
  var d=new Date(Date.UTC(fecha.getFullYear(),fecha.getMonth(),fecha.getDate()));
  var dayNum=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-dayNum);
  var yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-yearStart)/86400000)+1)/7);
}

function pintarHistorialMes(mesStr){
  var cont=document.getElementById('hist-contenido');
  if(!cont) return;
  var registros=window._histRegistros||[], permisos=window._histPermisos||[];
  var primerDiaMes=mesStr+'-01';
  var registrosMes=registros.filter(function(reg){return reg.fecha.slice(0,7)===mesStr;});
  var resumen=calcularResumenAsistencia(registrosMes,primerDiaMes);
  var porDia={};
  registrosMes.forEach(function(reg){
    var key=reg.fecha+'|'+reg.modalidad;
    if(!porDia[key]) porDia[key]={fecha:reg.fecha,modalidad:reg.modalidad,entrada:null,salida:null,retardo:false};
    if(reg.tipo==='entrada'&&(!porDia[key].entrada||reg.registrado_en<porDia[key].entrada)){porDia[key].entrada=reg.registrado_en;porDia[key].retardo=reg.retardo;}
    if(reg.tipo==='salida'&&(!porDia[key].salida||reg.registrado_en>porDia[key].salida)) porDia[key].salida=reg.registrado_en;
  });
  var claves=Object.keys(porDia).sort().reverse();
  var totalHorasExtra=0;
  claves.forEach(function(k){
    var d=porDia[k];
    if(d.modalidad==='extras'&&d.entrada&&d.salida){
      totalHorasExtra += (new Date(d.salida)-new Date(d.entrada))/3600000;
    }
  });
  window._histResumenActual=resumen;
  var html='<div class="stats-row"><div class="stat-card" data-cat="trabajados" style="cursor:pointer;"><div class="stat-num stat-vd">'+resumen.trabajados+'</div><div class="stat-lbl">Trabajados</div></div><div class="stat-card" data-cat="faltas" style="cursor:pointer;"><div class="stat-num" style="color:var(--rojo);">'+resumen.faltas+'</div><div class="stat-lbl">Faltas</div></div><div class="stat-card" data-cat="retardos" style="cursor:pointer;"><div class="stat-num stat-am">'+resumen.retardos+'</div><div class="stat-lbl">Retardos</div></div></div><div id="hist-detalle-cat"></div>';
  html+='<div style="background:var(--verde-tenue);border-radius:var(--radio-sm);padding:.85rem;margin-bottom:1rem;text-align:center;"><strong style="color:var(--verde);font-size:1.1rem;">'+totalHorasExtra.toFixed(1)+' h</strong><div class="hint" style="margin:0;">Total de horas extra trabajadas</div></div>';
  if(claves.length){
    var semanas={};
    claves.forEach(function(k){
      var d=porDia[k];
      var fd=new Date(d.fecha+'T00:00:00');
      var diaSemana=fd.getDay();
      var lunes=new Date(fd);
      lunes.setDate(fd.getDate()-((diaSemana+6)%7));
      var domingo=new Date(lunes);
      domingo.setDate(lunes.getDate()+6);
      var claveSemana=lunes.toISOString().slice(0,10);
      if(!semanas[claveSemana]) semanas[claveSemana]={inicio:lunes,fin:domingo,dias:[],trabajados:0,horasExtra:0};
      semanas[claveSemana].dias.push(d);
      if(d.modalidad==='labores') semanas[claveSemana].trabajados++;
      if(d.modalidad==='extras'&&d.entrada&&d.salida) semanas[claveSemana].horasExtra += (new Date(d.salida)-new Date(d.entrada))/3600000;
    });
    var clavesSemana=Object.keys(semanas).sort().reverse();
    html+='<div class="seccion-titulo" style="margin-top:0;">Por semana</div>';
    html+=clavesSemana.map(function(sk){
      var s=semanas[sk];
      var numSemana=numeroSemanaISO(s.inicio);
      var mesInicio=s.inicio.toLocaleDateString('es-MX',{month:'long'});
      var mesFin=s.fin.toLocaleDateString('es-MX',{month:'long'});
      var rango = (mesInicio===mesFin)
        ? ('del '+s.inicio.getDate()+' al '+s.fin.getDate()+' de '+mesFin+' '+s.fin.getFullYear())
        : ('del '+s.inicio.getDate()+' '+mesInicio+' al '+s.fin.getDate()+' '+mesFin+' '+s.fin.getFullYear());
      var filas=s.dias.map(function(d){
        var hE=d.entrada?new Date(d.entrada).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true}):'—';
        var hS=d.salida?new Date(d.salida).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true}):'—';
        return '<div style="font-size:.78rem;display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--gris-1);"><span>'+d.fecha+(d.modalidad==='extras'?' · extra':'')+(d.retardo?' · <span style="color:var(--rojo);font-weight:700;">retardo</span>':'')+'</span><span style="color:var(--verde-mid);font-weight:700;">'+hE+' → '+hS+'</span></div>';
      }).join('');
      return '<div class="orden-card"><div style="margin-bottom:.4rem;"><strong style="font-size:.85rem;">Semana '+numSemana+'</strong><div style="font-size:.75rem;color:var(--gris-3);">'+rango+' · '+s.trabajados+' días'+(s.horasExtra>0?' · '+s.horasExtra.toFixed(1)+'h extra':'')+'</div></div>'+filas+'</div>';
    }).join('');
  } else { html+='<div class="empty">Sin registros de asistencia este mes.</div>'; }
  if(permisos.length){
    var estLbl={pendiente:'⏳ Pendiente',aprobado:'✅ Aprobado',rechazado:'❌ Rechazado'};
    var estColor={pendiente:'var(--tierra)',aprobado:'var(--verde-mid)',rechazado:'var(--rojo)'};
    html+='<div class="seccion-titulo" style="margin-top:1rem;">Permisos</div>'+permisos.map(function(p){
        return '<div style="background:var(--blanco);border-radius:12px;padding:.75rem;font-size:.8rem;margin-bottom:.4rem;"><div style="display:flex;justify-content:space-between;"><span>'+(p.tipo==='medico'?'🩺 Médico':'👤 Personal')+' · '+p.fecha_inicio+' a '+p.fecha_fin+'</span><span style="color:'+estColor[p.estado]+';font-weight:700;">'+estLbl[p.estado]+'</span></div>'+(p.folio?'<div class="hint" style="margin-top:.2rem;">🔖 '+p.folio+'</div>':'')+(p.motivo?'<div class="hint" style="margin-top:.1rem;">'+p.motivo+'</div>':'')+(p.evidencia_url?'<div style="margin-top:.2rem;"><a href="'+p.evidencia_url+'" target="_blank" style="color:var(--verde-mid);font-weight:700;font-size:.78rem;">📎 Ver comprobante</a></div>':'')+'</div>';
      }).join('');
    }
    cont.innerHTML=html;
    cont.querySelectorAll('[data-cat]').forEach(function(el){el.addEventListener('click',function(){mostrarDetalleHistorial(this.dataset.cat);});});
}

function mostrarDetalleHistorial(cat){
  var det=document.getElementById('hist-detalle-cat');
  if(!det) return;
  var r=window._histResumenActual;
  if(!r) return;
  var html='';
  if(cat==='trabajados'){
    html='<div class="seccion-titulo" style="margin-top:.75rem;">✅ Días trabajados ('+r.trabajados+')</div>';
    if(!r.trabajadosFechas.length) html+='<div class="empty">Sin días trabajados este mes.</div>';
    else html+=r.trabajadosFechas.map(function(f){
      var hE=new Date(r.trabajadosHoras[f]).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true});
      return '<div style="background:var(--blanco);border-radius:10px;padding:.6rem .75rem;font-size:.8rem;margin-bottom:.35rem;display:flex;justify-content:space-between;"><span>'+f+'</span><span style="color:var(--verde-mid);font-weight:700;">Entrada '+hE+'</span></div>';
    }).join('');
  } else if(cat==='faltas'){
    html='<div class="seccion-titulo" style="margin-top:.75rem;">❌ Faltas ('+r.faltas+')</div>';
    if(!r.faltasFechas.length) html+='<div class="empty">Sin faltas este mes 🎉</div>';
    else html+=r.faltasFechas.map(function(f){
      return '<div style="background:var(--blanco);border-radius:10px;padding:.6rem .75rem;font-size:.8rem;margin-bottom:.35rem;color:var(--rojo);font-weight:700;">'+f+'</div>';
    }).join('');
  } else if(cat==='retardos'){
    html='<div class="seccion-titulo" style="margin-top:.75rem;">⏰ Retardos ('+r.retardos+')</div>';
    if(!r.retardosFechas.length) html+='<div class="empty">Sin retardos este mes 🎉</div>';
    else html+=r.retardosFechas.map(function(x){
      var h=new Date(x.hora).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true});
      return '<div style="background:var(--blanco);border-radius:10px;padding:.6rem .75rem;font-size:.8rem;margin-bottom:.35rem;display:flex;justify-content:space-between;"><span>'+x.fecha+'</span><span style="color:var(--tierra);font-weight:700;">Entrada '+h+'</span></div>';
    }).join('');
  }
  det.innerHTML=html;
  det.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function pararRiegoTimer(){if(riegoTimer){clearInterval(riegoTimer);riegoTimer=null;}riegoAlarmaActiva=false;}

var SUBTAB_TAREAS_ACTUAL='porhacer';

function cargarTareas(subtab){
  if(subtab) SUBTAB_TAREAS_ACTUAL=subtab;
  pararRiegoTimer();
  riegoSincronizar();
  if(navigator.onLine) sincronizarEvidenciasPendientes().then(sincronizarColaGeneral);
  var body=document.getElementById('op-body');
  body.innerHTML=barraSubtabsTareas()+'<div id="tareas-contenido"><div class="loading">Cargando tus tareas...</div></div>';
  var hoy=new Date().toISOString().slice(0,10);
  Promise.all([
    from('ordenes_trabajo').select('*,tabla:tablas(nombre,plantacion_id,cantidad_surcos),tipo_labor:tipos_labor(nombre,requiere_cantidad_insumo,unidad_insumo,requiere_tiempo),subtipo:subtipos_labor(nombre)').eq('operario_id',usuario.id).in('estado',['pendiente','en_proceso']).order('fecha_asignacion',{ascending:true}).get(),
    from('ordenes_trabajo').select('*,tabla:tablas(nombre,plantacion_id),tipo_labor:tipos_labor(nombre,requiere_tiempo)').eq('operario_id',usuario.id).eq('fecha_asignacion',hoy).order('creado_en',{ascending:false}).get(),
    from('ordenes_trabajo').select('*,tabla:tablas(nombre,plantacion_id),tipo_labor:tipos_labor(nombre,requiere_tiempo)').eq('operario_id',usuario.id).eq('estado','completada').order('fecha_asignacion',{ascending:false}).limit(60).get()
  ]).then(function(res){
    var todas=res[0]||[], hoyOrdenes=res[1]||[], completadas=res[2]||[];
    var idsComp=completadas.map(function(o){return o.id;});
    var evidenciaFetch = idsComp.length ? from('registros_labor').select('orden_id,foto_url').in('orden_id',idsComp).get() : Promise.resolve([]);
    return evidenciaFetch.then(function(regs){
      var evidenciaPorOrden={};
      (regs||[]).forEach(function(r){evidenciaPorOrden[r.orden_id]=!!r.foto_url;});
      try{localStorage.setItem('mootsil_tareas_cache_'+usuario.id,JSON.stringify({todas:todas,hoyOrdenes:hoyOrdenes,completadas:completadas,evidenciaPorOrden:evidenciaPorOrden,ts:Date.now()}));}catch(e){}
      pintarTareas(todas,hoyOrdenes,false,completadas,evidenciaPorOrden);
    });
  }).catch(function(err){
    var cache=null;
    try{cache=JSON.parse(localStorage.getItem('mootsil_tareas_cache_'+usuario.id)||'null');}catch(e){}
    if(cache){ pintarTareas(cache.todas,cache.hoyOrdenes,true,cache.completadas||[],cache.evidenciaPorOrden||{}); }
    else{
      var cont=document.getElementById('tareas-contenido');
      if(cont) cont.innerHTML='<div class="empty">📡 Sin señal y sin tareas guardadas.<br/>Conéctate al menos una vez para descargarlas.</div>';
    }
  });
}

function barraSubtabsTareas(){
  var tabs=[['porhacer','Por Hacer'],['pendientes','Pendientes'],['terminadas','Terminadas'],['rendimiento','Rendimiento']];
  return '<div style="display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;">'+tabs.map(function(t){
    return '<button type="button" class="rep-view-btn'+(SUBTAB_TAREAS_ACTUAL===t[0]?' active':'')+'" data-subtab="'+t[0]+'" onclick="cargarTareas(\''+t[0]+'\')">'+t[1]+'</button>';
  }).join('')+'</div>';
}

function pintarTareas(todas,hoyOrdenes,esCache,completadas,evidenciaPorOrden){
  completadas=completadas||[]; evidenciaPorOrden=evidenciaPorOrden||{};
  var body=document.getElementById('op-body');
  if(!document.getElementById('tareas-contenido')){
    body.innerHTML=barraSubtabsTareas()+'<div id="tareas-contenido"></div>';
  }
  var cont=document.getElementById('tareas-contenido');
  if(SUBTAB_TAREAS_ACTUAL==='rendimiento'){
    renderRendimientoOperario();
    return;
  }
  try{
    var hoy=new Date().toISOString().slice(0,10);
    riegoOrdenes=hoyOrdenes.filter(function(o){return o.tipo_labor&&o.tipo_labor.requiere_tiempo;});
    var tareasTodas=todas.filter(function(t){return t.tabla&&!(t.tipo_labor&&t.tipo_labor.requiere_tiempo);});
    var porHacer=tareasTodas.filter(function(t){return t.estado==='pendiente';});
    var enProceso=tareasTodas.filter(function(t){return t.estado==='en_proceso';});
    var completadasNormales=completadas.filter(function(o){return o.tabla&&!(o.tipo_labor&&o.tipo_labor.requiere_tiempo);});

    function tarjetaTarea(t){
      var p=cats.plantaciones.find(function(x){return x.id===t.tabla.plantacion_id;});
      var ic=ICONOS[t.tipo_labor.nombre]||'🔧';
      var su=(t.surcos_asignados&&t.surcos_asignados.length)?t.surcos_asignados.join(', '):'Todos';
      var atrasada=t.fecha_asignacion<hoy;
      var etiquetaTipo=t.es_hora_extra?' <span style="color:var(--tierra);font-size:.7rem;font-weight:700;background:var(--tierra-tenue);padding:2px 8px;border-radius:10px;">⏰ Hora Extra</span>':' <span style="color:var(--verde-mid);font-size:.7rem;font-weight:700;background:var(--verde-tenue);padding:2px 8px;border-radius:10px;">🕐 Normal</span>';
      var progresoTxt='', etiquetaEstado='';
      if(t.estado==='en_proceso'){
        var tieneAvance=t.surcos_completados&&t.surcos_completados.length>0;
        var totalRef=(t.surcos_asignados&&t.surcos_asignados.length)?t.surcos_asignados.length:(t.tabla.cantidad_surcos||0);
        if(tieneAvance){
          progresoTxt='<br/>🔶 Avance: '+t.surcos_completados.length+'/'+totalRef+' surcos';
          etiquetaEstado=' <span style="color:var(--tierra);font-size:.7rem;font-weight:700;background:var(--tierra-tenue);padding:2px 8px;border-radius:10px;">🔶 No concluida</span>';
        } else {
          etiquetaEstado=' <span style="color:var(--verde-mid);font-size:.7rem;font-weight:700;background:var(--verde-tenue);padding:2px 8px;border-radius:10px;">🆕 Iniciada, sin avance</span>';
        }
      }
      return '<div class="tarea-card" style="'+(atrasada?'border-left-color:var(--rojo);':(t.es_hora_extra?'border-left-color:var(--tierra);':''))+'"><div class="tarea-title">'+ic+' '+t.tipo_labor.nombre+(t.subtipo?' · '+t.subtipo.nombre:'')+etiquetaTipo+etiquetaEstado+(atrasada?' <span style="color:var(--rojo);font-size:.72rem;font-weight:700;">⚠️ Desde '+t.fecha_asignacion+'</span>':'')+'</div><div class="tarea-meta">📍 '+(p?p.nombre:'')+' · '+t.tabla.nombre+'<br/>🔢 Surcos: '+su+progresoTxt+(t.notas_encargado?'<br/>📝 '+t.notas_encargado:'')+'</div><div style="margin-top:.75rem;display:flex;gap:8px;">'+(t.estado==='pendiente'?'<button class="btn-sm btn-iniciar" data-ini="'+t.id+'">▶ Iniciar</button>':'')+(t.estado==='en_proceso'?'<button class="btn-sm btn-completar" data-eje="'+t.id+'">✅ Registrar avance</button>':'')+'</div></div>';
    }

    var html='';
    if(SUBTAB_TAREAS_ACTUAL==='porhacer'){
      if(riegoOrdenes.length){
        var comp=riegoOrdenes.filter(function(o){return o.estado==='completada';}).length;
        if(comp<riegoOrdenes.length) html+='<div class="tarea-card" style="border-left-color:var(--tierra);cursor:pointer;" onclick="renderRiegoPlantaciones()"><div class="tarea-title">💧 Riego de hoy</div><div class="tarea-meta">'+comp+' de '+riegoOrdenes.length+' tablas regadas · toca para entrar</div></div>';
      }
      if(!porHacer.length&&!html){html+='<div class="empty">🌱 No tienes tareas por hacer.<br/>El encargado te asignará labores aquí.</div>';}
      else html+=porHacer.map(tarjetaTarea).join('');
    } else if(SUBTAB_TAREAS_ACTUAL==='pendientes'){
      if(riegoOrdenes.length){
        var comp2=riegoOrdenes.filter(function(o){return o.estado==='en_proceso';}).length;
        if(comp2>0) html+='<div class="tarea-card" style="border-left-color:var(--tierra);cursor:pointer;" onclick="renderRiegoPlantaciones()"><div class="tarea-title">💧 Riego en curso</div><div class="tarea-meta">Toca para continuar</div></div>';
      }
      if(!enProceso.length&&!html) html='<div class="empty">No tienes tareas en proceso.</div>';
      else html+=enProceso.map(tarjetaTarea).join('');
    } else if(SUBTAB_TAREAS_ACTUAL==='terminadas'){
      if(!completadasNormales.length){html='<div class="empty">Aún no tienes labores terminadas.</div>';}
      else html=completadasNormales.map(function(t){
        var p=cats.plantaciones.find(function(x){return x.id===t.tabla.plantacion_id;});
        var ic=ICONOS[t.tipo_labor.nombre]||'🔧';
        var tieneEvidencia=evidenciaPorOrden[t.id];
        var etiquetaTipo=t.es_hora_extra?' <span style="color:var(--tierra);font-size:.68rem;font-weight:700;">⏰ Hora Extra</span>':'';
        return '<div class="tarea-card" style="opacity:.75;border-left-color:var(--verde-mid);"><div class="tarea-title">'+ic+' '+t.tipo_labor.nombre+' 🔒'+etiquetaTipo+'</div><div class="tarea-meta">📍 '+(p?p.nombre:'')+' · '+t.tabla.nombre+' · '+t.fecha_asignacion+'<br/>'+(tieneEvidencia?'📷 Con evidencia':'Sin foto de evidencia')+'</div></div>';
      }).join('');
    }

    var prefijo=esCache?'<p class="hint" style="text-align:center;margin-bottom:.75rem;">📡 Sin señal — mostrando tus tareas guardadas.</p>':'';
    cont.innerHTML=prefijo+html;
    cont.querySelectorAll('[data-ini]').forEach(function(b){b.addEventListener('click',function(){
      var oid=this.dataset.ini;
      if(navigator.onLine) from('ordenes_trabajo').eq('id',oid).update({estado:'en_proceso'}).then(function(){cargarTareas();}).catch(function(){riegoEncolar(oid,{estado:'en_proceso'});cargarTareas();});
      else{riegoEncolar(oid,{estado:'en_proceso'});var t=todas.find(function(x){return x.id===oid;});if(t)t.estado='en_proceso';pintarTareas(todas,hoyOrdenes,true,completadas,evidenciaPorOrden);}
    });});
    cont.querySelectorAll('[data-eje]').forEach(function(b){b.addEventListener('click',function(){iniciarEjecucion(this.dataset.eje);});});
  }catch(err){
    cont.innerHTML='<div class="empty">Ocurrió un problema mostrando tus tareas.<br/>Cierra sesión y vuelve a entrar. Si persiste, avisa al admin.<br/><span style="font-size:.7rem;color:var(--gris-3);">('+err.message+')</span></div>';
  }
}

function renderRendimientoOperario(){
  var body=document.getElementById('op-body');
  if(!document.getElementById('tareas-contenido')){
    body.innerHTML=barraSubtabsTareas()+'<div id="tareas-contenido"></div>';
  }
  var cont=document.getElementById('tareas-contenido');
  cont.innerHTML='<div class="loading">Calculando rendimiento...</div>';
  var hoyD=new Date();
  var primerDiaMes=new Date(hoyD.getFullYear(),hoyD.getMonth(),1).toISOString().slice(0,10);
  var hoy=hoyD.toISOString().slice(0,10);
  var nombreMes=hoyD.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
  Promise.all([
    from('asistencia_registros').select('*').eq('usuario_id',usuario.id).gte('fecha',primerDiaMes).get(),
    from('ordenes_trabajo').select('fecha_asignacion,completado_en,estado').eq('operario_id',usuario.id).gte('fecha_asignacion',primerDiaMes).get(),
    from('evaluaciones_comportamiento').select('*').eq('operario_id',usuario.id).gte('periodo_fin',primerDiaMes).get(),
    from('bonos').select('*').eq('estado','activo').get()
  ]).then(function(r){
    var registrosAs=r[0]||[], ordenesMes=r[1]||[], evals=r[2]||[], bonos=r[3]||[];
    var resumenAs=calcularResumenAsistencia(registrosAs,primerDiaMes);
    var scoreAsistencia=Math.max(0,10-resumenAs.faltas*1.5-resumenAs.retardos*0.5);

    var completadasMes=ordenesMes.filter(function(o){return o.estado==='completada'&&o.completado_en;});
    var aTiempo=completadasMes.filter(function(o){return o.completado_en.slice(0,10)<=o.fecha_asignacion;}).length;
    var scoreTareas = completadasMes.length ? (aTiempo/completadasMes.length)*10 : 7;

    var atrasadasAbiertas=ordenesMes.filter(function(o){return o.estado==='en_proceso'&&o.fecha_asignacion<hoy;}).length;
    var scoreAvance=Math.max(0,10-atrasadasAbiertas*2);

    var horasExtraMes=0;
    var porDiaExtra={};
    registrosAs.filter(function(x){return x.modalidad==='extras';}).forEach(function(reg){
      if(!porDiaExtra[reg.fecha]) porDiaExtra[reg.fecha]={entrada:null,salida:null};
      if(reg.tipo==='entrada'&&(!porDiaExtra[reg.fecha].entrada||reg.registrado_en<porDiaExtra[reg.fecha].entrada)) porDiaExtra[reg.fecha].entrada=reg.registrado_en;
      if(reg.tipo==='salida'&&(!porDiaExtra[reg.fecha].salida||reg.registrado_en>porDiaExtra[reg.fecha].salida)) porDiaExtra[reg.fecha].salida=reg.registrado_en;
    });
    Object.keys(porDiaExtra).forEach(function(f){var d=porDiaExtra[f];if(d.entrada&&d.salida) horasExtraMes+=(new Date(d.salida)-new Date(d.entrada))/3600000;});
    var scoreExtra=Math.min(10,5+horasExtraMes*0.3);

    var scoreComportamiento = evals.length ? (evals.reduce(function(s,e){return s+parseFloat(e.calificacion);},0)/evals.length) : 7;

    var pesos={asistencia:.30,tareas:.25,avance:.15,extra:.10,comportamiento:.20};
    var scoreFinal = scoreAsistencia*pesos.asistencia + scoreTareas*pesos.tareas + scoreAvance*pesos.avance + scoreExtra*pesos.extra + scoreComportamiento*pesos.comportamiento;
    scoreFinal = Math.max(0,Math.min(10,scoreFinal));

    var color = scoreFinal>=8?'var(--verde-mid)':scoreFinal>=6?'var(--tierra)':'var(--rojo)';
    var pct=(scoreFinal/10)*100;

    var bonosCalificando=bonos.filter(function(b){return (b.tipo==='individual'||b.tipo==='equipo')&&(!b.umbral_minimo||scoreFinal>=parseFloat(b.umbral_minimo));});

    var html='';
    html+='<div class="seccion-titulo" style="text-transform:capitalize;">Rendimiento de '+nombreMes+'</div>';
    html+='<div class="form-card" style="text-align:center;">';
    if(usuario.avatarUrl) html+='<img src="'+usuario.avatarUrl+'" style="max-height:140px;object-fit:contain;margin-bottom:.5rem;">';
    html+='<div style="font-size:2.2rem;font-weight:800;color:'+color+';">'+scoreFinal.toFixed(1)+'<span style="font-size:1.1rem;color:var(--gris-3);">/10</span></div>';

    document.getElementById('riego-iniciar').addEventListener('click',function(){

    });
    return;
  }

  if(o.estado==='en_proceso'){
    var inicio=new Date(o.hora_inicio_real).getTime();
    var finMs=inicio+o.duracion_minutos*60000;
    body.innerHTML='<div class="seccion-titulo">💧 '+(p?p.nombre:'')+' · '+o.tabla.nombre+'</div><div class="riego-ejec-card" id="riego-card"><div class="riego-ejec-min" id="riego-cuenta">--:--</div><p class="hint" id="riego-msg">Riego en curso</p><button class="btn-primary" style="background:var(--rojo)" id="riego-terminar">⏹ Terminar riego</button></div><p class="hint" style="margin-top:.75rem;">Mantén esta pantalla abierta para escuchar la alarma cuando falten 5 min.</p><button class="btn-back" style="margin-top:.5rem;" onclick="renderRiegoTablas(\''+o.tabla.plantacion_id+'\')">← Volver a tablas</button>';
    document.getElementById('riego-terminar').addEventListener('click',function(){
      pararRiegoTimer();
      riegoActualizarEstado(o,{estado:'completada',hora_fin_real:new Date().toISOString()});
      renderRiegoTablas(o.tabla.plantacion_id);
    });
    function tick(){
      var restanteMs=finMs-Date.now();
      var card=document.getElementById('riego-card'), cuenta=document.getElementById('riego-cuenta'), msg=document.getElementById('riego-msg');
      if(!card) {pararRiegoTimer();return;}
      var neg=restanteMs<0, abs=Math.abs(restanteMs);
      var mm=Math.floor(abs/60000), ss=Math.floor((abs%60000)/1000);
      cuenta.textContent=(neg?'+':'')+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
      if(restanteMs<=5*60000){
        riegoAlarmaActiva=true;
        card.classList.add('riego-alarma');
        msg.textContent=neg?'⏰ Tiempo cumplido — cierra esta tabla':'⏰ Faltan 5 min — prepárate para cambiar de tabla';
        sonarAlarmaRiego();
      } else {
        card.classList.remove('riego-alarma');
        msg.textContent='Riego en curso';
      }
    }
    tick();
    riegoTimer=setInterval(tick,1000);
  }
}

function sonarAlarmaRiego(){
  try{
    if(!riegoAudioCtx) riegoAudioCtx=new (window.AudioContext||window.webkitAudioContext)();
    var ctx=riegoAudioCtx;
    if(ctx.state==='suspended') ctx.resume();
    var t0=ctx.currentTime;
    var o1=ctx.createOscillator(), g=ctx.createGain();
    o1.type='square';
    o1.frequency.setValueAtTime(700,t0);
    o1.frequency.linearRampToValueAtTime(1400,t0+0.45);
    o1.frequency.linearRampToValueAtTime(700,t0+0.9);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(1,t0+0.05);
    g.gain.setValueAtTime(1,t0+0.85);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.95);
    o1.connect(g);g.connect(ctx.destination);
    o1.start(t0);o1.stop(t0+1);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([350,120,350,120,350]);
}
