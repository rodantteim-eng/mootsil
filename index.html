function renderRiegoEjecucion(ordenId){
  pararRiegoTimer();
  var body=document.getElementById('op-body');
  var o=riegoOrdenes.find(function(x){return x.id===ordenId;});
  if(!o){renderRiegoPlantaciones();return;}
  var p=cats.plantaciones.find(function(x){return x.id===o.tabla.plantacion_id;});

  if(o.estado==='pendiente'){
    body.innerHTML='<div class="seccion-titulo">💧 '+(p?p.nombre:'')+' · '+o.tabla.nombre+'</div><div class="riego-ejec-card"><div class="riego-ejec-min">'+o.duracion_minutos+' min</div><p class="hint">Duración programada por el encargado</p><button class="btn-primary" id="riego-iniciar">▶ Iniciar riego</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderRiegoTablas(\''+o.tabla.plantacion_id+'\')">← Volver a tablas</button>';
    document.getElementById('riego-iniciar').addEventListener('click',function(){
      var ahora=new Date().toISOString();
      riegoActualizarEstado(o,{estado:'en_proceso',hora_inicio_real:ahora});
      renderRiegoEjecucion(ordenId);
    });
    return;
  }

  if(o.estado==='en_proceso'){
    var inicio=new Date(o.hora_inicio_real).getTime();
    var finMs=inicio+o.duracion_minutos*60000;
    body.innerHTML='<div class="seccion-titulo">💧 '+(p?p.nombre:'')+' · '+o.tabla.nombre+'</div><div class="riego-ejec-card" id="riego-card"><div class="riego-ejec-min" id="riego-cuenta">--:--</div><p class="hint" id="riego-msg">Riego en curso</p><button class="btn-primary" style="background:var(--rojo)" id="riego-terminar">⏹ Terminar riego</button></div><p class="hint" style="margin-top:.75rem;">Mantén esta pantalla abierta para escuchar la alarma cuando falten 5 min.</p><button class="btn-back" style="margin-top:.5rem;" onclick="renderRiegoTablas(\''+o.tabla.plantacion_id+'\')">← Volver a tablas</button>';
    document.getElementById('riego-terminar').addEventListener('click',function(){
      pararRiegoTimer();
      riegoActualizarEstado(o,{estado:'completada',hora_fin_real:new Date().toISOString()});
      renderRiegoTablas(o.tabla.plantacion_id);
    });
    function tick(){
      var restanteMs=finMs-Date.now();
      var card=document.getElementById('riego-card'), cuenta=document.getElementById('riego-cuenta'), msg=document.getElementById('riego-msg');
      if(!card) {pararRiegoTimer();return;}
      var neg=restanteMs<0, abs=Math.abs(restanteMs);
      var mm=Math.floor(abs/60000), ss=Math.floor((abs%60000)/1000);
      cuenta.textContent=(neg?'+':'')+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
      if(restanteMs<=5*60000){
        riegoAlarmaActiva=true;
        card.classList.add('riego-alarma');
        msg.textContent=neg?'⏰ Tiempo cumplido — cierra esta tabla':'⏰ Faltan 5 min — prepárate para cambiar de tabla';
        sonarAlarmaRiego();
      } else {
        card.classList.remove('riego-alarma');
        msg.textContent='Riego en curso';
      }
    }
    tick();
    riegoTimer=setInterval(tick,1000);
  }
}

function sonarAlarmaRiego(){
  try{
    if(!riegoAudioCtx) riegoAudioCtx=new (window.AudioContext||window.webkitAudioContext)();
    var ctx=riegoAudioCtx;
    if(ctx.state==='suspended') ctx.resume();
    var t0=ctx.currentTime;
    var o1=ctx.createOscillator(), g=ctx.createGain();
    o1.type='square';
    o1.frequency.setValueAtTime(700,t0);
    o1.frequency.linearRampToValueAtTime(1400,t0+0.45);
    o1.frequency.linearRampToValueAtTime(700,t0+0.9);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(1,t0+0.05);
    g.gain.setValueAtTime(1,t0+0.85);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.95);
    o1.connect(g);g.connect(ctx.destination);
    o1.start(t0);o1.stop(t0+1);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([350,120,350,120,350]);
}

function iniciarEjecucion(oid){
  from('ordenes_trabajo').select('*,tabla:tablas(nombre,plantacion_id,cantidad_surcos),tipo_labor:tipos_labor(nombre,requiere_cantidad_insumo,unidad_insumo,requiere_formula),subtipo:subtipos_labor(nombre)').eq('id',oid).single().then(function(o){
    ordenEjecutando=o; pasoEjec=1; capturaEjec={surcos:[],cantidad:0,foto:false};
    if(o.tipo_labor&&o.tipo_labor.requiere_formula&&o.formula_id){
      Promise.all([
        from('formulas_aplicacion').select('*').eq('id',o.formula_id).get(),
        from('formula_componentes').select('*,item:inventario_items(nombre,unidad)').eq('formula_id',o.formula_id).get()
      ]).then(function(r){
        ordenEjecutando.formula=r[0]&&r[0][0];
        ordenEjecutando.componentesFormula=r[1]||[];
        renderEjec();
      });
    } else {
      renderEjec();
    }
  });
}

    var evid=capturaEjec.foto?'<div style="padding:.75rem;background:var(--verde-tenue);border-radius:var(--radio);color:var(--verde);font-size:.85rem;text-align:center;margin-bottom:1rem;">✅ Evidencia capturada</div>':'';

function aplicarRangoOp(){
  var ini=parseInt(document.getElementById('op-ri').value)||1;

function guardarEjec(){
  var o=ordenEjecutando;
  if(capturaEjec.foto&&capturaEjec.fotoBlob&&!capturaEjec.fotoUrl){
    // Esperar a que la foto termine de subirse

    mostrar('screen-exito');
    var nombre='evidencia_'+Date.now()+'.jpg';
    var esVideo=capturaEjec.esVideo||false;
    var ext=esVideo?'.webm':'.jpg';
    var mime=esVideo?'video/webm':'image/jpeg';
    fetch(URL_SB+'/storage/v1/object/evidencias/'+nombre.replace('.jpg',ext),{method:'POST',headers:{'apikey':KEY_SB,'Authorization':'Bearer '+KEY_SB,'Content-Type':mime,'x-upsert':'true'},body:capturaEjec.fotoBlob}).then(function(){
      capturaEjec.fotoUrl=URL_SB+'/storage/v1/object/public/evidencias/'+nombre.replace('.jpg',ext);

function ejecutarGuardadoFinal(o){
  var esAplic=o.tipo_labor&&o.tipo_labor.requiere_formula;
  var reg={usuario_id:usuario.id,tabla_id:o.tabla_id,tipo_labor_id:o.tipo_labor_id,subtipo_labor_id:o.subtipo_labor_id||null,surcos_trabajados:esAplic?[]:capturaEjec.surcos,cantidad_insumo:esAplic?o.volumen_aplicado_litros:(capturaEjec.cantidad||null),foto_url:capturaEjec.fotoUrl||null,capturado_en:new Date().toISOString(),orden_id:o.id};
  if(!navigator.onLine){
    colaOffline.push(reg);
    localStorage.setItem('mootsil_cola',JSON.stringify(colaOffline));
    from('ordenes_trabajo').eq('id',o.id).update({estado:'completada'}).then(function(){
      document.getElementById('exito-sub').textContent='Sin señal. Guardado en tu dispositivo y se subirá cuando haya internet.';
      mostrar('screen-exito'); ordenEjecutando=null;
    });
    return;
  }
  from('registros_labor').insert(reg).then(function(){
    from('ordenes_trabajo').eq('id',o.id).update({estado:'completada'}).then(function(){
      var lb=cats.tiposLabor.find(function(l){return l.id===o.tipo_labor_id;}), tb=cats.tablas.find(function(t){return t.id===o.tabla_id;});
      showToast('✅ '+usuario.nombre+' completó '+(lb?lb.nombre:'')+' en '+(tb?tb.nombre:''));
      var detalle=esAplic?('Fórmula: '+(o.formula?o.formula.nombre:'')):('Surcos: '+capturaEjec.surcos.join(', '));
      from('notificaciones').insert({titulo:'✅ Labor completada',cuerpo:usuario.nombre+' completó '+(lb?lb.nombre:'')+' en '+(tb?tb.nombre:'')+' — '+detalle,icono:'✅',leida:false,para_rol:'encargado'}).then(function(){
        document.getElementById('exito-sub').textContent='Registro guardado. El encargado recibirá un aviso.';
        mostrar('screen-exito'); ordenEjecutando=null;
      });
    });
  }).catch(function(e){alert('Error: '+e.message);});
}

window.addEventListener('online',function(){

  localStorage.setItem('mootsil_cola','[]');
  pendientes.forEach(function(r){from('registros_labor').insert(r).catch(function(){colaOffline.push(r);localStorage.setItem('mootsil_cola',JSON.stringify(colaOffline));});});
});

function renderNuevoUsuario(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="form-card"><h3>Nuevo usuario</h3><div class="form-group"><label>Nombre</label><input type="text" id="nu-n" placeholder="Nombre completo"/></div><div class="form-group"><label>Rol</label><select id="nu-r"><option value="operario">Operario</option><option value="encargado">Encargado</option><option value="ingeniero">Ingeniero</option><option value="cosechador">Cosechador</option><option value="galerista">Galerista</option><option value="dueño">Dueño</option><option value="inversionista">Inversionista</option><option value="admin">Admin</option></select></div><div class="form-group"><label>PIN (4 dígitos)</label><input type="number" id="nu-p" placeholder="1234" min="0" max="9999"/></div><div class="nav-row"><button class="btn-back" onclick="renderConfig()">← Cancelar</button><button class="btn-next" onclick="guardarNuevoUsuario()">Guardar</button></div></div>';
}

function guardarNuevoUsuario(){
  var nombre=document.getElementById('nu-n').value.trim();
  var rol=document.getElementById('nu-r').value;
  var pin=String(document.getElementById('nu-p').value).padStart(4,'0');
  if(!nombre||pin.length!==4){alert('Completa todos los campos.');return;}
  from('usuarios').insert({nombre:nombre,rol:rol,activo:true}).then(function(data){
    var uid=Array.isArray(data)?data[0].id:data.id;
    api('/rest/v1/rpc/set_pin',{method:'POST',body:{p_usuario_id:uid,p_pin:pin}}).then(function(){
      cargarCatalogos().then(function(){renderConfig();});
    });
  }).catch(function(e){alert('Error: '+e.message);});
}

function renderEditarUsuario(id,nombre,rol){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="form-card"><h3>Editar usuario</h3><div class="form-group"><label>Nombre</label><input type="text" id="eu-n" value="'+nombre+'"/></div><div class="form-group"><label>Rol</label><select id="eu-r"><option value="operario"'+(rol==='operario'?' selected':'')+'>Operario</option><option value="encargado"'+(rol==='encargado'?' selected':'')+'>Encargado</option><option value="ingeniero"'+(rol==='ingeniero'?' selected':'')+'>Ingeniero</option><option value="cosechador"'+(rol==='cosechador'?' selected':'')+'>Cosechador</option><option value="galerista"'+(rol==='galerista'?' selected':'')+'>Galerista</option><option value="dueño"'+(rol==='dueño'?' selected':'')+'>Dueño</option><option value="inversionista"'+(rol==='inversionista'?' selected':'')+'>Inversionista</option><option value="admin"'+(rol==='admin'?' selected':'')+'>Admin</option></select></div><div class="nav-row"><button class="btn-back" onclick="renderConfig()">← Cancelar</button><button class="btn-next" onclick="guardarEditarUsuario(\''+id+'\')">Guardar</button></div></div>';
}

function guardarEditarUsuario(id){
  var nn=document.getElementById('eu-n').value.trim(), nr=document.getElementById('eu-r').value;
  if(!nn){alert('El nombre es obligatorio.');return;}
  from('usuarios').eq('id',id).update({nombre:nn,rol:nr}).then(function(){cargarCatalogos().then(function(){renderConfig();});});
}

function renderCambiarPin(id,nombre){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="form-card"><h3>Cambiar PIN — '+nombre+'</h3><div class="form-group"><label>Nuevo PIN (4 dígitos)</label><input type="number" id="cp-p" placeholder="0000" min="0" max="9999"/></div><div class="nav-row"><button class="btn-back" onclick="renderConfig()">← Cancelar</button><button class="btn-next" onclick="guardarPin(\''+id+'\')">Guardar PIN</button></div></div>';
}

function guardarPin(id){
  var pin=String(document.getElementById('cp-p').value).padStart(4,'0');
  if(pin.length!==4){alert('El PIN debe tener 4 dígitos.');return;}
  api('/rest/v1/rpc/set_pin',{method:'POST',body:{p_usuario_id:id,p_pin:pin}}).then(function(){alert('PIN actualizado.');renderConfig();});
}

function bajaUsuario(id){if(confirm('¿Dar de baja?')) from('usuarios').eq('id',id).update({activo:false}).then(function(){renderConfig();});}
function altaUsuario(id){from('usuarios').eq('id',id).update({activo:true}).then(function(){renderConfig();});}
function usarCamara(){document.getElementById('cam-input').click();}
function abrirGaleria(){document.getElementById('gal-input').click();}

function abrirCamaraApp(){
  var overlay=document.getElementById('cam-overlay');
  overlay.style.display='flex';
  navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing},audio:false}).then(function(stream){
    camStream=stream;
    var video=document.getElementById('cam-video');
    video.srcObject=stream;
  }).catch(function(e){
    overlay.style.display='none';
    alert('No se pudo acceder a la camara. Usa Galeria.');
  });
}

function cerrarCamara(){
  if(camStream) camStream.getTracks().forEach(function(t){t.stop();});
  camStream=null;
  document.getElementById('cam-overlay').style.display='none';
}

function toggleVideo(){
  if(!grabando){
    videoChunks=[];
    var options={mimeType:'video/webm;codecs=vp9'};
    if(!MediaRecorder.isTypeSupported(options.mimeType)) options={mimeType:'video/webm'};
    mediaRecorder=new MediaRecorder(camStream, options);
    mediaRecorder.ondataavailable=function(e){if(e.data.size>0) videoChunks.push(e.data);};
    mediaRecorder.onstop=function(){
      var blob=new Blob(videoChunks,{type:'video/webm'});
      capturaEjec.foto=true;
      capturaEjec.fotoBlob=blob;
      capturaEjec.fotoUrl=null;
      capturaEjec.esVideo=true;
      cerrarCamara();
      renderEjec();
    };
    mediaRecorder.start();
    grabando=true;
    document.getElementById('btn-video').textContent='⏹ Detener';
    document.getElementById('btn-video').style.background='rgba(255,0,0,.9)';
    var st=document.getElementById('cam-status');
    if(st) st.style.display='block';
  } else {
    mediaRecorder.stop();
    grabando=false;
    document.getElementById('btn-video').textContent='⏺ Video';
    document.getElementById('btn-video').style.background='rgba(255,0,0,.5)';
    var st=document.getElementById('cam-status');
    if(st) st.style.display='none';
  }
}
function girarCamara(){
  camFacing=camFacing==='environment'?'user':'environment';
  if(camStream) camStream.getTracks().forEach(function(t){t.stop();});
  navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing},audio:false}).then(function(stream){
    camStream=stream;
    document.getElementById('cam-video').srcObject=stream;
  });
}

function tomarFoto(){
  var video=document.getElementById('cam-video');
  var canvas=document.getElementById('cam-canvas');
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  canvas.toBlob(function(blob){
    capturaEjec.foto=true;
    capturaEjec.fotoBlob=blob;
    capturaEjec.fotoUrl=null;
    cerrarCamara();
    renderEjec();
  },'image/jpeg',0.8);
}


function salir(){usuario=null;pin='';dibujarPin();setErr('');mostrar('screen-login');}

if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister();});});
}
</script>

<input type="file" id="gal-input" accept="image/*,video/*" capture style="display:none" onchange="capturaEjec.foto=true;renderEjec();">
