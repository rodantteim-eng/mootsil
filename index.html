<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Mootsil · Labores</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --verde:#1a3a2a;--verde-mid:#2d6644;--verde-claro:#4a9a6a;--verde-tenue:#e8f4ee;
  --tierra:#c17f3a;--tierra-tenue:#fdf3e7;--rojo:#c0392b;--rojo-tenue:#fdf0ee;
  --amarillo:#e6a817;--amarillo-tenue:#fef9ec;
  --blanco:#ffffff;--gris-1:#f5f5f3;--gris-2:#e0e0db;--gris-3:#9a9a94;--negro:#1a1a18;
  --radio:14px;--radio-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--verde);min-height:100vh;color:var(--negro);}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
#screen-login{background:var(--verde);align-items:center;justify-content:center;padding:2rem;}
.login-logo{text-align:center;margin-bottom:2.5rem;}
.login-logo h1{color:var(--blanco);font-size:2rem;font-weight:700;}
.login-logo p{color:rgba(255,255,255,.55);font-size:.85rem;margin-top:.3rem;}
.login-card{background:var(--blanco);border-radius:20px;padding:1.75rem 1.5rem;width:100%;max-width:340px;}
.login-card h2{font-size:1rem;font-weight:600;margin-bottom:.3rem;}
.login-card .sub{font-size:.8rem;color:var(--gris-3);margin-bottom:1.25rem;}
.pin-display{display:flex;gap:10px;justify-content:center;margin-bottom:1.5rem;}
.pin-dot{width:48px;height:48px;border-radius:50%;border:2px solid var(--gris-2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:var(--verde);}
.pin-dot.filled{background:var(--verde);border-color:var(--verde);color:var(--blanco);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-btn{background:var(--gris-1);border:2px solid var(--gris-2);border-radius:var(--radio);height:64px;font-size:1.4rem;font-weight:600;cursor:pointer;color:var(--negro);}
.pin-btn:active{background:var(--gris-2);}
.pin-btn.del{background:var(--tierra-tenue);color:var(--tierra);border-color:var(--tierra-tenue);}
.pin-error{text-align:center;font-size:.8rem;color:var(--rojo);margin-top:.75rem;min-height:1.4rem;font-weight:500;}
.app-header{background:var(--verde);padding:1rem 1.25rem .75rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.app-header h1{color:var(--blanco);font-size:1rem;font-weight:600;}
.header-sub{color:rgba(255,255,255,.6);font-size:.75rem;margin-top:.1rem;}
.btn-salir{background:rgba(255,255,255,.15);border:none;border-radius:20px;color:var(--blanco);font-size:.75rem;padding:.4rem .9rem;cursor:pointer;}
.tabs{background:var(--verde-mid);display:flex;flex-shrink:0;overflow-x:auto;}
.tab{flex-shrink:0;padding:.75rem .6rem;text-align:center;font-size:.75rem;font-weight:600;color:rgba(255,255,255,.6);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.tab.active{color:var(--blanco);border-bottom-color:var(--blanco);}
.app-body{background:var(--gris-1);flex:1;overflow-y:auto;padding:1rem;}
.orden-card{background:var(--blanco);border-radius:var(--radio);padding:1rem;margin-bottom:.75rem;border-left:4px solid var(--gris-2);}
.orden-card.pendiente{border-left-color:var(--amarillo);}
.orden-card.en_proceso{border-left-color:var(--verde-claro);}
.orden-card.completada{border-left-color:var(--verde-mid);opacity:.75;}
.orden-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;}
.orden-labor{font-weight:700;font-size:.95rem;}
.orden-badge{font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;text-transform:uppercase;}
.badge-pendiente{background:var(--amarillo-tenue);color:var(--amarillo);}
.badge-en_proceso{background:var(--verde-tenue);color:var(--verde-mid);}
.badge-completada{background:var(--verde-tenue);color:var(--verde);}
.orden-meta{font-size:.78rem;color:var(--gris-3);line-height:1.7;}
.orden-meta strong{color:var(--negro);}
.orden-actions{display:flex;gap:8px;margin-top:.75rem;flex-wrap:wrap;}
.btn-sm{padding:.45rem .9rem;border-radius:var(--radio-sm);border:none;font-size:.78rem;font-weight:600;cursor:pointer;}
.btn-iniciar{background:var(--verde-tenue);color:var(--verde-mid);}
.btn-completar{background:var(--verde-mid);color:var(--blanco);}
.btn-cancelar{background:var(--rojo-tenue);color:var(--rojo);}
.form-card{background:var(--blanco);border-radius:var(--radio);padding:1.1rem;margin-bottom:.75rem;}
.form-card h3{font-size:.9rem;font-weight:700;margin-bottom:1rem;}
.form-group{margin-bottom:.85rem;}
.form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--gris-3);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.04em;}
.form-group select,.form-group input{width:100%;padding:.65rem .75rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.9rem;background:var(--gris-1);color:var(--negro);}
.surcos-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:.4rem;}
.surco-btn{padding:.5rem 0;border-radius:6px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.8rem;font-weight:700;cursor:pointer;text-align:center;}
.surco-btn.sel{border-color:var(--verde-mid);background:var(--verde-tenue);color:var(--verde);}
.op-chip{padding:6px 16px;border-radius:20px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.85rem;cursor:pointer;color:var(--negro);font-weight:600;}
.op-chip.sel{background:var(--verde-tenue);border-color:var(--verde-mid);color:var(--verde);}
.fcomp-item-opcion:hover,.fcomp-item-opcion:active{background:var(--gris-1);}
.fcomp-item-buscar{width:100%;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;}
.btn-primary{width:100%;padding:.9rem;border:none;border-radius:var(--radio);background:var(--verde-mid);color:var(--blanco);font-size:.95rem;font-weight:700;cursor:pointer;margin-top:.5rem;}
.tarea-card{background:var(--blanco);border-radius:var(--radio);padding:1.1rem;margin-bottom:.75rem;border-left:4px solid var(--amarillo);}
.tarea-title{font-weight:700;font-size:1rem;margin-bottom:.35rem;}
.tarea-meta{font-size:.8rem;color:var(--gris-3);line-height:1.7;}
.steps-bar{display:flex;gap:5px;margin-bottom:1rem;}
.step-seg{flex:1;height:4px;border-radius:2px;background:var(--gris-2);}
.step-seg.done{background:var(--verde-claro);}
.step-seg.active{background:var(--verde-mid);}
.step-label{font-size:.7rem;color:var(--gris-3);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em;}
.step-title{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
.cantidad-row{display:flex;align-items:center;gap:12px;background:var(--blanco);border-radius:var(--radio);padding:1rem;margin-bottom:1rem;}
.cant-btn{width:52px;height:52px;border-radius:50%;border:2px solid var(--gris-2);background:var(--gris-1);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.cant-val{flex:1;text-align:center;font-size:2.2rem;font-weight:700;}
.cant-unit{text-align:center;font-size:.75rem;color:var(--gris-3);}
.nav-row{display:flex;gap:10px;margin-top:1.25rem;}
.btn-back{flex:1;padding:.85rem;border:2px solid var(--gris-2);border-radius:var(--radio);background:var(--blanco);font-size:.9rem;font-weight:600;cursor:pointer;}
.btn-next{flex:2;padding:.85rem;border:none;border-radius:var(--radio);background:var(--verde-mid);color:var(--blanco);font-size:.9rem;font-weight:700;cursor:pointer;}
.btn-next:disabled{background:var(--gris-2);color:var(--gris-3);}
.resumen-card{background:var(--blanco);border-radius:var(--radio);padding:1rem 1.1rem;margin-bottom:.75rem;}
.resumen-row{display:flex;justify-content:space-between;font-size:.82rem;padding:.35rem 0;border-bottom:1px solid var(--gris-1);}
.resumen-row:last-child{border-bottom:none;}
.resumen-key{color:var(--gris-3);}
.resumen-val{font-weight:600;text-align:right;max-width:60%;}
.notif-item{background:var(--blanco);border-radius:var(--radio);padding:.85rem 1rem;margin-bottom:.6rem;display:flex;gap:.75rem;border-left:3px solid var(--tierra);}
.notif-ic{font-size:1.3rem;flex-shrink:0;}
.notif-texto{font-size:.82rem;line-height:1.5;}
.notif-texto strong{display:block;font-size:.85rem;color:var(--negro);}
.notif-tiempo{font-size:.7rem;color:var(--gris-3);margin-top:.2rem;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.stat-card{background:var(--blanco);border-radius:var(--radio-sm);padding:.75rem;text-align:center;}
.stat-num{font-size:1.6rem;font-weight:700;}
.stat-lbl{font-size:.65rem;color:var(--gris-3);text-transform:uppercase;letter-spacing:.04em;margin-top:.2rem;}
.stat-am{color:var(--amarillo);}
.stat-vd{color:var(--verde-mid);}
.stat-az{color:#2980b9;}
#screen-exito{background:var(--verde);align-items:center;justify-content:center;padding:2rem;text-align:center;}
.exito-ic{font-size:5rem;margin-bottom:1.5rem;}
.exito-tit{color:var(--blanco);font-size:1.6rem;font-weight:700;margin-bottom:.5rem;}
.exito-sub{color:rgba(255,255,255,.65);font-size:.9rem;margin-bottom:2rem;line-height:1.6;}
.btn-nuevo{background:var(--blanco);color:var(--verde);border:none;border-radius:var(--radio);padding:1rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;}
.hint{font-size:.75rem;color:var(--gris-3);margin-top:.6rem;}
.loading{text-align:center;color:var(--gris-3);padding:3rem 1rem;font-size:.9rem;}
.seccion-titulo{font-size:.75rem;font-weight:700;color:var(--gris-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--gris-3);font-size:.88rem;line-height:1.6;}
.orden-badge-rol{font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;text-transform:uppercase;}
.prog-bar{background:var(--gris-2);border-radius:4px;height:6px;margin-bottom:.75rem;}
.prog-fill{height:6px;border-radius:4px;}
#toast{position:fixed;bottom:1.5rem;right:1rem;background:var(--verde);color:#fff;padding:.75rem 1.1rem;border-radius:12px;font-size:.85rem;font-weight:600;z-index:8888;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:280px;line-height:1.4;}
.rep-view-btn{padding:.4rem .9rem;border-radius:20px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.75rem;font-weight:600;cursor:pointer;color:var(--negro);}
.rep-view-btn.active{background:var(--verde-mid);border-color:var(--verde-mid);color:#fff;}
.riego-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:flex-start;}
.riego-circle{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;color:#fff;font-weight:700;font-size:.85rem;padding:6px;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:transform .15s;}
.riego-circle:active{transform:scale(.95);}
.riego-circle.roja{background:var(--rojo);}
.riego-circle.verde{background:var(--verde-mid);}
.riego-circle.activa{background:var(--tierra);}
.riego-circle.neutra{background:var(--gris-1);border:2px solid var(--gris-2);color:var(--gris-3);box-shadow:none;}
.riego-circle small{font-weight:500;font-size:.65rem;opacity:.85;margin-top:2px;}
.riego-ejec-card{background:var(--blanco);border-radius:var(--radio);padding:1.75rem 1.25rem;text-align:center;transition:background .3s;}
.riego-ejec-min{font-size:2.6rem;font-weight:800;color:var(--verde-mid);margin-bottom:.5rem;font-variant-numeric:tabular-nums;}
.riego-ejec-card.riego-alarma{background:var(--rojo-tenue);animation:riego-flash 1s infinite;}
.riego-ejec-card.riego-alarma .riego-ejec-min{color:var(--rojo);}
@keyframes riego-flash{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.0);}50%{box-shadow:0 0 0 10px rgba(192,57,43,.15);}}
.labor-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.labor-tile{background:var(--blanco);border-radius:var(--radio);padding:1rem .5rem;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .12s;border:2px solid transparent;}
.labor-tile:active{transform:scale(.94);}
.labor-tile-ic{font-size:1.7rem;margin-bottom:.35rem;}
.labor-tile-lbl{font-size:.72rem;font-weight:700;color:var(--negro);line-height:1.2;}
.labor-tile-otra{background:var(--verde-tenue);border-color:var(--verde-mid);}
.labor-tile-otra .labor-tile-lbl{color:var(--verde);}
.labor-chosen{display:flex;align-items:center;gap:8px;font-size:1rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--gris-1);}
.pbtn-emerg{background:var(--blanco);border:2px solid var(--rojo);color:var(--rojo);border-radius:var(--radio);padding:1.1rem;text-align:center;font-weight:800;font-size:1rem;}
.pbtn-emerg:active{background:var(--rojo-tenue);}

#cam-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:none;flex-direction:column;}
#cam-video{flex:1;width:100%;object-fit:cover;}
#cam-canvas{display:none;}
.cam-bar{background:#000;padding:1.5rem;display:flex;justify-content:space-around;align-items:center;}
.cam-capbtn{width:75px;height:75px;border-radius:50%;border:5px solid #fff;background:#fff;cursor:pointer;font-size:1.8rem;}
.cam-auxbtn{color:#fff;font-size:.85rem;padding:.5rem 1.25rem;background:rgba(255,255,255,.15);border:none;border-radius:20px;cursor:pointer;}

#recibo-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:9999;overflow-y:auto;flex-direction:column;}
#recibo-overlay.active{display:flex;}
.recibo-bar{display:flex;gap:10px;padding:.85rem 1rem;background:var(--verde);position:sticky;top:0;z-index:2;flex-shrink:0;}
.recibo-bar button{flex:1;padding:.75rem;border:none;border-radius:var(--radio-sm);font-weight:700;font-size:.85rem;cursor:pointer;}
.recibo-bar button.recibo-cerrar{background:rgba(255,255,255,.15);color:#fff;}
.recibo-bar button.recibo-imprimir{background:#fff;color:var(--verde);}
.recibo-doc{max-width:480px;width:100%;margin:0 auto;padding:1.5rem 1.25rem 3rem;color:#181818;}
.recibo-doc .recibo-encabezado{text-align:center;border-bottom:2px solid #181818;padding-bottom:1rem;margin-bottom:1rem;}
.recibo-doc .recibo-encabezado h2{font-size:1.25rem;margin-bottom:.15rem;}
.recibo-doc .recibo-folio{font-size:.72rem;color:#666;margin-top:.35rem;}
.recibo-doc .recibo-datos{font-size:.85rem;line-height:1.7;margin-bottom:1rem;}
.recibo-doc .recibo-datos strong{font-weight:700;}
.recibo-fila{display:flex;justify-content:space-between;gap:1rem;font-size:.85rem;padding:.4rem 0;border-bottom:1px solid #e5e5e0;}
.recibo-fila.recibo-total{border-top:2px solid #181818;border-bottom:none;margin-top:.4rem;padding-top:.65rem;font-weight:800;font-size:1.05rem;}
.recibo-firmas{margin-top:3rem;display:flex;justify-content:space-between;gap:1.5rem;}
.recibo-firmas div{flex:1;text-align:center;border-top:1px solid #181818;padding-top:.4rem;font-size:.72rem;color:#444;}
.recibo-nota{font-size:.7rem;color:#888;margin-top:2rem;text-align:center;}
@media print{
  body>*:not(#recibo-overlay){display:none!important;}
  #recibo-overlay{position:static!important;overflow:visible!important;}
  .recibo-no-print{display:none!important;}
  .recibo-doc{max-width:100%;padding:0;}
}
</style>
</head>
<body>

<div id="screen-login" class="screen active">
  <div class="login-logo"><h1>🫐 Mootsil</h1><p>Rancho · Módulo de Labores</p></div>
  <div class="login-card">
    <h2>Ingresa tu PIN</h2>
    <p class="sub">Toca los 4 dígitos para entrar</p>
    <div class="pin-display">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinDigit('1')">1</button>
      <button class="pin-btn" onclick="pinDigit('2')">2</button>
      <button class="pin-btn" onclick="pinDigit('3')">3</button>
      <button class="pin-btn" onclick="pinDigit('4')">4</button>
      <button class="pin-btn" onclick="pinDigit('5')">5</button>
      <button class="pin-btn" onclick="pinDigit('6')">6</button>
      <button class="pin-btn" onclick="pinDigit('7')">7</button>
      <button class="pin-btn" onclick="pinDigit('8')">8</button>
      <button class="pin-btn" onclick="pinDigit('9')">9</button>
      <button class="pin-btn" style="visibility:hidden"></button>
      <button class="pin-btn" onclick="pinDigit('0')">0</button>
      <button class="pin-btn del" onclick="pinBorrar()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<div id="screen-encargado" class="screen">
  <div class="app-header">
    <div><h1>🫐 Mootsil</h1><div class="header-sub" id="enc-nombre">Encargado</div></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button onclick="renderCambiarMiPin()" style="border:none;background:rgba(255,255,255,.12);color:#fff;font-size:.72rem;font-weight:600;cursor:pointer;padding:.4rem .7rem;border-radius:var(--radio-sm);">🔒 PIN</button>
      <button class="btn-salir" onclick="salir()">Salir</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab" id="tab-tablero" onclick="tabEncargado('tablero')" style="display:none">Tablero</button>
    <button class="tab" id="tab-asignar" onclick="tabEncargado('asignar')" style="display:none">🧰 Labores</button>
    <button class="tab" id="tab-aplicaciones" onclick="tabEncargado('aplicaciones')" style="display:none">🧪 Aplicaciones</button>
    <button class="tab" id="tab-cosecha" onclick="tabEncargado('cosecha')" style="display:none">🧺 Cosecha</button>
    <button class="tab" id="tab-labores" onclick="tabEncargado('labores')" style="display:none">📋 Solicitudes</button>
    <button class="tab" id="tab-reporte" onclick="tabEncargado('reporte')">Reporte</button>
    <button class="tab" id="tab-notif" onclick="tabEncargado('notif')">Avisos <span id="badge-avisos" style="display:none;background:var(--tierra);color:#fff;border-radius:50%;width:16px;height:16px;font-size:.6rem;font-weight:700;align-items:center;justify-content:center;margin-left:3px;vertical-align:middle;">0</span></button>
    <button class="tab" id="tab-alarmas" onclick="tabEncargado('alarmas')" style="display:none">🚨 Alarmas</button>
    <button class="tab" id="tab-admin" onclick="tabEncargado('admin')" style="display:none">🏛️ Administración</button>
    <button class="tab" id="tab-inventario" onclick="tabEncargado('inventario')" style="display:none">Inventario</button>
    <button class="tab" id="tab-config" onclick="tabEncargado('config')" style="display:none">⚙️</button>
  </div>
  <div class="app-body" id="enc-body"><div class="loading">Cargando...</div></div>
</div>

<div id="screen-operario" class="screen">
  <div class="app-header">
    <div><h1>🌱 Mootsil | Labores</h1><div class="header-sub" id="op-nombre">Colaborador</div></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button onclick="renderAlarmasMenu()" style="width:38px;height:38px;border-radius:50%;background:rgba(192,57,43,.25);border:none;color:#fff;font-size:1rem;cursor:pointer;">🚨</button>
      <button class="btn-salir" onclick="salir()">Salir</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab" id="tab-asistencia" onclick="tabOperario('asistencia')">Asistencia</button>
    <button class="tab active" id="tab-tareas" onclick="tabOperario('tareas')">Mis tareas</button>
    <button class="tab" id="tab-pagos" onclick="tabOperario('pagos')">Pagos</button>
    <button class="tab" id="tab-solicitudes" onclick="tabOperario('solicitudes')">Solicitudes</button>
    <button class="tab" id="tab-op-notif" onclick="tabOperario('notif')">Avisos <span id="op-badge-alertas" style="display:none;background:var(--rojo);color:#fff;border-radius:50%;width:16px;height:16px;font-size:.6rem;font-weight:700;align-items:center;justify-content:center;margin-left:3px;vertical-align:middle;">0</span></button>
    <button class="tab" id="tab-perfil" onclick="tabOperario('perfil')">Perfil</button>
  </div>
  <div class="app-body" id="op-body"><div class="loading">Cargando tareas...</div></div>

function api(path, opts) {
  opts = opts || {};
  var ctrl = (typeof AbortController!=='undefined') ? new AbortController() : null;
  var timer = ctrl ? setTimeout(function(){ctrl.abort();}, 8000) : null;
  return fetch(URL_SB + path, {
    method: opts.method || 'GET',
    headers: Object.assign({'apikey':KEY_SB,'Authorization':'Bearer '+KEY_SB,'Content-Type':'application/json','Prefer':opts.prefer||''}, opts.headers||{}),
    body: opts.body ? JSON.stringify(opts.body) : undefined,
    signal: ctrl?ctrl.signal:undefined
  }).then(function(r) {
    if(timer) clearTimeout(timer);
    if(!r.ok) return r.json().then(function(e){ throw new Error(e.message||r.status); });
    return r.status===204 ? {} : r.json();
  }).catch(function(e){
    if(timer) clearTimeout(timer);
    throw e;
  });
}

function rpc(fn, params) { return api('/rest/v1/rpc/'+fn, {method:'POST', body:params}); }

function from(table) {
  var q = {_t:table, _f:[], _s:'*', _o:'', _l:'',
    select:function(s){this._s=s;return this;},
    eq:function(c,v){this._f.push(c+'=eq.'+encodeURIComponent(v));return this;},
    neq:function(c,v){this._f.push(c+'=neq.'+encodeURIComponent(v));return this;},
    is:function(c,v){this._f.push(c+'=is.'+v);return this;},
    gte:function(c,v){this._f.push(c+'=gte.'+encodeURIComponent(v));return this;},
    lte:function(c,v){this._f.push(c+'=lte.'+encodeURIComponent(v));return this;},
    in:function(c,v){this._f.push(c+'=in.("'+v.join('","')+'")');return this;},
    not:function(c,op,v){this._f.push(c+'=not.'+op+'.'+v);return this;},
    order:function(c,o){this._o='&order='+c+(o&&o.ascending===false?'.desc':'.asc');return this;},
    limit:function(n){this._l='&limit='+n;return this;},
    get:function(){
      var url='/rest/v1/'+this._t+'?select='+encodeURIComponent(this._s);
      if(this._f.length) url+='&'+this._f.join('&');
      url+=this._o+this._l;
      return api(url);
    },
    single:function(){return this.get().then(function(d){return Array.isArray(d)?d[0]:d;});},
    insert:function(data){return api('/rest/v1/'+this._t,{method:'POST',body:data,prefer:'return=representation'});},
    update:function(data){
      var url='/rest/v1/'+this._t+'?'+this._f.join('&');
      return api(url,{method:'PATCH',body:data,prefer:'return=representation'});
    },
    delete:function(){
      var url='/rest/v1/'+this._t+'?'+this._f.join('&');
      return api(url,{method:'DELETE',prefer:'return=representation'});
    }
  };
  return q;
}

function abrirDBEvidencias(){
  if(_mootsilDB) return Promise.resolve(_mootsilDB);
  return new Promise(function(resolve,reject){
    var req=indexedDB.open('mootsil_evidencias',1);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains('pendientes')) db.createObjectStore('pendientes',{keyPath:'id'});
    };
    req.onsuccess=function(e){_mootsilDB=e.target.result;resolve(_mootsilDB);};
    req.onerror=function(e){reject(e.target.error);};
  });
}
function guardarEvidenciaPendiente(blob,mime){
  var id='ev_'+Date.now()+'_'+Math.round(Math.random()*99999);
  return abrirDBEvidencias().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('pendientes','readwrite');
      tx.objectStore('pendientes').put({id:id,blob:blob,mime:mime||'image/jpeg',creado_en:Date.now()});
      tx.oncomplete=function(){resolve(id);};
      tx.onerror=function(e){reject(e.target.error);};
    });
  });
}

      req.onsuccess=function(){resolve(req.result||null);};
      req.onerror=function(){resolve(null);};
    });
  });
}

      } else {

      }
    });
  });

      renderFormAsignarPaso2();

ar(--verde-mid);background:var(--verde-tenue);color:var(--verde);font-size:.78rem;font-weight:600;cursor:pointer;">Tabla completa</button><button type="button" onclick="selNingunoF()" style="padding:4px 14px;border-radius:20px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.78rem;cursor:pointer;">Limpiar</button></div><div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap;"><span style="font-size:.78rem;color:var(--gris-3)">Del surco</span><input type="number" id="f-ri" min="1" style="width:52px;padding:3px 6px;border:1.5px solid var(--gris-2);border-radius:6px;font-size:.85rem;" placeholder="1"><span style="font-size:.78rem;color:var(--gris-3)">al</span><input type="number" id="f-rf" min="1" style="width:52px;padding:3px 6px;border:1.5px solid var(--gris-2);border-radius:6px;font-size:.85rem;" placeholder="12"><button type="button" onclick="aplicarRangoF()" style="padding:4px 10px;border-radius:20px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.78rem;cursor:pointer;">Aplicar</button></div><div class="surcos-grid" id="fsc"></div><p class="hint">O toca surcos individuales</p></div><div class="form-group"><label>Duración</label><select id="fdu"><option value="dia">Solo hoy</option><option value="labor_completa">Labor completa</option></select></div><div class="form-group"><label>Fecha</label><input type="date" id="ffe" value="'+fechaHoyLocal()+'"/></div><div class="form-group"><label>Notas</label><input type="text" id="fno" placeholder="Opcional..."/></div><button class="btn-primary" onclick="guardarOrden()">'+(modoAsignacionLabor==='extra'?'Asignar como hora extra':'Asignar orden')+'</button></div>';

function guardarRiegoAsignacion(){
  var btn=document.getElementById('riego-finalizar'); if(btn){btn.disabled=true;btn.textContent='Guardando...';}
  var not=document.getElementById('riego-notas-input').value||null;
  var filas=Object.keys(riegoAsigMinutos).filter(function(k){return riegoAsigMinutos[k]>0;}).map(function(tid){return {tabla:tid,min:riegoAsigMinutos[tid]};});
  if(!filas.length){alert('No hay tablas con tiempo asignado.');if(btn){btn.disabled=false;btn.textContent='✅ Asignar riego';}return;}
  var lbId=asignarLaborSel.id;
  var tareas=[];
  riegoAsigOperarios.forEach(function(oid){filas.forEach(function(r){tareas.push({asignado_por:usuario.id,operario_id:oid,tabla_id:r.tabla,tipo_labor_id:lbId,duracion_minutos:r.min,duracion:'dia',fecha_asignacion:riegoAsigFecha,notas_encargado:not,estado:'pendiente'});});});
  Promise.all(tareas.map(function(t){return from('ordenes_trabajo').insert(t);})).then(function(){
    Promise.all(riegoAsigOperarios.map(function(oid){
      return from('notificaciones').insert({titulo:'💧 Riego asignado',cuerpo:usuario.nombre+' asignó riego a '+(cats.operarios.find(function(o){return o.id===oid;})||{}).nombre+' en '+filas.length+' tabla(s)',icono:'💧',leida:false,para_rol:'operario',para_usuario:oid});
    })).then(function(){showToast('💧 Riego asignado en '+filas.length+' tabla(s). Puedes asignar otra labor.');renderFormAsignar();});
  }).catch(function(e){alert('Error: '+e.message);if(btn){btn.disabled=false;btn.textContent='✅ Asignar riego';}});
}

}

function selNingunoF(){formSurcos=[];document.querySelectorAll('#fsc .surco-btn').forEach(function(b){b.classList.remove('sel');});}
function aplicarRangoF(){

function guardarOrden(){
  var opIds=Array.from(document.querySelectorAll('.op-chip.sel')).map(function(c){return c.dataset.id;});
  var lb=asignarLaborSel;
  var lbId=lb?lb.id:null;
  if(!opIds.length||!lbId){alert('Faltan datos obligatorios.');return;}
  var dur=document.getElementById('fdu').value, fec=document.getElementById('ffe').value, not=document.getElementById('fno').value||null;

  if(lb&&lb.requiere_tiempo){
    var filas=Array.from(document.querySelectorAll('.riego-min')).map(function(i){return {tabla:i.dataset.tabla,min:parseInt(i.value)||0};}).filter(function(r){return r.min>0;});
    if(!filas.length){alert('Captura al menos una duración de riego.');return;}
    var esExtraRiego=modoAsignacionLabor==='extra';
    var tareas=[];
    opIds.forEach(function(oid){filas.forEach(function(r){tareas.push({asignado_por:usuario.id,operario_id:oid,tabla_id:r.tabla,tipo_labor_id:lbId,duracion_minutos:r.min,duracion:dur,fecha_asignacion:fec,notas_encargado:not,estado:'pendiente',es_hora_extra:esExtraRiego});});});
    Promise.all(tareas.map(function(t){return from('ordenes_trabajo').insert(t);})).then(function(){
      var autorizarExtraRiego = esExtraRiego ? Promise.all(opIds.map(function(oid){
        return from('horas_extra_asignadas').insert({operario_id:oid,asignado_por:usuario.id,fecha:fec,motivo:not,tipo_labor_id:lbId,estado:'aprobada'});
      })) : Promise.resolve();
      return autorizarExtraRiego.then(function(){
        return Promise.all(opIds.map(function(oid){
          return from('notificaciones').insert({titulo:esExtraRiego?'⏰ Riego (hora extra) asignado':'💧 Riego asignado',cuerpo:usuario.nombre+' asignó riego a '+(cats.equipoDeCampo.find(function(o){return o.id===oid;})||{}).nombre+' en '+filas.length+' tabla(s)'+(esExtraRiego?' (hora extra)':''),icono:esExtraRiego?'⏰':'💧',leida:false,para_rol:'operario',para_usuario:oid});
        }));
      });
    }).then(function(){showToast((esExtraRiego?'⏰ Riego asignado como hora extra. ':'💧 Riego asignado. ')+'Puedes asignar otra labor.');renderFormAsignar();}).catch(function(e){alert('Error: '+e.message);});
    return;
  }

  var tbId=document.getElementById('ftb').value;
  if(!tbId){alert('Faltan datos obligatorios.');return;}
  var sub=document.getElementById('fsb').value||null;
  var cant=parseFloat(document.getElementById('fca').value)||null;
  var tb=cats.tablas.find(function(t){return t.id===tbId;});
  var esExtra=modoAsignacionLabor==='extra';
  Promise.all(opIds.map(function(oid){
    return from('ordenes_trabajo').insert({asignado_por:usuario.id,operario_id:oid,tabla_id:tbId,tipo_labor_id:lbId,subtipo_labor_id:sub,surcos_asignados:formSurcos,cantidad_insumo_esperada:cant,duracion:dur,fecha_asignacion:fec,notas_encargado:not,estado:'pendiente',es_hora_extra:esExtra});
  })).then(function(){
    var autorizarExtra = esExtra ? Promise.all(opIds.map(function(oid){
      return from('horas_extra_asignadas').insert({operario_id:oid,asignado_por:usuario.id,fecha:fec,motivo:not,tipo_labor_id:lbId,estado:'aprobada'});
    })) : Promise.resolve();
    return autorizarExtra.then(function(){
      return Promise.all(opIds.map(function(oid){
        return from('notificaciones').insert({titulo:esExtra?'⏰ Hora extra asignada':'📋 Nueva tarea asignada',cuerpo:usuario.nombre+' asignó a '+(cats.equipoDeCampo.find(function(o){return o.id===oid;})||{}).nombre+': '+(lb?lb.nombre:'')+' en '+(tb?tb.nombre:'')+(esExtra?' (hora extra)':''),icono:esExtra?'⏰':'📋',leida:false,para_rol:'operario',para_usuario:oid});
      }));
    });
  }).then(function(){showToast((esExtra?'⏰ Hora extra asignada: ':'📋 Labor asignada: ')+(lb?lb.nombre:'')+'. Puedes asignar otra.');renderFormAsignar();}).catch(function(e){alert('Error: '+e.message);});
}

function renderNotifs(bodyId){
  var body=document.getElementById(bodyId);
  body.innerHTML='<div class="loading">Cargando avisos...</div>';

function consultaNotifsPropias(soloNoLeidas){
  var esOperario = usuario.rol==='operario'||usuario.rol==='cosechador'||usuario.rol==='galerista'||usuario.rol==='labores_eventual';
  if(!esOperario){
    var q=from('notificaciones').select('*').eq('para_rol','encargado');
    if(soloNoLeidas) q=q.eq('leida',false);
    return q.order('creado_en',{ascending:false}).get();
  }
  var qBroadcast=from('notificaciones').select('*').eq('para_rol','operario').is('para_usuario','null');
  var qPersonal=from('notificaciones').select('*').eq('para_rol','operario').eq('para_usuario',usuario.id);
  if(soloNoLeidas){qBroadcast=qBroadcast.eq('leida',false);qPersonal=qPersonal.eq('leida',false);}
  return Promise.all([qBroadcast.get(),qPersonal.get()]).then(function(r){
    var combinadas=(r[0]||[]).concat(r[1]||[]);
    combinadas.sort(function(a,b){return new Date(b.creado_en)-new Date(a.creado_en);});
    return combinadas;
  });
}

function fechaHoyLocal(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/Mexico_City'});}
function numFmt(n){n=parseFloat(n)||0;return (Math.round(n*100)/100).toString();}
function formatMonto(n){n=parseFloat(n)||0;return n.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});}
function formatMontoInputValor(raw){
  raw=(raw||'').replace(/[^\d.]/g,'');
  var firstDot=raw.indexOf('.');
  if(firstDot>-1) raw=raw.slice(0,firstDot+1)+raw.slice(firstDot+1).replace(/\./g,'');
  var hasDot=raw.indexOf('.')>-1;
  var parts=raw.split('.');
  var intPart=(parts[0]||'').replace(/^0+(?=\d)/,'');
  var withCommas=intPart.replace(/\B(?=(\d{3})+(?!\d))/g,',');
  if(hasDot) return withCommas+'.'+(parts[1]||'').slice(0,2);
  return withCommas;
}
function wireMontoInput(id){
  var el=document.getElementById(id);
  if(!el) return;
  el.setAttribute('type','text');
  el.setAttribute('inputmode','decimal');
  if(el.value) el.value=formatMontoInputValor(el.value);
  el.addEventListener('input',function(){
    this.value=formatMontoInputValor(this.value);
    this.selectionStart=this.selectionEnd=this.value.length;
  });
}
function parseMonto(str){return parseFloat((str||'').replace(/,/g,''))||0;}
function fmtAmigable(cantidad,unidad){
  cantidad=parseFloat(cantidad)||0;
  if(unidad==='kg'&&cantidad<1) return numFmt(cantidad*1000)+' gr';
  if(unidad==='litros'&&cantidad<1) return numFmt(cantidad*1000)+' ml';
  return numFmt(cantidad)+' '+unidad;
}

function renderActivosRancho(tipoInicial){

    from('activos_rancho').select('*,operario:usuarios!asignado_a(nombre)').eq('activo',true).order('nombre').get()
  ]).then(function(r){
    var todos=r[0]||[];
    var hoy=fechaHoyLocal();
    todos.forEach(function(it){
      it._requiereMant=false;
      if(it.fecha_ultimo_mantenimiento&&it.frecuencia_mantenimiento_dias){

    });
    var items=todos.filter(function(it){return categoriasTab.indexOf(it.categoria)>-1;});
    var conMant=items.filter(function(it){return it._requiereMant;});
    var html='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">'+tituloTab+(puedeEditar?'<button type="button" onclick="renderActivoNuevo({categoria:\''+tipoInicial+'\'})" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nuevo</button>':'')+'</div>';
    html+=pintarTabsInventario(tabKey);
    if(!items.length){body.innerHTML=html+'<div class="empty">Aún no hay '+(esHerramientas?'herramientas':'equipo')+' registrado.'+(puedeEditar?'<br/>Toca "+ Nuevo" para agregar el primero.':'')+'</div>';return;}
    if(conMant.length) html+='<div style="background:var(--rojo-tenue);border:1.5px solid var(--rojo);border-radius:var(--radio-sm);padding:.75rem;margin-bottom:1rem;font-size:.82rem;"><strong style="color:var(--rojo);">🔧 '+conMant.length+' requiere(n) mantenimiento</strong></div>';
    categoriasTab.forEach(function(cat){
      var deEstaCat=items.filter(function(it){return it.categoria===cat;});
      if(!deEstaCat.length) return;
      if(categoriasTab.length>1) html+='<div class="seccion-titulo" style="margin-top:1rem;font-size:.85rem;">'+cat+'s</div>';
      html+=deEstaCat.map(function(it){
        var estColor={disponible:'var(--verde-mid)',asignado:'var(--tierra)',mantenimiento:'var(--rojo)',baja:'var(--gris-3)'}[it.estado]||'var(--gris-3)';
        var estLbl={disponible:'✅ Disponible',asignado:'👷 Asignado a '+(it.operario?it.operario.nombre:'?'),mantenimiento:'🔧 En mantenimiento',baja:'⛔ De baja'}[it.estado]||it.estado;
        var thumb=it.imagen_url?'<img src="'+it.imagen_url+'" style="width:38px;height:38px;object-fit:cover;border-radius:8px;border:1px solid var(--gris-2);margin-right:.5rem;flex-shrink:0;">':'<div style="width:38px;height:38px;border-radius:8px;background:var(--gris-1);display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-right:.5rem;flex-shrink:0;">🔧</div>';
        return '<div class="orden-card" style="border-left-color:'+(it._requiereMant?'var(--rojo)':estColor)+';display:flex;align-items:center;cursor:pointer;" data-aid="'+it.id+'">'+thumb+'<div style="flex:1;min-width:0;"><strong style="font-size:.9rem;">'+it.nombre+'</strong><div class="orden-meta">'+estLbl+(it._requiereMant?' · <span style="color:var(--rojo);font-weight:700;">🔧 Requiere mantenimiento</span>':'')+'</div></div></div>';
      }).join('');
    });
    body.innerHTML=html;
    body.querySelectorAll('[data-aid]').forEach(function(el){el.addEventListener('click',function(){renderActivoDetalle(this.dataset.aid);});});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

ia de mantenimiento (días, opcional)</label><input type="number" id="ar-frecuencia" min="1" placeholder="Ej. 90"><p class="hint">Ej. 90 = cada 3 meses te va a avisar que toca revisarla.</p></div><button class="btn-primary" id="ar-guardar">Guardar</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderActivosRancho(\''+tabVolver+'\')">← Volver</button>';

ock mínimo (para alerta)</label><div style="display:flex;gap:8px;align-items:center;"><input type="number" id="inv-n-min" min="0" value="'+(prefill.stock_minimo||0)+'" style="flex:1;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;"><span class="hint" id="inv-n-unidad-lbl2" style="margin:0;min-width:40px;">kg</span></div><div style="display:flex;gap:8px;align-items:center;margin-top:.4rem;"><span class="hint" style="margin:0;">o convertir desde</span><input type="number" id="inv-n-min-paq" min="0" placeholder="0" style="width:70px;padding:.4rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.8rem;"><span class="hint" id="inv-n-min-paq-lbl" style="margin:0;">sacos</span></div></div><div class="form-group"><label>Fecha de caducidad (opcional)</label><input type="date" id="inv-n-caducidad" value="'+(prefill.fecha_caducidad||'')+'"></div><button class="btn-primary" id="inv-n-guardar">Guardar componente</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderInventario()">← Volver a inventario</button>';

      }).join('');

as a contar?</label><div style="display:flex;gap:8px;"><button type="button" class="op-chip sel" id="inv-mov-modo-base" data-modo="base">✓ Por '+it.unidad+'</button><button type="button" class="op-chip" id="inv-mov-modo-paq" data-modo="paquete">Por '+it.unidad_compra+'</button></div></div><div class="form-group" id="inv-mov-tamano-wrap" style="display:none;"><label>Tamaño de este '+it.unidad_compra.toLowerCase()+' (esta vez)</label><input type="number" id="inv-mov-tamano" min="0" step="any" value="'+(it.factor_compra||'')+'"><p class="hint">Por si esta compra vino en un tamaño distinto al habitual (ej. hoy llegó de 10L en vez de los 20L de siempre) — no cambia lo que tienes configurado en el producto.</p></div>':'')+'<div class="form-group"><label id="inv-mov-cant-lbl">¿Cuánto? (en '+it.unidad+')</label><input type="number" id="inv-mov-cantidad" min="0" placeholder="0" step="any"><p class="hint" id="inv-mov-ejemplo">Ej: si llegaron 12 kg sueltos, escribe 12.</p></div><p class="hint" id="inv-mov-equiv" style="display:none;font-weight:700;color:var(--verde-mid);"></p><div class="form-group"><label>Nota (opcional)</label><input type="text" id="inv-mov-motivo" placeholder="Ej. Proveedor X, factura #123, o para qué se usó"></div><button class="btn-primary" id="inv-mov-guardar">Registrar</button></div><div id="inv-mov-historial"><div class="loading">Cargando movimientos...</div></div><button class="btn-back" style="margin-top:1rem;" onclick="renderInventario()">← Volver a inventario</button>';

  });
  var modoCaptura='base', tipoMov='entrada';
  var TIPO_LABELS={entrada:'➕ Entrada — llegó pedido/compra',salida:'➖ Salida — se usó o se perdió',ajuste:'✏️ Ajuste — corregir un conteo mal capturado'};

      this.classList.add('sel');
      this.textContent='✓ '+TIPO_LABELS[this.dataset.tipo];

  function tamanoPaqueteActual(){
    var el=document.getElementById('inv-mov-tamano');

  }
  function actualizarEtiquetaMov(){
    document.getElementById('inv-mov-cant-lbl').textContent='¿Cuánto? (en '+(modoCaptura==='paquete'?it.unidad_compra:it.unidad)+')';

    calcularEquivalencia();
  }
  function calcularEquivalencia(){
    var equivEl=document.getElementById('inv-mov-equiv');
    var cant=parseFloat(document.getElementById('inv-mov-cantidad').value)||0;
    if(modoCaptura==='paquete'&&cant>0){
      equivEl.style.display='block';
      equivEl.textContent='= '+numFmt(cant*tamanoPaqueteActual())+' '+it.unidad+' en total';
    } else { equivEl.style.display='none'; }

  document.getElementById('inv-mov-guardar').addEventListener('click',function(){
    var tipo=tipoMov;
    var cantInput=parseFloat(document.getElementById('inv-mov-cantidad').value)||0;
    if(cantInput<=0){alert('Captura una cantidad mayor a 0.');return;}
    var factorUsado=modoCaptura==='paquete'?tamanoPaqueteActual():1;
    var cant=modoCaptura==='paquete'?cantInput*factorUsado:cantInput;
    var motivoBase=document.getElementById('inv-mov-motivo').value||null;
    var motivo=(modoCaptura==='paquete')?(numFmt(cantInput)+' '+it.unidad_compra+(it.unidad_compra.slice(-1)!=='s'&&cantInput!=1?'s':'')+' de '+numFmt(factorUsado)+' '+it.unidad+' c/u'+(motivoBase?' · '+motivoBase:'')):motivoBase;
    var stockAntes=it.stock_actual;
    var nuevoStock=tipo==='entrada'?it.stock_actual+cant:tipo==='salida'?it.stock_actual-cant:cant;
    from('movimientos_inventario').insert({item_id:it.id,tipo:tipo,cantidad:cant,motivo:motivo,usuario_id:usuario.id,stock_anterior:stockAntes,stock_posterior:nuevoStock}).then(function(){
      return from('inventario_items').eq('id',it.id).update({stock_actual:nuevoStock});
    }).then(function(){
      it.stock_actual=nuevoStock;
      showToast('✅ Movimiento registrado');
      renderInventarioItem(itemId);

  from('movimientos_inventario').select('*,usuario:usuarios(nombre)').eq('item_id',itemId).order('creado_en',{ascending:false}).limit(15).get().then(function(movs){

    var ic={entrada:'➕',salida:'➖',ajuste:'✏️'};
    cont.innerHTML='<div class="seccion-titulo">Historial reciente</div>'+movs.map(function(m,idx){
      var f=new Date(m.creado_en).toLocaleDateString('es-MX',{day:'2-digit',month:'short'});
      var puedeBorrar=idx===0;
      return '<div style="font-size:.78rem;padding:.5rem 0;border-bottom:1px solid var(--gris-1);display:flex;justify-content:space-between;align-items:center;"><span>'+(ic[m.tipo]||'')+' '+numFmt(m.cantidad)+' '+it.unidad+(m.motivo?' · '+m.motivo:'')+'</span><span style="display:flex;align-items:center;gap:8px;"><span style="color:var(--gris-3)">'+(m.usuario?m.usuario.nombre+' · ':'')+f+'</span>'+(puedeBorrar?'<button type="button" class="inv-mov-borrar" data-mid="'+m.id+'" data-stockanterior="'+(m.stock_anterior==null?'':m.stock_anterior)+'" style="border:none;background:none;color:var(--rojo);font-size:.95rem;cursor:pointer;">✕</button>':'')+'</span></div>';
    }).join('')+'<p class="hint" style="margin-top:.5rem;">Solo se puede eliminar el movimiento más reciente, para no descuadrar el historial. Para corregir uno anterior, usa un "Ajuste".</p>';
    cont.querySelectorAll('.inv-mov-borrar').forEach(function(btn){
      btn.addEventListener('click',function(){
        if(!confirm('¿Eliminar este movimiento? El stock se corregirá automáticamente.')) return;
        var mid=this.dataset.mid;
        var stockAnterior=this.dataset.stockanterior;
        var stockCorregido=stockAnterior!==''?parseFloat(stockAnterior):null;
        if(stockCorregido===null){
          alert('Este movimiento es de antes de esta función y no tiene guardado el stock previo. Corrígelo manualmente con un "Ajuste".');
          return;
        }
        from('movimientos_inventario').eq('id',mid).delete().then(function(){
          return from('inventario_items').eq('id',it.id).update({stock_actual:stockCorregido});
        }).then(function(){
          it.stock_actual=stockCorregido;
          showToast('🗑️ Movimiento eliminado, stock corregido');
          renderInventarioItem(itemId);
        }).catch(function(e){alert('Error: '+e.message);});
      });
    });
  });
}

omponente</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderInventarioItem(\''+itemId+'\')">← Cancelar</button>';

function renderAplicacionesEstatus(){
  var body=document.getElementById('enc-body');

  var hoy=fechaHoyLocal();

    from('formulas_aplicacion').select('*,tabla:tablas(nombre,plantacion_id),creador:usuarios!creado_por(nombre)').eq('activo',true).order('fecha_programada').get(),
    from('formula_componentes').select('*,item:inventario_items!item_id(nombre,unidad,stock_actual),autorizador:usuarios!autorizado_por(nombre)').get(),
    from('ordenes_trabajo').select('id').eq('validado_ingeniero',false).not('formula_id','is','null').get(),
    from('ordenes_trabajo').select('id,formula_id,estado,completado_en,validado_ingeniero,operario:usuarios!operario_id(nombre)').not('formula_id','is','null').get()

          if(!asignadoAPorFormula[o.formula_id]) asignadoAPorFormula[o.formula_id]=[];
          if(asignadoAPorFormula[o.formula_id].indexOf(o.operario.nombre)===-1) asignadoAPorFormula[o.formula_id].push(o.operario.nombre);
        } else {
          if(!aplicadoPorFormula[o.formula_id]) aplicadoPorFormula[o.formula_id]=[];
          if(aplicadoPorFormula[o.formula_id].indexOf(o.operario.nombre)===-1) aplicadoPorFormula[o.formula_id].push(o.operario.nombre);
        }
      }
      if(o.estado==='completada'){
        if(!aplicadaPorFormula[o.formula_id]||o.completado_en>aplicadaPorFormula[o.formula_id]) aplicadaPorFormula[o.formula_id]=o.completado_en||true;
        if(!o.validado_ingeniero){
          sinValidarPorFormula[o.formula_id]=true;

          ordenesPorValidar[o.formula_id].push({id:o.id,nombre:o.operario?o.operario.nombre:'?'});
        }
      }
    });
    rows.forEach(function(f){
      f._aplicada=!!aplicadaPorFormula[f.id];
      f._asignada=!!asignadaPorFormula[f.id];
      f._estadoFicha=f._aplicada?'aplicadas':((f.fecha_programada&&f.fecha_programada<=hoy)?'hoy':'programadas');
    });

      var autorizados=comps.filter(function(c){return c.estado_faltante==='autorizado';});

function renderDuplicarFormula(formulaId){
  var body=document.getElementById('enc-body');

    from('formulas_aplicacion').select('*,tabla:tablas(nombre,plantacion_id)').eq('id',formulaId).get(),
    from('formula_componentes').select('*').eq('formula_id',formulaId).get()
  ]).then(function(r){
    var f=r[0][0], comps=r[1]||[];
    var pOrigen=f.tabla?cats.plantaciones.find(function(x){return x.id===f.tabla.plantacion_id;}):null;
    var pO=cats.plantaciones.map(function(p){return '<option value="'+p.id+'"'+(pOrigen&&p.id===pOrigen.id?' selected':'')+'>'+p.nombre+'</option>';}).join('');

    function pintarTablasDestino(){

      document.getElementById('dup-tablas').innerHTML=tabs.length?tabs.map(function(t){return '<button type="button" class="op-chip" data-id="'+t.id+'" onclick="toggleChip(this)">'+t.nombre+'</button>';}).join(''):'<p class="hint">No hay otras tablas en esta plantación.</p>';

      Promise.all(tablaIds.map(function(tid){
        return from('formulas_aplicacion').insert({nombre:f.nombre,via:f.via,categoria:f.categoria,bombas_compatibles:f.bombas_compatibles,tabla_id:tid,fecha_programada:fechaNueva,volumen_base_litros:f.volumen_base_litros,notas:f.notas,creado_por:usuario.id,activo:true}).then(function(resp){
          var nuevoId=resp&&resp[0]&&resp[0].id;
          return Promise.all(comps.map(function(c){
            var item=cats.inventario.find(function(x){return x.id===c.item_id;});
            var disponible=item?item.stock_actual:0;
            var faltante=Math.max(0,c.cantidad_base-disponible);
            return from('formula_componentes').insert({formula_id:nuevoId,item_id:c.item_id,cantidad_base:c.cantidad_base,estado_faltante:faltante>0?'pendiente':'ninguno',faltante_detectado:faltante});

}

function cargarCatalogoLista(categoria,soloPlantillas){
  var lista=document.getElementById('cat-lista');
  lista.innerHTML='<div class="loading">Cargando fórmulas de '+categoria+'...</div>';
  var q=from('formulas_aplicacion').select('*,tabla:tablas(nombre,plantacion_id)').eq('activo',true).eq('categoria_catalogo',categoria);
  if(soloPlantillas) q=q.eq('es_plantilla',true);
  q.order('nombre').get().then(function(rows){
    rows=rows||[];
    if(!rows.length&&soloPlantillas){
      lista.innerHTML='<div class="empty">Aún no hay plantillas frecuentes de '+categoria+'.<br/><button type="button" id="cat-vertodas" style="border:none;background:none;color:var(--verde-mid);font-weight:600;cursor:pointer;margin-top:.5rem;">Ver todas las fórmulas de '+categoria+'</button></div>';
      var btnTodas=document.getElementById('cat-vertodas');
      if(btnTodas) btnTodas.addEventListener('click',function(){cargarCatalogoLista(categoria,false);});
      return;
    }
    var tituloLista=soloPlantillas?'📌 Plantillas frecuentes':'Todas las fórmulas de '+categoria;
    function pintarFilas(filtro){
      var filtradas=filtro?rows.filter(function(f){return f.nombre.toLowerCase().indexOf(filtro.toLowerCase())>-1;}):rows;
      var cont=document.getElementById('cat-filas');
      if(!filtradas.length){cont.innerHTML='<div class="empty">Sin resultados para "'+filtro+'".</div>';return;}
      cont.innerHTML=filtradas.map(function(f){
        var p=f.tabla?cats.plantaciones.find(function(x){return x.id===f.tabla.plantacion_id;}):null;
        return '<div class="orden-card" style="cursor:pointer;" data-tid="'+f.id+'"><strong style="font-size:.9rem">'+(VIA_ICONOS[f.via]||'')+' '+f.nombre+(f.es_plantilla?' 📌':'')+'</strong><div class="orden-meta">📍 '+(p?p.nombre:'')+' · '+(f.tabla?f.tabla.nombre:'')+' · '+f.via+'</div></div>';
      }).join('');
      cont.querySelectorAll('[data-tid]').forEach(function(el){el.addEventListener('click',function(){cargarPlantillaCatalogo(this.dataset.tid);});});
    }
    lista.innerHTML='<div class="seccion-titulo" style="margin-top:0;">'+tituloLista+'</div><input type="text" id="cat-buscar" placeholder="🔍 Buscar por nombre..." style="width:100%;padding:.6rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;margin-bottom:.75rem;"><div id="cat-filas"></div>'+(soloPlantillas?'<button type="button" id="cat-vertodas" style="border:none;background:none;color:var(--verde-mid);font-weight:600;cursor:pointer;margin-top:.5rem;font-size:.8rem;">Ver todas las fórmulas de '+categoria+'</button>':'');
    pintarFilas('');
    document.getElementById('cat-buscar').addEventListener('input',function(){pintarFilas(this.value);});
    var btnTodas=document.getElementById('cat-vertodas');
    if(btnTodas) btnTodas.addEventListener('click',function(){cargarCatalogoLista(categoria,false);});
  }).catch(function(e){lista.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function cargarPlantillaCatalogo(formulaId){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="loading">Cargando plantilla...</div>';
  Promise.all([
    from('formulas_aplicacion').select('*').eq('id',formulaId).get(),
    from('formula_componentes').select('*,item:inventario_items!item_id(nombre,unidad)').eq('formula_id',formulaId).get()
  ]).then(function(r){
    var f=r[0]&&r[0][0], comps=r[1]||[];
    if(!f){renderCatalogoFormulas();return;}
    formulaEditId=null;
    formulaVolverAResumen=false;
    formulaModoCatalogoDirecto=true;
    formulaVia=f.via; formulaCategoria=f.categoria; formulaCategoriasCombinadas=f.categorias_combinadas||[]; formulaEsPlantilla=false; formulaBombas=(f.bombas_compatibles||[]).slice();
    window._formulaDuracionSurcos=f.duracion_o_surcos||null;
    formulaTablaId=f.tabla_id||null;
    var tb=cats.tablas.find(function(t){return t.id===formulaTablaId;});
    formulaPlantacionId=tb?tb.plantacion_id:null;
    formulaCompSeq=0;
    formulaCompRows=comps.filter(function(c){return c.estado_faltante!=='sustituido';}).map(function(c){
      formulaCompSeq++;
      var unidad=c.item?c.item.unidad:'';
      var cantidad=c.cantidad_base;
      var unidadEntrada=unidad;
      if(unidad==='kg'&&cantidad<1) unidadEntrada='gr';
      else if(unidad==='litros'&&cantidad<1) unidadEntrada='ml';
      return {row:formulaCompSeq,item_id:c.item_id,nombre:c.item?c.item.nombre:'',unidad:unidad,unidadEntrada:unidadEntrada,cantidad:cantidad};
    });
    window._formulaNombreExistente=f.nombre+' (copia)';
    window._formulaNotasExistente=f.notas;
    window._formulaFechaExistente=fechaHoyLocal();
    window._formulaCreadorExistente=null;
    window._formulaVolumenExistente=f.volumen_base_litros;

function renderFormulaForm(formulaId){
  formulaEditId=formulaId||null;
  formulaVolverAResumen=false;
  formulaVia=null; formulaCategoria=null; formulaCategoriasCombinadas=[]; formulaEsPlantilla=false; formulaBombas=[]; formulaCompRows=[]; formulaCompSeq=0;
  formulaPlantacionId=null; formulaTablaId=null;
  window._formulaCreadorExistente=null;
  window._formulaDuracionSurcos=null;
  formulaModoCatalogoDirecto=false;
  if(formulaId){
    Promise.all([
      from('formulas_aplicacion').select('*,creador:usuarios!creado_por(nombre)').eq('id',formulaId).get(),
      from('formula_componentes').select('*,item:inventario_items!item_id(nombre,unidad)').eq('formula_id',formulaId).get()
    ]).then(function(r){
      var f=r[0]&&r[0][0], comps=r[1]||[];

      formulaVia=f.via; formulaCategoria=f.categoria; formulaCategoriasCombinadas=f.categorias_combinadas||[]; formulaEsPlantilla=!!f.es_plantilla; formulaBombas=(f.bombas_compatibles||[]).slice();
      window._formulaDuracionSurcos=f.duracion_o_surcos||null;
      formulaTablaId=f.tabla_id||null;
      var tb=cats.tablas.find(function(t){return t.id===formulaTablaId;});
      formulaPlantacionId=tb?tb.plantacion_id:null;
      formulaCompRows=comps.map(function(c){
        formulaCompSeq++;

        var unidadEntrada=unidad;
        if(unidad==='kg'&&cantidad<1) unidadEntrada='gr';
        else if(unidad==='litros'&&cantidad<1) unidadEntrada='ml';
        return {row:formulaCompSeq,item_id:c.item_id,nombre:c.item?c.item.nombre:'',unidad:unidad,unidadEntrada:unidadEntrada,cantidad:cantidad,estadoFaltante:c.estado_faltante,sustituidoPorItemId:c.sustituido_por_item_id,sustitutoDeItemId:c.sustituto_de_item_id,faltanteDetectado:c.faltante_detectado,autorizadoPor:c.autorizado_por,autorizadoEn:c.autorizado_en};
      });
      window._formulaNombreExistente=f.nombre; window._formulaNotasExistente=f.notas; window._formulaFechaExistente=f.fecha_programada;
      window._formulaCreadorExistente=f.creador?f.creador.nombre:null;
      renderFormulaPasoNotas();
    });
  } else {
    window._formulaNombreExistente=''; window._formulaNotasExistente=''; window._formulaFechaExistente='';
    renderFormulaPasoPlantacion();
  }
}

function unidadesAlternas(unidadBase){
  if(unidadBase==='kg') return ['kg','gr'];
  if(unidadBase==='litros') return ['litros','ml'];
  return [unidadBase];
}
function convertirABase(valor,unidadEntrada,unidadBase){
  if(!valor) return 0;
  if(unidadEntrada===unidadBase) return valor;
  if(unidadBase==='kg'&&unidadEntrada==='gr') return valor/1000;
  if(unidadBase==='litros'&&unidadEntrada==='ml') return valor/1000;
  return valor;
}
function convertirDesdeBase(valorBase,unidadEntrada,unidadBase){
  if(!valorBase) return '';
  if(unidadEntrada===unidadBase) return valorBase;
  if(unidadBase==='kg'&&unidadEntrada==='gr') return valorBase*1000;
  if(unidadBase==='litros'&&unidadEntrada==='ml') return valorBase*1000;
  return valorBase;
}

:600;cursor:pointer;">Crear y usar</button></div><div style="display:flex;gap:8px;align-items:center;margin-top:.5rem;"><input type="number" class="fcomp-cant" data-row="'+r.row+'" min="0" placeholder="cantidad para 200L" value="'+(valorMostrado||'')+'" style="flex:1;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;">'+unidadSelectHtml+'<button type="button" class="fcomp-quitar" data-row="'+r.row+'" style="border:none;background:none;color:var(--rojo);font-size:1.1rem;cursor:pointer;">✕</button></div><p class="hint" style="margin:.3rem 0 0;">La cantidad de arriba es lo que la fórmula usa, no el stock — el stock se registra aparte en Inventario.</p></div>';
  }).join('');
  function filtrarInventarioFcomp(query){
    query=(query||'').trim().toLowerCase();

      }).then(function(rows){
        cats.inventario=rows||[];
        var it=cats.inventario.find(function(x){return x.nombre.toLowerCase()===nombre.toLowerCase();});
        aplicarComponenteCreado(rid,it);
      }).catch(function(e){alert('Error: '+e.message);});
    });
  });
  cont.querySelectorAll('.fcomp-cant').forEach(function(inp){
    inp.addEventListener('input',function(){
      var rid=parseInt(this.dataset.row);
      var row=formulaCompRows.find(function(x){return x.row===rid;});
      if(row){
        var unidadEntrada=row.unidadEntrada||row.unidad;
        row.cantidad=convertirABase(parseFloat(this.value)||0,unidadEntrada,row.unidad);
      }
    });
  });
  cont.querySelectorAll('.fcomp-unidad-sel').forEach(function(sel){
    sel.addEventListener('change',function(){
      var rid=parseInt(this.dataset.row);
      var row=formulaCompRows.find(function(x){return x.row===rid;});
      if(row){
        row.unidadEntrada=this.value;
        var input=cont.querySelector('.fcomp-cant[data-row="'+rid+'"]');
        var valorActual=input?(parseFloat(input.value)||0):0;
        row.cantidad=convertirABase(valorActual,row.unidadEntrada,row.unidad);
      }
    });
  });
  cont.querySelectorAll('.fcomp-quitar').forEach(function(btn){
    btn.addEventListener('click',function(){
      var rid=parseInt(this.dataset.row);
      formulaCompRows=formulaCompRows.filter(function(x){return x.row!==rid;});
      if(!formulaCompRows.length) agregarFormulaComponenteRow(); else pintarFormulaCompList();
    });
  });
}

function aplicarComponenteCreado(rid,item){
  var row=formulaCompRows.find(function(x){return x.row===rid;});
  if(row&&item){row.item_id=item.id;row.nombre=item.nombre;row.unidad=item.unidad;row.unidadEntrada=item.unidad;}
  pintarFormulaCompList();
  showToast('📦 Componente creado con 0 en stock: '+(item?item.nombre:''));
}

function agregarFormulaComponenteRow(){
  formulaCompSeq++;
  formulaCompRows.push({row:formulaCompSeq,item_id:null,nombre:'',unidad:'',cantidad:null});
  pintarFormulaCompList();
}

ndo la asignes a un operario, en el módulo de Aplicaciones.</p><div class="form-group"><label style="display:flex;align-items:center;gap:8px;font-weight:600;font-size:.85rem;"><input type="checkbox" id="fm-plantilla" '+(formulaEsPlantilla?'checked':'')+' style="width:18px;height:18px;"> 📌 Es una fórmula que se repite mucho (guardar como plantilla frecuente en el Catálogo)</label></div><div class="form-group" id="fm-catcatalogo-box" style="display:'+((formulaEsPlantilla&&formulaCategoria==='Combinada')?'':'none')+';"><label>¿En qué categoría del catálogo la guardamos?</label><div style="display:flex;flex-wrap:wrap;gap:8px;" id="fm-catcatalogo-chips">'+['Nutrición','Plaga','Estimulación','Herbicida'].map(function(c){return '<button type="button" class="op-chip'+(window._formulaCategoriaCatalogo===c?' sel':'')+'" data-catcat="'+c+'" onclick="seleccionUnica(this)">'+CATEGORIA_ICONOS[c]+' '+c+'</button>';}).join('')+'</div><p class="hint">Como "Combinada" varía mucho, no aparece como categoría del catálogo — elige bajo cuál de las 4 se debe encontrar esta plantilla.</p></div><div class="form-group"><label>Notas (opcional)</label><input type="text" id="fm-notas-input" value="'+(window._formulaNotasExistente?window._formulaNotasExistente.replace(/"/g,'&quot;'):'')+'" placeholder="Instrucciones adicionales..."></div><button class="btn-primary" id="fm-guardar">'+(formulaEditId?'Guardar cambios':'Crear fórmula')+'</button></div>'+(formulaEditId?'<div class="form-card"><button type="button" id="fm-eliminar" style="width:100%;padding:.75rem;border-radius:var(--radio-sm);border:1.5px solid var(--rojo);background:var(--rojo-tenue);color:var(--rojo);font-weight:700;font-size:.85rem;cursor:pointer;">🗑️ Eliminar fórmula</button></div>':'')+'<button class="btn-back" style="margin-top:1rem;" onclick="renderAplicacionesEstatus()">← Volver a fórmulas</button>';
  document.getElementById('fm-guardar').addEventListener('click',guardarFormula);
  var plantillaCheckbox=document.getElementById('fm-plantilla');
  plantillaCheckbox.addEventListener('change',function(){
    document.getElementById('fm-catcatalogo-box').style.display=(plantillaCheckbox.checked&&formulaCategoria==='Combinada')?'':'none';

  document.querySelectorAll('[data-autorizar-inline]').forEach(function(btn){

      e.stopPropagation();

      formulaVolverAResumen=true;

function guardarFormula(){
  var nombre=window._formulaNombreExistente;
  var notas=document.getElementById('fm-notas-input').value||null;
  var esPlantilla=document.getElementById('fm-plantilla').checked;
  var catCatalogo=formulaCategoria;
  if(formulaCategoria==='Combinada'){
    var catCatSel=document.querySelector('#fm-catcatalogo-chips .op-chip.sel');
    if(esPlantilla&&!catCatSel){alert('Selecciona en qué categoría del catálogo se debe guardar esta fórmula combinada.');return;}
    catCatalogo=catCatSel?catCatSel.dataset.catcat:null;
  }
  var comps=formulaCompRows.filter(function(r){return r.item_id&&r.cantidad>0;});
  var btn=document.getElementById('fm-guardar'); btn.disabled=true; btn.textContent='Guardando...';
  var payload={nombre:nombre,via:formulaVia,categoria:formulaCategoria,categoria_catalogo:catCatalogo,categorias_combinadas:formulaCategoria==='Combinada'?formulaCategoriasCombinadas:null,es_plantilla:esPlantilla,bombas_compatibles:formulaBombas,duracion_o_surcos:window._formulaDuracionSurcos||null,tabla_id:formulaTablaId,fecha_programada:window._formulaFechaExistente||null,volumen_base_litros:200,notas:notas,creado_por:usuario.id,activo:true};
  var guardar=formulaEditId?from('formulas_aplicacion').eq('id',formulaEditId).update(payload):from('formulas_aplicacion').insert(payload);
  guardar.then(function(resp){
    var fid=formulaEditId||(resp&&resp[0]&&resp[0].id);
    if(!fid){throw new Error('No se pudo obtener la fórmula guardada.');}
    var borrarViejos=formulaEditId?from('formula_componentes').eq('formula_id',fid).delete():Promise.resolve();
    return borrarViejos.then(function(){
      return Promise.all(comps.map(function(c){
        if(c.estadoFaltante==='sustituido'){
          return from('formula_componentes').insert({formula_id:fid,item_id:c.item_id,cantidad_base:c.cantidad,estado_faltante:'sustituido',sustituido_por_item_id:c.sustituidoPorItemId||null,faltante_detectado:c.faltanteDetectado||0});
        }
        var item=cats.inventario.find(function(x){return x.id===c.item_id;});
        var disponible=item?item.stock_actual:0;
        var faltante=Math.max(0,c.cantidad-disponible);
        var yaResuelto=c.estadoFaltante==='autorizado'&&faltante>0;
        var estadoFaltante=yaResuelto?'autorizado':(faltante>0?'pendiente':'ninguno');
        return from('formula_componentes').insert({formula_id:fid,item_id:c.item_id,cantidad_base:c.cantidad,estado_faltante:estadoFaltante,faltante_detectado:faltante,sustituto_de_item_id:c.sustitutoDeItemId||null,autorizado_por:yaResuelto?c.autorizadoPor:null,autorizado_en:yaResuelto?c.autorizadoEn:null});
      }));
    });
  }).then(function(){
    var hayFaltante=comps.some(function(c){
      var item=cats.inventario.find(function(x){return x.id===c.item_id;});
      var disponible=item?item.stock_actual:0;
      return (c.cantidad-disponible)>0;
    });
    var avisoFaltante=hayFaltante?from('notificaciones').insert({titulo:'⚠️ Fórmula con faltante de producto',cuerpo:'La fórmula "'+nombre+'" quedó guardada con al menos un componente sin stock suficiente. Revísala en Fórmulas → ⚠️ Faltantes.',icono:'⚠️',leida:false,para_rol:'encargado'}):Promise.resolve();
    return avisoFaltante.then(function(){
      showToast(hayFaltante?'⚠️ Guardada con faltante de producto: '+nombre:'✅ Fórmula guardada: '+nombre);
      renderAplicacionesEstatus();
    });
  }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent=formulaEditId?'Guardar cambios':'Crear fórmula';});
}

function renderAsigAplicPorFecha(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">🧪 Aplicaciones<button type="button" onclick="renderAplicacionesEstatus()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Aplicaciones</button></div><div class="loading">Buscando lo programado...</div>';
  var hoy=fechaHoyLocal();
  var en7dias=new Date(Date.now()+7*86400000).toISOString().slice(0,10);
  Promise.all([
    from('formulas_aplicacion').select('*,tabla:tablas(nombre,plantacion_id)').eq('activo',true).not('fecha_programada','is','null').order('fecha_programada').get(),
    from('ordenes_trabajo').select('formula_id,estado').not('formula_id','is','null').get()
  ]).then(function(r){
    var formulas=r[0]||[], ordenesConFormula=(r[1]||[]).filter(function(o){return o.estado!=='cancelada';});
    var asignadas={}, aplicadas={};
    ordenesConFormula.forEach(function(o){asignadas[o.formula_id]=true; if(o.estado==='completada') aplicadas[o.formula_id]=true;});
    var hoyF=formulas.filter(function(f){return f.fecha_programada===hoy;});
    var semanaF=formulas.filter(function(f){return f.fecha_programada>hoy&&f.fecha_programada<=en7dias;});
    var masF=formulas.filter(function(f){return f.fecha_programada>en7dias;});
    function tarjeta(f){
      var p=f.tabla?cats.plantaciones.find(function(x){return x.id===f.tabla.plantacion_id;}):null;
      var yaAsig=asignadas[f.id], yaAplic=aplicadas[f.id];
      var badge=yaAplic?'<span style="font-size:.7rem;color:var(--verde-mid);font-weight:700;">🔒 Ya aplicada</span>':(yaAsig?'<span style="font-size:.7rem;color:var(--tierra);font-weight:700;">🔶 Ya asignada</span>':'<span style="font-size:.7rem;color:var(--rojo);font-weight:700;">Sin asignar</span>');
      return '<div class="orden-card" style="cursor:pointer;'+(yaAplic?'opacity:.5;':'')+'" data-fid="'+f.id+'" data-aplicada="'+(yaAplic?'1':'0')+'" data-nombre="'+f.nombre.replace(/"/g,'&quot;')+'"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.92rem">'+(VIA_ICONOS[f.via]||'')+' '+f.nombre+'</strong>'+badge+'</div><div class="orden-meta">📍 '+(p?p.nombre:'')+' · '+(f.tabla?f.tabla.nombre:'')+' · 📅 '+f.fecha_programada+'</div></div>';
    }
    var html='';
    if(hoyF.length) html+='<div class="seccion-titulo">📅 Hoy</div>'+hoyF.map(tarjeta).join('');
    if(semanaF.length) html+='<div class="seccion-titulo" style="margin-top:1rem">Esta semana</div>'+semanaF.map(tarjeta).join('');
    if(masF.length) html+='<div class="seccion-titulo" style="margin-top:1rem">Más adelante</div>'+masF.map(tarjeta).join('');
    if(!formulas.length) html='<div class="empty">No hay fórmulas con fecha programada.<br/>Puedes buscar por plantación abajo.</div>';
    html+='<button class="btn-back" style="margin-top:1.25rem;width:100%;" onclick="renderAsigAplicPlantaciones()">🔍 Buscar por plantación / tabla</button>';
    body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">🧪 Aplicaciones<button type="button" onclick="renderAplicacionesEstatus()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Aplicaciones</button></div>'+html;
    body.querySelectorAll('[data-fid]').forEach(function(el){el.addEventListener('click',function(){
      if(this.dataset.aplicada==='1'){
        if(!confirm('⚠️ La fórmula "'+this.dataset.nombre+'" ya fue aplicada anteriormente.\n\n¿Seguro que quieres asignarla otra vez? Esto puede causar una aplicación duplicada.')) return;
      }
      cargarFormulaParaAsignar(this.dataset.fid);
    });});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderEditarModoAsignacion(formulaId){

  from('ordenes_trabajo').select('id,es_hora_extra,operario_id,tipo_labor_id,fecha_asignacion,notas_encargado,operario:usuarios!operario_id(nombre)').eq('formula_id',formulaId).not('estado','eq','completada').not('estado','eq','cancelada').get().then(function(rows){

    var html='<div class="seccion-titulo">✏️ Gestionar operarios asignados</div>'+(rows.length>1?'<p class="hint" style="margin-bottom:.75rem;">Hay '+rows.length+' operarios en esta aplicación.</p>':'')+rows.map(function(o){
      return '<div class="orden-card"><strong style="font-size:.9rem;">'+(o.operario?o.operario.nombre:'')+'</strong><div class="orden-meta">Actualmente: '+(o.es_hora_extra?'⏰ Hora Extra':'🧑‍🌾 Labores')+'</div><div style="display:flex;gap:8px;margin-top:.5rem;flex-wrap:wrap;"><button type="button" class="btn-sm btn-completar" data-toggle-modo="'+o.id+'" data-actual="'+(o.es_hora_extra?'1':'0')+'" data-op="'+o.operario_id+'" data-labor="'+o.tipo_labor_id+'" data-fecha="'+o.fecha_asignacion+'">Cambiar a '+(o.es_hora_extra?'🧑‍🌾 Labores':'⏰ Hora Extra')+'</button>'+(rows.length>1?'<button type="button" class="btn-sm btn-cancelar" data-quitar="'+o.id+'" data-nombre="'+(o.operario?o.operario.nombre:'').replace(/"/g,'&quot;')+'">🗑️ Quitar de esta aplicación</button>':'')+'</div></div>';
    }).join('');

    body.querySelectorAll('[data-toggle-modo]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var oid=this.dataset.toggleModo, eraExtra=this.dataset.actual==='1', opId=this.dataset.op, laborId=this.dataset.labor, fecha=this.dataset.fecha;
        var nuevoValor=!eraExtra;
        from('ordenes_trabajo').eq('id',oid).update({es_hora_extra:nuevoValor}).then(function(){
          if(nuevoValor){
            return from('horas_extra_asignadas').insert({operario_id:opId,asignado_por:usuario.id,fecha:fecha,motivo:'Corrección de modo',tipo_labor_id:laborId,estado:'aprobada'});
          } else {
            return from('horas_extra_asignadas').eq('operario_id',opId).eq('fecha',fecha).eq('tipo_labor_id',laborId).delete();
          }
        }).then(function(){

function cargarFormulaParaAsignar(formulaId){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="loading">Cargando fórmula...</div>';
  Promise.all([
    from('formulas_aplicacion').select('*').eq('id',formulaId).get(),
    from('formula_componentes').select('*,item:inventario_items!item_id(nombre,unidad,stock_actual)').eq('formula_id',formulaId).get()
  ]).then(function(r){
    aplic.formula=r[0]&&r[0][0];
    aplic.componentes=r[1]||[];
    aplic.tablaId=aplic.formula.tabla_id;
    var tb=cats.tablas.find(function(t){return t.id===aplic.tablaId;});
    aplic.plantacionId=tb?tb.plantacion_id:null;
    aplic.fecha=aplic.formula.fecha_programada||fechaHoyLocal();
    aplic.bomba=(aplic.formula.bombas_compatibles||[])[0]||'manual';
    aplic.modoCantidad='tambo';
    if(aplic.bomba==='inyeccion'){
      aplic.numBombas=1; aplic.volumen=200; aplic.factor=1;
      renderAsigAplicComponentes();
    } else {
      renderAsigAplicCantidad();
    }
  });
}

function renderAsigAplicCantidad(){
  var body=document.getElementById('enc-body');
  var cap=BOMBA_CAPACIDAD[aplic.bomba];
  var bombasParaTambo=Math.round((200/cap)*10)/10;
  var modo=aplic.modoCantidad||'tambo';
  var tilesEquipo=['inyeccion','motor','manual'].map(function(b){
    return '<div class="labor-tile'+(aplic.bomba===b?' labor-tile-otra':'')+'" data-bomba="'+b+'"><div class="labor-tile-ic">'+BOMBA_ICONOS[b]+'</div><div class="labor-tile-lbl">'+BOMBA_LABELS[b]+'</div></div>';
  }).join('');
  body.innerHTML='<div class="seccion-titulo">🧪 '+aplic.formula.nombre+'</div><p class="hint" style="margin-bottom:.75rem;">Equipo: <strong>'+BOMBA_ICONOS[aplic.bomba]+' '+BOMBA_LABELS[aplic.bomba]+'</strong> (definido por la fórmula) · <a href="javascript:void(0)" id="aplic-cambiar-equipo" style="color:var(--verde-mid);font-weight:600;">cambiar</a></p><div id="aplic-equipo-box" style="display:none;margin-bottom:1rem;" class="labor-grid">'+tilesEquipo+'</div><div class="form-card"><div class="form-group"><label>¿Cuánto se va a aplicar?</label><div style="display:flex;gap:8px;"><button type="button" class="op-chip'+(modo==='tambo'?' sel':'')+'" id="aplic-modo-tambo">🛢️ Tambo completo (200 L)</button><button type="button" class="op-chip'+(modo==='bombas'?' sel':'')+'" id="aplic-modo-bombas">🎒 Por bombas</button></div></div><div id="aplic-tambo-info" style="'+(modo==='tambo'?'':'display:none;')+'"><p class="hint">≈ '+bombasParaTambo+' '+BOMBA_LABELS[aplic.bomba].toLowerCase()+'s de '+cap+' L c/u para llenar el tambo.</p></div><div id="aplic-bombas-info" style="'+(modo==='bombas'?'':'display:none;')+'"><input type="number" id="aplic-numbombas" min="1" value="'+(aplic.numBombas||1)+'" style="width:100%;text-align:center;font-size:2.4rem;font-weight:800;color:var(--verde-mid);border:none;background:transparent;outline:none;"><p class="hint">bombas de '+cap+' L c/u</p><p class="hint" id="aplic-vol-preview" style="font-weight:700;"></p></div><button class="btn-primary" style="margin-top:1rem;" id="aplic-cant-continuar">Continuar →</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderAsigAplicFormulas()">← Volver a fórmula</button>';
  function actualizarPreview(){
    var n=parseFloat(document.getElementById('aplic-numbombas').value)||0;
    document.getElementById('aplic-vol-preview').textContent='= '+numFmt(n*cap)+' litros totales';
  }
  document.getElementById('aplic-cambiar-equipo').addEventListener('click',function(){
    var box=document.getElementById('aplic-equipo-box');
    box.style.display=box.style.display==='none'?'flex':'none';
  });
  document.getElementById('aplic-equipo-box').querySelectorAll('[data-bomba]').forEach(function(el){el.addEventListener('click',function(){
    aplic.bomba=this.dataset.bomba;
    if(aplic.bomba==='inyeccion'){
      aplic.numBombas=1; aplic.volumen=200; aplic.factor=1;
      renderAsigAplicComponentes();
    } else {
      renderAsigAplicCantidad();
    }
  });});
  document.getElementById('aplic-modo-tambo').addEventListener('click',function(){
    aplic.modoCantidad='tambo';
    this.classList.add('sel');
    document.getElementById('aplic-modo-bombas').classList.remove('sel');
    document.getElementById('aplic-tambo-info').style.display='';
    document.getElementById('aplic-bombas-info').style.display='none';
  });
  document.getElementById('aplic-modo-bombas').addEventListener('click',function(){
    aplic.modoCantidad='bombas';
    this.classList.add('sel');
    document.getElementById('aplic-modo-tambo').classList.remove('sel');
    document.getElementById('aplic-tambo-info').style.display='none';
    document.getElementById('aplic-bombas-info').style.display='';
    actualizarPreview();
  });
  document.getElementById('aplic-numbombas').addEventListener('input',actualizarPreview);
  actualizarPreview();
  document.getElementById('aplic-cant-continuar').addEventListener('click',function(){
    if(aplic.modoCantidad==='bombas'){
      var n=parseFloat(document.getElementById('aplic-numbombas').value)||0;
      if(n<=0){alert('Captura cuántas bombas se van a usar.');return;}
      aplic.numBombas=n; aplic.volumen=n*cap; aplic.factor=aplic.volumen/200;
    } else {
      aplic.numBombas=bombasParaTambo; aplic.volumen=200; aplic.factor=1;
    }
    renderAsigAplicComponentes();
  });
}

function renderAsigAplicComponentes(){
  var body=document.getElementById('enc-body');
  var faltantes=[];
  var filas=aplic.componentes.map(function(c){
    var cantEscalada=c.cantidad_base*aplic.factor;
    var stock=c.item?c.item.stock_actual:0;
    var falta=cantEscalada-stock;
    var unidadItem=c.item?c.item.unidad:'';
    if(falta>0) faltantes.push({nombre:c.item?c.item.nombre:'',falta:falta,unidad:unidadItem});
    return '<div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--gris-1);font-size:.85rem;"><span>'+(c.item?c.item.nombre:'')+'</span><strong>'+fmtAmigable(cantEscalada,unidadItem)+'</strong></div>';
  }).join('');
  var alertaHtml=faltantes.length?'<div style="background:var(--rojo-tenue);border:1.5px solid var(--rojo);border-radius:var(--radio-sm);padding:.75rem;margin-bottom:1rem;font-size:.82rem;"><strong style="color:var(--rojo);">⚠️ No alcanza el inventario</strong><br>'+faltantes.map(function(f){return f.nombre+' (faltan '+fmtAmigable(f.falta,f.unidad)+')';}).join(', ')+'</div>':'';
  body.innerHTML='<div class="seccion-titulo">🧪 Receta ajustada · '+numFmt(aplic.volumen)+' L ('+Math.round(aplic.factor*100)+'% de la base)</div>'+alertaHtml+'<div class="form-card">'+filas+'</div><button class="btn-primary" style="margin-top:1.25rem;" id="aplic-comp-continuar">Continuar →</button><button class="btn-back" style="margin-top:.75rem;" onclick="'+(aplic.bomba==='inyeccion'?'renderAsigAplicFormulas()':'renderAsigAplicCantidad()')+'">← Volver</button>';
  document.getElementById('aplic-comp-continuar').addEventListener('click',function(){
    if(faltantes.length&&!confirm('El inventario no alcanza para esta cantidad. ¿Asignar de todas formas? (tendrás que comprar antes de aplicar)')) return;
    renderAsigAplicOperarios();
  });
}

  document.getElementById('aplic-modo-extra').addEventListener('click',function(){aplic.esExtra=true;this.classList.add('sel');document.getElementById('aplic-modo-normal').classList.remove('sel');});

function renderAsigAplicNotas(){

  var t=cats.tablas.find(function(x){return x.id===aplic.tablaId;});
  var p=cats.plantaciones.find(function(x){return x.id===aplic.plantacionId;});
