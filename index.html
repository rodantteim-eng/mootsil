function guardarEjec(){
  var o=ordenEjecutando;
  if(!capturaEjec.foto){
    alert('Debes tomar una foto o video de evidencia antes de concluir la labor.');
    return;
  }
  if(capturaEjec.foto&&capturaEjec.fotoBlob&&!capturaEjec.fotoUrl){
    document.getElementById('exito-sub').textContent='Subiendo evidencia...';
    mostrar('screen-exito');
    var esVideo=capturaEjec.esVideo||false;
    var ext=esVideo?'.webm':'.jpg';
    var mime=esVideo?'video/webm':'image/jpeg';
    var nombre='evidencia_'+Date.now()+ext;

    function guardarLocalYContinuar(){
      guardarEvidenciaPendiente(capturaEjec.fotoBlob,mime).then(function(localId){
        capturaEjec.fotoUrl='offline:'+localId;
        document.getElementById('exito-sub').textContent='Sin señal — tu evidencia quedó guardada en el celular y se subirá sola cuando regrese la conexión.';
        ejecutarGuardadoFinal(o);
      }).catch(function(){
        capturaEjec.fotoUrl='pendiente';
        ejecutarGuardadoFinal(o);
      });
    }

    if(!navigator.onLine){
      guardarLocalYContinuar();
      return;
    }
    var ctrl=(typeof AbortController!=='undefined')?new AbortController():null;
    var timer=ctrl?setTimeout(function(){ctrl.abort();},8000):null;
    fetch(URL_SB+'/storage/v1/object/evidencias/'+nombre,{method:'POST',headers:{'apikey':KEY_SB,'Authorization':'Bearer '+KEY_SB,'Content-Type':mime,'x-upsert':'true'},body:capturaEjec.fotoBlob,signal:ctrl?ctrl.signal:undefined}).then(function(r){
      if(timer) clearTimeout(timer);
      if(!r.ok) throw new Error('HTTP '+r.status);
      capturaEjec.fotoUrl=URL_SB+'/storage/v1/object/public/evidencias/'+nombre;
      ejecutarGuardadoFinal(o);
    }).catch(function(){
      if(timer) clearTimeout(timer);
      guardarLocalYContinuar();
    });
    return;
  }
  ejecutarGuardadoFinal(o);
}

function calcularProgresoSurcos(o){
  var totalAsignados = (o.surcos_asignados&&o.surcos_asignados.length) ? o.surcos_asignados.map(String) : (o.tabla&&o.tabla.cantidad_surcos ? Array.from({length:o.tabla.cantidad_surcos},function(_,i){return String(i+1);}) : []);
  var yaCompletados = (o.surcos_completados||[]).map(String);
  var nuevos = (capturaEjec.surcos||[]).map(String);
  var union = Array.from(new Set(yaCompletados.concat(nuevos)));
  var faltan = totalAsignados.filter(function(s){return union.indexOf(s)===-1;});
  return {totalAsignados:totalAsignados,union:union,faltan:faltan,completo: totalAsignados.length>0 && faltan.length===0};
}

function ejecutarGuardadoFinal(o){
  var esAplic=o.tipo_labor&&o.tipo_labor.requiere_formula;
  var progreso = esAplic ? {completo:true,union:[],faltan:[]} : calcularProgresoSurcos(o);
  var nuevoEstado = progreso.completo ? 'completada' : 'en_proceso';
  var updatePayload = esAplic ? {estado:nuevoEstado} : {estado:nuevoEstado, surcos_completados:progreso.union};
  if(nuevoEstado==='completada') updatePayload.completado_en=new Date().toISOString();
  var reg={usuario_id:usuario.id,tabla_id:o.tabla_id,tipo_labor_id:o.tipo_labor_id,subtipo_labor_id:o.subtipo_labor_id||null,surcos_trabajados:esAplic?[]:capturaEjec.surcos,cantidad_insumo:esAplic?o.volumen_aplicado_litros:(capturaEjec.cantidad||null),foto_url:capturaEjec.fotoUrl||null,capturado_en:new Date().toISOString(),orden_id:o.id};
  var fotoQuedoLocal = capturaEjec.fotoUrl && capturaEjec.fotoUrl.indexOf('offline:')===0;
  if(!navigator.onLine||fotoQuedoLocal){
    colaOffline.push(reg);
    localStorage.setItem('mootsil_cola',JSON.stringify(colaOffline));
    from('ordenes_trabajo').eq('id',o.id).update(updatePayload).then(function(){
      if(!document.getElementById('exito-sub').textContent) document.getElementById('exito-sub').textContent='Sin señal. Guardado en tu dispositivo y se subirá cuando haya internet.';
      mostrar('screen-exito'); ordenEjecutando=null;
    }).catch(function(){
      riegoEncolar(o.id,updatePayload);
      mostrar('screen-exito'); ordenEjecutando=null;
    });
    return;
  }
  from('registros_labor').insert(reg).then(function(){
    from('ordenes_trabajo').eq('id',o.id).update(updatePayload).then(function(){
      var lb=cats.tiposLabor.find(function(l){return l.id===o.tipo_labor_id;}), tb=cats.tablas.find(function(t){return t.id===o.tabla_id;});
      var verbo = progreso.completo ? 'completó' : 'avanzó en';
      showToast('✅ '+usuario.nombre+' '+verbo+' '+(lb?lb.nombre:'')+' en '+(tb?tb.nombre:''));
      var detalle=esAplic?('Fórmula: '+(o.formula?o.formula.nombre:'')):('Surcos: '+capturaEjec.surcos.join(', ')+(progreso.completo?'':' · Faltan: '+progreso.faltan.join(', ')));
      from('notificaciones').insert({titulo: progreso.completo?'✅ Labor completada':'🔶 Avance parcial registrado',cuerpo:usuario.nombre+' '+verbo+' '+(lb?lb.nombre:'')+' en '+(tb?tb.nombre:'')+' — '+detalle,icono: progreso.completo?'✅':'🔶',leida:false,para_rol:'encargado'}).then(function(){
        document.getElementById('exito-sub').textContent = progreso.completo ? 'Registro guardado. El encargado recibirá un aviso.' : 'Avance guardado. Faltan '+progreso.faltan.length+' surco(s) — seguirá apareciendo en tus tareas.';
        mostrar('screen-exito'); ordenEjecutando=null;
      });
    });
  }).catch(function(e){alert('Error: '+e.message);});
}

function sincronizarEvidenciasPendientes(){
  return listarEvidenciasPendientes().then(function(items){
    return Promise.all(items.map(function(item){
      var ext=item.mime==='video/webm'?'.webm':'.jpg';
      var nombre='evidencia_'+item.id+ext;
      return fetch(URL_SB+'/storage/v1/object/evidencias/'+nombre,{method:'POST',headers:{'apikey':KEY_SB,'Authorization':'Bearer '+KEY_SB,'Content-Type':item.mime,'x-upsert':'true'},body:item.blob}).then(function(r){
        if(!r.ok) throw new Error('HTTP '+r.status);
        var url=URL_SB+'/storage/v1/object/public/evidencias/'+nombre;
        var marcador='offline:'+item.id;
        colaOffline.forEach(function(r2){ if(r2.foto_url===marcador) r2.foto_url=url; });
        localStorage.setItem('mootsil_cola',JSON.stringify(colaOffline));
        return borrarEvidenciaPendiente(item.id);
      }).catch(function(){});
    }));
  });
}

function sincronizarColaGeneral(){
  if(!colaOffline.length) return;
  var pendientes=colaOffline.slice(); colaOffline=[];
  localStorage.setItem('mootsil_cola','[]');
  pendientes.forEach(function(r){from('registros_labor').insert(r).catch(function(){colaOffline.push(r);localStorage.setItem('mootsil_cola',JSON.stringify(colaOffline));});});
}

window.addEventListener('online',function(){
  sincronizarEvidenciasPendientes().then(sincronizarColaGeneral);
});

function usarCamara(){document.getElementById('cam-input').click();}
function abrirGaleria(){document.getElementById('gal-input').click();}

function abrirCamaraApp(){
  var overlay=document.getElementById('cam-overlay');
  overlay.style.display='flex';
  navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing},audio:false}).then(function(stream){
    camStream=stream;
    var video=document.getElementById('cam-video');
    video.srcObject=stream;
  }).catch(function(e){
    overlay.style.display='none';
    alert('No se pudo acceder a la camara. Usa Galeria.');
  });
}

function cerrarCamara(){
  if(camStream) camStream.getTracks().forEach(function(t){t.stop();});
  camStream=null;
  document.getElementById('cam-overlay').style.display='none';
}

function toggleVideo(){
  if(!grabando){
    videoChunks=[];
    var options={mimeType:'video/webm;codecs=vp9'};
    if(!MediaRecorder.isTypeSupported(options.mimeType)) options={mimeType:'video/webm'};
    mediaRecorder=new MediaRecorder(camStream, options);
    mediaRecorder.ondataavailable=function(e){if(e.data.size>0) videoChunks.push(e.data);};
    mediaRecorder.onstop=function(){
      var blob=new Blob(videoChunks,{type:'video/webm'});
      capturaEjec.foto=true;
      capturaEjec.fotoBlob=blob;
      capturaEjec.fotoUrl=null;
      capturaEjec.esVideo=true;
      cerrarCamara();
      renderEjec();
    };
    mediaRecorder.start();
    grabando=true;
    document.getElementById('btn-video').textContent='⏹ Detener';
    document.getElementById('btn-video').style.background='rgba(255,0,0,.9)';
    var st=document.getElementById('cam-status');
    if(st) st.style.display='block';
  } else {
    mediaRecorder.stop();
    grabando=false;
    document.getElementById('btn-video').textContent='⏺ Video';
    document.getElementById('btn-video').style.background='rgba(255,0,0,.5)';
    var st=document.getElementById('cam-status');
    if(st) st.style.display='none';
  }
}
function girarCamara(){
  camFacing=camFacing==='environment'?'user':'environment';
  if(camStream) camStream.getTracks().forEach(function(t){t.stop();});
  navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing},audio:false}).then(function(stream){
    camStream=stream;
    document.getElementById('cam-video').srcObject=stream;
  });
}

function tomarFoto(){
  var video=document.getElementById('cam-video');
  var canvas=document.getElementById('cam-canvas');
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  canvas.toBlob(function(blob){
    capturaEjec.foto=true;
    capturaEjec.fotoBlob=blob;
    capturaEjec.fotoUrl=null;
    cerrarCamara();
    renderEjec();
  },'image/jpeg',0.8);
}


function salir(){usuario=null;pin='';dibujarPin();setErr('');mostrar('screen-login');}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(function(e){console.warn('SW no registrado:',e);});
}
