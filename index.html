function pintarHistorialMes(mesStr){
  var cont=document.getElementById('hist-contenido');
  if(!cont) return;
  var registros=window._histRegistros||[], permisos=window._histPermisos||[];
  var primerDiaMes=mesStr+'-01';
  var registrosMes=registros.filter(function(reg){return reg.fecha.slice(0,7)===mesStr;});
  var permisosAprobados=permisos.filter(function(p){return p.estado==='aprobado';});
  var resumen=calcularResumenAsistencia(registrosMes,primerDiaMes,permisosAprobados);
  var porDia={};
  registrosMes.forEach(function(reg){
    var key=reg.fecha+'|'+reg.modalidad;
    if(!porDia[key]) porDia[key]={fecha:reg.fecha,modalidad:reg.modalidad,entrada:null,salida:null,retardo:false};
    if(reg.tipo==='entrada'&&(!porDia[key].entrada||reg.registrado_en<porDia[key].entrada)){porDia[key].entrada=reg.registrado_en;porDia[key].retardo=reg.retardo;}
    if(reg.tipo==='salida'&&(!porDia[key].salida||reg.registrado_en>porDia[key].salida)) porDia[key].salida=reg.registrado_en;
  });
  var claves=Object.keys(porDia).sort().reverse();
  var totalHorasExtra=0;
  claves.forEach(function(k){
    var d=porDia[k];
    if(d.modalidad==='extras'&&d.entrada&&d.salida){
      totalHorasExtra += (new Date(d.salida)-new Date(d.entrada))/3600000;
    }
  });
  window._histResumenActual=resumen;
  var html='<div class="stats-row"><div class="stat-card" data-cat="trabajados" style="cursor:pointer;"><div class="stat-num stat-vd">'+resumen.trabajados+'</div><div class="stat-lbl">Trabajados</div></div><div class="stat-card" data-cat="faltas" style="cursor:pointer;"><div class="stat-num" style="color:var(--rojo);">'+resumen.faltas+'</div><div class="stat-lbl">Faltas</div></div><div class="stat-card" data-cat="retardos" style="cursor:pointer;"><div class="stat-num stat-am">'+resumen.retardos+'</div><div class="stat-lbl">Retardos</div></div></div><div id="hist-detalle-cat"></div>';
  html+='<div style="background:var(--verde-tenue);border-radius:var(--radio-sm);padding:.85rem;margin-bottom:1rem;text-align:center;"><strong style="color:var(--verde);font-size:1.1rem;">'+totalHorasExtra.toFixed(1)+' h</strong><div class="hint" style="margin:0;">Total de horas extra trabajadas</div></div>';
  if(claves.length){
    var semanas={};
    claves.forEach(function(k){
      var d=porDia[k];
      var fd=new Date(d.fecha+'T00:00:00');
      var diaSemana=fd.getDay();
      var lunes=new Date(fd);
      lunes.setDate(fd.getDate()-((diaSemana+6)%7));
      var domingo=new Date(lunes);
      domingo.setDate(lunes.getDate()+6);
      var claveSemana=lunes.toISOString().slice(0,10);
      if(!semanas[claveSemana]) semanas[claveSemana]={inicio:lunes,fin:domingo,dias:[],trabajados:0,horasExtra:0};
      semanas[claveSemana].dias.push(d);
      if(d.modalidad==='labores') semanas[claveSemana].trabajados++;
      if(d.modalidad==='extras'&&d.entrada&&d.salida) semanas[claveSemana].horasExtra += (new Date(d.salida)-new Date(d.entrada))/3600000;
    });
    var clavesSemana=Object.keys(semanas).sort().reverse();
    html+='<div class="seccion-titulo" style="margin-top:0;">Por semana</div>';
    html+=clavesSemana.map(function(sk){
      var s=semanas[sk];
      var numSemana=numeroSemanaISO(s.inicio);
      var mesInicio=s.inicio.toLocaleDateString('es-MX',{month:'long'});
      var mesFin=s.fin.toLocaleDateString('es-MX',{month:'long'});
      var rango = (mesInicio===mesFin)
        ? ('del '+s.inicio.getDate()+' al '+s.fin.getDate()+' de '+mesFin+' '+s.fin.getFullYear())
        : ('del '+s.inicio.getDate()+' '+mesInicio+' al '+s.fin.getDate()+' '+mesFin+' '+s.fin.getFullYear());
      var filas=s.dias.map(function(d){
        var hE=d.entrada?new Date(d.entrada).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true}):'—';
        var hS=d.salida?new Date(d.salida).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true}):'—';
        return '<div style="font-size:.78rem;display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--gris-1);"><span>'+d.fecha+(d.modalidad==='extras'?' · extra':'')+(d.retardo?' · <span style="color:var(--rojo);font-weight:700;">retardo</span>':'')+'</span><span style="color:var(--verde-mid);font-weight:700;">'+hE+' → '+hS+'</span></div>';
      }).join('');
      return '<div class="orden-card"><div style="margin-bottom:.4rem;"><strong style="font-size:.85rem;">Semana '+numSemana+'</strong><div style="font-size:.75rem;color:var(--gris-3);">'+rango+' · '+s.trabajados+' días'+(s.horasExtra>0?' · '+s.horasExtra.toFixed(1)+'h extra':'')+'</div></div>'+filas+'</div>';
    }).join('');
  } else { html+='<div class="empty">Sin registros de asistencia este mes.</div>'; }
  if(permisos.length){
    var estLbl={pendiente:'⏳ Pendiente',aprobado:'✅ Aprobado',rechazado:'❌ Rechazado'};
    var estColor={pendiente:'var(--tierra)',aprobado:'var(--verde-mid)',rechazado:'var(--rojo)'};
    html+='<div class="seccion-titulo" style="margin-top:1rem;">Permisos</div>'+permisos.map(function(p){
        var goceTxt=p.estado==='aprobado'?('<div class="hint" style="margin-top:.1rem;">'+(p.con_goce?'💰 Con goce de sueldo':'🚫 Sin goce de sueldo')+'</div>'):'';
        return '<div style="background:var(--blanco);border-radius:12px;padding:.75rem;font-size:.8rem;margin-bottom:.4rem;"><div style="display:flex;justify-content:space-between;"><span>'+(p.tipo==='medico'?'🩺 Médico':'👤 Personal')+' · '+p.fecha_inicio+' a '+p.fecha_fin+'</span><span style="color:'+estColor[p.estado]+';font-weight:700;">'+estLbl[p.estado]+'</span></div>'+(p.folio?'<div class="hint" style="margin-top:.2rem;">🔖 '+p.folio+'</div>':'')+(p.motivo?'<div class="hint" style="margin-top:.1rem;">'+p.motivo+'</div>':'')+goceTxt+(p.evidencia_url?'<div style="margin-top:.2rem;"><a href="'+p.evidencia_url+'" target="_blank" style="color:var(--verde-mid);font-weight:700;font-size:.78rem;">📎 Ver comprobante</a></div>':'')+'</div>';
      }).join('');
    }
    cont.innerHTML=html;
    cont.querySelectorAll('[data-cat]').forEach(function(el){el.addEventListener('click',function(){mostrarDetalleHistorial(this.dataset.cat);});});
}

function mostrarDetalleHistorial(cat){
  var det=document.getElementById('hist-detalle-cat');
  if(!det) return;
  var r=window._histResumenActual;
  if(!r) return;
  var html='';
  if(cat==='trabajados'){
    html='<div class="seccion-titulo" style="margin-top:.75rem;">✅ Días trabajados ('+r.trabajados+')</div>';
    if(!r.trabajadosFechas.length) html+='<div class="empty">Sin días trabajados este mes.</div>';
    else html+=r.trabajadosFechas.map(function(f){
      var hE=new Date(r.trabajadosHoras[f]).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true});
      return '<div style="background:var(--blanco);border-radius:10px;padding:.6rem .75rem;font-size:.8rem;margin-bottom:.35rem;display:flex;justify-content:space-between;"><span>'+f+'</span><span style="color:var(--verde-mid);font-weight:700;">Entrada '+hE+'</span></div>';
    }).join('');
  } else if(cat==='faltas'){
    html='<div class="seccion-titulo" style="margin-top:.75rem;">❌ Faltas ('+r.faltas+')</div>';
    if(!r.faltasFechas.length) html+='<div class="empty">Sin faltas este mes 🎉</div>';
    else html+=r.faltasFechas.map(function(f){
      return '<div style="background:var(--blanco);border-radius:10px;padding:.6rem .75rem;font-size:.8rem;margin-bottom:.35rem;color:var(--rojo);font-weight:700;">'+f+'</div>';
    }).join('');
  } else if(cat==='retardos'){
    html='<div class="seccion-titulo" style="margin-top:.75rem;">⏰ Retardos ('+r.retardos+')</div>';
    if(!r.retardosFechas.length) html+='<div class="empty">Sin retardos este mes 🎉</div>';
    else html+=r.retardosFechas.map(function(x){
      var h=new Date(x.hora).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true});
      return '<div style="background:var(--blanco);border-radius:10px;padding:.6rem .75rem;font-size:.8rem;margin-bottom:.35rem;display:flex;justify-content:space-between;"><span>'+x.fecha+'</span><span style="color:var(--tierra);font-weight:700;">Entrada '+h+'</span></div>';
    }).join('');
  }
  det.innerHTML=html;
  det.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function pararRiegoTimer(){if(riegoTimer){clearInterval(riegoTimer);riegoTimer=null;}riegoAlarmaActiva=false;}

var SUBTAB_TAREAS_ACTUAL='porhacer';

function cargarTareas(subtab){
  if(subtab) SUBTAB_TAREAS_ACTUAL=subtab;
  pararRiegoTimer();
  riegoSincronizar();
  if(navigator.onLine) sincronizarEvidenciasPendientes().then(sincronizarColaGeneral);
  var body=document.getElementById('op-body');
  body.innerHTML=barraSubtabsTareas()+'<div id="tareas-contenido"><div class="loading">Cargando tus tareas...</div></div>';
  var hoy=fechaHoyLocal();
  Promise.all([
    from('ordenes_trabajo').select('*,tabla:tablas(nombre,plantacion_id,cantidad_surcos),tipo_labor:tipos_labor(nombre,requiere_cantidad_insumo,unidad_insumo,requiere_tiempo,requiere_formula),subtipo:subtipos_labor(nombre),activo_rancho:activos_rancho(nombre,imagen_url),formula:formulas_aplicacion(nombre,via,categoria)').eq('operario_id',usuario.id).in('estado',['pendiente','en_proceso']).order('fecha_asignacion',{ascending:true}).get(),
    from('ordenes_trabajo').select('*,tabla:tablas(nombre,plantacion_id),tipo_labor:tipos_labor(nombre,requiere_tiempo),activo_rancho:activos_rancho(nombre,imagen_url)').eq('operario_id',usuario.id).eq('fecha_asignacion',hoy).order('creado_en',{ascending:false}).get(),
    from('ordenes_trabajo').select('*,tabla:tablas(nombre,plantacion_id),tipo_labor:tipos_labor(nombre,requiere_tiempo),activo_rancho:activos_rancho(nombre,imagen_url)').eq('operario_id',usuario.id).eq('estado','completada').order('fecha_asignacion',{ascending:false}).limit(60).get()
  ]).then(function(res){
    var todas=res[0]||[], hoyOrdenes=res[1]||[], completadas=res[2]||[];
    var idsComp=completadas.map(function(o){return o.id;});
    var evidenciaFetch = idsComp.length ? from('registros_labor').select('orden_id,foto_url').in('orden_id',idsComp).get() : Promise.resolve([]);
    var formulaIds=Array.from(new Set(todas.filter(function(t){return t.formula_id;}).map(function(t){return t.formula_id;})));
    var componentesFetch = formulaIds.length ? from('formula_componentes').select('*,item:inventario_items!item_id(nombre,unidad)').in('formula_id',formulaIds).get() : Promise.resolve([]);
    return Promise.all([evidenciaFetch,componentesFetch]).then(function(r2){
      var regs=r2[0]||[], compRows=r2[1]||[];
      var evidenciaPorOrden={};
      (regs||[]).forEach(function(r){evidenciaPorOrden[r.orden_id]=!!r.foto_url;});
      var componentesPorFormula={};
      compRows.forEach(function(c){(componentesPorFormula[c.formula_id]=componentesPorFormula[c.formula_id]||[]).push(c);});
      try{localStorage.setItem('mootsil_tareas_cache_'+usuario.id,JSON.stringify({todas:todas,hoyOrdenes:hoyOrdenes,completadas:completadas,evidenciaPorOrden:evidenciaPorOrden,componentesPorFormula:componentesPorFormula,ts:Date.now()}));}catch(e){}
      pintarTareas(todas,hoyOrdenes,false,completadas,evidenciaPorOrden,componentesPorFormula);
    });
  }).catch(function(err){
    var cache=null;
    try{cache=JSON.parse(localStorage.getItem('mootsil_tareas_cache_'+usuario.id)||'null');}catch(e){}
    if(cache){ pintarTareas(cache.todas,cache.hoyOrdenes,true,cache.completadas||[],cache.evidenciaPorOrden||{},cache.componentesPorFormula||{}); }
    else{
      var cont=document.getElementById('tareas-contenido');
      if(cont) cont.innerHTML='<div class="empty">📡 Sin señal y sin tareas guardadas.<br/>Conéctate al menos una vez para descargarlas.</div>';
    }
  });
}

function barraSubtabsTareas(){
  var tabs=[['porhacer','Por Hacer'],['pendientes','Pendientes'],['terminadas','Terminadas'],['rendimiento','Rendimiento']];
  return '<div style="display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;">'+tabs.map(function(t){
    return '<button type="button" class="rep-view-btn'+(SUBTAB_TAREAS_ACTUAL===t[0]?' active':'')+'" data-subtab="'+t[0]+'" onclick="cargarTareas(\''+t[0]+'\')">'+t[1]+'</button>';
  }).join('')+'</div>';
}

function pintarTareas(todas,hoyOrdenes,esCache,completadas,evidenciaPorOrden,componentesPorFormula){
  completadas=completadas||[]; evidenciaPorOrden=evidenciaPorOrden||{}; componentesPorFormula=componentesPorFormula||{};
  var body=document.getElementById('op-body');
  if(!document.getElementById('tareas-contenido')){
    body.innerHTML=barraSubtabsTareas()+'<div id="tareas-contenido"></div>';
  }
  var cont=document.getElementById('tareas-contenido');
  if(SUBTAB_TAREAS_ACTUAL==='rendimiento'){
    renderRendimientoOperario();
    return;
  }
  try{
    var hoy=fechaHoyLocal();
    riegoOrdenes=hoyOrdenes.filter(function(o){return o.tipo_labor&&o.tipo_labor.requiere_tiempo;});
    var tareasTodas=todas.filter(function(t){return (t.tabla||t.activo_rancho_id)&&!(t.tipo_labor&&t.tipo_labor.requiere_tiempo);});
    var porHacer=tareasTodas.filter(function(t){return t.estado==='pendiente';});
    var enProceso=tareasTodas.filter(function(t){return t.estado==='en_proceso';});
    var completadasNormales=completadas.filter(function(o){return (o.tabla||o.activo_rancho_id)&&!(o.tipo_labor&&o.tipo_labor.requiere_tiempo);});

    function tarjetaTarea(t){
      if(t.activo_rancho_id){
        var an=t.activo_rancho?t.activo_rancho.nombre:'Herramienta';
        var atrasadaM=t.fecha_asignacion<hoy;
        return '<div class="tarea-card" style="'+(atrasadaM?'border-left-color:var(--rojo);':'border-left-color:var(--tierra);')+'"><div class="tarea-title">🔧 Mantenimiento — '+an+(atrasadaM?' <span style="color:var(--rojo);font-size:.72rem;font-weight:700;">⚠️ Desde '+t.fecha_asignacion+'</span>':'')+'</div><div class="tarea-meta">'+(t.notas_encargado||'Dale mantenimiento y confirma cuando termines.')+'</div><div style="margin-top:.75rem;display:flex;gap:8px;">'+(t.estado==='pendiente'?'<button class="btn-sm btn-iniciar" data-ini="'+t.id+'">▶ Iniciar</button>':'')+(t.estado==='en_proceso'?'<button class="btn-sm btn-completar" data-eje="'+t.id+'">✅ Registrar avance</button>':'')+'</div></div>';
      }
      var p=cats.plantaciones.find(function(x){return x.id===t.tabla.plantacion_id;});
      var esAplic=!!(t.tipo_labor&&t.tipo_labor.requiere_formula&&t.formula_id);
      var ic=esAplic?(VIA_ICONOS[t.formula?t.formula.via:'']||'🧪'):(ICONOS[t.tipo_labor.nombre]||'🔧');
      var tituloLabor=esAplic?(t.formula?t.formula.nombre:t.tipo_labor.nombre):(t.tipo_labor.nombre+(t.subtipo?' · '+t.subtipo.nombre:''));
      var su=(t.surcos_asignados&&t.surcos_asignados.length)?t.surcos_asignados.join(', '):'Todos';
      var atrasada=t.fecha_asignacion<hoy;
      var etiquetaTipo=t.es_hora_extra?' <span style="color:var(--tierra);font-size:.7rem;font-weight:700;background:var(--tierra-tenue);padding:2px 8px;border-radius:10px;">⏰ Hora Extra</span>':' <span style="color:var(--verde-mid);font-size:.7rem;font-weight:700;background:var(--verde-tenue);padding:2px 8px;border-radius:10px;">🧑‍🌾 Labores</span>';
      var progresoTxt='', etiquetaEstado='';
      if(t.estado==='en_proceso'){
        var tieneAvance=t.surcos_completados&&t.surcos_completados.length>0;
        var totalRef=(t.surcos_asignados&&t.surcos_asignados.length)?t.surcos_asignados.length:(t.tabla.cantidad_surcos||0);
        if(tieneAvance){
          progresoTxt='<br/>🔶 Avance: '+t.surcos_completados.length+'/'+totalRef+' surcos';
          etiquetaEstado=' <span style="color:var(--tierra);font-size:.7rem;font-weight:700;background:var(--tierra-tenue);padding:2px 8px;border-radius:10px;">🔶 No concluida</span>';
        } else {
          etiquetaEstado=' <span style="color:var(--verde-mid);font-size:.7rem;font-weight:700;background:var(--verde-tenue);padding:2px 8px;border-radius:10px;">🆕 Iniciada, sin avance</span>';
        }
      }
      var aplicInfoHtml='';
      if(esAplic){
        var compList=componentesPorFormula[t.formula_id]||[];
        var factor=t.factor_escala||1;
        var productosHtml=compList.length?compList.map(function(c){
          return '<div style="display:flex;justify-content:space-between;font-size:.78rem;padding:.15rem 0;"><span>'+(c.item?c.item.nombre:'')+'</span><strong>'+fmtAmigable(c.cantidad_base*factor,c.item?c.item.unidad:'')+'</strong></div>';
        }).join(''):'';
        aplicInfoHtml='<div style="margin-top:.5rem;padding-top:.5rem;border-top:1px dashed var(--gris-2);font-size:.8rem;">'+(t.formula&&t.formula.categoria?'<span style="color:var(--gris-3);">'+(CATEGORIA_ICONOS[t.formula.categoria]||'')+' '+t.formula.categoria+'</span><br/>':'')+'⚙️ '+(BOMBA_ICONOS[t.bomba_usada]||'')+' '+(BOMBA_LABELS[t.bomba_usada]||t.bomba_usada||'')+' · 🧴 '+numFmt(t.volumen_aplicado_litros||0)+' L'+(productosHtml?'<div style="margin-top:.35rem;"><strong style="font-size:.72rem;color:var(--gris-3);text-transform:uppercase;letter-spacing:.03em;">Productos a usar</strong>'+productosHtml+'</div>':'')+'</div>';
      }
      return '<div class="tarea-card" style="'+(atrasada?'border-left-color:var(--rojo);':(t.es_hora_extra?'border-left-color:var(--tierra);':''))+'"><div class="tarea-title">'+ic+' '+tituloLabor+etiquetaTipo+etiquetaEstado+(atrasada?' <span style="color:var(--rojo);font-size:.72rem;font-weight:700;">⚠️ Desde '+t.fecha_asignacion+'</span>':'')+'</div><div class="tarea-meta">📍 '+(p?p.nombre:'')+' · '+t.tabla.nombre+'<br/>🔢 Surcos: '+su+progresoTxt+(t.notas_encargado?'<br/>📝 '+t.notas_encargado:'')+'</div>'+aplicInfoHtml+'<div style="margin-top:.75rem;display:flex;gap:8px;">'+(t.estado==='pendiente'?'<button class="btn-sm btn-iniciar" data-ini="'+t.id+'">▶ Iniciar</button>':'')+(t.estado==='en_proceso'?'<button class="btn-sm btn-completar" data-eje="'+t.id+'">✅ Registrar avance</button>':'')+'</div></div>';
    }

    var html='';
    if(SUBTAB_TAREAS_ACTUAL==='porhacer'){
      if(riegoOrdenes.length){
        var comp=riegoOrdenes.filter(function(o){return o.estado==='completada';}).length;
        if(comp<riegoOrdenes.length) html+='<div class="tarea-card" style="border-left-color:var(--tierra);cursor:pointer;" onclick="renderRiegoPlantaciones()"><div class="tarea-title">💧 Riego de hoy</div><div class="tarea-meta">'+comp+' de '+riegoOrdenes.length+' tablas regadas · toca para entrar</div></div>';
      }
      if(!porHacer.length&&!html){html+='<div class="empty">🌱 No tienes tareas por hacer.<br/>El encargado te asignará labores aquí.</div>';}
      else html+=porHacer.map(tarjetaTarea).join('');
    } else if(SUBTAB_TAREAS_ACTUAL==='pendientes'){
      if(riegoOrdenes.length){
        var comp2=riegoOrdenes.filter(function(o){return o.estado==='en_proceso';}).length;
        if(comp2>0) html+='<div class="tarea-card" style="border-left-color:var(--tierra);cursor:pointer;" onclick="renderRiegoPlantaciones()"><div class="tarea-title">💧 Riego en curso</div><div class="tarea-meta">Toca para continuar</div></div>';
      }
      if(!enProceso.length&&!html) html='<div class="empty">No tienes tareas en proceso.</div>';
      else html+=enProceso.map(tarjetaTarea).join('');
    } else if(SUBTAB_TAREAS_ACTUAL==='terminadas'){
      if(!completadasNormales.length){html='<div class="empty">Aún no tienes labores terminadas.</div>';}
      else html=completadasNormales.map(function(t){
        var p=cats.plantaciones.find(function(x){return x.id===t.tabla.plantacion_id;});
        var ic=ICONOS[t.tipo_labor.nombre]||'🔧';
        var tieneEvidencia=evidenciaPorOrden[t.id];
        var etiquetaTipo=t.es_hora_extra?' <span style="color:var(--tierra);font-size:.68rem;font-weight:700;">⏰ Hora Extra</span>':'';
        return '<div class="tarea-card" style="opacity:.75;border-left-color:var(--verde-mid);"><div class="tarea-title">'+ic+' '+t.tipo_labor.nombre+' 🔒'+etiquetaTipo+'</div><div class="tarea-meta">📍 '+(p?p.nombre:'')+' · '+t.tabla.nombre+' · '+t.fecha_asignacion+'<br/>'+(tieneEvidencia?'📷 Con evidencia':'Sin foto de evidencia')+'</div></div>';
      }).join('');
    }

    var prefijo=esCache?'<p class="hint" style="text-align:center;margin-bottom:.75rem;">📡 Sin señal — mostrando tus tareas guardadas.</p>':'';
    cont.innerHTML=prefijo+html;
    cont.querySelectorAll('[data-ini]').forEach(function(b){b.addEventListener('click',function(){
      var oid=this.dataset.ini;
      if(navigator.onLine) from('ordenes_trabajo').eq('id',oid).update({estado:'en_proceso'}).then(function(){cargarTareas();}).catch(function(){riegoEncolar(oid,{estado:'en_proceso'});cargarTareas();});
      else{riegoEncolar(oid,{estado:'en_proceso'});var t=todas.find(function(x){return x.id===oid;});if(t)t.estado='en_proceso';pintarTareas(todas,hoyOrdenes,true,completadas,evidenciaPorOrden);}
    });});
    cont.querySelectorAll('[data-eje]').forEach(function(b){b.addEventListener('click',function(){iniciarEjecucion(this.dataset.eje);});});
  }catch(err){
    cont.innerHTML='<div class="empty">Ocurrió un problema mostrando tus tareas.<br/>Cierra sesión y vuelve a entrar. Si persiste, avisa al admin.<br/><span style="font-size:.7rem;color:var(--gris-3);">('+err.message+')</span></div>';
  }
}

function calcularScoreOperario(operarioId,fechaInicio,fechaFin){
  return Promise.all([
    from('asistencia_registros').select('*').eq('usuario_id',operarioId).gte('fecha',fechaInicio).lte('fecha',fechaFin).get(),
    from('ordenes_trabajo').select('fecha_asignacion,completado_en,estado').eq('operario_id',operarioId).gte('fecha_asignacion',fechaInicio).lte('fecha_asignacion',fechaFin).get(),
    from('evaluaciones_comportamiento').select('*').eq('operario_id',operarioId).gte('periodo_fin',fechaInicio).lte('periodo_fin',fechaFin).get(),
    from('permisos').select('*').eq('usuario_id',operarioId).eq('estado','aprobado').get()
  ]).then(function(r){
    var registrosAs=r[0]||[], ordenesMes=r[1]||[], evals=r[2]||[], permisosAprobados=r[3]||[];
    var resumenAs=calcularResumenAsistencia(registrosAs,fechaInicio,permisosAprobados);
    var scoreAsistencia=Math.max(0,10-resumenAs.faltas*1.5-resumenAs.retardos*0.5);

    var completadasMes=ordenesMes.filter(function(o){return o.estado==='completada'&&o.completado_en;});
    var aTiempo=completadasMes.filter(function(o){return o.completado_en.slice(0,10)<=o.fecha_asignacion;}).length;
    var scoreTareas = completadasMes.length ? (aTiempo/completadasMes.length)*10 : 7;

    var hoy=fechaHoyLocal();
    var atrasadasAbiertas=ordenesMes.filter(function(o){return o.estado==='en_proceso'&&o.fecha_asignacion<hoy;}).length;
    var scoreAvance=Math.max(0,10-atrasadasAbiertas*2);

    var horasExtraMes=0;
    var porDiaExtra={};
    registrosAs.filter(function(x){return x.modalidad==='extras';}).forEach(function(reg){
      if(!porDiaExtra[reg.fecha]) porDiaExtra[reg.fecha]={entrada:null,salida:null};
      if(reg.tipo==='entrada'&&(!porDiaExtra[reg.fecha].entrada||reg.registrado_en<porDiaExtra[reg.fecha].entrada)) porDiaExtra[reg.fecha].entrada=reg.registrado_en;
      if(reg.tipo==='salida'&&(!porDiaExtra[reg.fecha].salida||reg.registrado_en>porDiaExtra[reg.fecha].salida)) porDiaExtra[reg.fecha].salida=reg.registrado_en;
    });
    Object.keys(porDiaExtra).forEach(function(f){var d=porDiaExtra[f];if(d.entrada&&d.salida) horasExtraMes+=(new Date(d.salida)-new Date(d.entrada))/3600000;});
    var scoreExtra=Math.min(10,5+horasExtraMes*0.3);

    var scoreComportamiento = evals.length ? (evals.reduce(function(s,e){return s+parseFloat(e.calificacion);},0)/evals.length) : 7;

    var pesos={asistencia:.30,tareas:.25,avance:.15,extra:.10,comportamiento:.20};
    var scoreFinal = scoreAsistencia*pesos.asistencia + scoreTareas*pesos.tareas + scoreAvance*pesos.avance + scoreExtra*pesos.extra + scoreComportamiento*pesos.comportamiento;
    scoreFinal=Math.max(0,Math.min(10,scoreFinal));
    return {final:scoreFinal,asistencia:scoreAsistencia,tareas:scoreTareas,avance:scoreAvance,extra:scoreExtra,comportamiento:scoreComportamiento,resumenAs:resumenAs,completadasMes:completadasMes,aTiempo:aTiempo,atrasadasAbiertas:atrasadasAbiertas,horasExtraMes:horasExtraMes,evals:evals};
  });
}

  if(o.estado==='en_proceso'){

    document.getElementById('riego-terminar').addEventListener('click',function(){
      pararRiegoTimer();
      riegoActualizarEstado(o,{estado:'completada',hora_fin_real:new Date().toISOString()});
      renderRiegoTablas(o.tabla.plantacion_id);
    });
    function tick(){
      var restanteMs=finMs-Date.now();
      var card=document.getElementById('riego-card'), cuenta=document.getElementById('riego-cuenta'), msg=document.getElementById('riego-msg');
      if(!card) {pararRiegoTimer();return;}
      var neg=restanteMs<0, abs=Math.abs(restanteMs);
      var mm=Math.floor(abs/60000), ss=Math.floor((abs%60000)/1000);
      cuenta.textContent=(neg?'+':'')+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
      if(restanteMs<=5*60000){
        riegoAlarmaActiva=true;
        card.classList.add('riego-alarma');
        msg.textContent=neg?'⏰ Tiempo cumplido — cierra esta tabla':'⏰ Faltan 5 min — prepárate para cambiar de tabla';
        sonarAlarmaRiego();
      } else {
        card.classList.remove('riego-alarma');
        msg.textContent='Riego en curso';
      }
    }
    tick();
    riegoTimer=setInterval(tick,1000);
  }
}

function sonarAlarmaRiego(){
  try{
    if(!riegoAudioCtx) riegoAudioCtx=new (window.AudioContext||window.webkitAudioContext)();
    var ctx=riegoAudioCtx;
    if(ctx.state==='suspended') ctx.resume();
    var t0=ctx.currentTime;
    var o1=ctx.createOscillator(), g=ctx.createGain();
    o1.type='square';
    o1.frequency.setValueAtTime(700,t0);
    o1.frequency.linearRampToValueAtTime(1400,t0+0.45);
    o1.frequency.linearRampToValueAtTime(700,t0+0.9);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(1,t0+0.05);
    g.gain.setValueAtTime(1,t0+0.85);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.95);
    o1.connect(g);g.connect(ctx.destination);
    o1.start(t0);o1.stop(t0+1);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([350,120,350,120,350]);
}

function selTodosOp(){capturaEjec.surcos=[];document.querySelectorAll('[data-s]').forEach(function(b){capturaEjec.surcos.push(parseInt(b.dataset.s));b.classList.add('sel');});var s=document.getElementById('esig');if(s)s.disabled=false;}
function selNingunoOp(){capturaEjec.surcos=[];document.querySelectorAll('[data-s]').forEach(function(b){b.classList.remove('sel');});var s=document.getElementById('esig');if(s)s.disabled=true;}
function aplicarRangoOp(){
  var ini=parseInt(document.getElementById('op-ri').value)||1;
  var fin=parseInt(document.getElementById('op-rf').value)||1;
  capturaEjec.surcos=[];
  document.querySelectorAll('[data-s]').forEach(function(b){b.classList.remove('sel');var n=parseInt(b.dataset.s);if(n>=ini&&n<=fin){capturaEjec.surcos.push(n);b.classList.add('sel');}});
  var s=document.getElementById('esig');if(s)s.disabled=!capturaEjec.surcos.length;
}

function guardarEjec(){
  var o=ordenEjecutando;
  if(!capturaEjec.foto){
    alert('Debes tomar una foto o video de evidencia antes de concluir la labor.');
    return;
  }
  if(!capturaEjec.herramientaLimpia){
    alert('Marca la casilla confirmando que limpiaste y guardaste tus herramientas.');
    return;
  }
  if(capturaEjec.foto&&capturaEjec.fotoBlob&&!capturaEjec.fotoUrl){
    document.getElementById('exito-sub').textContent='Subiendo evidencia...';
    mostrar('screen-exito');
    var esVideo=capturaEjec.esVideo||false;
    var ext=esVideo?'.webm':'.jpg';
    var mime=esVideo?'video/webm':'image/jpeg';
    var nombre='evidencia_'+Date.now()+ext;

    function guardarLocalYContinuar(){
      guardarEvidenciaPendiente(capturaEjec.fotoBlob,mime).then(function(localId){
        capturaEjec.fotoUrl='offline:'+localId;
        document.getElementById('exito-sub').textContent='Sin señal — tu evidencia quedó guardada en el celular y se subirá sola cuando regrese la conexión.';
        ejecutarGuardadoFinal(o);
      }).catch(function(){
        capturaEjec.fotoUrl='pendiente';
        ejecutarGuardadoFinal(o);
      });
    }

    if(!navigator.onLine){
      guardarLocalYContinuar();
      return;
    }
    var ctrl=(typeof AbortController!=='undefined')?new AbortController():null;
    var timer=ctrl?setTimeout(function(){ctrl.abort();},8000):null;
    fetch(URL_SB+'/storage/v1/object/evidencias/'+nombre,{method:'POST',headers:{'apikey':KEY_SB,'Authorization':'Bearer '+KEY_SB,'Content-Type':mime,'x-upsert':'true'},body:capturaEjec.fotoBlob,signal:ctrl?ctrl.signal:undefined}).then(function(r){
      if(timer) clearTimeout(timer);
      if(!r.ok) throw new Error('HTTP '+r.status);
      capturaEjec.fotoUrl=URL_SB+'/storage/v1/object/public/evidencias/'+nombre;
      ejecutarGuardadoFinal(o);
    }).catch(function(){
      if(timer) clearTimeout(timer);
      guardarLocalYContinuar();
    });
    return;
  }
  ejecutarGuardadoFinal(o);
}

function calcularProgresoSurcos(o){
  var totalAsignados = (o.surcos_asignados&&o.surcos_asignados.length) ? o.surcos_asignados.map(String) : (o.tabla&&o.tabla.cantidad_surcos ? Array.from({length:o.tabla.cantidad_surcos},function(_,i){return String(i+1);}) : []);
  var yaCompletados = (o.surcos_completados||[]).map(String);
  var nuevos = (capturaEjec.surcos||[]).map(String);
  var union = Array.from(new Set(yaCompletados.concat(nuevos)));
  var faltan = totalAsignados.filter(function(s){return union.indexOf(s)===-1;});
  return {totalAsignados:totalAsignados,union:union,faltan:faltan,completo: totalAsignados.length>0 && faltan.length===0};
}

function ejecutarGuardadoFinal(o){
  var esAplic=o.tipo_labor&&o.tipo_labor.requiere_formula;
  var esMantenimiento=!!o.activo_rancho_id;
  var progreso = (esAplic||esMantenimiento) ? {completo:true,union:[],faltan:[]} : calcularProgresoSurcos(o);
  var nuevoEstado = progreso.completo ? 'completada' : 'en_proceso';
  var updatePayload = (esAplic||esMantenimiento) ? {estado:nuevoEstado, herramienta_limpia:capturaEjec.herramientaLimpia||false} : {estado:nuevoEstado, surcos_completados:progreso.union, herramienta_limpia:capturaEjec.herramientaLimpia||false};
  if(nuevoEstado==='completada') updatePayload.completado_en=new Date().toISOString();
  var reg={usuario_id:usuario.id,tabla_id:o.tabla_id,tipo_labor_id:o.tipo_labor_id,subtipo_labor_id:o.subtipo_labor_id||null,surcos_trabajados:esAplic?[]:capturaEjec.surcos,cantidad_insumo:esAplic?o.volumen_aplicado_litros:(capturaEjec.cantidad||null),foto_url:capturaEjec.fotoUrl||null,capturado_en:new Date().toISOString(),orden_id:o.id};
  var fotoQuedoLocal = capturaEjec.fotoUrl && capturaEjec.fotoUrl.indexOf('offline:')===0;
  if(!navigator.onLine||fotoQuedoLocal){
    colaOffline.push(reg);
    localStorage.setItem('mootsil_cola',JSON.stringify(colaOffline));
    from('ordenes_trabajo').eq('id',o.id).update(updatePayload).then(function(){
      if(nuevoEstado==='completada'&&o.activo_rancho_id) from('activos_rancho').eq('id',o.activo_rancho_id).update({fecha_ultimo_mantenimiento:fechaHoyLocal()}).catch(function(){});
      if(!document.getElementById('exito-sub').textContent) document.getElementById('exito-sub').textContent='Sin señal. Guardado en tu dispositivo y se subirá cuando haya internet.';
      mostrar('screen-exito'); ordenEjecutando=null;
    }).catch(function(){
      riegoEncolar(o.id,updatePayload);
      mostrar('screen-exito'); ordenEjecutando=null;
    });
    return;
  }
  from('registros_labor').insert(reg).then(function(){
    from('ordenes_trabajo').eq('id',o.id).update(updatePayload).then(function(){
      if(nuevoEstado==='completada'&&o.activo_rancho_id) from('activos_rancho').eq('id',o.activo_rancho_id).update({fecha_ultimo_mantenimiento:fechaHoyLocal()}).catch(function(){});
      var lb=cats.tiposLabor.find(function(l){return l.id===o.tipo_labor_id;}), tb=cats.tablas.find(function(t){return t.id===o.tabla_id;});
      var verbo = progreso.completo ? 'completó' : 'avanzó en';
      showToast('✅ '+usuario.nombre+' '+verbo+' '+(lb?lb.nombre:'')+' en '+(tb?tb.nombre:''));
      var detalle=esAplic?('Fórmula: '+(o.formula?o.formula.nombre:'')):('Surcos: '+capturaEjec.surcos.join(', ')+(progreso.completo?'':' · Faltan: '+progreso.faltan.join(', ')));
      from('notificaciones').insert({titulo: progreso.completo?'✅ Labor completada':'🔶 Avance parcial registrado',cuerpo:usuario.nombre+' '+verbo+' '+(lb?lb.nombre:'')+' en '+(tb?tb.nombre:'')+' — '+detalle,icono: progreso.completo?'✅':'🔶',leida:false,para_rol:'encargado'}).then(function(){
        document.getElementById('exito-sub').textContent = progreso.completo ? 'Registro guardado. El encargado recibirá un aviso.' : 'Avance guardado. Faltan '+progreso.faltan.length+' surco(s) — seguirá apareciendo en tus tareas.';
        mostrar('screen-exito'); ordenEjecutando=null;
      });
    });
  }).catch(function(e){alert('Error: '+e.message);});
}

function sincronizarEvidenciasPendientes(){
  return listarEvidenciasPendientes().then(function(items){
    return Promise.all(items.map(function(item){
      var ext=item.mime==='video/webm'?'.webm':'.jpg';
      var nombre='evidencia_'+item.id+ext;
      return fetch(URL_SB+'/storage/v1/object/evidencias/'+nombre,{method:'POST',headers:{'apikey':KEY_SB,'Authorization':'Bearer '+KEY_SB,'Content-Type':item.mime,'x-upsert':'true'},body:item.blob}).then(function(r){
        if(!r.ok) throw new Error('HTTP '+r.status);
        var url=URL_SB+'/storage/v1/object/public/evidencias/'+nombre;
        var marcador='offline:'+item.id;
        colaOffline.forEach(function(r2){ if(r2.foto_url===marcador) r2.foto_url=url; });
        localStorage.setItem('mootsil_cola',JSON.stringify(colaOffline));
        return borrarEvidenciaPendiente(item.id);
      }).catch(function(){});
    }));
  });
}

function sincronizarColaGeneral(){
  if(!colaOffline.length) return;
  var pendientes=colaOffline.slice(); colaOffline=[];
  localStorage.setItem('mootsil_cola','[]');
  pendientes.forEach(function(r){from('registros_labor').insert(r).catch(function(){colaOffline.push(r);localStorage.setItem('mootsil_cola',JSON.stringify(colaOffline));});});
}

window.addEventListener('online',function(){
  sincronizarEvidenciasPendientes().then(sincronizarColaGeneral);
});

  var opO=cats.operarios.map(function(o){return '<button type="button" class="op-chip" data-id="'+o.id+'" onclick="seleccionUnica(this)">'+o.nombre+'</button>';}).join('');
  body.innerHTML='<div class="seccion-titulo">+ Nuevo contrato</div><div class="form-card"><div class="form-group"><label>Colaborador</label><div style="display:flex;flex-wrap:wrap;gap:8px;">'+opO+'</div></div><div class="form-group"><label>Tipo de contrato</label><input type="text" id="ct-tipo" placeholder="Ej. Tiempo completo / Por temporada"></div><div class="form-group"><label>Fecha de inicio</label><input type="date" id="ct-fecha" value="'+fechaHoyLocal()+'"></div><div class="form-group"><label>Documento (foto o PDF, opcional)</label><button type="button" onclick="document.getElementById(\'ct-archivo\').click()" style="width:100%;padding:.75rem;border:1.5px dashed var(--verde-mid);border-radius:var(--radio-sm);background:var(--verde-tenue);color:var(--verde);font-weight:600;cursor:pointer;">📎 Adjuntar archivo</button><div id="ct-archivo-status" style="margin-top:.5rem;"></div><input type="hidden" id="ct-url"><input type="file" id="ct-archivo" accept="image/*,.pdf" style="display:none"></div><div class="form-group"><label>Notas</label><input type="text" id="ct-notas" placeholder="Opcional..."></div><button class="btn-primary" id="ct-guardar">Guardar contrato</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderContratos()">← Volver a Contratos</button>';
  document.getElementById('ct-archivo').addEventListener('change',function(){
    var f=this.files&&this.files[0];
    if(!f) return;
    var status=document.getElementById('ct-archivo-status');
    status.innerHTML='<span class="hint">Subiendo...</span>';
    var nombre='contrato_'+Date.now()+'_'+Math.round(Math.random()*9999)+'_'+f.name.replace(/[^a-zA-Z0-9.]/g,'');
    fetch(URL_SB+'/storage/v1/object/evidencias/'+nombre,{method:'POST',headers:{'apikey':KEY_SB,'Authorization':'Bearer '+KEY_SB,'Content-Type':f.type||'application/octet-stream','x-upsert':'true'},body:f}).then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      var url=URL_SB+'/storage/v1/object/public/evidencias/'+nombre;
      document.getElementById('ct-url').value=url;
      status.innerHTML='✅ Archivo listo: '+f.name;
    }).catch(function(e){status.innerHTML='<span style="color:var(--rojo);">No se pudo subir: '+e.message+'</span>';});
  });
  document.getElementById('ct-guardar').addEventListener('click',function(){
    var opBtn=document.querySelector('.op-chip.sel');
    if(!opBtn){alert('Selecciona un colaborador.');return;}
    var tipo=document.getElementById('ct-tipo').value||null;
    var fecha=document.getElementById('ct-fecha').value||null;
    var url=document.getElementById('ct-url').value||null;
    var notas=document.getElementById('ct-notas').value||null;
    from('contratos').insert({operario_id:opBtn.dataset.id,tipo_contrato:tipo,fecha_inicio:fecha,url_documento:url,notas:notas,creado_por:usuario.id}).then(function(){
      showToast('✅ Contrato guardado');
      renderContratos();
    }).catch(function(e){alert('Error: '+e.message);});
  });
}

function renderDocumentosPersonales(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="loading">Cargando documentos...</div>';
  from('documentos_personales').select('*,operario:usuarios!operario_id(nombre)').order('creado_en',{ascending:false}).get().then(function(rows){
    var header='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">📄 Documentos personales<button type="button" onclick="renderNuevoDocumentoPersonal()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nuevo documento</button></div>';
    if(!rows||!rows.length){body.innerHTML=header+'<div class="empty">Sin documentos registrados.</div><button class="btn-back" style="margin-top:1rem;" onclick="renderEmpleadosMenu()">← Volver a Empleados</button>';return;}
    var html=header+rows.map(function(d){
      return '<div class="orden-card" style="border-left-color:var(--verde-mid);"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem">'+(d.operario?d.operario.nombre:'')+' — '+d.tipo+'</strong></div><div class="orden-meta">'+(d.notas?d.notas+'<br/>':'')+'<a href="'+d.url_documento+'" target="_blank" style="color:var(--verde-mid);font-weight:700;">📎 Ver documento</a> · <button type="button" class="dp-eliminar" data-id="'+d.id+'" style="border:none;background:none;color:var(--rojo);font-size:.75rem;cursor:pointer;padding:0;">🗑️ Eliminar</button></div></div>';
    }).join('');
    body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderEmpleadosMenu()">← Volver a Empleados</button>';
    body.querySelectorAll('.dp-eliminar').forEach(function(btn){
      btn.addEventListener('click',function(){
        if(!confirm('¿Eliminar este documento?')) return;
        from('documentos_personales').eq('id',this.dataset.id).delete().then(function(){renderDocumentosPersonales();});
      });
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function guardarNuevoUsuario(){
  var nombre=document.getElementById('nu-n').value.trim();

  from('usuarios').insert({nombre:nombre,rol:rol,fecha_ingreso:fechaIngreso,activo:true}).then(function(data){

}

function renderCambiarMiPin(){
  var esOperario = usuario.rol==='operario'||usuario.rol==='cosechador'||usuario.rol==='galerista'||usuario.rol==='labores_eventual';
  var body=document.getElementById(esOperario?'op-body':'enc-body');
  var volver = esOperario?'cargarTareas()':'renderTablero()';
  body.innerHTML='<div class="seccion-titulo">🔒 Cambiar mi PIN</div><div class="form-card"><div class="form-group"><label>Tu PIN actual</label><input type="number" id="mp-actual" placeholder="0000" min="0" max="9999"></div><div class="form-group"><label>Nuevo PIN (4 dígitos)</label><input type="number" id="mp-nuevo" placeholder="0000" min="0" max="9999"></div><div class="form-group"><label>Repite el nuevo PIN</label><input type="number" id="mp-nuevo2" placeholder="0000" min="0" max="9999"></div><button class="btn-primary" id="mp-guardar">Guardar nuevo PIN</button></div><button class="btn-back" style="margin-top:1rem;" onclick="'+volver+'">← Cancelar</button>';
  document.getElementById('mp-guardar').addEventListener('click',function(){
    var actual=String(document.getElementById('mp-actual').value||'').padStart(4,'0');
    var nuevo=String(document.getElementById('mp-nuevo').value||'').padStart(4,'0');
    var nuevo2=String(document.getElementById('mp-nuevo2').value||'').padStart(4,'0');
    if(actual.length!==4||nuevo.length!==4){alert('Cada PIN debe tener 4 dígitos.');return;}
    if(nuevo!==nuevo2){alert('El nuevo PIN no coincide en los dos campos.');return;}
    var btn=this; btn.disabled=true; btn.textContent='Verificando...';
    rpc('verificar_pin',{p_pin:actual}).then(function(data){
      if(!data||!data.length||data[0].usuario_id!==usuario.id){
        alert('Tu PIN actual no es correcto.');
        btn.disabled=false; btn.textContent='Guardar nuevo PIN';
        return;
      }
      return api('/rest/v1/rpc/set_pin',{method:'POST',body:{p_usuario_id:usuario.id,p_pin:nuevo}}).then(function(){
        showToast('✅ PIN actualizado');
        if(esOperario) cargarTareas(); else renderTablero();
      });
    }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Guardar nuevo PIN';});
  });
}

function guardarPin(id){
  var pin=String(document.getElementById('cp-p').value).padStart(4,'0');
  if(pin.length!==4){alert('El PIN debe tener 4 dígitos.');return;}
  api('/rest/v1/rpc/set_pin',{method:'POST',body:{p_usuario_id:id,p_pin:pin}}).then(function(){alert('PIN actualizado.');renderAltasBajas();});
}

function usarCamara(){document.getElementById('cam-input').click();}
function abrirGaleria(){document.getElementById('gal-input').click();}

function abrirCamaraApp(){
  var overlay=document.getElementById('cam-overlay');
  overlay.style.display='flex';
  navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing},audio:false}).then(function(stream){
    camStream=stream;
    var video=document.getElementById('cam-video');
    video.srcObject=stream;
  }).catch(function(e){
    overlay.style.display='none';
    alert('No se pudo acceder a la camara. Usa Galeria.');
  });
}

function cerrarCamara(){
  if(camStream) camStream.getTracks().forEach(function(t){t.stop();});
  camStream=null;
  document.getElementById('cam-overlay').style.display='none';
}

function toggleVideo(){
  if(!grabando){
    videoChunks=[];
    var options={mimeType:'video/webm;codecs=vp9'};
    if(!MediaRecorder.isTypeSupported(options.mimeType)) options={mimeType:'video/webm'};
    mediaRecorder=new MediaRecorder(camStream, options);
    mediaRecorder.ondataavailable=function(e){if(e.data.size>0) videoChunks.push(e.data);};
    mediaRecorder.onstop=function(){
      var blob=new Blob(videoChunks,{type:'video/webm'});
      capturaEjec.foto=true;
      capturaEjec.fotoBlob=blob;
      capturaEjec.fotoUrl=null;
      capturaEjec.esVideo=true;
      cerrarCamara();
      renderEjec();
    };
    mediaRecorder.start();
    grabando=true;
    document.getElementById('btn-video').textContent='⏹ Detener';
    document.getElementById('btn-video').style.background='rgba(255,0,0,.9)';
    var st=document.getElementById('cam-status');
    if(st) st.style.display='block';
  } else {
    mediaRecorder.stop();
    grabando=false;
    document.getElementById('btn-video').textContent='⏺ Video';
    document.getElementById('btn-video').style.background='rgba(255,0,0,.5)';
    var st=document.getElementById('cam-status');
    if(st) st.style.display='none';
  }
}
function girarCamara(){
  camFacing=camFacing==='environment'?'user':'environment';
  if(camStream) camStream.getTracks().forEach(function(t){t.stop();});
  navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing},audio:false}).then(function(stream){
    camStream=stream;
    document.getElementById('cam-video').srcObject=stream;
  });
}

function tomarFoto(){
  var video=document.getElementById('cam-video');
  var canvas=document.getElementById('cam-canvas');
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  canvas.toBlob(function(blob){
    capturaEjec.foto=true;
    capturaEjec.fotoBlob=blob;
    capturaEjec.fotoUrl=null;
    cerrarCamara();
    renderEjec();
  },'image/jpeg',0.8);
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(function(e){console.warn('SW no registrado:',e);});
}
