<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Mootsil · Labores</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --verde:#1a3a2a;--verde-mid:#2d6644;--verde-claro:#4a9a6a;--verde-tenue:#e8f4ee;
  --tierra:#c17f3a;--tierra-tenue:#fdf3e7;--rojo:#c0392b;--rojo-tenue:#fdf0ee;
  --amarillo:#e6a817;--amarillo-tenue:#fef9ec;
  --blanco:#ffffff;--gris-1:#f5f5f3;--gris-2:#e0e0db;--gris-3:#9a9a94;--negro:#1a1a18;
  --radio:14px;--radio-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--verde);min-height:100vh;color:var(--negro);}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
#screen-login{background:var(--verde);align-items:center;justify-content:center;padding:2rem;}
.login-logo{text-align:center;margin-bottom:2.5rem;}
.login-logo h1{color:var(--blanco);font-size:2rem;font-weight:700;}
.login-logo p{color:rgba(255,255,255,.55);font-size:.85rem;margin-top:.3rem;}
.login-card{background:var(--blanco);border-radius:20px;padding:1.75rem 1.5rem;width:100%;max-width:340px;}
.login-card h2{font-size:1rem;font-weight:600;margin-bottom:.3rem;}
.login-card .sub{font-size:.8rem;color:var(--gris-3);margin-bottom:1.25rem;}
.pin-display{display:flex;gap:10px;justify-content:center;margin-bottom:1.5rem;}
.pin-dot{width:48px;height:48px;border-radius:50%;border:2px solid var(--gris-2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:var(--verde);}
.pin-dot.filled{background:var(--verde);border-color:var(--verde);color:var(--blanco);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-btn{background:var(--gris-1);border:2px solid var(--gris-2);border-radius:var(--radio);height:64px;font-size:1.4rem;font-weight:600;cursor:pointer;color:var(--negro);}
.pin-btn:active{background:var(--gris-2);}
.pin-btn.del{background:var(--tierra-tenue);color:var(--tierra);border-color:var(--tierra-tenue);}
.pin-error{text-align:center;font-size:.8rem;color:var(--rojo);margin-top:.75rem;min-height:1.4rem;font-weight:500;}
.app-header{background:var(--verde);padding:1rem 1.25rem .75rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.app-header h1{color:var(--blanco);font-size:1rem;font-weight:600;}
.header-sub{color:rgba(255,255,255,.6);font-size:.75rem;margin-top:.1rem;}
.btn-salir{background:rgba(255,255,255,.15);border:none;border-radius:20px;color:var(--blanco);font-size:.75rem;padding:.4rem .9rem;cursor:pointer;}
.tabs{background:var(--verde-mid);display:flex;flex-shrink:0;overflow-x:auto;}
.tab{flex-shrink:0;padding:.75rem .6rem;text-align:center;font-size:.75rem;font-weight:600;color:rgba(255,255,255,.6);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.tab.active{color:var(--blanco);border-bottom-color:var(--blanco);}
.app-body{background:var(--gris-1);flex:1;overflow-y:auto;padding:1rem;}
.orden-card{background:var(--blanco);border-radius:var(--radio);padding:1rem;margin-bottom:.75rem;border-left:4px solid var(--gris-2);}
.orden-card.pendiente{border-left-color:var(--amarillo);}
.orden-card.en_proceso{border-left-color:var(--verde-claro);}
.orden-card.completada{border-left-color:var(--verde-mid);opacity:.75;}
.orden-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;}
.orden-labor{font-weight:700;font-size:.95rem;}
.orden-badge{font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;text-transform:uppercase;}
.badge-pendiente{background:var(--amarillo-tenue);color:var(--amarillo);}
.badge-en_proceso{background:var(--verde-tenue);color:var(--verde-mid);}
.badge-completada{background:var(--verde-tenue);color:var(--verde);}
.orden-meta{font-size:.78rem;color:var(--gris-3);line-height:1.7;}
.orden-meta strong{color:var(--negro);}
.orden-actions{display:flex;gap:8px;margin-top:.75rem;flex-wrap:wrap;}
.btn-sm{padding:.45rem .9rem;border-radius:var(--radio-sm);border:none;font-size:.78rem;font-weight:600;cursor:pointer;}
.btn-iniciar{background:var(--verde-tenue);color:var(--verde-mid);}
.btn-completar{background:var(--verde-mid);color:var(--blanco);}
.btn-cancelar{background:var(--rojo-tenue);color:var(--rojo);}
.form-card{background:var(--blanco);border-radius:var(--radio);padding:1.1rem;margin-bottom:.75rem;}
.form-card h3{font-size:.9rem;font-weight:700;margin-bottom:1rem;}
.form-group{margin-bottom:.85rem;}
.form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--gris-3);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.04em;}
.form-group select,.form-group input{width:100%;padding:.65rem .75rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.9rem;background:var(--gris-1);color:var(--negro);}
.surcos-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:.4rem;}
.surco-btn{padding:.5rem 0;border-radius:6px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.8rem;font-weight:700;cursor:pointer;text-align:center;}
.surco-btn.sel{border-color:var(--verde-mid);background:var(--verde-tenue);color:var(--verde);}
.op-chip{padding:6px 16px;border-radius:20px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.85rem;cursor:pointer;color:var(--negro);font-weight:600;}
.op-chip.sel{background:var(--verde-tenue);border-color:var(--verde-mid);color:var(--verde);}
.btn-primary{width:100%;padding:.9rem;border:none;border-radius:var(--radio);background:var(--verde-mid);color:var(--blanco);font-size:.95rem;font-weight:700;cursor:pointer;margin-top:.5rem;}
.tarea-card{background:var(--blanco);border-radius:var(--radio);padding:1.1rem;margin-bottom:.75rem;border-left:4px solid var(--amarillo);}
.tarea-title{font-weight:700;font-size:1rem;margin-bottom:.35rem;}
.tarea-meta{font-size:.8rem;color:var(--gris-3);line-height:1.7;}
.steps-bar{display:flex;gap:5px;margin-bottom:1rem;}
.step-seg{flex:1;height:4px;border-radius:2px;background:var(--gris-2);}
.step-seg.done{background:var(--verde-claro);}
.step-seg.active{background:var(--verde-mid);}
.step-label{font-size:.7rem;color:var(--gris-3);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em;}
.step-title{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
.cantidad-row{display:flex;align-items:center;gap:12px;background:var(--blanco);border-radius:var(--radio);padding:1rem;margin-bottom:1rem;}
.cant-btn{width:52px;height:52px;border-radius:50%;border:2px solid var(--gris-2);background:var(--gris-1);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.cant-val{flex:1;text-align:center;font-size:2.2rem;font-weight:700;}
.cant-unit{text-align:center;font-size:.75rem;color:var(--gris-3);}
.nav-row{display:flex;gap:10px;margin-top:1.25rem;}
.btn-back{flex:1;padding:.85rem;border:2px solid var(--gris-2);border-radius:var(--radio);background:var(--blanco);font-size:.9rem;font-weight:600;cursor:pointer;}
.btn-next{flex:2;padding:.85rem;border:none;border-radius:var(--radio);background:var(--verde-mid);color:var(--blanco);font-size:.9rem;font-weight:700;cursor:pointer;}
.btn-next:disabled{background:var(--gris-2);color:var(--gris-3);}
.resumen-card{background:var(--blanco);border-radius:var(--radio);padding:1rem 1.1rem;margin-bottom:.75rem;}
.resumen-row{display:flex;justify-content:space-between;font-size:.82rem;padding:.35rem 0;border-bottom:1px solid var(--gris-1);}
.resumen-row:last-child{border-bottom:none;}
.resumen-key{color:var(--gris-3);}
.resumen-val{font-weight:600;text-align:right;max-width:60%;}
.notif-item{background:var(--blanco);border-radius:var(--radio);padding:.85rem 1rem;margin-bottom:.6rem;display:flex;gap:.75rem;border-left:3px solid var(--tierra);}
.notif-ic{font-size:1.3rem;flex-shrink:0;}
.notif-texto{font-size:.82rem;line-height:1.5;}
.notif-texto strong{display:block;font-size:.85rem;color:var(--negro);}
.notif-tiempo{font-size:.7rem;color:var(--gris-3);margin-top:.2rem;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.stat-card{background:var(--blanco);border-radius:var(--radio-sm);padding:.75rem;text-align:center;}
.stat-num{font-size:1.6rem;font-weight:700;}
.stat-lbl{font-size:.65rem;color:var(--gris-3);text-transform:uppercase;letter-spacing:.04em;margin-top:.2rem;}
.stat-am{color:var(--amarillo);}
.stat-vd{color:var(--verde-mid);}
.stat-az{color:#2980b9;}
#screen-exito{background:var(--verde);align-items:center;justify-content:center;padding:2rem;text-align:center;}
.exito-ic{font-size:5rem;margin-bottom:1.5rem;}
.exito-tit{color:var(--blanco);font-size:1.6rem;font-weight:700;margin-bottom:.5rem;}
.exito-sub{color:rgba(255,255,255,.65);font-size:.9rem;margin-bottom:2rem;line-height:1.6;}
.btn-nuevo{background:var(--blanco);color:var(--verde);border:none;border-radius:var(--radio);padding:1rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;}
.hint{font-size:.75rem;color:var(--gris-3);margin-top:.6rem;}
.loading{text-align:center;color:var(--gris-3);padding:3rem 1rem;font-size:.9rem;}
.seccion-titulo{font-size:.75rem;font-weight:700;color:var(--gris-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--gris-3);font-size:.88rem;line-height:1.6;}
.orden-badge-rol{font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;text-transform:uppercase;}
.prog-bar{background:var(--gris-2);border-radius:4px;height:6px;margin-bottom:.75rem;}
.prog-fill{height:6px;border-radius:4px;}
#toast{position:fixed;bottom:1.5rem;right:1rem;background:var(--verde);color:#fff;padding:.75rem 1.1rem;border-radius:12px;font-size:.85rem;font-weight:600;z-index:8888;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:280px;line-height:1.4;}
.rep-view-btn{padding:.4rem .9rem;border-radius:20px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.75rem;font-weight:600;cursor:pointer;color:var(--negro);}
.rep-view-btn.active{background:var(--verde-mid);border-color:var(--verde-mid);color:#fff;}
.riego-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:flex-start;}
.riego-circle{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;color:#fff;font-weight:700;font-size:.85rem;padding:6px;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:transform .15s;}
.riego-circle:active{transform:scale(.95);}
.riego-circle.roja{background:var(--rojo);}
.riego-circle.verde{background:var(--verde-mid);}
.riego-circle.activa{background:var(--tierra);}
.riego-circle.neutra{background:var(--gris-1);border:2px solid var(--gris-2);color:var(--gris-3);box-shadow:none;}
.riego-circle small{font-weight:500;font-size:.65rem;opacity:.85;margin-top:2px;}
.riego-ejec-card{background:var(--blanco);border-radius:var(--radio);padding:1.75rem 1.25rem;text-align:center;transition:background .3s;}
.riego-ejec-min{font-size:2.6rem;font-weight:800;color:var(--verde-mid);margin-bottom:.5rem;font-variant-numeric:tabular-nums;}
.riego-ejec-card.riego-alarma{background:var(--rojo-tenue);animation:riego-flash 1s infinite;}
.riego-ejec-card.riego-alarma .riego-ejec-min{color:var(--rojo);}
@keyframes riego-flash{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.0);}50%{box-shadow:0 0 0 10px rgba(192,57,43,.15);}}
.labor-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.labor-tile{background:var(--blanco);border-radius:var(--radio);padding:1rem .5rem;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .12s;border:2px solid transparent;}
.labor-tile:active{transform:scale(.94);}
.labor-tile-ic{font-size:1.7rem;margin-bottom:.35rem;}
.labor-tile-lbl{font-size:.72rem;font-weight:700;color:var(--negro);line-height:1.2;}
.labor-tile-otra{background:var(--verde-tenue);border-color:var(--verde-mid);}
.labor-tile-otra .labor-tile-lbl{color:var(--verde);}
.labor-chosen{display:flex;align-items:center;gap:8px;font-size:1rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--gris-1);}
.pbtn-emerg{background:var(--blanco);border:2px solid var(--rojo);color:var(--rojo);border-radius:var(--radio);padding:1.1rem;text-align:center;font-weight:800;font-size:1rem;}
.pbtn-emerg:active{background:var(--rojo-tenue);}

#cam-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:none;flex-direction:column;}
#cam-video{flex:1;width:100%;object-fit:cover;}
#cam-canvas{display:none;}
.cam-bar{background:#000;padding:1.5rem;display:flex;justify-content:space-around;align-items:center;}
.cam-capbtn{width:75px;height:75px;border-radius:50%;border:5px solid #fff;background:#fff;cursor:pointer;font-size:1.8rem;}
.cam-auxbtn{color:#fff;font-size:.85rem;padding:.5rem 1.25rem;background:rgba(255,255,255,.15);border:none;border-radius:20px;cursor:pointer;}
</style>
</head>
<body>

<div id="screen-login" class="screen active">
  <div class="login-logo"><h1>🫐 Mootsil</h1><p>Rancho · Módulo de Labores</p></div>
  <div class="login-card">
    <h2>Ingresa tu PIN</h2>
    <p class="sub">Toca los 4 dígitos para entrar</p>
    <div class="pin-display">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinDigit('1')">1</button>
      <button class="pin-btn" onclick="pinDigit('2')">2</button>
      <button class="pin-btn" onclick="pinDigit('3')">3</button>
      <button class="pin-btn" onclick="pinDigit('4')">4</button>
      <button class="pin-btn" onclick="pinDigit('5')">5</button>
      <button class="pin-btn" onclick="pinDigit('6')">6</button>
      <button class="pin-btn" onclick="pinDigit('7')">7</button>
      <button class="pin-btn" onclick="pinDigit('8')">8</button>
      <button class="pin-btn" onclick="pinDigit('9')">9</button>
      <button class="pin-btn" style="visibility:hidden"></button>
      <button class="pin-btn" onclick="pinDigit('0')">0</button>
      <button class="pin-btn del" onclick="pinBorrar()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<div id="screen-encargado" class="screen">
  <div class="app-header">
    <div><h1>🫐 Mootsil</h1><div class="header-sub" id="enc-nombre">Encargado</div></div>
    <button class="btn-salir" onclick="salir()">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-tablero" onclick="tabEncargado('tablero')">Tablero</button>
    <button class="tab" id="tab-asignar" onclick="tabEncargado('asignar')">+ Asignar</button>
    <button class="tab" id="tab-notif" onclick="tabEncargado('notif')">Avisos <span id="badge-avisos" style="display:none;background:var(--tierra);color:#fff;border-radius:50%;width:16px;height:16px;font-size:.6rem;font-weight:700;align-items:center;justify-content:center;margin-left:3px;vertical-align:middle;">0</span></button>
    <button class="tab" id="tab-alarmas" onclick="tabEncargado('alarmas')" style="display:none">🚨 Alarmas</button>
    <button class="tab" id="tab-admin" onclick="tabEncargado('admin')" style="display:none">🏛️ Administración</button>
    <button class="tab" id="tab-reporte" onclick="tabEncargado('reporte')">Reporte</button>
    <button class="tab" id="tab-inventario" onclick="tabEncargado('inventario')" style="display:none">Inventario</button>
    <button class="tab" id="tab-formulas" onclick="tabEncargado('formulas')" style="display:none">Fórmulas</button>
    <button class="tab" id="tab-validar" onclick="tabEncargado('validar')" style="display:none">Validar</button>
    <button class="tab" id="tab-config" onclick="tabEncargado('config')" style="display:none">⚙️</button>
  </div>
  <div class="app-body" id="enc-body"><div class="loading">Cargando...</div></div>
</div>

<div id="screen-operario" class="screen">
  <div class="app-header">
    <div><h1>🌱 Mootsil | Labores</h1><div class="header-sub" id="op-nombre">Colaborador</div></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button onclick="renderAlarmasMenu()" style="width:38px;height:38px;border-radius:50%;background:rgba(192,57,43,.25);border:none;color:#fff;font-size:1rem;cursor:pointer;">🚨</button>
      <button class="btn-salir" onclick="salir()">Salir</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab" id="tab-asistencia" onclick="tabOperario('asistencia')">Asistencia</button>
    <button class="tab active" id="tab-tareas" onclick="tabOperario('tareas')">Mis tareas</button>
    <button class="tab" id="tab-pagos" onclick="tabOperario('pagos')">Pagos</button>
    <button class="tab" id="tab-op-notif" onclick="tabOperario('notif')">Avisos <span id="op-badge-alertas" style="display:none;background:var(--rojo);color:#fff;border-radius:50%;width:16px;height:16px;font-size:.6rem;font-weight:700;align-items:center;justify-content:center;margin-left:3px;vertical-align:middle;">0</span></button>
    <button class="tab" id="tab-perfil" onclick="tabOperario('perfil')">Perfil</button>
  </div>
  <div class="app-body" id="op-body"><div class="loading">Cargando tareas...</div></div>
</div>

<div id="screen-exito" class="screen">
  <div class="exito-ic">✅</div>
  <div class="exito-tit">¡Labor completada!</div>
  <div class="exito-sub" id="exito-sub">El registro se guardó correctamente.</div>
  <button class="btn-nuevo" onclick="mostrar('screen-operario');cargarTareas()">Ver mis tareas</button>
</div>


<div id="toast"></div>
<div id="cam-overlay">
  <video id="cam-video" autoplay playsinline muted></video>
  <canvas id="cam-canvas"></canvas>
  <div id="cam-status" style="position:absolute;top:1rem;left:50%;transform:translateX(-50%);background:rgba(200,0,0,.85);color:#fff;padding:.3rem .9rem;border-radius:20px;font-size:.85rem;font-weight:600;display:none;">⏺ Grabando...</div>
  <div class="cam-bar">
    <button class="cam-auxbtn" onclick="cerrarCamara()">✕ Cancelar</button>
    <button class="cam-capbtn" onclick="tomarFoto()">📷</button>
    <button id="btn-video" onclick="toggleVideo()" style="color:#fff;font-size:.85rem;padding:.5rem 1rem;background:rgba(200,0,0,.6);border:none;border-radius:20px;cursor:pointer;">⏺ Video</button>
    <button class="cam-auxbtn" onclick="girarCamara()">🔄</button>
  </div>
</div>

  var ctrl = (typeof AbortController!=='undefined') ? new AbortController() : null;
  var timer = ctrl ? setTimeout(function(){ctrl.abort();}, 8000) : null;
  return fetch(URL_SB + path, {

    gte:function(c,v){this._f.push(c+'=gte.'+encodeURIComponent(v));return this;},
    lte:function(c,v){this._f.push(c+'=lte.'+encodeURIComponent(v));return this;},
    in:function(c,v){this._f.push(c+'=in.("'+v.join('","')+'")');return this;},
    not:function(c,op,v){this._f.push(c+'=not.'+op+'.'+v);return this;},
    order:function(c,o){this._o='&order='+c+(o&&o.ascending===false?'.desc':'.asc');return this;},
    limit:function(n){this._l='&limit='+n;return this;},
    get:function(){
      var url='/rest/v1/'+this._t+'?select='+encodeURIComponent(this._s);
      if(this._f.length) url+='&'+this._f.join('&');
      url+=this._o+this._l;
      return api(url);
    },
    single:function(){return this.get().then(function(d){return Array.isArray(d)?d[0]:d;});},
    insert:function(data){return api('/rest/v1/'+this._t,{method:'POST',body:data,prefer:'return=representation'});},
    update:function(data){
      var url='/rest/v1/'+this._t+'?'+this._f.join('&');
      return api(url,{method:'PATCH',body:data,prefer:'return=representation'});
    },
    delete:function(){
      var url='/rest/v1/'+this._t+'?'+this._f.join('&');
      return api(url,{method:'DELETE',prefer:'return=representation'});
    }
  };
  return q;
}

var _mootsilDB=null;
function abrirDBEvidencias(){
  if(_mootsilDB) return Promise.resolve(_mootsilDB);
  return new Promise(function(resolve,reject){
    var req=indexedDB.open('mootsil_evidencias',1);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains('pendientes')) db.createObjectStore('pendientes',{keyPath:'id'});
    };
    req.onsuccess=function(e){_mootsilDB=e.target.result;resolve(_mootsilDB);};
    req.onerror=function(e){reject(e.target.error);};
  });
}
function guardarEvidenciaPendiente(blob,mime){
  var id='ev_'+Date.now()+'_'+Math.round(Math.random()*99999);
  return abrirDBEvidencias().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('pendientes','readwrite');
      tx.objectStore('pendientes').put({id:id,blob:blob,mime:mime||'image/jpeg',creado_en:Date.now()});
      tx.oncomplete=function(){resolve(id);};
      tx.onerror=function(e){reject(e.target.error);};
    });
  });
}
function obtenerEvidenciaPendiente(id){
  return abrirDBEvidencias().then(function(db){
    return new Promise(function(resolve){
      var tx=db.transaction('pendientes','readonly');
      var req=tx.objectStore('pendientes').get(id);
      req.onsuccess=function(){resolve(req.result||null);};
      req.onerror=function(){resolve(null);};
    });
  });
}
function borrarEvidenciaPendiente(id){
  return abrirDBEvidencias().then(function(db){
    var tx=db.transaction('pendientes','readwrite');
    tx.objectStore('pendientes').delete(id);
  }).catch(function(){});
}
function listarEvidenciasPendientes(){
  return abrirDBEvidencias().then(function(db){
    return new Promise(function(resolve){
      var tx=db.transaction('pendientes','readonly');
      var req=tx.objectStore('pendientes').getAll();
      req.onsuccess=function(){resolve(req.result||[]);};
      req.onerror=function(){resolve([]);};
    });
  });
}

ar(--verde-mid);background:var(--verde-tenue);color:var(--verde);font-size:.78rem;font-weight:600;cursor:pointer;">Tabla completa</button><button type="button" onclick="selNingunoF()" style="padding:4px 14px;border-radius:20px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.78rem;cursor:pointer;">Limpiar</button></div><div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap;"><span style="font-size:.78rem;color:var(--gris-3)">Del surco</span><input type="number" id="f-ri" min="1" style="width:52px;padding:3px 6px;border:1.5px solid var(--gris-2);border-radius:6px;font-size:.85rem;" placeholder="1"><span style="font-size:.78rem;color:var(--gris-3)">al</span><input type="number" id="f-rf" min="1" style="width:52px;padding:3px 6px;border:1.5px solid var(--gris-2);border-radius:6px;font-size:.85rem;" placeholder="12"><button type="button" onclick="aplicarRangoF()" style="padding:4px 10px;border-radius:20px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.78rem;cursor:pointer;">Aplicar</button></div><div class="surcos-grid" id="fsc"></div><p class="hint">O toca surcos individuales</p></div><div class="form-group"><label>Duración</label><select id="fdu"><option value="dia">Solo hoy</option><option value="labor_completa">Labor completa</option></select></div><div class="form-group"><label>Fecha</label><input type="date" id="ffe" value="'+new Date().toISOString().slice(0,10)+'"/></div><div class="form-group"><label>Notas</label><input type="text" id="fno" placeholder="Opcional..."/></div><button class="btn-primary" onclick="guardarOrden()">'+(modoAsignacionLabor==='extra'?'Asignar como hora extra':'Asignar orden')+'</button></div>';

function guardarRiegoAsignacion(){
  var btn=document.getElementById('riego-finalizar'); if(btn){btn.disabled=true;btn.textContent='Guardando...';}
  var not=document.getElementById('riego-notas-input').value||null;
  var filas=Object.keys(riegoAsigMinutos).filter(function(k){return riegoAsigMinutos[k]>0;}).map(function(tid){return {tabla:tid,min:riegoAsigMinutos[tid]};});
  if(!filas.length){alert('No hay tablas con tiempo asignado.');if(btn){btn.disabled=false;btn.textContent='✅ Asignar riego';}return;}
  var lbId=asignarLaborSel.id;
  var tareas=[];
  riegoAsigOperarios.forEach(function(oid){filas.forEach(function(r){tareas.push({asignado_por:usuario.id,operario_id:oid,tabla_id:r.tabla,tipo_labor_id:lbId,duracion_minutos:r.min,duracion:'dia',fecha_asignacion:riegoAsigFecha,notas_encargado:not,estado:'pendiente'});});});
  Promise.all(tareas.map(function(t){return from('ordenes_trabajo').insert(t);})).then(function(){
    Promise.all(riegoAsigOperarios.map(function(oid){
      return from('notificaciones').insert({titulo:'💧 Riego asignado',cuerpo:usuario.nombre+' asignó riego a '+(cats.operarios.find(function(o){return o.id===oid;})||{}).nombre+' en '+filas.length+' tabla(s)',icono:'💧',leida:false,para_rol:'operario',para_usuario:oid});
    })).then(function(){showToast('💧 Riego asignado en '+filas.length+' tabla(s). Puedes asignar otra labor.');renderFormAsignar();});
  }).catch(function(e){alert('Error: '+e.message);if(btn){btn.disabled=false;btn.textContent='✅ Asignar riego';}});
}

function toggleChip(btn){

  else{btn.classList.add('sel');}
}

function renderSurcosForm(){
  var tid=document.getElementById('ftb').value;
  var t=cats.tablas.find(function(x){return x.id===tid;});
  var n=(t&&t.cantidad_surcos)?t.cantidad_surcos:12;
  formSurcos=[];
  var h='';
  for(var i=1;i<=n;i++) h+='<button type="button" class="surco-btn" data-n="'+i+'">'+i+'</button>';
  var g=document.getElementById('fsc');

function selTodosF(){formSurcos=[];document.querySelectorAll('#fsc .surco-btn').forEach(function(b){var n=parseInt(b.dataset.n);formSurcos.push(n);b.classList.add('sel');});}
function selNingunoF(){formSurcos=[];document.querySelectorAll('#fsc .surco-btn').forEach(function(b){b.classList.remove('sel');});}
function aplicarRangoF(){
  var ini=parseInt(document.getElementById('f-ri').value)||1;
  var fin=parseInt(document.getElementById('f-rf').value)||1;
  formSurcos=[];
  document.querySelectorAll('#fsc .surco-btn').forEach(function(b){b.classList.remove('sel');});

function guardarOrden(){
  var opIds=Array.from(document.querySelectorAll('.op-chip.sel')).map(function(c){return c.dataset.id;});
  var lb=asignarLaborSel;
  var lbId=lb?lb.id:null;
  if(!opIds.length||!lbId){alert('Faltan datos obligatorios.');return;}
  var dur=document.getElementById('fdu').value, fec=document.getElementById('ffe').value, not=document.getElementById('fno').value||null;

  if(lb&&lb.requiere_tiempo){
    var filas=Array.from(document.querySelectorAll('.riego-min')).map(function(i){return {tabla:i.dataset.tabla,min:parseInt(i.value)||0};}).filter(function(r){return r.min>0;});
    if(!filas.length){alert('Captura al menos una duración de riego.');return;}
    var tareas=[];
    opIds.forEach(function(oid){filas.forEach(function(r){tareas.push({asignado_por:usuario.id,operario_id:oid,tabla_id:r.tabla,tipo_labor_id:lbId,duracion_minutos:r.min,duracion:dur,fecha_asignacion:fec,notas_encargado:not,estado:'pendiente'});});});
    Promise.all(tareas.map(function(t){return from('ordenes_trabajo').insert(t);})).then(function(){
      Promise.all(opIds.map(function(oid){
        return from('notificaciones').insert({titulo:'💧 Riego asignado',cuerpo:usuario.nombre+' asignó riego a '+(cats.operarios.find(function(o){return o.id===oid;})||{}).nombre+' en '+filas.length+' tabla(s)',icono:'💧',leida:false,para_rol:'operario',para_usuario:oid});
      })).then(function(){showToast('💧 Riego asignado. Puedes asignar otra labor.');renderFormAsignar();});
    }).catch(function(e){alert('Error: '+e.message);});
    return;
  }

  var tbId=document.getElementById('ftb').value;
  if(!tbId){alert('Faltan datos obligatorios.');return;}
  var sub=document.getElementById('fsb').value||null;
  var cant=parseFloat(document.getElementById('fca').value)||null;
  var tb=cats.tablas.find(function(t){return t.id===tbId;});
  var esExtra=modoAsignacionLabor==='extra';
  Promise.all(opIds.map(function(oid){
    return from('ordenes_trabajo').insert({asignado_por:usuario.id,operario_id:oid,tabla_id:tbId,tipo_labor_id:lbId,subtipo_labor_id:sub,surcos_asignados:formSurcos,cantidad_insumo_esperada:cant,duracion:dur,fecha_asignacion:fec,notas_encargado:not,estado:'pendiente',es_hora_extra:esExtra});
  })).then(function(){
    var autorizarExtra = esExtra ? Promise.all(opIds.map(function(oid){
      return from('horas_extra_asignadas').insert({operario_id:oid,asignado_por:usuario.id,fecha:fec,motivo:not,tipo_labor_id:lbId,estado:'aprobada'});
    })) : Promise.resolve();
    return autorizarExtra.then(function(){
      return Promise.all(opIds.map(function(oid){
        return from('notificaciones').insert({titulo:esExtra?'⏰ Hora extra asignada':'📋 Nueva tarea asignada',cuerpo:usuario.nombre+' asignó a '+(cats.operarios.find(function(o){return o.id===oid;})||{}).nombre+': '+(lb?lb.nombre:'')+' en '+(tb?tb.nombre:'')+(esExtra?' (hora extra)':''),icono:esExtra?'⏰':'📋',leida:false,para_rol:'operario',para_usuario:oid});
      }));
    });
  }).then(function(){showToast((esExtra?'⏰ Hora extra asignada: ':'📋 Labor asignada: ')+(lb?lb.nombre:'')+'. Puedes asignar otra.');renderFormAsignar();}).catch(function(e){alert('Error: '+e.message);});
}

function renderNotifs(bodyId){
  var body=document.getElementById(bodyId);
  body.innerHTML='<div class="loading">Cargando avisos...</div>';
  var esPanelLiderazgo = bodyId==='enc-body';
  Promise.all([
    from('notificaciones').select('*').order('creado_en',{ascending:false}).limit(30).get(),
    esPanelLiderazgo?from('config_app').select('*').get():Promise.resolve([])
  ]).then(function(r){
    var data=r[0], cfgRows=r[1]||[];
    var cfg={}; cfgRows.forEach(function(c){cfg[c.clave]=c.valor;});
    if(!data||!data.length){body.innerHTML='<div class="empty">📭 Sin avisos por ahora</div>';return;}
    body.innerHTML=data.map(function(n){
      var diff=Math.floor((Date.now()-new Date(n.creado_en))/1000);
      var t=diff<60?'hace un momento':diff<3600?'hace '+Math.floor(diff/60)+' min':diff<86400?'hace '+Math.floor(diff/3600)+' h':'hace '+Math.floor(diff/86400)+' días';
      var esEmergencia = esPanelLiderazgo && n.icono==='🆘';

function cargarReporte(){
  var fechaEl=document.getElementById('fecha-rep');
  if(fechaEl&&fechaEl.value) repFecha=fechaEl.value;
  var fecha=repFecha;
  var body=document.getElementById('rep-body'); if(!body) return;
  body.innerHTML='<div class="loading">Cargando...</div>';
  from('ordenes_trabajo').select('*,operario:usuarios!operario_id(nombre),tabla:tablas(nombre,plantacion_id,cantidad_surcos),tipo_labor:tipos_labor(nombre)').eq('fecha_asignacion',fecha).order('creado_en',{ascending:false}).get().then(function(ordenes){
    if(!ordenes||!ordenes.length){body.innerHTML='<div class="empty">Sin actividad para esta fecha.</div>';return;}
    var grupos={};
    ordenes.forEach(function(o){
      var planta=o.tabla?cats.plantaciones.find(function(p){return p.id===o.tabla.plantacion_id;}):null;
      var key, label, sublabel;
      if(repVista==='trabajador'){
        key=o.operario_id;
        label=o.operario?o.operario.nombre:'Sin asignar';
        sublabel=(planta?planta.nombre:'')+' · '+(o.tabla?o.tabla.nombre:'');
      } else if(repVista==='plantacion'){
        key=o.tabla?o.tabla.plantacion_id:'sin-planta';
        label=planta?planta.nombre:'Sin plantación';
        sublabel=(o.tabla?o.tabla.nombre:'');
      } else if(repVista==='tarea'){
        key=o.tipo_labor_id;
        label=o.tipo_labor?o.tipo_labor.nombre:'Sin labor';
        sublabel=(planta?planta.nombre:'')+' · '+(o.tabla?o.tabla.nombre:'');
      } else {
        key=o.tabla_id;
        label=(planta?planta.nombre:'')+' · '+(o.tabla?o.tabla.nombre:'');
        sublabel='';
      }
      if(!grupos[key]){grupos[key]={label:label,ordenes:[]};}
      grupos[key].ordenes.push({o:o,sublabel:sublabel});
    });
    var html='';
    Object.keys(grupos).forEach(function(gid){
      var g=grupos[gid];
      var comp=g.ordenes.filter(function(x){return x.o.estado==='completada';}).length;
      var total=g.ordenes.length;
      var pct=total>0?Math.round(comp/total*100):0;
      var color=pct===100?'var(--verde-mid)':pct>50?'var(--tierra)':'var(--rojo)';
      html+='<div style="background:var(--blanco);border-radius:var(--radio);padding:1rem;margin-bottom:.75rem;border-left:4px solid '+color+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;"><strong style="font-size:.95rem">'+g.label+'</strong><span style="font-size:.75rem;font-weight:700;color:'+color+'">'+pct+'%</span></div><div class="prog-bar"><div class="prog-fill" style="background:'+color+';width:'+pct+'%"></div></div>';
      g.ordenes.forEach(function(x){
        var o=x.o;
        var ic=o.estado==='completada'?'✅':o.estado==='en_proceso'?'🔄':'⏳';
        var su=(o.surcos_asignados&&o.surcos_asignados.length)?o.surcos_asignados.join(', '):'Todos';
        var etiqueta=repVista==='trabajador'?(o.tipo_labor?o.tipo_labor.nombre:''):repVista==='plantacion'?(o.tipo_labor?o.tipo_labor.nombre:''):repVista==='tarea'?(o.operario?o.operario.nombre:''):(o.tipo_labor?o.tipo_labor.nombre:'')+' · '+(o.operario?o.operario.nombre:'');
        html+='<div style="font-size:.78rem;padding:.5rem 0;border-bottom:1px solid var(--gris-1);"><div style="display:flex;justify-content:space-between;align-items:center;"><span>'+ic+' '+etiqueta+(x.sublabel?' · '+x.sublabel:'')+'</span><span style="color:var(--gris-3)">'+su+'</span></div><div id="foto-'+o.id+'"></div></div>';
      });
      html+='</div>';
    });
    body.innerHTML=html;
      ordenes.filter(function(o){return o.estado==='completada';}).forEach(function(o){
        fetch(URL_SB+'/rest/v1/registros_labor?select=foto_url&orden_id=eq.'+o.id+'&limit=1',{headers:{'apikey':KEY_SB,'Authorization':'Bearer '+KEY_SB}}).then(function(r){return r.json();}).then(function(regs){
          if(regs&&regs.length&&regs[0].foto_url&&regs[0].foto_url!=='pendiente'&&regs[0].foto_url!==null){
            var d=document.getElementById('foto-'+o.id);
            if(d){
              var url=regs[0].foto_url;
              var esVid=url.indexOf('.webm')>-1||url.indexOf('.mp4')>-1;
              d.innerHTML=esVid?'<div style="margin-top:6px;"><video src="'+url+'" style="width:160px;height:100px;border-radius:8px;" controls playsinline></video><br><a href="'+url+'" target="_blank" style="font-size:.72rem;color:var(--verde-mid);">▶ Abrir video</a></div>':'<img src="'+url+'" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-top:6px;cursor:pointer;" onclick="window.open(this.src)" title="Ver evidencia">';
            }
          }
        });
      });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

e="display:flex;gap:8px;align-items:center;"><input type="number" id="inv-n-min" min="0" value="0" style="flex:1;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;"><span class="hint" id="inv-n-unidad-lbl2" style="margin:0;min-width:40px;">kg</span></div><div style="display:flex;gap:8px;align-items:center;margin-top:.4rem;"><span class="hint" style="margin:0;">o convertir desde</span><input type="number" id="inv-n-min-paq" min="0" placeholder="0" style="width:70px;padding:.4rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.8rem;"><span class="hint" id="inv-n-min-paq-lbl" style="margin:0;">sacos</span></div></div><button class="btn-primary" id="inv-n-guardar">Guardar componente</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderInventario()">← Volver a inventario</button>';

function renderInventarioItem(itemId){
  var body=document.getElementById('enc-body');
  var it=cats.inventario.find(function(x){return x.id===itemId;});
  if(!it){renderInventario();return;}

label>Tamaño de este '+it.unidad_compra.toLowerCase()+' (esta vez)</label><input type="number" id="inv-mov-tamano" min="0" step="any" value="'+(it.factor_compra||'')+'"><p class="hint">Por si esta compra vino en un tamaño distinto al habitual (ej. hoy llegó de 10L en vez de los 20L de siempre) — no cambia lo que tienes configurado en el producto.</p></div>':'')+'<div class="form-group"><label id="inv-mov-cant-lbl">¿Cuánto? (en '+it.unidad+')</label><input type="number" id="inv-mov-cantidad" min="0" placeholder="0" step="any"><p class="hint" id="inv-mov-ejemplo">Ej: si llegaron 12 kg sueltos, escribe 12.</p></div><p class="hint" id="inv-mov-equiv" style="display:none;font-weight:700;color:var(--verde-mid);"></p><div class="form-group"><label>Nota (opcional)</label><input type="text" id="inv-mov-motivo" placeholder="Ej. Proveedor X, factura #123, o para qué se usó"></div><button class="btn-primary" id="inv-mov-guardar">Registrar</button></div><div id="inv-mov-historial"><div class="loading">Cargando movimientos...</div></div><button class="btn-back" style="margin-top:1rem;" onclick="renderInventario()">← Volver a inventario</button>';
  var modoCaptura='base', tipoMov='entrada';
  var TIPO_LABELS={entrada:'➕ Entrada — llegó pedido/compra',salida:'➖ Salida — se usó o se perdió',ajuste:'✏️ Ajuste — corregir un conteo mal capturado'};
  document.querySelectorAll('#inv-mov-tipo-grp [data-tipo]').forEach(function(btn){
    btn.addEventListener('click',function(){
      tipoMov=this.dataset.tipo;
      document.querySelectorAll('#inv-mov-tipo-grp [data-tipo]').forEach(function(b){b.classList.remove('sel');b.textContent=TIPO_LABELS[b.dataset.tipo];});
      this.classList.add('sel');
      this.textContent='✓ '+TIPO_LABELS[this.dataset.tipo];
    });
  });
  if(tienePaquete){
    var tamanoWrap=document.getElementById('inv-mov-tamano-wrap');
    var btnBase=document.getElementById('inv-mov-modo-base'), btnPaq=document.getElementById('inv-mov-modo-paq');
    btnBase.addEventListener('click',function(){modoCaptura='base';this.classList.add('sel');this.textContent='✓ Por '+it.unidad;btnPaq.classList.remove('sel');btnPaq.textContent='Por '+it.unidad_compra;tamanoWrap.style.display='none';actualizarEtiquetaMov();});
    btnPaq.addEventListener('click',function(){modoCaptura='paquete';this.classList.add('sel');this.textContent='✓ Por '+it.unidad_compra;btnBase.classList.remove('sel');btnBase.textContent='Por '+it.unidad;tamanoWrap.style.display='';actualizarEtiquetaMov();});
    document.getElementById('inv-mov-tamano').addEventListener('input',calcularEquivalencia);

  }

    var stockAntes=it.stock_actual;
    var nuevoStock=tipo==='entrada'?it.stock_actual+cant:tipo==='salida'?it.stock_actual-cant:cant;
    from('movimientos_inventario').insert({item_id:it.id,tipo:tipo,cantidad:cant,motivo:motivo,usuario_id:usuario.id,stock_anterior:stockAntes,stock_posterior:nuevoStock}).then(function(){
      return from('inventario_items').eq('id',it.id).update({stock_actual:nuevoStock});
    }).then(function(){
      it.stock_actual=nuevoStock;
      showToast('✅ Movimiento registrado');
      renderInventarioItem(itemId);
    }).catch(function(e){alert('Error: '+e.message);});
  });
  from('movimientos_inventario').select('*,usuario:usuarios(nombre)').eq('item_id',itemId).order('creado_en',{ascending:false}).limit(15).get().then(function(movs){
    var cont=document.getElementById('inv-mov-historial');
    if(!cont) return;
    if(!movs||!movs.length){cont.innerHTML='<div class="empty">Sin movimientos registrados.</div>';return;}
    var ic={entrada:'➕',salida:'➖',ajuste:'✏️'};
    cont.innerHTML='<div class="seccion-titulo">Historial reciente</div>'+movs.map(function(m,idx){
      var f=new Date(m.creado_en).toLocaleDateString('es-MX',{day:'2-digit',month:'short'});
      var puedeBorrar=idx===0;
      return '<div style="font-size:.78rem;padding:.5rem 0;border-bottom:1px solid var(--gris-1);display:flex;justify-content:space-between;align-items:center;"><span>'+(ic[m.tipo]||'')+' '+numFmt(m.cantidad)+' '+it.unidad+(m.motivo?' · '+m.motivo:'')+'</span><span style="display:flex;align-items:center;gap:8px;"><span style="color:var(--gris-3)">'+(m.usuario?m.usuario.nombre+' · ':'')+f+'</span>'+(puedeBorrar?'<button type="button" class="inv-mov-borrar" data-mid="'+m.id+'" data-stockanterior="'+(m.stock_anterior==null?'':m.stock_anterior)+'" style="border:none;background:none;color:var(--rojo);font-size:.95rem;cursor:pointer;">✕</button>':'')+'</span></div>';
    }).join('')+'<p class="hint" style="margin-top:.5rem;">Solo se puede eliminar el movimiento más reciente, para no descuadrar el historial. Para corregir uno anterior, usa un "Ajuste".</p>';
    cont.querySelectorAll('.inv-mov-borrar').forEach(function(btn){
      btn.addEventListener('click',function(){
        if(!confirm('¿Eliminar este movimiento? El stock se corregirá automáticamente.')) return;
        var mid=this.dataset.mid;
        var stockAnterior=this.dataset.stockanterior;
        var stockCorregido=stockAnterior!==''?parseFloat(stockAnterior):null;
        if(stockCorregido===null){
          alert('Este movimiento es de antes de esta función y no tiene guardado el stock previo. Corrígelo manualmente con un "Ajuste".');
          return;
        }
        from('movimientos_inventario').eq('id',mid).delete().then(function(){
          return from('inventario_items').eq('id',it.id).update({stock_actual:stockCorregido});
        }).then(function(){
          it.stock_actual=stockCorregido;
          showToast('🗑️ Movimiento eliminado, stock corregido');
          renderInventarioItem(itemId);
        }).catch(function(e){alert('Error: '+e.message);});
      });
    });
  });
}

function renderInventarioEditar(itemId){
  var body=document.getElementById('enc-body');
  var it=cats.inventario.find(function(x){return x.id===itemId;});
  if(!it){renderInventario();return;}
  body.innerHTML='<div class="seccion-titulo">Editar '+it.nombre+'</div><div class="form-card"><div class="form-group"><label>Nombre</label><input type="text" id="inv-e-nombre" value="'+it.nombre.replace(/"/g,'&quot;')+'"></div><div class="form-group"><label>Unidad de uso</label><select id="inv-e-unidad"><option value="litros">Litros</option><option value="ml">Mililitros</option><option value="kg">Kilogramos</option><option value="gr">Gramos</option><option value="pza">Piezas</option></select></div><div class="form-group"><label>¿Se compra empacado? (opcional)</label><div style="display:flex;gap:8px;"><input type="text" id="inv-e-unidad-compra" placeholder="Ej. Saco, Bidón, Caja" value="'+(it.unidad_compra||'').replace(/"/g,'&quot;')+'" style="flex:1;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;"><input type="number" id="inv-e-factor-compra" min="0" placeholder="Ej. 25" value="'+(it.factor_compra||'')+'" style="width:90px;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;"></div><p class="hint">Nombre del paquete + cuánto trae cada uno.</p></div><div class="form-group"><label>Stock mínimo (para alerta)</label><div style="display:flex;gap:8px;align-items:center;"><input type="number" id="inv-e-min" min="0" value="'+it.stock_minimo+'" style="flex:1;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;"><span class="hint" id="inv-e-unidad-lbl" style="margin:0;min-width:40px;">'+it.unidad+'</span></div><div style="display:flex;gap:8px;align-items:center;margin-top:.4rem;"><span class="hint" style="margin:0;">o convertir desde</span><input type="number" id="inv-e-min-paq" min="0" placeholder="'+(it.factor_compra?numFmt(it.stock_minimo/it.factor_compra):'0')+'" style="width:70px;padding:.4rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.8rem;"><span class="hint" id="inv-e-min-paq-lbl" style="margin:0;">'+(it.unidad_compra?it.unidad_compra.toLowerCase():'paquetes')+'</span></div></div><button class="btn-primary" id="inv-e-guardar">Guardar cambios</button></div><div class="form-card"><button type="button" id="inv-e-eliminar" style="width:100%;padding:.75rem;border-radius:var(--radio-sm);border:1.5px solid var(--rojo);background:var(--rojo-tenue);color:var(--rojo);font-weight:700;font-size:.85rem;cursor:pointer;">🗑️ Eliminar componente</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderInventarioItem(\''+itemId+'\')">← Cancelar</button>';
  document.getElementById('inv-e-unidad').value=it.unidad;
  function refrescarEtiquetasE(){
    var u=document.getElementById('inv-e-unidad').value;
    var uc=(document.getElementById('inv-e-unidad-compra').value||'paquetes').trim();
    document.getElementById('inv-e-unidad-lbl').textContent=u;
    document.getElementById('inv-e-min-paq-lbl').textContent=uc.toLowerCase();
  }
  document.getElementById('inv-e-unidad').addEventListener('change',refrescarEtiquetasE);
  document.getElementById('inv-e-unidad-compra').addEventListener('input',refrescarEtiquetasE);
  document.getElementById('inv-e-min-paq').addEventListener('input',function(){
    var f=parseFloat(document.getElementById('inv-e-factor-compra').value)||0;
    if(f>0) document.getElementById('inv-e-min').value=numFmt((parseFloat(this.value)||0)*f);
  });
  document.getElementById('inv-e-guardar').addEventListener('click',function(){
    var nombre=(document.getElementById('inv-e-nombre').value||'').trim();
    if(!nombre){alert('Escribe el nombre del componente.');return;}
    var unidad=document.getElementById('inv-e-unidad').value;
    var min=parseFloat(document.getElementById('inv-e-min').value)||0;
    var unidadCompra=(document.getElementById('inv-e-unidad-compra').value||'').trim()||null;
    var factorCompra=parseFloat(document.getElementById('inv-e-factor-compra').value)||null;
    from('inventario_items').eq('id',itemId).update({nombre:nombre,unidad:unidad,stock_minimo:min,unidad_compra:unidadCompra,factor_compra:factorCompra}).then(function(){
      return from('inventario_items').select('*').eq('activo',true).order('nombre').get();
    }).then(function(rows){
      cats.inventario=rows||[];
      showToast('✅ Componente actualizado');
      renderInventarioItem(itemId);
    }).catch(function(e){alert('Error: '+e.message);});
  });
  document.getElementById('inv-e-eliminar').addEventListener('click',function(){
    from('formula_componentes').select('formula_id,formula:formulas_aplicacion(nombre)').eq('item_id',itemId).get().then(function(usos){
      if(usos&&usos.length){
        var nombres=usos.map(function(u){return u.formula?u.formula.nombre:'';}).filter(Boolean).join(', ');
        alert('No se puede eliminar: este componente está usado en '+usos.length+' fórmula(s): '+nombres+'.\n\nQuita el componente de esas fórmulas primero, o simplemente déjalo en 0 de stock.');
        return;
      }
      if(!confirm('¿Eliminar "'+it.nombre+'" del inventario? Esta acción no se puede deshacer.')) return;
      from('inventario_items').eq('id',itemId).update({activo:false}).then(function(){
        return from('inventario_items').select('*').eq('activo',true).order('nombre').get();
      }).then(function(rows){
        cats.inventario=rows||[];
        showToast('🗑️ Componente eliminado');
        renderInventario();
      }).catch(function(e){alert('Error: '+e.message);});
    }).catch(function(e){alert('Error: '+e.message);});
  });
}

var VIA_ICONOS={'Riego':'💧','Foliar':'🌿','Drench':'🧪'};
var CATEGORIA_ICONOS={'Nutrición':'🌱','Plaga':'🐛','Estimulación':'⚡'};
var BOMBA_ICONOS={'inyeccion':'🛢️','motor':'⚙️','manual':'🤲'};
var BOMBA_LABELS={'inyeccion':'Bomba Inyección','motor':'Bomba Motor','manual':'Bomba Manual'};
var formulaVia=null, formulaCategoria=null, formulaBombas=[], formulaCompRows=[], formulaCompSeq=0, formulaEditId=null, formulaVolverAResumen=false;
var formulaPlantacionId=null, formulaTablaId=null;

function headerFormulas(){
  return '<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">Fórmulas<div><button type="button" onclick="renderFormulasFaltantes()" style="border:none;background:none;color:var(--rojo);font-size:.78rem;font-weight:600;cursor:pointer;margin-right:.75rem;">⚠️ Faltantes</button><button type="button" onclick="renderFormulaForm()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nueva fórmula</button></div></div>';
}

function renderFormulas(){
  var body=document.getElementById('enc-body');
  body.innerHTML=headerFormulas()+'<div class="loading">Cargando fórmulas...</div>';
  Promise.all([
    from('formulas_aplicacion').select('*,tabla:tablas(nombre,plantacion_id)').eq('activo',true).order('fecha_programada').get(),
    from('formula_componentes').select('*,item:inventario_items(nombre,unidad,stock_actual)').get()
  ]).then(function(r){
    var rows=r[0]||[], todosComps=r[1]||[];
    if(!rows.length){body.innerHTML=headerFormulas()+'<div class="empty">🧪 Aún no hay fórmulas registradas.</div>';return;}
    var html=headerFormulas();
    html+=rows.map(function(f){
      var bombasTxt=(f.bombas_compatibles||[]).map(function(b){return BOMBA_ICONOS[b]+' '+(BOMBA_LABELS[b]||b);}).join(', ');
      var p=f.tabla?cats.plantaciones.find(function(x){return x.id===f.tabla.plantacion_id;}):null;
      var ubicacion=(p?p.nombre+' · ':'')+(f.tabla?f.tabla.nombre:'sin tabla');
      var comps=todosComps.filter(function(c){return c.formula_id===f.id;});
      var faltantes=comps.filter(function(c){return c.item&&(c.cantidad_base>c.item.stock_actual);});
      var colorBorde=faltantes.length?'var(--rojo)':'var(--verde-mid)';
      var alerta=faltantes.length?'<div style="color:var(--rojo);font-weight:700;font-size:.75rem;margin-top:.25rem;">⚠️ Falta material: '+faltantes.map(function(c){return c.item.nombre;}).join(', ')+' — pedir antes del '+(f.fecha_programada||'?')+'</div>':'';
      return '<div class="orden-card" style="border-left-color:'+colorBorde+';display:flex;gap:.5rem;align-items:flex-start;"><div style="flex:1;cursor:pointer;" data-fid="'+f.id+'"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.92rem">'+(VIA_ICONOS[f.via]||'')+' '+f.nombre+'</strong><span style="font-size:.72rem;color:var(--gris-3)">'+(CATEGORIA_ICONOS[f.categoria]||'')+' '+f.categoria+'</span></div><div class="orden-meta">📍 '+ubicacion+' · '+f.via+(f.fecha_programada?' · 📅 '+f.fecha_programada:'')+' · Base 🛢️ '+f.volumen_base_litros+' L'+(bombasTxt?' · '+bombasTxt:'')+'</div>'+alerta+'</div><button type="button" class="fm-borrar-rapido" data-borrar="'+f.id+'" data-nombre="'+f.nombre.replace(/"/g,'&quot;')+'" style="flex-shrink:0;width:26px;height:26px;border-radius:50%;border:1px solid var(--rojo);background:var(--rojo-tenue);color:var(--rojo);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;">🗑️</button></div>';
    }).join('');
    body.innerHTML=html;
    body.querySelectorAll('.fm-borrar-rapido').forEach(function(btn){
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        var fid=this.dataset.borrar, nombre=this.dataset.nombre;
        if(!confirm('¿Eliminar la fórmula "'+nombre+'"? Esta acción no se puede deshacer.')) return;
        from('formulas_aplicacion').eq('id',fid).update({activo:false}).then(function(){
          showToast('🗑️ Fórmula eliminada');
          renderFormulas();
        }).catch(function(e){alert('Error: '+e.message);});
      });
    });
    body.querySelectorAll('[data-fid]').forEach(function(el){el.addEventListener('click',function(){renderFormulaForm(this.dataset.fid);});});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderFormulasFaltantes(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">⚠️ Faltantes de producto</div><div class="loading">Cargando...</div>';
  from('formula_componentes').select('*,item:inventario_items(nombre,unidad,stock_actual),formula:formulas_aplicacion(nombre,fecha_programada,activo)').in('estado_faltante',['pendiente','autorizado']).order('estado_faltante',{ascending:true}).get().then(function(rows){
    rows=(rows||[]).filter(function(c){return c.formula&&c.formula.activo;});
    var header='<div class="seccion-titulo">⚠️ Faltantes de producto</div>';
    if(!rows.length){body.innerHTML=header+'<div class="empty">🎉 Ninguna fórmula tiene faltante de producto pendiente.</div><button class="btn-back" style="margin-top:1rem;" onclick="renderFormulas()">← Volver a fórmulas</button>';return;}
    var html=header+rows.map(function(c){
      var autorizado=c.estado_faltante==='autorizado';
      return '<div class="orden-card" style="border-left-color:'+(autorizado?'var(--verde-mid)':'var(--rojo)')+';"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem">'+(c.formula?c.formula.nombre:'')+'</strong><span style="font-size:.72rem;font-weight:700;color:'+(autorizado?'var(--verde-mid)':'var(--rojo)')+';">'+(autorizado?'✅ Autorizado':'⚠️ Pendiente')+'</span></div><div class="orden-meta">Componente: '+(c.item?c.item.nombre:'')+'<br/>Requiere: '+numFmt(c.cantidad_base)+' '+(c.item?c.item.unidad:'')+' · Disponible: '+numFmt(c.item?c.item.stock_actual:0)+' '+(c.item?c.item.unidad:'')+'<br/>Falta: <strong style="color:var(--rojo);">'+numFmt(c.faltante_detectado)+' '+(c.item?c.item.unidad:'')+'</strong>'+(c.formula&&c.formula.fecha_programada?'<br/>📅 Programada: '+c.formula.fecha_programada:'')+'</div>'+(autorizado?'':'<div style="display:flex;gap:8px;margin-top:.6rem;"><button class="btn-sm btn-completar" data-autorizar="'+c.id+'">✅ Autorizar de todas formas</button><button class="btn-sm btn-iniciar" data-cambiar="'+c.id+'" data-formula="'+c.formula_id+'">🔄 Cambiar producto</button></div>')+'</div>';
    }).join('');
    body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderFormulas()">← Volver a fórmulas</button>';
    body.querySelectorAll('[data-autorizar]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var cid=this.dataset.autorizar;
        from('formula_componentes').eq('id',cid).update({estado_faltante:'autorizado',autorizado_por:usuario.id,autorizado_en:new Date().toISOString()}).then(function(){
          showToast('✅ Faltante autorizado');
          renderFormulasFaltantes();
        }).catch(function(e){alert('Error: '+e.message);});
      });
    });
    body.querySelectorAll('[data-cambiar]').forEach(function(btn){
      btn.addEventListener('click',function(){
        renderCambiarProductoFaltante(this.dataset.cambiar);
      });
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderCambiarProductoFaltante(compId){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="loading">Cargando...</div>';
  from('formula_componentes').select('*,item:inventario_items(nombre,unidad)').eq('id',compId).get().then(function(rows){
    var c=rows[0];
    var opts=cats.inventario.map(function(i){return '<option value="'+i.id+'">'+i.nombre+' ('+numFmt(i.stock_actual)+' '+i.unidad+' disponibles)</option>';}).join('');
    body.innerHTML='<div class="seccion-titulo">🔄 Cambiar producto</div><div class="form-card"><p class="hint" style="margin-bottom:.75rem;">Reemplazando: <strong>'+(c.item?c.item.nombre:'')+'</strong> (faltaban '+numFmt(c.faltante_detectado)+' '+(c.item?c.item.unidad:'')+')</p><div class="form-group"><label>Nuevo producto</label><select id="cp-nuevo">'+opts+'</select></div><div class="form-group"><label>Cantidad requerida</label><input type="number" id="cp-cantidad" min="0" step="any" value="'+c.cantidad_base+'"></div><button class="btn-primary" id="cp-guardar">Guardar cambio</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderFormulasFaltantes()">← Volver a Faltantes</button>';
    document.getElementById('cp-guardar').addEventListener('click',function(){
      var nuevoId=document.getElementById('cp-nuevo').value;
      var cantidad=parseFloat(document.getElementById('cp-cantidad').value)||0;
      var item=cats.inventario.find(function(i){return i.id===nuevoId;});
      var disponible=item?item.stock_actual:0;
      var faltante=Math.max(0,cantidad-disponible);
      from('formula_componentes').eq('id',compId).update({item_id:nuevoId,cantidad_base:cantidad,faltante_detectado:faltante,estado_faltante:faltante>0?'pendiente':'ninguno',autorizado_por:null,autorizado_en:null}).then(function(){
        showToast('✅ Producto actualizado en la fórmula');
        renderFormulasFaltantes();
      }).catch(function(e){alert('Error: '+e.message);});
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderFormulaForm(formulaId){
  formulaEditId=formulaId||null;
  formulaVolverAResumen=false;
  formulaVia=null; formulaCategoria=null; formulaBombas=[]; formulaCompRows=[]; formulaCompSeq=0;
  formulaPlantacionId=null; formulaTablaId=null;
  if(formulaId){
    Promise.all([
      from('formulas_aplicacion').select('*').eq('id',formulaId).get(),
      from('formula_componentes').select('*,item:inventario_items(nombre,unidad)').eq('formula_id',formulaId).get()
    ]).then(function(r){
      var f=r[0]&&r[0][0], comps=r[1]||[];
      if(!f){renderFormulas();return;}
      formulaVia=f.via; formulaCategoria=f.categoria; formulaBombas=(f.bombas_compatibles||[]).slice();
      formulaTablaId=f.tabla_id||null;
      var tb=cats.tablas.find(function(t){return t.id===formulaTablaId;});
      formulaPlantacionId=tb?tb.plantacion_id:null;
      formulaCompRows=comps.map(function(c){formulaCompSeq++;return {row:formulaCompSeq,item_id:c.item_id,nombre:c.item?c.item.nombre:'',unidad:c.item?c.item.unidad:'',cantidad:c.cantidad_base};});
      window._formulaNombreExistente=f.nombre; window._formulaNotasExistente=f.notas; window._formulaFechaExistente=f.fecha_programada;
      renderFormulaPasoNotas();
    });
  } else {
    window._formulaNombreExistente=''; window._formulaNotasExistente=''; window._formulaFechaExistente='';
    renderFormulaPasoPlantacion();
  }
}

function formulaCancelarLink(){return '<button type="button" onclick="renderFormulas()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Cancelar</button>';}

function renderFormulaPasoPlantacion(){
  var body=document.getElementById('enc-body');
  var tiles=cats.plantaciones.map(function(p){
    return '<div class="labor-tile'+(formulaPlantacionId===p.id?' labor-tile-otra':'')+'" data-pid="'+p.id+'"><div class="labor-tile-ic">🌿</div><div class="labor-tile-lbl">'+p.nombre+'</div></div>';
  }).join('');
  body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">Paso 1 de 8 · Plantación'+formulaCancelarLink()+'</div><div class="labor-grid">'+tiles+'</div>';
  body.querySelectorAll('[data-pid]').forEach(function(el){el.addEventListener('click',function(){formulaPlantacionId=this.dataset.pid;formulaTablaId=null;renderFormulaPasoTabla();});});
}

function renderFormulaPasoTabla(){
  var body=document.getElementById('enc-body');
  var tabs=cats.tablas.filter(function(t){return t.plantacion_id===formulaPlantacionId;});
  var p=cats.plantaciones.find(function(x){return x.id===formulaPlantacionId;});
  var tiles=tabs.map(function(t){
    return '<div class="labor-tile'+(formulaTablaId===t.id?' labor-tile-otra':'')+'" data-tid="'+t.id+'"><div class="labor-tile-ic">🧭</div><div class="labor-tile-lbl">'+t.nombre+'</div></div>';
  }).join('');
  body.innerHTML='<div class="seccion-titulo">Paso 2 de 8 · Tabla en '+(p?p.nombre:'')+'</div><div class="labor-grid">'+tiles+'</div><button class="btn-back" style="margin-top:1rem;" onclick="renderFormulaPasoPlantacion()">← Volver a plantación</button>';
  body.querySelectorAll('[data-tid]').forEach(function(el){el.addEventListener('click',function(){formulaTablaId=this.dataset.tid;if(formulaVolverAResumen){formulaVolverAResumen=false;renderFormulaPasoNotas();}else renderFormulaPasoVia();});});
}

function renderFormulaPasoVia(){
  var body=document.getElementById('enc-body');
  var tiles=['Riego','Foliar','Drench'].map(function(v){

function unidadesAlternas(unidadBase){
  if(unidadBase==='kg') return ['kg','gr'];
  if(unidadBase==='litros') return ['litros','ml'];
  return [unidadBase];
}
function convertirABase(valor,unidadEntrada,unidadBase){
  if(!valor) return 0;
  if(unidadEntrada===unidadBase) return valor;
  if(unidadBase==='kg'&&unidadEntrada==='gr') return valor/1000;
  if(unidadBase==='litros'&&unidadEntrada==='ml') return valor/1000;
  return valor;
}
function convertirDesdeBase(valorBase,unidadEntrada,unidadBase){
  if(!valorBase) return '';
  if(unidadEntrada===unidadBase) return valorBase;
  if(unidadBase==='kg'&&unidadEntrada==='gr') return valorBase*1000;
  if(unidadBase==='litros'&&unidadEntrada==='ml') return valorBase*1000;
  return valorBase;
}

ciones adicionales..."></div><button class="btn-primary" id="fm-guardar">'+(formulaEditId?'Guardar cambios':'Crear fórmula')+'</button></div>'+(formulaEditId?'<div class="form-card"><button type="button" id="fm-eliminar" style="width:100%;padding:.75rem;border-radius:var(--radio-sm);border:1.5px solid var(--rojo);background:var(--rojo-tenue);color:var(--rojo);font-weight:700;font-size:.85rem;cursor:pointer;">🗑️ Eliminar fórmula</button></div>':'')+'<button class="btn-back" style="margin-top:1rem;" onclick="renderFormulas()">← Volver a fórmulas</button>';

function guardarFormula(){
  var nombre=window._formulaNombreExistente;
  var notas=document.getElementById('fm-notas-input').value||null;
  var comps=formulaCompRows.filter(function(r){return r.item_id&&r.cantidad>0;});
  var btn=document.getElementById('fm-guardar'); btn.disabled=true; btn.textContent='Guardando...';
  var payload={nombre:nombre,via:formulaVia,categoria:formulaCategoria,bombas_compatibles:formulaBombas,tabla_id:formulaTablaId,fecha_programada:window._formulaFechaExistente||null,volumen_base_litros:200,notas:notas,creado_por:usuario.id,activo:true};
  var guardar=formulaEditId?from('formulas_aplicacion').eq('id',formulaEditId).update(payload):from('formulas_aplicacion').insert(payload);
  guardar.then(function(resp){
    var fid=formulaEditId||(resp&&resp[0]&&resp[0].id);
    if(!fid){throw new Error('No se pudo obtener la fórmula guardada.');}
    var borrarViejos=formulaEditId?from('formula_componentes').eq('formula_id',fid).delete():Promise.resolve();
    return borrarViejos.then(function(){
      return Promise.all(comps.map(function(c){
        var item=cats.inventario.find(function(x){return x.id===c.item_id;});
        var disponible=item?item.stock_actual:0;
        var faltante=Math.max(0,c.cantidad-disponible);
        var estadoFaltante=faltante>0?'pendiente':'ninguno';
        return from('formula_componentes').insert({formula_id:fid,item_id:c.item_id,cantidad_base:c.cantidad,estado_faltante:estadoFaltante,faltante_detectado:faltante});
      }));
    });
  }).then(function(){
    var hayFaltante=comps.some(function(c){
      var item=cats.inventario.find(function(x){return x.id===c.item_id;});
      var disponible=item?item.stock_actual:0;
      return (c.cantidad-disponible)>0;
    });
    var avisoFaltante=hayFaltante?from('notificaciones').insert({titulo:'⚠️ Fórmula con faltante de producto',cuerpo:'La fórmula "'+nombre+'" quedó guardada con al menos un componente sin stock suficiente. Revísala en Fórmulas → ⚠️ Faltantes.',icono:'⚠️',leida:false,para_rol:'encargado'}):Promise.resolve();
    return avisoFaltante.then(function(){
      showToast(hayFaltante?'⚠️ Guardada con faltante de producto: '+nombre:'✅ Fórmula guardada: '+nombre);
      renderFormulas();
    });
  }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent=formulaEditId?'Guardar cambios':'Crear fórmula';});
}

function renderAsigAplicPorFecha(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">🧪 Aplicaciones<button type="button" onclick="renderFormAsignar()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Cambiar labor</button></div><div class="loading">Buscando lo programado...</div>';
  var hoy=new Date().toISOString().slice(0,10);
  var en7dias=new Date(Date.now()+7*86400000).toISOString().slice(0,10);
  Promise.all([
    from('formulas_aplicacion').select('*,tabla:tablas(nombre,plantacion_id)').eq('activo',true).not('fecha_programada','is','null').order('fecha_programada').get(),
    from('ordenes_trabajo').select('formula_id').not('formula_id','is','null').get()
  ]).then(function(r){
    var formulas=r[0]||[], ordenesConFormula=r[1]||[];
    var asignadas={};
    ordenesConFormula.forEach(function(o){asignadas[o.formula_id]=true;});
    var hoyF=formulas.filter(function(f){return f.fecha_programada===hoy;});
    var semanaF=formulas.filter(function(f){return f.fecha_programada>hoy&&f.fecha_programada<=en7dias;});
    var masF=formulas.filter(function(f){return f.fecha_programada>en7dias;});
    function tarjeta(f){
      var p=f.tabla?cats.plantaciones.find(function(x){return x.id===f.tabla.plantacion_id;}):null;
      var yaAsig=asignadas[f.id];
      return '<div class="orden-card" style="cursor:pointer;'+(yaAsig?'opacity:.55;':'')+'" data-fid="'+f.id+'"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.92rem">'+(VIA_ICONOS[f.via]||'')+' '+f.nombre+'</strong>'+(yaAsig?'<span style="font-size:.7rem;color:var(--verde-mid);font-weight:700;">✅ Ya asignada</span>':'<span style="font-size:.7rem;color:var(--rojo);font-weight:700;">Sin asignar</span>')+'</div><div class="orden-meta">📍 '+(p?p.nombre:'')+' · '+(f.tabla?f.tabla.nombre:'')+' · 📅 '+f.fecha_programada+'</div></div>';
    }
    var html='';
    if(hoyF.length) html+='<div class="seccion-titulo">📅 Hoy</div>'+hoyF.map(tarjeta).join('');
    if(semanaF.length) html+='<div class="seccion-titulo" style="margin-top:1rem">Esta semana</div>'+semanaF.map(tarjeta).join('');
    if(masF.length) html+='<div class="seccion-titulo" style="margin-top:1rem">Más adelante</div>'+masF.map(tarjeta).join('');
    if(!formulas.length) html='<div class="empty">No hay fórmulas con fecha programada.<br/>Puedes buscar por plantación abajo.</div>';
    html+='<button class="btn-back" style="margin-top:1.25rem;width:100%;" onclick="renderAsigAplicPlantaciones()">🔍 Buscar por plantación / tabla</button>';
    body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">🧪 Aplicaciones<button type="button" onclick="renderFormAsignar()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Cambiar labor</button></div>'+html;
    body.querySelectorAll('[data-fid]').forEach(function(el){el.addEventListener('click',function(){cargarFormulaParaAsignar(this.dataset.fid);});});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderAsigAplicPlantaciones(){
  var body=document.getElementById('enc-body');
  var html='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">🧪 Aplicación · Plantación<button type="button" onclick="renderFormAsignar()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Cambiar labor</button></div><div class="riego-grid">';
  cats.plantaciones.forEach(function(p){
    html+='<div class="riego-circle neutra" data-pid="'+p.id+'"><span>'+p.nombre+'</span></div>';
  });
  html+='</div>';
  body.innerHTML=html;
  body.querySelectorAll('[data-pid]').forEach(function(el){el.addEventListener('click',function(){aplic.plantacionId=this.dataset.pid;renderAsigAplicTablas();});});
}

function renderAsigAplicTablas(){
  var body=document.getElementById('enc-body');
  var p=cats.plantaciones.find(function(x){return x.id===aplic.plantacionId;});
  var tabs=cats.tablas.filter(function(t){return t.plantacion_id===aplic.plantacionId;});
  body.innerHTML='<div class="seccion-titulo">🧪 '+(p?p.nombre:'')+' · Elige tabla</div><div class="riego-grid" id="aplic-tablas-grid"><div class="loading">Buscando fórmulas...</div></div><button class="btn-back" style="margin-top:1rem;" onclick="renderAsigAplicPlantaciones()">← Volver a plantación</button>';
  from('formulas_aplicacion').select('id,tabla_id').eq('activo',true).get().then(function(formulas){
    var conFormula={};
    (formulas||[]).forEach(function(f){conFormula[f.tabla_id]=(conFormula[f.tabla_id]||0)+1;});
    var grid=document.getElementById('aplic-tablas-grid');
    if(!grid) return;
    grid.innerHTML=tabs.map(function(t){
      var n=conFormula[t.id]||0;
      var disabled=n===0;
      var etiqueta=n>0?(n+' fórmula(s)'):'sin fórmula';
      return '<div class="riego-circle neutra" style="'+(disabled?'opacity:.4;cursor:not-allowed;':'')+'" '+(disabled?'':'data-tid="'+t.id+'"')+'><span>'+t.nombre+'</span><small>'+etiqueta+'</small></div>';
    }).join('');
    grid.querySelectorAll('[data-tid]').forEach(function(el){el.addEventListener('click',function(){aplic.tablaId=this.dataset.tid;renderAsigAplicFormulas();});});
  });
}

function renderAsigAplicFormulas(){
  var body=document.getElementById('enc-body');
  var t=cats.tablas.find(function(x){return x.id===aplic.tablaId;});
  body.innerHTML='<div class="seccion-titulo">🧪 '+(t?t.nombre:'')+' · Elige fórmula</div><div class="loading">Cargando fórmulas...</div><button class="btn-back" style="margin-top:1rem;" onclick="renderAsigAplicTablas()">← Volver a tabla</button>';
  from('formulas_aplicacion').select('*').eq('activo',true).eq('tabla_id',aplic.tablaId).order('fecha_programada').get().then(function(rows){
    if(!rows||!rows.length){body.innerHTML='<div class="seccion-titulo">🧪 '+(t?t.nombre:'')+' · Elige fórmula</div><div class="empty">Esta tabla no tiene fórmulas. Créala primero en Fórmulas.</div><button class="btn-back" style="margin-top:1rem;" onclick="renderAsigAplicTablas()">← Volver a tabla</button>';return;}
    var html='<div class="seccion-titulo">🧪 '+(t?t.nombre:'')+' · Elige fórmula</div>';
    html+=rows.map(function(f){
      return '<div class="orden-card" style="cursor:pointer;" data-fid="'+f.id+'"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.92rem">'+(VIA_ICONOS[f.via]||'')+' '+f.nombre+'</strong><span style="font-size:.72rem;color:var(--gris-3)">'+(CATEGORIA_ICONOS[f.categoria]||'')+' '+f.categoria+'</span></div><div class="orden-meta">'+(f.fecha_programada?'📅 '+f.fecha_programada:'sin fecha')+' · Base 🛢️ 200L</div></div>';
    }).join('');
    html+='<button class="btn-back" style="margin-top:1rem;" onclick="renderAsigAplicTablas()">← Volver a tabla</button>';
    body.innerHTML=html;
    body.querySelectorAll('[data-fid]').forEach(function(el){el.addEventListener('click',function(){cargarFormulaParaAsignar(this.dataset.fid);});});
  });
}

function cargarFormulaParaAsignar(formulaId){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="loading">Cargando fórmula...</div>';
  Promise.all([
    from('formulas_aplicacion').select('*').eq('id',formulaId).get(),
    from('formula_componentes').select('*,item:inventario_items(nombre,unidad,stock_actual)').eq('formula_id',formulaId).get()
  ]).then(function(r){
    aplic.formula=r[0]&&r[0][0];
    aplic.componentes=r[1]||[];
    aplic.tablaId=aplic.formula.tabla_id;
    var tb=cats.tablas.find(function(t){return t.id===aplic.tablaId;});
    aplic.plantacionId=tb?tb.plantacion_id:null;
    aplic.fecha=aplic.formula.fecha_programada||new Date().toISOString().slice(0,10);
    renderAsigAplicBomba();
  });
}

function renderAsigAplicBomba(){
  var body=document.getElementById('enc-body');
  var sugerida=(aplic.formula.bombas_compatibles||[])[0];
  var tiles=['inyeccion','motor','manual'].map(function(b){
    var esSugerida=b===sugerida;
    return '<div class="labor-tile'+(aplic.bomba===b?' labor-tile-otra':'')+'" data-bomba="'+b+'"><div class="labor-tile-ic">'+BOMBA_ICONOS[b]+'</div><div class="labor-tile-lbl">'+BOMBA_LABELS[b]+(esSugerida?' ⭐':'')+'</div></div>';
  }).join('');
  body.innerHTML='<div class="seccion-titulo">🧪 '+aplic.formula.nombre+' · ¿Con qué equipo?</div><p class="hint">⭐ = lo que sugirió el ingeniero, pero puedes elegir el que tengas disponible hoy.</p><div class="labor-grid">'+tiles+'</div><button class="btn-back" style="margin-top:1rem;" onclick="renderAsigAplicFormulas()">← Volver a fórmula</button>';
  body.querySelectorAll('[data-bomba]').forEach(function(el){el.addEventListener('click',function(){
    aplic.bomba=this.dataset.bomba;
    if(aplic.bomba==='inyeccion'){
      aplic.numBombas=1; aplic.volumen=200; aplic.factor=1;
      renderAsigAplicComponentes();
    } else {
      renderAsigAplicCantidadBombas();
    }
  });});
}

function renderAsigAplicCantidadBombas(){
  var body=document.getElementById('enc-body');
  var cap=BOMBA_CAPACIDAD[aplic.bomba];
  body.innerHTML='<div class="seccion-titulo">🧪 ¿Cuántas '+BOMBA_LABELS[aplic.bomba].toLowerCase()+'s?</div><div class="riego-ejec-card"><input type="number" id="aplic-numbombas" min="1" value="'+(aplic.numBombas||1)+'" style="width:100%;text-align:center;font-size:2.4rem;font-weight:800;color:var(--verde-mid);border:none;background:transparent;outline:none;"><p class="hint">bombas de '+cap+' L c/u</p><p class="hint" id="aplic-vol-preview" style="font-weight:700;"></p><button class="btn-primary" id="aplic-bombas-continuar">Continuar →</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderAsigAplicBomba()">← Volver a equipo</button>';
  function actualizarPreview(){
    var n=parseFloat(document.getElementById('aplic-numbombas').value)||0;
    document.getElementById('aplic-vol-preview').textContent='= '+numFmt(n*cap)+' litros totales';
  }
  document.getElementById('aplic-numbombas').addEventListener('input',actualizarPreview);
  actualizarPreview();
  document.getElementById('aplic-bombas-continuar').addEventListener('click',function(){
    var n=parseFloat(document.getElementById('aplic-numbombas').value)||0;
    if(n<=0){alert('Captura cuántas bombas se van a usar.');return;}
    aplic.numBombas=n; aplic.volumen=n*cap; aplic.factor=aplic.volumen/200;
    renderAsigAplicComponentes();
  });
}

function renderAsigAplicComponentes(){
  var body=document.getElementById('enc-body');
  var faltantes=[];
  var filas=aplic.componentes.map(function(c){
    var cantEscalada=c.cantidad_base*aplic.factor;
    var stock=c.item?c.item.stock_actual:0;
    var falta=cantEscalada-stock;
    if(falta>0) faltantes.push({nombre:c.item?c.item.nombre:'',falta:falta,unidad:c.item?c.item.unidad:''});
    return '<div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--gris-1);font-size:.85rem;"><span>'+(c.item?c.item.nombre:'')+'</span><strong>'+numFmt(cantEscalada)+' '+(c.item?c.item.unidad:'')+'</strong></div>';
  }).join('');
  var alertaHtml=faltantes.length?'<div style="background:var(--rojo-tenue);border:1.5px solid var(--rojo);border-radius:var(--radio-sm);padding:.75rem;margin-bottom:1rem;font-size:.82rem;"><strong style="color:var(--rojo);">⚠️ No alcanza el inventario</strong><br>'+faltantes.map(function(f){return f.nombre+' (faltan '+numFmt(f.falta)+' '+f.unidad+')';}).join(', ')+'</div>':'';
  body.innerHTML='<div class="seccion-titulo">🧪 Receta ajustada · '+numFmt(aplic.volumen)+' L ('+Math.round(aplic.factor*100)+'% de la base)</div>'+alertaHtml+'<div class="form-card">'+filas+'</div><button class="btn-primary" style="margin-top:1.25rem;" id="aplic-comp-continuar">Continuar →</button><button class="btn-back" style="margin-top:.75rem;" onclick="'+(aplic.bomba==='inyeccion'?'renderAsigAplicBomba()':'renderAsigAplicCantidadBombas()')+'">← Volver</button>';
  document.getElementById('aplic-comp-continuar').addEventListener('click',function(){
    if(faltantes.length&&!confirm('El inventario no alcanza para esta cantidad. ¿Asignar de todas formas? (tendrás que comprar antes de aplicar)')) return;
    renderAsigAplicOperarios();
  });
}

function renderAsigAplicOperarios(){
  var body=document.getElementById('enc-body');
  var opO=cats.operarios.map(function(o){return '<button type="button" class="op-chip'+(aplic.operarios.indexOf(o.id)>-1?' sel':'')+'" data-id="'+o.id+'" onclick="toggleChip(this)">'+o.nombre+'</button>';}).join('');
  body.innerHTML='<div class="seccion-titulo">🧪 ¿Quién la aplica?</div><div class="form-card"><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;">'+opO+'</div><button class="btn-primary" id="aplic-op-continuar">Continuar →</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderAsigAplicComponentes()">← Volver a receta</button>';
  document.getElementById('aplic-op-continuar').addEventListener('click',function(){
    var opIds=Array.from(document.querySelectorAll('.op-chip.sel')).map(function(c){return c.dataset.id;});
    if(!opIds.length){alert('Selecciona al menos un operario.');return;}
