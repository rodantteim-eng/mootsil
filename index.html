function guardarAplicacion(){
  var btn=document.getElementById('aplic-finalizar'); btn.disabled=true; btn.textContent='Guardando...';
  var notas=document.getElementById('aplic-notas-input').value||null;
  var lbAplic=cats.tiposLabor.find(function(l){return l.requiere_formula;});
  var payloadBase={asignado_por:usuario.id,tabla_id:aplic.tablaId,tipo_labor_id:lbAplic.id,formula_id:aplic.formula.id,bomba_usada:aplic.bomba,volumen_aplicado_litros:aplic.volumen,factor_escala:aplic.factor,fecha_asignacion:aplic.fecha,notas_encargado:notas,estado:'pendiente',validado_ingeniero:false,duracion:'dia',es_hora_extra:aplic.esExtra};
  var ordenesPromesa=Promise.all(aplic.operarios.map(function(oid){
    return from('ordenes_trabajo').insert(Object.assign({},payloadBase,{operario_id:oid}));
  }));
  ordenesPromesa.then(function(resultados){
    var primeraOrdenId=resultados&&resultados[0]&&resultados[0][0]&&resultados[0][0].id;
    var autorizarExtra = aplic.esExtra ? Promise.all(aplic.operarios.map(function(oid){
      return from('horas_extra_asignadas').insert({operario_id:oid,asignado_por:usuario.id,fecha:aplic.fecha,motivo:notas,tipo_labor_id:lbAplic.id,estado:'aprobada'});
    })) : Promise.resolve();
    var movs=aplic.componentes.map(function(c){
      var cant=c.cantidad_base*aplic.factor;
      var nuevoStock=(c.item?c.item.stock_actual:0)-cant;
      return from('movimientos_inventario').insert({item_id:c.item_id,tipo:'salida',cantidad:cant,motivo:'Aplicación: '+aplic.formula.nombre,referencia_orden_id:primeraOrdenId,usuario_id:usuario.id,stock_anterior:c.item?c.item.stock_actual:0,stock_posterior:nuevoStock}).then(function(){
        return from('inventario_items').eq('id',c.item_id).update({stock_actual:nuevoStock});
      });
    });
    return autorizarExtra.then(function(){return Promise.all(movs);});
  }).then(function(){
    return from('inventario_items').select('*').eq('activo',true).order('nombre').get();
  }).then(function(rows){
    cats.inventario=rows||[];
    return Promise.all(aplic.operarios.map(function(oid){
      return from('notificaciones').insert({titulo:aplic.esExtra?'⏰ Aplicación (hora extra) asignada':'🧪 Aplicación asignada',cuerpo:usuario.nombre+' asignó a '+(cats.operarios.find(function(o){return o.id===oid;})||{}).nombre+': '+aplic.formula.nombre+(aplic.esExtra?' (hora extra)':''),icono:aplic.esExtra?'⏰':'🧪',leida:false,para_rol:'operario',para_usuario:oid});
    }));
  }).then(function(){
    showToast('✅ Aplicación asignada'+(aplic.esExtra?' como hora extra':'')+'. Inventario descontado, pendiente de validar.');
    renderAplicacionesEstatus();

function chequearVencimientosProveedores(){
  var hoy=fechaHoyLocal();
  var limite=new Date(); limite.setDate(limite.getDate()+5);
  var limiteStr=limite.toISOString().slice(0,10);
  from('compras').select('*,proveedor:proveedores(nombre)').eq('forma_pago','credito').eq('estado_pago','pendiente').eq('notificado_vencimiento',false).lte('fecha_vencimiento',limiteStr).get().then(function(rows){
    (rows||[]).forEach(function(c){
      var vencido=c.fecha_vencimiento<hoy;
      var provNombre=c.proveedor?c.proveedor.nombre:'un proveedor';
      var msg=(vencido?'⚠️ Ya venció el pago a ':'⏳ Está por vencer el pago a ')+provNombre+': $'+parseFloat(c.total).toFixed(2)+' — vence '+c.fecha_vencimiento+(c.numero_factura?' (factura '+c.numero_factura+')':'');
      from('notificaciones').insert({titulo:vencido?'⚠️ Pago a proveedor vencido':'⏳ Pago a proveedor por vencer',cuerpo:msg,icono:'💳',leida:false,para_rol:'encargado'}).then(function(){
        return from('compras').eq('id',c.id).update({notificado_vencimiento:true});
      }).catch(function(){});
    });
  }).catch(function(){});
}

    var cantEjemplo=(conPaquete&&f.modoCaptura==='paquete')?('Ej: si compraste 7 '+it.unidad_compra.toLowerCase()+'s, escribe 7.'):'';
    var equivTxt=(conPaquete&&f.modoCaptura==='paquete'&&parseFloat(f.cantidad)>0)?('= '+numFmt(parseFloat(f.cantidad)*parseFloat(it.factor_compra))+' '+it.unidad+' en total'):'';
    var esActivo=!!CATEGORIA_GASTO_A_ACTIVO[f.categoria];
    var buscadorProductoHtml=grupoCat?('<div class="form-group" style="margin-bottom:.5rem;"><label>Producto de '+GRUPOS_INVENTARIO[grupoCat].lbl+' (opcional)</label><div class="fcomp-item-wrap" data-row="'+f.row+'" style="position:relative;"><input type="text" class="fcomp-item-buscar nc-item-buscar" data-row="'+f.row+'" autocomplete="off" placeholder="🔍 Buscar producto..." value="'+(f.itemNombre?f.itemNombre.replace(/"/g,'&quot;'):'')+'"><div class="fcomp-item-resultados nc-item-resultados" data-row="'+f.row+'" style="display:none;position:absolute;left:0;right:0;top:100%;z-index:30;background:#fff;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);max-height:220px;overflow-y:auto;box-shadow:0 6px 16px rgba(0,0,0,.15);"></div></div></div>'):'';
    var activoHtml=esActivo?('<div class="form-group" style="margin-bottom:.5rem;"><label>Nombre de la '+(f.categoria==='herramientas'?'herramienta':'equipo')+' (opcional)</label><input type="text" class="nc-activo-nombre" data-row="'+f.row+'" value="'+(f.activoNombre?f.activoNombre.replace(/"/g,'&quot;'):'')+'" placeholder="Ej. Tijera de poda larga"><p class="hint" style="margin:.3rem 0 0;">Si la llenas, se agrega automáticamente a '+(f.categoria==='herramientas'?'🧰 Herramientas':'⚙️ Equipos')+' como disponible.</p></div>'):'';
    return '<div class="form-card" style="margin-bottom:.5rem;padding:.75rem;" data-row="'+f.row+'">'+
      '<div class="form-group" style="margin-bottom:.5rem;"><label>Categoría</label><select class="nc-cat" data-row="'+f.row+'">'+catOpts+'</select></div>'+
      buscadorProductoHtml+
      activoHtml+
      (tieneItem?(modoTogglesHtml+'<div class="form-group" style="margin-bottom:.2rem;"><label>Cantidad que entra a inventario ('+cantLbl+')</label><input type="number" class="nc-cantidad" data-row="'+f.row+'" min="0" step="any" value="'+(f.cantidad||'')+'" placeholder="0">'+(cantEjemplo?'<p class="hint" style="margin:.3rem 0 0;">'+cantEjemplo+'</p>':'')+'</div><p class="hint nc-equiv" data-row="'+f.row+'" style="margin:0 0 .5rem;font-weight:700;color:var(--verde-mid);">'+equivTxt+'</p>'):'')+
      '<div class="form-group" style="margin-bottom:.5rem;"><label>Monto ($)</label><input type="number" class="nc-monto" data-row="'+f.row+'" min="0" step="any" value="'+(f.monto||'')+'" placeholder="0.00"></div>'+
      '<div class="form-group" style="margin-bottom:0;"><label>Concepto / descripción (opcional)</label><input type="text" class="nc-concepto" data-row="'+f.row+'" value="'+(f.concepto?f.concepto.replace(/"/g,'&quot;'):'')+'" placeholder="Ej. Sulfato de amonio 25kg"></div>'+
      (filas.length>1?'<button type="button" class="nc-quitar" data-row="'+f.row+'" style="border:none;background:none;color:var(--rojo);font-size:.78rem;font-weight:600;cursor:pointer;margin-top:.5rem;">🗑️ Quitar producto</button>':'')+
      '</div>';
  }

  function pintarItemsCompra(){
    var cont=document.getElementById('nc-items');
    cont.innerHTML=filas.map(pintarFilaCompra).join('');
    cont.querySelectorAll('.nc-cat').forEach(function(sel){
      sel.addEventListener('change',function(){
        var rid=this.dataset.row, val=this.value;
        var f=filas.find(function(x){return x.row==rid;});
        if(f){
          f.categoria=val;
          f.itemId='';
          f.itemNombre='';
          f.modoCaptura='base';
          f.cantidad='';
        }
        pintarItemsCompra();
      });
    });
    cont.querySelectorAll('.nc-modo-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var rid=this.dataset.row, modo=this.dataset.modo;
        var f=filas.find(function(x){return x.row==rid;});
        if(f){ f.modoCaptura=modo; f.cantidad=''; }
        pintarItemsCompra();
      });
    });
    cont.querySelectorAll('.nc-cantidad').forEach(function(inp){
      inp.addEventListener('input',function(){
        var rid=this.dataset.row, val=this.value;
        var f=filas.find(function(x){return x.row==rid;});
        if(f) f.cantidad=val;
        var eq=cont.querySelector('.nc-equiv[data-row="'+rid+'"]');
        if(eq&&f){
          var it=cats.inventario.find(function(x){return x.id===f.itemId;});
          if(it&&f.modoCaptura==='paquete'&&parseFloat(val)>0){
            eq.textContent='= '+numFmt(parseFloat(val)*parseFloat(it.factor_compra))+' '+it.unidad+' en total';
          } else {
            eq.textContent='';
          }
        }
      });
    });
    cont.querySelectorAll('.nc-monto').forEach(function(inp){
      inp.addEventListener('input',function(){
        var rid=this.dataset.row, val=this.value;
        var f=filas.find(function(x){return x.row==rid;});
        if(f) f.monto=val;
        calcularTotal();
      });
    });
    cont.querySelectorAll('.nc-concepto').forEach(function(inp){
      inp.addEventListener('input',function(){
        var rid=this.dataset.row, val=this.value;
        var f=filas.find(function(x){return x.row==rid;});
        if(f) f.concepto=val;
      });
    });
    cont.querySelectorAll('.nc-activo-nombre').forEach(function(inp){
      inp.addEventListener('input',function(){
        var rid=this.dataset.row, val=this.value;
        var f=filas.find(function(x){return x.row==rid;});
        if(f) f.activoNombre=val;
      });
    });
    cont.querySelectorAll('.nc-quitar').forEach(function(btn){
      btn.addEventListener('click',function(){
        var rid=this.dataset.row;
        filas=filas.filter(function(f){return f.row!=rid;});
        pintarItemsCompra();
      });
    });
    cont.querySelectorAll('.nc-item-buscar').forEach(function(inp){
      inp.addEventListener('focus',function(){pintarResultadosNC(this.dataset.row,this.value);});
      inp.addEventListener('input',function(){pintarResultadosNC(this.dataset.row,this.value);});
      inp.addEventListener('blur',function(){
        var rid=this.dataset.row, inputEl=this;
        setTimeout(function(){
          var resWrap=cont.querySelector('.nc-item-resultados[data-row="'+rid+'"]');
          if(resWrap) resWrap.style.display='none';
          var fila=filas.find(function(f){return f.row==rid;});
          inputEl.value=fila&&fila.itemNombre?fila.itemNombre:'';
        },150);
      });
    });
    calcularTotal();
  }
  pintarItemsCompra();

  document.getElementById('nc-agregar-btn').addEventListener('click',function(){
    filas.push(nuevaFilaCompra());
    pintarItemsCompra();
  });

  var formaPagoSel='contado';
  function actualizarVisibilidadVencimiento(){
    document.getElementById('nc-vencimiento-wrap').style.display=formaPagoSel==='credito'?'':'none';
  }
  document.getElementById('nc-fp-contado').addEventListener('click',function(){formaPagoSel='contado';this.classList.add('sel');this.textContent='✓ Contado';document.getElementById('nc-fp-credito').classList.remove('sel');document.getElementById('nc-fp-credito').textContent='Crédito';actualizarVisibilidadVencimiento();});
  document.getElementById('nc-fp-credito').addEventListener('click',function(){formaPagoSel='credito';this.classList.add('sel');this.textContent='✓ Crédito';document.getElementById('nc-fp-contado').classList.remove('sel');document.getElementById('nc-fp-contado').textContent='Contado';actualizarVisibilidadVencimiento();});
  document.getElementById('nc-proveedor').addEventListener('change',function(){
    var provId=this.value;
    document.getElementById('nc-prov-nuevo-wrap').style.display=provId==='_nuevo'?'':'none';
    var prov=cats.proveedores.find(function(p){return p.id===provId;});
    if(prov&&prov.forma_pago_default==='credito'){
      document.getElementById('nc-fp-credito').click();
      if(prov.plazo_dias_default){
        var fechaBase=document.getElementById('nc-fecha').value||hoy;
        var d=new Date(fechaBase+'T00:00:00'); d.setDate(d.getDate()+prov.plazo_dias_default);
        document.getElementById('nc-vencimiento').value=d.toISOString().slice(0,10);
      }
    }
  });
  document.getElementById('nc-comprobante').addEventListener('change',function(){
    var f=this.files[0];
    if(!f) return;
    var status=document.getElementById('nc-comprobante-status');
    status.textContent='Subiendo...';
    subirComprobanteGasto(f).then(function(url){
      comprobanteUrl=url;
      status.textContent='✅ Comprobante adjuntado';
    }).catch(function(e){status.textContent='Error al subir: '+e.message;});
  });

  document.getElementById('nc-guardar').addEventListener('click',function(){
    var btn=this;
    var fecha=document.getElementById('nc-fecha').value||hoy;
    var numeroFactura=(document.getElementById('nc-factura').value||'').trim()||null;
    var proveedorSel=document.getElementById('nc-proveedor').value;
    var esCredito=formaPagoSel==='credito';
    var vencimiento=esCredito?(document.getElementById('nc-vencimiento').value||null):null;
    if(esCredito&&!vencimiento){alert('Captura la fecha de vencimiento del pago a crédito.');return;}
    var lineas=filas.filter(function(f){return (parseFloat(f.monto)||0)>0;});
    if(!lineas.length){alert('Captura el monto de al menos un producto.');return;}
    for(var i=0;i<lineas.length;i++){
      if(lineas[i].itemId&&!(cantidadBaseDe(lineas[i])>0)){
        alert('Captura la cantidad que entra a inventario para "'+lineas[i].itemNombre+'", o quita el producto de inventario si no aplica.');
        return;
      }
    }
    var total=lineas.reduce(function(s,f){return s+(parseFloat(f.monto)||0);},0);
    btn.disabled=true; btn.textContent='Guardando...';

    function resolverProveedor(){
      if(proveedorSel==='_nuevo'){
        var nombre=(document.getElementById('nc-prov-nombre').value||'').trim();
        if(!nombre) return Promise.resolve(null);
        var giro=(document.getElementById('nc-prov-giro').value||'').trim()||null;
        var tel=(document.getElementById('nc-prov-tel').value||'').trim()||null;
        return from('proveedores').insert({nombre:nombre,giro:giro,telefono:tel,activo:true}).then(function(rows){
          var nuevo=rows[0];
          cats.proveedores.push(nuevo);
          cats.proveedores.sort(function(a,b){return a.nombre.localeCompare(b.nombre);});
          return nuevo.id;
        });
      }
      return Promise.resolve(proveedorSel||null);
    }

    resolverProveedor().then(function(proveedorId){
      var compraPayload={proveedor_id:proveedorId,numero_factura:numeroFactura,fecha:fecha,forma_pago:formaPagoSel,fecha_vencimiento:vencimiento,estado_pago:esCredito?'pendiente':'pagado',notificado_vencimiento:false,comprobante_url:comprobanteUrl,total:total,registrado_por:usuario.id};
      return from('compras').insert(compraPayload).then(function(rows){
        var compra=rows[0];
        var gastoPayloads=lineas.map(function(f){
          return {categoria:f.categoria,monto:parseFloat(f.monto),fecha:fecha,proveedor_id:proveedorId,concepto:f.concepto||null,inventario_item_id:f.itemId||null,cantidad:f.itemId?cantidadBaseDe(f):null,comprobante_url:comprobanteUrl,registrado_por:usuario.id,forma_pago:formaPagoSel,fecha_vencimiento:vencimiento,estado_pago:esCredito?'pendiente':'pagado',notificado_vencimiento:false,compra_id:compra.id};
        });
        return from('gastos').insert(gastoPayloads).then(function(){ return lineas; });
      });
    }).then(function(lineasGuardadas){
      var conStock=lineasGuardadas.filter(function(f){return f.itemId&&cantidadBaseDe(f)>0;});
      return conStock.reduce(function(p,f){
        return p.then(function(){
          var it=cats.inventario.find(function(x){return x.id===f.itemId;});
          if(!it) return;
          var stockAntes=it.stock_actual;
          var cant=cantidadBaseDe(f);
          var nuevoStock=stockAntes+cant;
          var motivoPaquete=(f.modoCaptura==='paquete'&&tienePaqueteItem(it))?(numFmt(parseFloat(f.cantidad)||0)+' '+it.unidad_compra+(it.unidad_compra.slice(-1)!=='s'&&parseFloat(f.cantidad)!=1?'s':'')+' de '+numFmt(it.factor_compra)+' '+it.unidad+' c/u'):null;
          var motivo='Compra'+(motivoPaquete?(' · '+motivoPaquete):'')+(f.concepto?' · '+f.concepto:'');
          return from('movimientos_inventario').insert({item_id:it.id,tipo:'entrada',cantidad:cant,motivo:motivo,usuario_id:usuario.id,stock_anterior:stockAntes,stock_posterior:nuevoStock}).then(function(){
            return from('inventario_items').eq('id',it.id).update({stock_actual:nuevoStock});
          }).then(function(){ it.stock_actual=nuevoStock; });
        });
      }, Promise.resolve()).then(function(){
        var conActivo=lineasGuardadas.filter(function(f){return CATEGORIA_GASTO_A_ACTIVO[f.categoria]&&(f.activoNombre||'').trim();});
        if(!conActivo.length) return;
        return Promise.all(conActivo.map(function(f){
          return from('activos_rancho').insert({nombre:f.activoNombre.trim(),categoria:CATEGORIA_GASTO_A_ACTIVO[f.categoria],estado:'disponible',descripcion:f.concepto||null,activo:true});
        }));
      });
    }).then(function(){
      showToast('✅ Compra registrada');
      renderComprasMenu();
    }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Registrar compra';});
  });
}

function renderProveedores(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">🏢 Proveedores</div><div class="loading">Cargando...</div>';
  from('proveedores').select('*').order('nombre').get().then(function(rows){
    rows=(rows||[]).slice().sort(function(a,b){return (b.activo?1:0)-(a.activo?1:0)||a.nombre.localeCompare(b.nombre);});
    var headerHtml='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">🏢 Proveedores<button type="button" onclick="renderComprasMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Compras y Gastos</button></div>';
    var html=headerHtml+'<button class="btn-primary" id="prov-nuevo-btn" style="margin-bottom:1rem;">+ Nuevo proveedor</button>';
    if(!rows.length){
      html+='<div class="empty">Aún no tienes proveedores registrados.</div>';
    } else {
      html+=rows.map(function(p){
        var fpTxt=p.forma_pago_default==='credito'?('💳 Crédito'+(p.plazo_dias_default?' a '+p.plazo_dias_default+' días':'')):'💵 Contado';
        return '<div class="orden-card"'+(p.activo?'':' style="opacity:.55;"')+'><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem;">'+p.nombre+(p.activo?'':' (inactivo)')+'</strong><button type="button" class="btn-sm" style="background:var(--gris-1);color:var(--negro);" data-editar-prov="'+p.id+'">✏️ Editar</button></div><div class="orden-meta">'+(p.giro?p.giro+' · ':'')+fpTxt+(p.telefono?' · 📞 '+p.telefono:'')+'</div></div>';
      }).join('');
    }
    body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderComprasMenu()">← Volver</button>';
    document.getElementById('prov-nuevo-btn').addEventListener('click',function(){renderProveedorForm(null);});
    body.querySelectorAll('[data-editar-prov]').forEach(function(btn){
      btn.addEventListener('click',function(){renderProveedorForm(this.dataset.editarProv);});
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderProveedorForm(id){
  var body=document.getElementById('enc-body');
  var esNuevo=!id;
  var p=esNuevo?null:cats.proveedores.find(function(x){return x.id===id;});
  function pintar(pv){
    body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">'+(esNuevo?'+ Nuevo proveedor':'✏️ Editar proveedor')+'<button type="button" onclick="renderProveedores()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Proveedores</button></div>'+
      '<div class="form-card">'+
      '<div class="form-group"><label>Nombre</label><input type="text" id="pf-nombre" value="'+(pv?pv.nombre:'')+'" placeholder="Ej. Agroquímicos del Valle"></div>'+
      '<div class="form-group"><label>¿A qué se dedica?</label><input type="text" id="pf-giro" value="'+(pv&&pv.giro?pv.giro:'')+'" placeholder="Ej. Fertilizantes y agroquímicos"></div>'+
      '<div class="form-group"><label>Teléfono (opcional)</label><input type="text" id="pf-tel" value="'+(pv&&pv.telefono?pv.telefono:'')+'" placeholder="Ej. 555-123-4567"></div>'+
      '<div class="form-group"><label>Notas (opcional)</label><input type="text" id="pf-notas" value="'+(pv&&pv.notas?pv.notas:'')+'"></div>'+
      '<div class="form-group"><label>Forma de pago habitual</label><div style="display:flex;gap:8px;"><button type="button" class="op-chip'+((!pv||pv.forma_pago_default==='contado')?' sel':'')+'" id="pf-fp-contado">'+((!pv||pv.forma_pago_default==='contado')?'✓ ':'')+'Contado</button><button type="button" class="op-chip'+(pv&&pv.forma_pago_default==='credito'?' sel':'')+'" id="pf-fp-credito">'+(pv&&pv.forma_pago_default==='credito'?'✓ ':'')+'Crédito</button></div></div>'+
      '<div class="form-group" id="pf-plazo-wrap" style="display:'+(pv&&pv.forma_pago_default==='credito'?'':'none')+';"><label>Plazo de pago habitual (días)</label><input type="number" id="pf-plazo" min="0" step="1" value="'+(pv&&pv.plazo_dias_default?pv.plazo_dias_default:'')+'" placeholder="Ej. 30"><p class="hint">Con esto Mootsil te avisa 5 días antes de que venza cada compra a crédito con este proveedor.</p></div>'+
      (esNuevo?'':'<div class="form-group"><label>Estado</label><div style="display:flex;gap:8px;"><button type="button" class="op-chip'+(pv&&pv.activo?' sel':'')+'" id="pf-activo-si">'+(pv&&pv.activo?'✓ ':'')+'Activo</button><button type="button" class="op-chip'+(pv&&!pv.activo?' sel':'')+'" id="pf-activo-no">'+(pv&&!pv.activo?'✓ ':'')+'Inactivo</button></div></div>')+
      '<button class="btn-primary" id="pf-guardar">Guardar</button>'+
      '</div><button class="btn-back" style="margin-top:1rem;" onclick="renderProveedores()">← Volver</button>';
    var activo=esNuevo?true:(pv?pv.activo:true);
    var formaPagoDefault=(pv&&pv.forma_pago_default==='credito')?'credito':'contado';
    if(!esNuevo){
      document.getElementById('pf-activo-si').addEventListener('click',function(){activo=true;this.classList.add('sel');this.textContent='✓ Activo';document.getElementById('pf-activo-no').classList.remove('sel');document.getElementById('pf-activo-no').textContent='Inactivo';});
      document.getElementById('pf-activo-no').addEventListener('click',function(){activo=false;this.classList.add('sel');this.textContent='✓ Inactivo';document.getElementById('pf-activo-si').classList.remove('sel');document.getElementById('pf-activo-si').textContent='Activo';});
    }
    document.getElementById('pf-fp-contado').addEventListener('click',function(){formaPagoDefault='contado';this.classList.add('sel');this.textContent='✓ Contado';document.getElementById('pf-fp-credito').classList.remove('sel');document.getElementById('pf-fp-credito').textContent='Crédito';document.getElementById('pf-plazo-wrap').style.display='none';});
    document.getElementById('pf-fp-credito').addEventListener('click',function(){formaPagoDefault='credito';this.classList.add('sel');this.textContent='✓ Crédito';document.getElementById('pf-fp-contado').classList.remove('sel');document.getElementById('pf-fp-contado').textContent='Contado';document.getElementById('pf-plazo-wrap').style.display='';});
    document.getElementById('pf-guardar').addEventListener('click',function(){
      var btn=this;
      var nombre=(document.getElementById('pf-nombre').value||'').trim();
      if(!nombre){alert('Captura el nombre del proveedor.');return;}
      var giro=(document.getElementById('pf-giro').value||'').trim()||null;
      var tel=(document.getElementById('pf-tel').value||'').trim()||null;
      var notas=(document.getElementById('pf-notas').value||'').trim()||null;
      var plazoDias=formaPagoDefault==='credito'?(parseInt(document.getElementById('pf-plazo').value)||null):null;
      btn.disabled=true; btn.textContent='Guardando...';
      var payload={nombre:nombre,giro:giro,telefono:tel,notas:notas,activo:activo,forma_pago_default:formaPagoDefault,plazo_dias_default:plazoDias};
      var accion=esNuevo?from('proveedores').insert(payload):from('proveedores').eq('id',id).update(payload);
      accion.then(function(){
        return from('proveedores').select('*').eq('activo',true).order('nombre').get();
      }).then(function(rows){
        cats.proveedores=rows||[];
        showToast('✅ Proveedor guardado');
        renderProveedores();
      }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Guardar';});
    });
  }
  if(esNuevo||p) pintar(p);
  else {
    from('proveedores').select('*').eq('id',id).get().then(function(rows){pintar(rows&&rows[0]);}).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
  }
}

function agruparGastosPorCompra(rows){
  var grupos={}, orden=[];
  (rows||[]).forEach(function(g){
    var key=g.compra_id||('_g_'+g.id);
    if(!grupos[key]){
      grupos[key]={
        compraId:g.compra_id||null,
        proveedorNombre:g.proveedor?g.proveedor.nombre:'Sin proveedor',
        fecha:g.fecha,
        numeroFactura:(g.compra&&g.compra.numero_factura)?g.compra.numero_factura:null,
        formaPago:g.forma_pago,
        estadoPago:g.estado_pago,
        fechaVencimiento:g.fecha_vencimiento,
        comprobanteUrl:g.comprobante_url,
        total:0,
        items:[]
      };
      orden.push(key);
    }
    grupos[key].total+=parseFloat(g.monto)||0;
    grupos[key].items.push(g);
  });
  return orden.map(function(k){return grupos[k];}).sort(function(a,b){return a.fecha<b.fecha?1:(a.fecha>b.fecha?-1:0);});
}

function pintarGrupoCompraCard(grp){
  var hoy=fechaHoyLocal();
  var vencido=grp.formaPago==='credito'&&grp.estadoPago==='pendiente'&&grp.fechaVencimiento&&grp.fechaVencimiento<hoy;
  var fpTxt=grp.formaPago==='credito'?('💳 Crédito · '+(grp.estadoPago==='pagado'?'✅ Pagado':('⏳ Pendiente'+(grp.fechaVencimiento?' (vence '+grp.fechaVencimiento+')':'')))):'💵 Contado';
  var itemsHtml=grp.items.map(function(g){
    var cat=GASTO_CATEGORIAS[g.categoria]||{ic:'💵',lbl:g.categoria};
    var desc=g.item?(numFmt(g.cantidad)+' '+g.item.unidad+' de '+g.item.nombre):(g.concepto||cat.lbl);
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--gris-1);font-size:.82rem;"><span>'+cat.ic+' '+desc+'</span><span style="display:flex;align-items:center;gap:6px;"><strong>$'+parseFloat(g.monto).toFixed(2)+'</strong><button type="button" class="btn-borrar-linea-gasto" data-id="'+g.id+'" style="border:none;background:none;color:var(--rojo);font-size:.85rem;cursor:pointer;">✕</button></span></div>';
  }).join('');
  return '<div class="orden-card" style="border-left-color:'+(vencido?'var(--rojo)':'var(--verde-mid)')+';"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.92rem;">🧾 '+grp.proveedorNombre+'</strong><strong style="font-size:1rem;color:var(--verde-mid);">$'+grp.total.toFixed(2)+'</strong></div><div class="orden-meta">📅 '+grp.fecha+' · '+fpTxt+(grp.numeroFactura?' · Factura #'+grp.numeroFactura:'')+'</div>'+(grp.comprobanteUrl?'<div class="orden-meta"><a href="'+grp.comprobanteUrl+'" target="_blank">🧾 Ver comprobante</a></div>':'')+'<div style="margin-top:.5rem;">'+itemsHtml+'</div>'+(grp.compraId&&grp.formaPago==='credito'&&grp.estadoPago==='pendiente'?'<button type="button" class="btn-sm btn-completar" style="margin-top:.5rem;" data-marcar-pagado="'+grp.compraId+'">✅ Marcar como pagado</button>':'')+'</div>';
}

function wireEventosGruposCompra(container,refrescarFn){
  container.querySelectorAll('.btn-borrar-linea-gasto').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(!confirm('¿Eliminar este producto de la compra? Si generó una entrada de inventario, el stock no se revierte automáticamente.')) return;
      from('gastos').eq('id',this.dataset.id).delete().then(function(){showToast('🗑️ Eliminado');refrescarFn();}).catch(function(e){alert('Error: '+e.message);});
    });
  });
  container.querySelectorAll('[data-marcar-pagado]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var compraId=this.dataset.marcarPagado;
      from('compras').eq('id',compraId).update({estado_pago:'pagado'}).then(function(){
        return from('gastos').eq('compra_id',compraId).update({estado_pago:'pagado'});
      }).then(function(){showToast('✅ Marcado como pagado');refrescarFn();}).catch(function(e){alert('Error: '+e.message);});
    });
  });
}

function renderResumenGastos(mesStr){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">📊 Resumen del mes</div><div class="loading">Cargando...</div>';
  var inicio=mesStr+'-01';
  var finD=new Date(inicio+'T00:00:00'); finD.setMonth(finD.getMonth()+1); finD.setDate(0);
  var fin=finD.toISOString().slice(0,10);
  Promise.all([
    from('gastos').select('*').gte('fecha',inicio).lte('fecha',fin).get(),
    from('pagos_semana_estado').select('monto_pagado,semana_inicio').eq('estado','pagado').gte('semana_inicio',inicio).lte('semana_inicio',fin).get(),
    from('pagos_extra_estado').select('monto_pagado,semana_inicio').eq('estado','pagado').gte('semana_inicio',inicio).lte('semana_inicio',fin).get(),
    from('pagos_eventuales').select('monto,fecha').gte('fecha',inicio).lte('fecha',fin).get()
  ]).then(function(r){
    var gastos=r[0]||[], sueldos=r[1]||[], extras=r[2]||[], eventuales=r[3]||[];
    var porCategoria={};
    Object.keys(GASTO_CATEGORIAS).forEach(function(k){porCategoria[k]=0;});
    gastos.forEach(function(g){porCategoria[g.categoria]=(porCategoria[g.categoria]||0)+parseFloat(g.monto);});
    var totalGastos=gastos.reduce(function(s,g){return s+parseFloat(g.monto);},0);
    var totalSueldos=sueldos.reduce(function(s,p){return s+parseFloat(p.monto_pagado||0);},0);
    var totalExtras=extras.reduce(function(s,p){return s+parseFloat(p.monto_pagado||0);},0);
    var totalEventuales=eventuales.reduce(function(s,p){return s+parseFloat(p.monto||0);},0);
    var totalNomina=totalSueldos+totalExtras+totalEventuales;
    var granTotal=totalGastos+totalNomina;
    var mesLbl=new Date(inicio+'T00:00:00').toLocaleDateString('es-MX',{month:'long',year:'numeric'});
    var headerHtml='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">📊 Resumen del mes<button type="button" onclick="renderComprasMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Compras y Gastos</button></div>';
    var html=headerHtml+'<div class="form-group" style="margin-bottom:.75rem;"><label>Mes</label><input type="month" id="rg-mes" value="'+mesStr+'"></div>';
    html+='<div class="form-card" style="text-align:center;margin-bottom:1rem;"><div style="font-size:.8rem;color:var(--gris-3);text-transform:capitalize;">Total general en '+mesLbl+'</div><div style="font-size:1.8rem;font-weight:800;color:var(--verde-mid);">$'+granTotal.toFixed(2)+'</div></div>';
    html+='<div class="seccion-titulo" style="margin-top:0;">🛒 Compras y gastos — $'+totalGastos.toFixed(2)+'</div>';
    html+=Object.keys(GASTO_CATEGORIAS).map(function(k){
      var c=GASTO_CATEGORIAS[k];
      return '<div class="resumen-row"><span class="resumen-key">'+c.ic+' '+c.lbl+'</span><span class="resumen-val">$'+porCategoria[k].toFixed(2)+'</span></div>';
    }).join('');
    html+='<div class="seccion-titulo">👥 Nómina — $'+totalNomina.toFixed(2)+'</div>';
    html+='<div class="resumen-row"><span class="resumen-key">💰 Sueldos (Labores)</span><span class="resumen-val">$'+totalSueldos.toFixed(2)+'</span></div>';
    html+='<div class="resumen-row"><span class="resumen-key">⏰ Horas extra</span><span class="resumen-val">$'+totalExtras.toFixed(2)+'</span></div>';
    html+='<div class="resumen-row"><span class="resumen-key">🧑‍🌾 Labores Eventual</span><span class="resumen-val">$'+totalEventuales.toFixed(2)+'</span></div>';
    html+='<p class="hint" style="margin-top:.75rem;">La nómina se toma de lo ya marcado como pagado en Nóminas y de los pagos a eventuales; no incluye préstamos entregados ni nómina aún pendiente de pagar.</p>';
    body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderComprasMenu()">← Volver</button>';
    document.getElementById('rg-mes').addEventListener('change',function(){renderResumenGastos(this.value);});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});

function renderOrdenCompra(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">🛒 Orden de compra</div><div class="loading">Calculando...</div>';
  var hoy=fechaHoyLocal();
  var en30=new Date(); en30.setDate(en30.getDate()+30);
  var en30str=en30.toISOString().slice(0,10);
  Promise.all([
    from('inventario_items').select('*').eq('activo',true).get(),
    from('formula_componentes').select('*,item:inventario_items!item_id(nombre,unidad),formula:formulas_aplicacion(nombre,activo)').eq('estado_faltante','pendiente').get()
  ]).then(function(r){
    var items=r[0]||[], pendientes=(r[1]||[]).filter(function(c){return c.formula&&c.formula.activo;});
    var necesidadPorItem={};
    items.forEach(function(it){
      if(it.stock_actual<=it.stock_minimo){
        necesidadPorItem[it.id]={item:it,cantidad:Math.max(0,it.stock_minimo-it.stock_actual),motivos:['Stock bajo mínimo']};
      }
    });
    pendientes.forEach(function(c){
      if(!c.item) return;
      var falta=c.faltante_detectado||0;
      if(falta<=0) return;
      if(!necesidadPorItem[c.item_id]) necesidadPorItem[c.item_id]={item:items.find(function(i){return i.id===c.item_id;})||c.item,cantidad:0,motivos:[]};
      necesidadPorItem[c.item_id].cantidad=Math.max(necesidadPorItem[c.item_id].cantidad,falta);
      necesidadPorItem[c.item_id].motivos.push('Fórmula "'+(c.formula?c.formula.nombre:'')+'"');
    });
    var listaComprar=Object.values(necesidadPorItem);
    var porCaducar=items.filter(function(it){return it.fecha_caducidad&&it.fecha_caducidad<=en30str;}).sort(function(a,b){return a.fecha_caducidad.localeCompare(b.fecha_caducidad);});

    var html='<div class="seccion-titulo">🛒 Orden de compra</div>';
    if(!listaComprar.length&&!porCaducar.length){
      html+='<div class="empty">🎉 No hay nada urgente que comprar ni productos por caducar.</div>';
      body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderAdministracionMenu()">← Volver a Administración</button>';
      return;
    }
    if(listaComprar.length){
      html+='<p class="hint" style="margin-bottom:.5rem;">Ajusta la cantidad si vas a pedir más o menos de lo sugerido. Desmarca lo que no vas a pedir esta vez.</p>';
      html+=listaComprar.map(function(n,idx){
        return '<div class="orden-card" style="display:flex;align-items:center;gap:.6rem;"><input type="checkbox" class="oc-check" data-idx="'+idx+'" checked style="width:22px;height:22px;flex-shrink:0;"><div style="flex:1;"><strong style="font-size:.88rem;">'+n.item.nombre+'</strong><div class="orden-meta">Sugerido: '+fmtAmigable(n.cantidad,n.item.unidad)+' · '+n.motivos.join(', ')+'</div></div><div style="display:flex;align-items:center;gap:4px;flex-shrink:0;"><input type="number" class="oc-cantidad" data-idx="'+idx+'" value="'+numFmt(n.cantidad)+'" min="0" step="any" style="width:75px;padding:.4rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;text-align:right;"><span style="font-size:.78rem;color:var(--gris-3);">'+n.item.unidad+'</span></div></div>';
      }).join('');
    }
    if(porCaducar.length){
      html+='<div class="seccion-titulo" style="margin-top:1.25rem;">📅 Por caducar (próximos 30 días)</div>';
      html+=porCaducar.map(function(it){
        var vencido=it.fecha_caducidad<hoy;
        return '<div class="orden-card" style="border-left-color:'+(vencido?'var(--rojo)':'var(--tierra)')+';"><strong style="font-size:.88rem;">'+it.nombre+'</strong><div class="orden-meta">'+(vencido?'⚠️ Ya venció el ':'Caduca el ')+it.fecha_caducidad+' · Stock: '+numFmt(it.stock_actual)+' '+it.unidad+'</div></div>';
      }).join('');
    }
    if(listaComprar.length) html+='<button class="btn-primary" id="oc-pdf" style="margin-top:1.25rem;">📄 Generar PDF para el proveedor</button><p class="hint" style="text-align:center;margin-top:.4rem;" id="oc-pdf-status"></p>';
    html+='<button class="btn-back" style="margin-top:1rem;" onclick="renderAdministracionMenu()">← Volver a Administración</button>';
    body.innerHTML=html;
    var btnPdf=document.getElementById('oc-pdf');
    if(btnPdf) btnPdf.addEventListener('click',function(){
      var seleccionados=Array.from(document.querySelectorAll('.oc-check:checked')).map(function(chk){
        var idx=chk.dataset.idx;
        var n=listaComprar[idx];
        var cantInput=document.querySelector('.oc-cantidad[data-idx="'+idx+'"]');
        var cant=parseFloat(cantInput.value)||0;
        return {nombre:n.item.nombre,cantidad:cant,unidad:n.item.unidad};
      }).filter(function(x){return x.cantidad>0;});
      if(!seleccionados.length){alert('Marca al menos un producto con cantidad mayor a 0.');return;}
      generarPdfOrdenCompra(seleccionados);
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function cargarJsPDF(cb){
  if(window.jspdf){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  s.onload=function(){cb();};
  s.onerror=function(){document.getElementById('oc-pdf-status').textContent='No se pudo cargar el generador de PDF. Revisa tu conexión.';};
  document.head.appendChild(s);
}

function generarPdfOrdenCompra(productos){
  var status=document.getElementById('oc-pdf-status');
  if(status) status.textContent='Generando PDF...';
  cargarJsPDF(function(){
    try{
      var jsPDF=window.jspdf.jsPDF;
      var doc=new jsPDF();
      var hoy=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});
      doc.setFontSize(18); doc.text('Mootsil — Orden de Compra',14,20);
      doc.setFontSize(10); doc.setTextColor(100); doc.text('Fecha: '+hoy,14,28);
      doc.setTextColor(0);
      var y=42;
      doc.setFontSize(11);
      doc.setFont(undefined,'bold');
      doc.text('Producto',14,y); doc.text('Cantidad',140,y); doc.text('Unidad',175,y);
      doc.setFont(undefined,'normal');
      doc.line(14,y+2,196,y+2);
      y+=10;
      productos.forEach(function(p){
        if(y>270){doc.addPage();y=20;}
        doc.text(p.nombre,14,y,{maxWidth:120});
        doc.text(numFmt(p.cantidad),140,y);
        doc.text(p.unidad,175,y);
        y+=9;
      });
      y+=6;
      doc.line(14,y,196,y);
      y+=10;
      doc.setFontSize(9); doc.setTextColor(120);
      doc.text('Proveedor: _______________________________     Fecha de entrega esperada: ______________',14,y);
      doc.save('orden_compra_'+fechaHoyLocal()+'.pdf');
      if(status) status.textContent='✅ PDF descargado';
    }catch(e){
      if(status) status.textContent='Error al generar el PDF: '+e.message;
    }
  });
}

function renderControlAsistencias(fecha){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">📋 Control de Asistencias</div><div class="loading">Cargando...</div>';
  var hoy=fechaHoyLocal();
  var operariosTodos=cats.operarios.concat(cats.cosechadores||[]).concat(cats.eventuales||[]);
  var idsUnicos={}; operariosTodos=operariosTodos.filter(function(o){if(idsUnicos[o.id])return false;idsUnicos[o.id]=true;return true;});
  Promise.all([
    from('asistencia_registros').select('*').eq('fecha',fecha).eq('modalidad','labores').get(),
    from('permisos').select('*').eq('estado','aprobado').lte('fecha_inicio',fecha).gte('fecha_fin',fecha).get()
  ]).then(function(rr){
    var rows=rr[0]||[];
    var permisosDelDia=rr[1]||[];
    var permisoPorOperario={}; permisosDelDia.forEach(function(p){permisoPorOperario[p.usuario_id]=p;});
    var porOperario={};
    rows.forEach(function(r){
      if(!porOperario[r.usuario_id]) porOperario[r.usuario_id]={entrada:null,salida:null,retardo:false};
      if(r.tipo==='entrada'&&(!porOperario[r.usuario_id].entrada||r.registrado_en<porOperario[r.usuario_id].entrada)){porOperario[r.usuario_id].entrada=r.registrado_en;porOperario[r.usuario_id].retardo=!!r.retardo;}
      if(r.tipo==='salida'&&(!porOperario[r.usuario_id].salida||r.registrado_en>porOperario[r.usuario_id].salida)) porOperario[r.usuario_id].salida=r.registrado_en;
    });
    var esHoy=fecha===hoy, esFuturo=fecha>hoy;
    var conPresente=0, conFalta=0, conRetardo=0, conPermiso=0;
    var filas=operariosTodos.map(function(op){
      var d=porOperario[op.id];
      var permiso=permisoPorOperario[op.id];
      var horaE=d&&d.entrada?new Date(d.entrada).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}):null;
      var horaS=d&&d.salida?new Date(d.salida).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}):null;
      var estadoTxt, estadoColor;
      if(d&&d.entrada&&d.salida){estadoTxt='✅ Completo — '+horaE+' a '+horaS;estadoColor='var(--verde-mid)';conPresente++;}
      else if(d&&d.entrada){estadoTxt='🟡 En el rancho desde '+horaE;estadoColor='var(--tierra)';conPresente++;}
      else if(permiso&&!esFuturo){estadoTxt='🩺 Permiso '+(permiso.tipo==='medico'?'médico':'personal')+' ('+(permiso.con_goce?'con goce':'sin goce')+')';estadoColor='#2980b9';conPermiso++;}
      else if(esFuturo){estadoTxt='—';estadoColor='var(--gris-3)';}
      else if(esHoy){estadoTxt='⏳ Aún no llega';estadoColor='var(--gris-3)';}
      else {estadoTxt='❌ Falta';estadoColor='var(--rojo)';conFalta++;}
      if(d&&d.retardo){estadoTxt+=' · 🕐 Retardo';conRetardo++;}
      return {op:op,estadoTxt:estadoTxt,estadoColor:estadoColor,tieneFalta:(!d||!d.entrada)&&!permiso&&!esFuturo&&!esHoy};
    });
    filas.sort(function(a,b){return (b.tieneFalta?1:0)-(a.tieneFalta?1:0);});
    var fechaLbl=new Date(fecha+'T00:00:00').toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    var html='<div class="seccion-titulo">📋 Control de Asistencias</div>';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap;"><button type="button" id="ca-ant" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;">← Día anterior</button><input type="date" id="ca-fecha" value="'+fecha+'" max="'+hoy+'" style="padding:.4rem .6rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;"><button type="button" id="ca-sig" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;" '+(esHoy?'disabled':'')+'>Día siguiente →</button></div>';
    html+='<p class="hint" style="margin-bottom:.75rem;text-transform:capitalize;">'+fechaLbl+'</p>';
    if(!esFuturo) html+='<div class="stats-row" style="grid-template-columns:repeat(4,1fr);"><div class="stat-card"><div class="stat-num stat-vd">'+conPresente+'</div><div class="stat-lbl">Presentes</div></div><div class="stat-card"><div class="stat-num" style="color:var(--rojo);">'+conFalta+'</div><div class="stat-lbl">Faltas</div></div><div class="stat-card"><div class="stat-num stat-am">'+conRetardo+'</div><div class="stat-lbl">Retardos</div></div><div class="stat-card"><div class="stat-num" style="color:#2980b9;">'+conPermiso+'</div><div class="stat-lbl">Permisos</div></div></div>';
    html+=filas.map(function(f){
      return '<div class="orden-card" style="border-left-color:'+f.estadoColor+';"><strong style="font-size:.9rem;">'+f.op.nombre+'</strong><div class="orden-meta" style="color:'+f.estadoColor+';font-weight:600;">'+f.estadoTxt+'</div></div>';
    }).join('');
    body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderAdministracionMenu()">← Volver a Administración</button>';
    document.getElementById('ca-fecha').addEventListener('change',function(){renderControlAsistencias(this.value);});
    document.getElementById('ca-ant').addEventListener('click',function(){var d=new Date(fecha+'T00:00:00');d.setDate(d.getDate()-1);renderControlAsistencias(d.toISOString().slice(0,10));});
    var btnSig=document.getElementById('ca-sig');
    if(!esHoy) btnSig.addEventListener('click',function(){var d=new Date(fecha+'T00:00:00');d.setDate(d.getDate()+1);renderControlAsistencias(d.toISOString().slice(0,10));});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderPagosEventuales(fecha){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">🧑‍🌾 Labores Eventual</div><div class="loading">Cargando...</div>';
  var hoy=fechaHoyLocal();
  var esHoy=fecha===hoy;
  Promise.all([
    from('asistencia_registros').select('*').eq('fecha',fecha).eq('modalidad','labores').get(),
    from('pagos_eventuales').select('*').eq('fecha',fecha).get()
  ]).then(function(r){
    var registros=r[0]||[];
    var pagosDelDia=r[1]||[];
    var pagoPorOperario={}; pagosDelDia.forEach(function(p){pagoPorOperario[p.operario_id]=p;});
    var clockPorOperario={};
    registros.forEach(function(reg){
      if(!clockPorOperario[reg.usuario_id]) clockPorOperario[reg.usuario_id]={entrada:null};
      if(reg.tipo==='entrada'&&(!clockPorOperario[reg.usuario_id].entrada||reg.registrado_en<clockPorOperario[reg.usuario_id].entrada)) clockPorOperario[reg.usuario_id].entrada=reg.registrado_en;
    });
    var eventuales=(cats.eventuales||[]).slice().sort(function(a,b){
      var aClock=!!clockPorOperario[a.id], bClock=!!clockPorOperario[b.id];
      if(aClock!==bClock) return aClock?-1:1;
      return a.nombre.localeCompare(b.nombre);
    });
    var fechaLbl=new Date(fecha+'T00:00:00').toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    var totalDia=pagosDelDia.reduce(function(s,p){return s+parseFloat(p.monto);},0);

    var html='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">🧑‍🌾 Labores Eventual<button type="button" onclick="renderAdministracionMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Administración</button></div>';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap;"><button type="button" id="pe-ant" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;">← Día anterior</button><input type="date" id="pe-fecha" value="'+fecha+'" max="'+hoy+'" style="padding:.4rem .6rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;"><button type="button" id="pe-sig" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;" '+(esHoy?'disabled':'')+'>Día siguiente →</button></div>';
    html+='<p class="hint" style="margin-bottom:.5rem;text-transform:capitalize;">'+fechaLbl+'</p>';
    html+='<div class="form-card" style="text-align:center;margin-bottom:1rem;"><div style="font-size:.8rem;color:var(--gris-3);">Pagado este día</div><div style="font-size:1.6rem;font-weight:800;color:var(--verde-mid);">$'+totalDia.toFixed(2)+'</div></div>';

    if(!eventuales.length){
      html+='<div class="empty">Aún no tienes colaboradores con rol "Labores Eventual". Dalos de alta en Empleados → Altas y Bajas.</div>';
    } else {
      html+=eventuales.map(function(o){
        var clockIn=clockPorOperario[o.id];
        var pago=pagoPorOperario[o.id];
        var horaE=clockIn&&clockIn.entrada?new Date(clockIn.entrada).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}):null;
        var asistTxt=clockIn?('✅ Marcó asistencia · '+horaE):'— Sin registro de asistencia este día';
        var accion=pago
          ? '<div style="margin-top:.5rem;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:700;color:var(--verde-mid);">✅ Pagado: $'+parseFloat(pago.monto).toFixed(2)+(pago.concepto?' · '+pago.concepto:'')+'</span><button type="button" class="btn-sm btn-cancelar" data-quitar-pago="'+pago.id+'">Quitar</button></div>'
          : '<div style="margin-top:.5rem;display:flex;gap:8px;align-items:center;"><input type="number" min="0" step="1" placeholder="Monto $" data-monto-input="'+o.id+'" style="flex:1;padding:.5rem .6rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;"><button type="button" class="btn-sm btn-completar" data-registrar-pago="'+o.id+'">💵 Registrar pago</button></div>';
        return '<div class="orden-card" style="border-left-color:'+(pago?'var(--verde-mid)':(clockIn?'var(--tierra)':'var(--gris-2)'))+';"><strong style="font-size:.9rem;">'+o.nombre+'</strong><div class="orden-meta">'+asistTxt+'</div>'+accion+'</div>';
      }).join('');
    }

    body.innerHTML=html;
    document.getElementById('pe-fecha').addEventListener('change',function(){renderPagosEventuales(this.value);});
    document.getElementById('pe-ant').addEventListener('click',function(){var d=new Date(fecha+'T00:00:00');d.setDate(d.getDate()-1);renderPagosEventuales(d.toISOString().slice(0,10));});
    var btnSig=document.getElementById('pe-sig');
    if(!esHoy) btnSig.addEventListener('click',function(){var d=new Date(fecha+'T00:00:00');d.setDate(d.getDate()+1);renderPagosEventuales(d.toISOString().slice(0,10));});

    body.querySelectorAll('[data-registrar-pago]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var opId=this.dataset.registrarPago;
        var input=body.querySelector('[data-monto-input="'+opId+'"]');
        var monto=parseFloat(input.value);
        if(!monto||monto<=0){alert('Captura un monto válido.');return;}
        btn.disabled=true; btn.textContent='Guardando...';
        from('pagos_eventuales').insert({operario_id:opId,fecha:fecha,monto:monto,pagado_por:usuario.id}).then(function(){
          return from('notificaciones').insert({titulo:'💳 Pago registrado',cuerpo:'Se te registró un pago de $'+monto.toFixed(2)+' por el día '+fecha+'.',icono:'💳',leida:false,para_rol:'operario',para_usuario:opId});
        }).then(function(){showToast('✅ Pago registrado');renderPagosEventuales(fecha);}).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='💵 Registrar pago';});
      });
    });
    body.querySelectorAll('[data-quitar-pago]').forEach(function(btn){
      btn.addEventListener('click',function(){
        if(!confirm('¿Quitar este pago registrado?')) return;
        from('pagos_eventuales').eq('id',this.dataset.quitarPago).delete().then(function(){showToast('Pago eliminado');renderPagosEventuales(fecha);}).catch(function(e){alert('Error: '+e.message);});
      });
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function subirComprobanteInversion(f){
  var nombre='inversion_'+Date.now()+'_'+Math.round(Math.random()*9999)+'.'+((f.name&&f.name.split('.').pop())||'jpg');
  return fetch(URL_SB+'/storage/v1/object/evidencias/'+nombre,{method:'POST',headers:{'apikey':KEY_SB,'Authorization':'Bearer '+KEY_SB,'Content-Type':f.type||'image/jpeg','x-upsert':'true'},body:f}).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return URL_SB+'/storage/v1/object/public/evidencias/'+nombre;
  });
}

function sumarMesesFecha(fechaStr,meses){
  var d=new Date(fechaStr+'T00:00:00');
  d.setMonth(d.getMonth()+meses);
  return d.toISOString().slice(0,10);
}

function renderInversionistaDetalle(usuarioId){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">💼 Inversionista</div><div class="loading">Cargando...</div>';
  Promise.all([
    from('usuarios').select('id,nombre').eq('id',usuarioId).get(),
    from('inversiones').select('*').eq('inversionista_id',usuarioId).order('fecha_inicio',{ascending:false}).get()
  ]).then(function(r){
    var iv=r[0]&&r[0][0];
    var contratos=r[1]||[];
    var headerHtml='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">💼 '+(iv?iv.nombre:'Inversionista')+'<button type="button" onclick="renderInversionistasMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Inversionistas</button></div>';
    function pintar(movsPorInversion){
      var html=headerHtml+'<button class="btn-primary" id="inv-nuevo-btn" style="margin-bottom:1rem;">+ Nuevo contrato de inversión</button>';
      if(!contratos.length){
        html+='<div class="empty">Aún no tiene contratos de inversión registrados.</div>';
      } else {
        html+=contratos.map(function(c){
          var movs=movsPorInversion[c.id]||[];
          var rendimiento=movs.filter(function(m){return m.tipo==='rendimiento';}).reduce(function(s,m){return s+parseFloat(m.monto);},0);
          var capitalDevuelto=movs.filter(function(m){return m.tipo==='devolucion_capital';}).reduce(function(s,m){return s+parseFloat(m.monto);},0);
          var estColor=c.estado==='activo'?'var(--verde-mid)':'var(--gris-3)';
          var estLbl=c.estado==='activo'?'🟢 Activo':'🔒 Cerrado';
          return '<div class="orden-card" data-ver-inversion="'+c.id+'" style="cursor:pointer;border-left-color:'+estColor+';"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.92rem;">$'+formatMonto(c.monto_invertido)+' invertido</strong><span style="font-size:.72rem;font-weight:700;color:'+estColor+';">'+estLbl+'</span></div><div class="orden-meta">📅 Desde '+c.fecha_inicio+(c.plazo_meses?(' · Plazo: '+c.plazo_meses+' meses'):'')+(c.fecha_fin_estimada?(' · Vence '+c.fecha_fin_estimada):'')+'<br/>📈 Rendimiento pagado: $'+formatMonto(rendimiento)+' · 💰 Capital devuelto: $'+formatMonto(capitalDevuelto)+'</div></div>';
        }).join('');
      }
      body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderInversionistasMenu()">← Volver</button>';
      document.getElementById('inv-nuevo-btn').addEventListener('click',function(){renderNuevaInversion(usuarioId);});
      body.querySelectorAll('[data-ver-inversion]').forEach(function(card){
        card.addEventListener('click',function(){renderInversionDetalle(this.dataset.verInversion);});
      });
    }
    if(!contratos.length){ pintar({}); return; }
    var ids=contratos.map(function(c){return c.id;});
    from('inversion_movimientos').select('*').in('inversion_id',ids).get().then(function(movs){
      var movsPorInversion={};
      (movs||[]).forEach(function(m){(movsPorInversion[m.inversion_id]=movsPorInversion[m.inversion_id]||[]).push(m);});
      pintar(movsPorInversion);
    }).catch(function(){pintar({});});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderNuevaInversion(usuarioId){

  body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">+ Nuevo contrato de inversión<button type="button" onclick="renderInversionistaDetalle(\''+usuarioId+'\')" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Cancelar</button></div>'+

      showToast('✅ Contrato de inversión registrado');
      renderInversionistaDetalle(usuarioId);
    }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Guardar contrato';});
  });

function renderInversionDetalle(inversionId){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">💼 Contrato de inversión</div><div class="loading">Cargando...</div>';
  Promise.all([
    from('inversiones').select('*,inversionista:usuarios!inversionista_id(id,nombre)').eq('id',inversionId).get(),
    from('inversion_movimientos').select('*').eq('inversion_id',inversionId).order('fecha',{ascending:false}).get()
  ]).then(function(r){
    var c=r[0]&&r[0][0];
    if(!c){body.innerHTML='<div class="empty">No se encontró el contrato.</div>';return;}
    var movs=r[1]||[];
    var rendimiento=movs.filter(function(m){return m.tipo==='rendimiento';}).reduce(function(s,m){return s+parseFloat(m.monto);},0);
    var capitalDevuelto=movs.filter(function(m){return m.tipo==='devolucion_capital';}).reduce(function(s,m){return s+parseFloat(m.monto);},0);
    var totalRetornado=rendimiento+capitalDevuelto;
    var saldoCapital=parseFloat(c.monto_invertido)-capitalDevuelto;
    var activo=c.estado==='activo';
    var usuarioIdInversionista=c.inversionista?c.inversionista.id:c.inversionista_id;

    var headerHtml='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.4rem;">💼 '+(c.inversionista?c.inversionista.nombre:'')+'<div style="display:flex;flex-wrap:wrap;gap:.6rem;"><button type="button" id="ic-editar-btn" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">✏️ Editar contrato</button><button type="button" onclick="renderInversionistaDetalle(\''+usuarioIdInversionista+'\')" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Contratos</button></div></div>';

    var html=headerHtml;
    html+='<div class="form-card">'+
      '<div class="resumen-row"><span class="resumen-key">Estado</span><span class="resumen-val" style="color:'+(activo?'var(--verde-mid)':'var(--gris-3)')+';">'+(activo?'🟢 Activo':'🔒 Cerrado')+'</span></div>'+
      '<div class="resumen-row"><span class="resumen-key">Monto invertido</span><span class="resumen-val">$'+formatMonto(c.monto_invertido)+'</span></div>'+
      '<div class="resumen-row"><span class="resumen-key">Fecha de inicio</span><span class="resumen-val">'+c.fecha_inicio+'</span></div>'+
      (c.plazo_meses?'<div class="resumen-row"><span class="resumen-key">Plazo</span><span class="resumen-val">'+c.plazo_meses+' meses</span></div>':'')+
      (c.fecha_fin_estimada?'<div class="resumen-row"><span class="resumen-key">Vence</span><span class="resumen-val">'+c.fecha_fin_estimada+'</span></div>':'')+
      (c.condiciones?'<div class="resumen-row"><span class="resumen-key">Condiciones</span><span class="resumen-val">'+c.condiciones+'</span></div>':'')+
      (c.comprobante_url?'<div class="resumen-row"><span class="resumen-key">Depósito inicial</span><span class="resumen-val"><a href="'+c.comprobante_url+'" target="_blank">🧾 Ver comprobante</a></span></div>':'')+
    '</div>';

    html+='<div class="form-card">'+
      '<div class="resumen-row"><span class="resumen-key">📈 Rendimiento pagado (utilidad)</span><span class="resumen-val">$'+formatMonto(rendimiento)+'</span></div>'+
      '<div class="resumen-row"><span class="resumen-key">💰 Capital devuelto</span><span class="resumen-val">$'+formatMonto(capitalDevuelto)+'</span></div>'+
      '<div class="resumen-row"><span class="resumen-key">Capital pendiente por devolver</span><span class="resumen-val">$'+formatMonto(saldoCapital)+'</span></div>'+
      '<div class="resumen-row" style="border-top:2px solid var(--gris-1);margin-top:.3rem;padding-top:.5rem;"><strong style="font-size:.85rem;">Total depositado al inversionista</strong><strong style="font-size:1rem;color:var(--verde-mid);">$'+formatMonto(totalRetornado)+'</strong></div>'+
    '</div>';

    if(!activo){
      html+='<div class="form-card"><div class="seccion-titulo" style="margin-top:0;">🔒 Contrato cerrado</div>'+(c.fecha_cierre?'<div class="resumen-row"><span class="resumen-key">Fecha de cierre</span><span class="resumen-val">'+c.fecha_cierre+'</span></div>':'')+(c.resumen_cierre?'<p class="hint">'+c.resumen_cierre+'</p>':'')+'</div>';
    }

    if(activo){
      var tipoChips=Object.keys(MOV_INVERSION_TIPOS).map(function(k,idx){
        var t=MOV_INVERSION_TIPOS[k];
        return '<button type="button" class="op-chip'+(idx===0?' sel':'')+'" data-tipomov="'+k+'" style="text-align:left;padding:.6rem .9rem;">'+(idx===0?'✓ ':'')+t.ic+' '+t.lbl+'</button>';
      }).join('');
      html+='<div class="form-card"><div class="seccion-titulo" style="margin-top:0;">Registrar depósito al inversionista</div>'+
        '<div class="form-group"><label>Tipo</label><div style="display:flex;flex-direction:column;gap:8px;" id="im-tipo-grp">'+tipoChips+'</div></div>'+
        '<div class="form-group"><label>Monto ($)</label><input type="text" inputmode="decimal" id="im-monto" placeholder="0.00"></div>'+
        '<div class="form-group"><label>Fecha</label><input type="date" id="im-fecha" value="'+fechaHoyLocal()+'"></div>'+
        '<div class="form-group"><label>Concepto (opcional)</label><input type="text" id="im-concepto" placeholder="Ej. Rendimiento de mayo"></div>'+
        '<div class="form-group"><label>Comprobante (opcional)</label><input type="file" id="im-comprobante" accept="image/*"><p class="hint" id="im-comprobante-status"></p></div>'+
        '<button class="btn-primary" id="im-guardar">Registrar depósito</button>'+
      '</div>';
      html+='<div class="form-card"><div class="seccion-titulo" style="margin-top:0;">🔒 Cerrar contrato</div><div class="form-group"><label>Fecha de cierre</label><input type="date" id="ic-fecha" value="'+fechaHoyLocal()+'"></div><div class="form-group"><label>Resumen de cierre (opcional)</label><input type="text" id="ic-resumen" placeholder="Ej. Capital y utilidad liquidados en su totalidad"></div><button class="btn-sm btn-cancelar" id="ic-cerrar">🔒 Cerrar contrato</button></div>';
    }

    html+='<div class="seccion-titulo">Historial de depósitos</div>';
    if(!movs.length){
      html+='<div class="empty">Aún no hay depósitos registrados para este contrato.</div>';
    } else {
      html+=movs.map(function(m){
        var t=MOV_INVERSION_TIPOS[m.tipo]||{ic:'💵',lbl:m.tipo};
        return '<div class="orden-card"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem;">'+t.ic+' '+t.lbl+'</strong><strong style="font-size:.95rem;color:var(--verde-mid);">$'+formatMonto(m.monto)+'</strong></div><div class="orden-meta">📅 '+m.fecha+(m.concepto?' · '+m.concepto:'')+(m.comprobante_url?' · <a href="'+m.comprobante_url+'" target="_blank">🧾 Ver comprobante</a>':'')+'</div><button type="button" class="btn-sm btn-cancelar" style="margin-top:.4rem;" data-borrar-mov="'+m.id+'">Eliminar</button></div>';
      }).join('');
    }

    body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderInversionistaDetalle(\''+usuarioIdInversionista+'\')">← Volver</button>';

    document.getElementById('ic-editar-btn').addEventListener('click',function(){renderEditarInversion(inversionId);});

    if(activo){
      wireMontoInput('im-monto');
      var tipoSel=Object.keys(MOV_INVERSION_TIPOS)[0];
      document.querySelectorAll('#im-tipo-grp [data-tipomov]').forEach(function(btn){
        btn.addEventListener('click',function(){
          tipoSel=this.dataset.tipomov;
          document.querySelectorAll('#im-tipo-grp [data-tipomov]').forEach(function(b){b.classList.remove('sel');var t=MOV_INVERSION_TIPOS[b.dataset.tipomov];b.innerHTML=t.ic+' '+t.lbl;});
          this.classList.add('sel');
          var t=MOV_INVERSION_TIPOS[this.dataset.tipomov];
          this.innerHTML='✓ '+t.ic+' '+t.lbl;
        });
      });
      var comprobanteMovUrl=null;
      document.getElementById('im-comprobante').addEventListener('change',function(){
        var f=this.files[0];
        if(!f) return;
        var status=document.getElementById('im-comprobante-status');
        status.textContent='Subiendo...';
        subirComprobanteInversion(f).then(function(url){comprobanteMovUrl=url;status.textContent='✅ Comprobante adjuntado';}).catch(function(e){status.textContent='Error al subir: '+e.message;});
      });
      document.getElementById('im-guardar').addEventListener('click',function(){
        var btn=this;
        var monto=parseMonto(document.getElementById('im-monto').value);
        if(!monto||monto<=0){alert('Captura un monto válido.');return;}
        var fecha=document.getElementById('im-fecha').value||fechaHoyLocal();
        var concepto=(document.getElementById('im-concepto').value||'').trim()||null;
        btn.disabled=true; btn.textContent='Guardando...';
        from('inversion_movimientos').insert({inversion_id:inversionId,tipo:tipoSel,monto:monto,fecha:fecha,concepto:concepto,comprobante_url:comprobanteMovUrl,registrado_por:usuario.id}).then(function(){
          return from('notificaciones').insert({titulo:'💼 Depósito registrado',cuerpo:'Se registró un depósito de $'+formatMonto(monto)+' ('+(MOV_INVERSION_TIPOS[tipoSel]||{}).lbl+') a tu inversión.',icono:'💼',leida:false,para_rol:'inversionista',para_usuario:usuarioIdInversionista});
        }).then(function(){showToast('✅ Depósito registrado');renderInversionDetalle(inversionId);}).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Registrar depósito';});
      });
      document.getElementById('ic-cerrar').addEventListener('click',function(){
        if(!confirm('¿Cerrar este contrato de inversión? Ya no podrás registrar más depósitos en él.')) return;
        var btn=this;
        var fechaCierre=document.getElementById('ic-fecha').value||fechaHoyLocal();
        var resumen=(document.getElementById('ic-resumen').value||'').trim()||null;
        btn.disabled=true;
        from('inversiones').eq('id',inversionId).update({estado:'cerrado',fecha_cierre:fechaCierre,resumen_cierre:resumen}).then(function(){
          showToast('🔒 Contrato cerrado');
          renderInversionDetalle(inversionId);
        }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;});
      });
    }
    body.querySelectorAll('[data-borrar-mov]').forEach(function(btn){
      btn.addEventListener('click',function(){
        if(!confirm('¿Eliminar este depósito del historial?')) return;
        from('inversion_movimientos').eq('id',this.dataset.borrarMov).delete().then(function(){showToast('🗑️ Depósito eliminado');renderInversionDetalle(inversionId);}).catch(function(e){alert('Error: '+e.message);});
      });
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderEditarInversion(inversionId){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">✏️ Editar contrato</div><div class="loading">Cargando...</div>';
  from('inversiones').select('*').eq('id',inversionId).get().then(function(rows){
    var c=rows&&rows[0];
    if(!c){body.innerHTML='<div class="empty">No se encontró el contrato.</div>';return;}
    body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">✏️ Editar contrato<button type="button" onclick="renderInversionDetalle(\''+inversionId+'\')" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Cancelar</button></div>'+
      '<div class="form-card">'+
      '<div class="form-group"><label>Monto invertido ($)</label><input type="text" inputmode="decimal" id="ei-monto" value="'+formatMonto(c.monto_invertido)+'"></div>'+
      '<div class="form-group"><label>Fecha de inicio</label><input type="date" id="ei-fecha" value="'+c.fecha_inicio+'"></div>'+
      '<div class="form-group"><label>Plazo (meses, opcional)</label><input type="number" id="ei-plazo" min="0" step="1" value="'+(c.plazo_meses||'')+'" placeholder="Ej. 12"></div>'+
      '<div class="form-group"><label>Condiciones / tasa acordada (opcional)</label><input type="text" id="ei-condiciones" value="'+(c.condiciones?c.condiciones.replace(/"/g,'&quot;'):'')+'" placeholder="Ej. 2% mensual sobre el capital"></div>'+
      '<div class="form-group"><label>Comprobante del depósito inicial (opcional)</label>'+(c.comprobante_url?'<p class="hint">Actual: <a href="'+c.comprobante_url+'" target="_blank">🧾 Ver comprobante</a></p>':'')+'<input type="file" id="ei-comprobante" accept="image/*"><p class="hint" id="ei-comprobante-status"></p></div>'+
      '<button class="btn-primary" id="ei-guardar">Guardar cambios</button>'+
      '</div><button class="btn-back" style="margin-top:1rem;" onclick="renderInversionDetalle(\''+inversionId+'\')">← Volver</button>';

    wireMontoInput('ei-monto');

    var comprobanteUrl=c.comprobante_url||null;
    document.getElementById('ei-comprobante').addEventListener('change',function(){
      var f=this.files[0];
      if(!f) return;
      var status=document.getElementById('ei-comprobante-status');
      status.textContent='Subiendo...';
      subirComprobanteInversion(f).then(function(url){comprobanteUrl=url;status.textContent='✅ Comprobante adjuntado';}).catch(function(e){status.textContent='Error al subir: '+e.message;});
    });

    document.getElementById('ei-guardar').addEventListener('click',function(){
      var btn=this;
      var monto=parseMonto(document.getElementById('ei-monto').value);
      if(!monto||monto<=0){alert('Captura el monto invertido.');return;}
      var fecha=document.getElementById('ei-fecha').value||c.fecha_inicio;
      var plazo=parseInt(document.getElementById('ei-plazo').value)||null;
      var condiciones=(document.getElementById('ei-condiciones').value||'').trim()||null;
      var fechaFin=plazo?sumarMesesFecha(fecha,plazo):null;
      btn.disabled=true; btn.textContent='Guardando...';
      from('inversiones').eq('id',inversionId).update({monto_invertido:monto,fecha_inicio:fecha,plazo_meses:plazo,fecha_fin_estimada:fechaFin,condiciones:condiciones,comprobante_url:comprobanteUrl}).then(function(){
        showToast('✅ Contrato actualizado');
        renderInversionDetalle(inversionId);
      }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Guardar cambios';});
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}
