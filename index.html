<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Mootsil · Labores</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --verde:#1a3a2a;--verde-mid:#2d6644;--verde-claro:#4a9a6a;--verde-tenue:#e8f4ee;
  --tierra:#c17f3a;--tierra-tenue:#fdf3e7;--rojo:#c0392b;--rojo-tenue:#fdf0ee;
  --amarillo:#e6a817;--amarillo-tenue:#fef9ec;
  --blanco:#ffffff;--gris-1:#f5f5f3;--gris-2:#e0e0db;--gris-3:#9a9a94;--negro:#1a1a18;
  --radio:14px;--radio-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--verde);min-height:100vh;color:var(--negro);}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
#screen-login{background:var(--verde);align-items:center;justify-content:center;padding:2rem;}
.login-logo{text-align:center;margin-bottom:2.5rem;}
.login-logo h1{color:var(--blanco);font-size:2rem;font-weight:700;}
.login-logo p{color:rgba(255,255,255,.55);font-size:.85rem;margin-top:.3rem;}
.login-card{background:var(--blanco);border-radius:20px;padding:1.75rem 1.5rem;width:100%;max-width:340px;}
.login-card h2{font-size:1rem;font-weight:600;margin-bottom:.3rem;}
.login-card .sub{font-size:.8rem;color:var(--gris-3);margin-bottom:1.25rem;}
.pin-display{display:flex;gap:10px;justify-content:center;margin-bottom:1.5rem;}
.pin-dot{width:48px;height:48px;border-radius:50%;border:2px solid var(--gris-2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:var(--verde);}
.pin-dot.filled{background:var(--verde);border-color:var(--verde);color:var(--blanco);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-btn{background:var(--gris-1);border:2px solid var(--gris-2);border-radius:var(--radio);height:64px;font-size:1.4rem;font-weight:600;cursor:pointer;color:var(--negro);}
.pin-btn:active{background:var(--gris-2);}
.pin-btn.del{background:var(--tierra-tenue);color:var(--tierra);border-color:var(--tierra-tenue);}
.pin-error{text-align:center;font-size:.8rem;color:var(--rojo);margin-top:.75rem;min-height:1.4rem;font-weight:500;}
.app-header{background:var(--verde);padding:1rem 1.25rem .75rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.app-header h1{color:var(--blanco);font-size:1rem;font-weight:600;}
.header-sub{color:rgba(255,255,255,.6);font-size:.75rem;margin-top:.1rem;}
.btn-salir{background:rgba(255,255,255,.15);border:none;border-radius:20px;color:var(--blanco);font-size:.75rem;padding:.4rem .9rem;cursor:pointer;}
.tabs{background:var(--verde-mid);display:flex;flex-shrink:0;overflow-x:auto;}
.tab{flex-shrink:0;padding:.75rem .6rem;text-align:center;font-size:.75rem;font-weight:600;color:rgba(255,255,255,.6);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.tab.active{color:var(--blanco);border-bottom-color:var(--blanco);}
.app-body{background:var(--gris-1);flex:1;overflow-y:auto;padding:1rem;}
.orden-card{background:var(--blanco);border-radius:var(--radio);padding:1rem;margin-bottom:.75rem;border-left:4px solid var(--gris-2);}
.orden-card.pendiente{border-left-color:var(--amarillo);}
.orden-card.en_proceso{border-left-color:var(--verde-claro);}
.orden-card.completada{border-left-color:var(--verde-mid);opacity:.75;}
.orden-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;}
.orden-labor{font-weight:700;font-size:.95rem;}
.orden-badge{font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;text-transform:uppercase;}
.badge-pendiente{background:var(--amarillo-tenue);color:var(--amarillo);}
.badge-en_proceso{background:var(--verde-tenue);color:var(--verde-mid);}
.badge-completada{background:var(--verde-tenue);color:var(--verde);}
.orden-meta{font-size:.78rem;color:var(--gris-3);line-height:1.7;}
.orden-meta strong{color:var(--negro);}
.orden-actions{display:flex;gap:8px;margin-top:.75rem;flex-wrap:wrap;}
.btn-sm{padding:.45rem .9rem;border-radius:var(--radio-sm);border:none;font-size:.78rem;font-weight:600;cursor:pointer;}
.btn-iniciar{background:var(--verde-tenue);color:var(--verde-mid);}
.btn-completar{background:var(--verde-mid);color:var(--blanco);}
.btn-cancelar{background:var(--rojo-tenue);color:var(--rojo);}
.form-card{background:var(--blanco);border-radius:var(--radio);padding:1.1rem;margin-bottom:.75rem;}
.form-card h3{font-size:.9rem;font-weight:700;margin-bottom:1rem;}
.form-group{margin-bottom:.85rem;}
.form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--gris-3);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.04em;}
.form-group select,.form-group input{width:100%;padding:.65rem .75rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.9rem;background:var(--gris-1);color:var(--negro);}
.surcos-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:.4rem;}
.surco-btn{padding:.5rem 0;border-radius:6px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.8rem;font-weight:700;cursor:pointer;text-align:center;}
.surco-btn.sel{border-color:var(--verde-mid);background:var(--verde-tenue);color:var(--verde);}
.op-chip{padding:6px 16px;border-radius:20px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.85rem;cursor:pointer;color:var(--negro);font-weight:600;}
.op-chip.sel{background:var(--verde-tenue);border-color:var(--verde-mid);color:var(--verde);}
.btn-primary{width:100%;padding:.9rem;border:none;border-radius:var(--radio);background:var(--verde-mid);color:var(--blanco);font-size:.95rem;font-weight:700;cursor:pointer;margin-top:.5rem;}
.tarea-card{background:var(--blanco);border-radius:var(--radio);padding:1.1rem;margin-bottom:.75rem;border-left:4px solid var(--amarillo);}
.tarea-title{font-weight:700;font-size:1rem;margin-bottom:.35rem;}
.tarea-meta{font-size:.8rem;color:var(--gris-3);line-height:1.7;}
.steps-bar{display:flex;gap:5px;margin-bottom:1rem;}
.step-seg{flex:1;height:4px;border-radius:2px;background:var(--gris-2);}
.step-seg.done{background:var(--verde-claro);}
.step-seg.active{background:var(--verde-mid);}
.step-label{font-size:.7rem;color:var(--gris-3);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em;}
.step-title{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
.cantidad-row{display:flex;align-items:center;gap:12px;background:var(--blanco);border-radius:var(--radio);padding:1rem;margin-bottom:1rem;}
.cant-btn{width:52px;height:52px;border-radius:50%;border:2px solid var(--gris-2);background:var(--gris-1);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.cant-val{flex:1;text-align:center;font-size:2.2rem;font-weight:700;}
.cant-unit{text-align:center;font-size:.75rem;color:var(--gris-3);}
.nav-row{display:flex;gap:10px;margin-top:1.25rem;}
.btn-back{flex:1;padding:.85rem;border:2px solid var(--gris-2);border-radius:var(--radio);background:var(--blanco);font-size:.9rem;font-weight:600;cursor:pointer;}
.btn-next{flex:2;padding:.85rem;border:none;border-radius:var(--radio);background:var(--verde-mid);color:var(--blanco);font-size:.9rem;font-weight:700;cursor:pointer;}
.btn-next:disabled{background:var(--gris-2);color:var(--gris-3);}
.resumen-card{background:var(--blanco);border-radius:var(--radio);padding:1rem 1.1rem;margin-bottom:.75rem;}
.resumen-row{display:flex;justify-content:space-between;font-size:.82rem;padding:.35rem 0;border-bottom:1px solid var(--gris-1);}
.resumen-row:last-child{border-bottom:none;}
.resumen-key{color:var(--gris-3);}
.resumen-val{font-weight:600;text-align:right;max-width:60%;}
.notif-item{background:var(--blanco);border-radius:var(--radio);padding:.85rem 1rem;margin-bottom:.6rem;display:flex;gap:.75rem;border-left:3px solid var(--tierra);}
.notif-ic{font-size:1.3rem;flex-shrink:0;}
.notif-texto{font-size:.82rem;line-height:1.5;}
.notif-texto strong{display:block;font-size:.85rem;color:var(--negro);}
.notif-tiempo{font-size:.7rem;color:var(--gris-3);margin-top:.2rem;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.stat-card{background:var(--blanco);border-radius:var(--radio-sm);padding:.75rem;text-align:center;}
.stat-num{font-size:1.6rem;font-weight:700;}
.stat-lbl{font-size:.65rem;color:var(--gris-3);text-transform:uppercase;letter-spacing:.04em;margin-top:.2rem;}
.stat-am{color:var(--amarillo);}
.stat-vd{color:var(--verde-mid);}
.stat-az{color:#2980b9;}
#screen-exito{background:var(--verde);align-items:center;justify-content:center;padding:2rem;text-align:center;}
.exito-ic{font-size:5rem;margin-bottom:1.5rem;}
.exito-tit{color:var(--blanco);font-size:1.6rem;font-weight:700;margin-bottom:.5rem;}
.exito-sub{color:rgba(255,255,255,.65);font-size:.9rem;margin-bottom:2rem;line-height:1.6;}
.btn-nuevo{background:var(--blanco);color:var(--verde);border:none;border-radius:var(--radio);padding:1rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;}
.hint{font-size:.75rem;color:var(--gris-3);margin-top:.6rem;}
.loading{text-align:center;color:var(--gris-3);padding:3rem 1rem;font-size:.9rem;}
.seccion-titulo{font-size:.75rem;font-weight:700;color:var(--gris-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--gris-3);font-size:.88rem;line-height:1.6;}
.orden-badge-rol{font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;text-transform:uppercase;}
.prog-bar{background:var(--gris-2);border-radius:4px;height:6px;margin-bottom:.75rem;}
.prog-fill{height:6px;border-radius:4px;}
#toast{position:fixed;bottom:1.5rem;right:1rem;background:var(--verde);color:#fff;padding:.75rem 1.1rem;border-radius:12px;font-size:.85rem;font-weight:600;z-index:8888;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:280px;line-height:1.4;}
.rep-view-btn{padding:.4rem .9rem;border-radius:20px;border:1.5px solid var(--gris-2);background:var(--gris-1);font-size:.75rem;font-weight:600;cursor:pointer;color:var(--negro);}
.rep-view-btn.active{background:var(--verde-mid);border-color:var(--verde-mid);color:#fff;}
.riego-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:flex-start;}
.riego-circle{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;color:#fff;font-weight:700;font-size:.85rem;padding:6px;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:transform .15s;}
.riego-circle:active{transform:scale(.95);}
.riego-circle.roja{background:var(--rojo);}
.riego-circle.verde{background:var(--verde-mid);}
.riego-circle.activa{background:var(--tierra);}
.riego-circle.neutra{background:var(--gris-1);border:2px solid var(--gris-2);color:var(--gris-3);box-shadow:none;}
.riego-circle small{font-weight:500;font-size:.65rem;opacity:.85;margin-top:2px;}
.riego-ejec-card{background:var(--blanco);border-radius:var(--radio);padding:1.75rem 1.25rem;text-align:center;transition:background .3s;}
.riego-ejec-min{font-size:2.6rem;font-weight:800;color:var(--verde-mid);margin-bottom:.5rem;font-variant-numeric:tabular-nums;}
.riego-ejec-card.riego-alarma{background:var(--rojo-tenue);animation:riego-flash 1s infinite;}
.riego-ejec-card.riego-alarma .riego-ejec-min{color:var(--rojo);}
@keyframes riego-flash{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.0);}50%{box-shadow:0 0 0 10px rgba(192,57,43,.15);}}
.labor-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.labor-tile{background:var(--blanco);border-radius:var(--radio);padding:1rem .5rem;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .12s;border:2px solid transparent;}
.labor-tile:active{transform:scale(.94);}
.labor-tile-ic{font-size:1.7rem;margin-bottom:.35rem;}
.labor-tile-lbl{font-size:.72rem;font-weight:700;color:var(--negro);line-height:1.2;}
.labor-tile-otra{background:var(--verde-tenue);border-color:var(--verde-mid);}
.labor-tile-otra .labor-tile-lbl{color:var(--verde);}
.labor-chosen{display:flex;align-items:center;gap:8px;font-size:1rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--gris-1);}

#cam-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:none;flex-direction:column;}
#cam-video{flex:1;width:100%;object-fit:cover;}
#cam-canvas{display:none;}
.cam-bar{background:#000;padding:1.5rem;display:flex;justify-content:space-around;align-items:center;}
.cam-capbtn{width:75px;height:75px;border-radius:50%;border:5px solid #fff;background:#fff;cursor:pointer;font-size:1.8rem;}
.cam-auxbtn{color:#fff;font-size:.85rem;padding:.5rem 1.25rem;background:rgba(255,255,255,.15);border:none;border-radius:20px;cursor:pointer;}
</style>
</head>
<body>

<div id="screen-login" class="screen active">
  <div class="login-logo"><h1>🫐 Mootsil</h1><p>Rancho · Módulo de Labores</p></div>
  <div class="login-card">
    <h2>Ingresa tu PIN</h2>
    <p class="sub">Toca los 4 dígitos para entrar</p>
    <div class="pin-display">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinDigit('1')">1</button>
      <button class="pin-btn" onclick="pinDigit('2')">2</button>
      <button class="pin-btn" onclick="pinDigit('3')">3</button>
      <button class="pin-btn" onclick="pinDigit('4')">4</button>
      <button class="pin-btn" onclick="pinDigit('5')">5</button>
      <button class="pin-btn" onclick="pinDigit('6')">6</button>
      <button class="pin-btn" onclick="pinDigit('7')">7</button>
      <button class="pin-btn" onclick="pinDigit('8')">8</button>
      <button class="pin-btn" onclick="pinDigit('9')">9</button>
      <button class="pin-btn" style="visibility:hidden"></button>
      <button class="pin-btn" onclick="pinDigit('0')">0</button>
      <button class="pin-btn del" onclick="pinBorrar()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<div id="screen-encargado" class="screen">
  <div class="app-header">
    <div><h1>🫐 Mootsil</h1><div class="header-sub" id="enc-nombre">Encargado</div></div>
    <button class="btn-salir" onclick="salir()">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-tablero" onclick="tabEncargado('tablero')">Tablero</button>
    <button class="tab" id="tab-asignar" onclick="tabEncargado('asignar')">+ Asignar</button>
    <button class="tab" id="tab-notif" onclick="tabEncargado('notif')">Avisos <span id="badge-avisos" style="display:none;background:var(--tierra);color:#fff;border-radius:50%;width:16px;height:16px;font-size:.6rem;font-weight:700;align-items:center;justify-content:center;margin-left:3px;vertical-align:middle;">0</span></button>
    <button class="tab" id="tab-reporte" onclick="tabEncargado('reporte')">Reporte</button>
    <button class="tab" id="tab-inventario" onclick="tabEncargado('inventario')" style="display:none">Inventario</button>
    <button class="tab" id="tab-formulas" onclick="tabEncargado('formulas')" style="display:none">Fórmulas</button>
    <button class="tab" id="tab-validar" onclick="tabEncargado('validar')" style="display:none">Validar</button>
    <button class="tab" id="tab-config" onclick="tabEncargado('config')" style="display:none">⚙️</button>
  </div>
  <div class="app-body" id="enc-body"><div class="loading">Cargando...</div></div>
</div>

<div id="screen-operario" class="screen">
  <div class="app-header">
    <div><h1>🫐 Mootsil</h1><div class="header-sub" id="op-nombre">Operario</div></div>
    <button class="btn-salir" onclick="salir()">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-tareas" onclick="tabOperario('tareas')">Mis tareas</button>
    <button class="tab" id="tab-op-notif" onclick="tabOperario('notif')">Avisos</button>
  </div>
  <div class="app-body" id="op-body"><div class="loading">Cargando tareas...</div></div>
</div>

<div id="screen-exito" class="screen">
  <div class="exito-ic">✅</div>
  <div class="exito-tit">¡Labor completada!</div>
  <div class="exito-sub" id="exito-sub">El registro se guardó correctamente.</div>
  <button class="btn-nuevo" onclick="mostrar('screen-operario');cargarTareas()">Ver mis tareas</button>
</div>


<div id="toast"></div>
<div id="cam-overlay">
  <video id="cam-video" autoplay playsinline muted></video>
  <canvas id="cam-canvas"></canvas>
  <div id="cam-status" style="position:absolute;top:1rem;left:50%;transform:translateX(-50%);background:rgba(200,0,0,.85);color:#fff;padding:.3rem .9rem;border-radius:20px;font-size:.85rem;font-weight:600;display:none;">⏺ Grabando...</div>
  <div class="cam-bar">
    <button class="cam-auxbtn" onclick="cerrarCamara()">✕ Cancelar</button>
    <button class="cam-capbtn" onclick="tomarFoto()">📷</button>
    <button id="btn-video" onclick="toggleVideo()" style="color:#fff;font-size:.85rem;padding:.5rem 1rem;background:rgba(200,0,0,.6);border:none;border-radius:20px;cursor:pointer;">⏺ Video</button>
    <button class="cam-auxbtn" onclick="girarCamara()">🔄</button>
  </div>
</div>
<script>

var KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwcmVhZnlxbmNrc3d2b2FlcmJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NDE0NjAsImV4cCI6MjA5ODQxNzQ2MH0.2Bwg1HdUXKlw9U3a3-3FvpeNV3iKktJchkL6xbD51DU';

function api(path, opts) {
  opts = opts || {};
  return fetch(URL_SB + path, {
    method: opts.method || 'GET',
    headers: Object.assign({'apikey':KEY_SB,'Authorization':'Bearer '+KEY_SB,'Content-Type':'application/json','Prefer':opts.prefer||''}, opts.headers||{}),
    body: opts.body ? JSON.stringify(opts.body) : undefined
  }).then(function(r) {
    if(!r.ok) return r.json().then(function(e){ throw new Error(e.message||r.status); });
    return r.status===204 ? {} : r.json();
  });
}

function rpc(fn, params) { return api('/rest/v1/rpc/'+fn, {method:'POST', body:params}); }

function from(table) {
  var q = {_t:table, _f:[], _s:'*', _o:'', _l:'',
    select:function(s){this._s=s;return this;},
    eq:function(c,v){this._f.push(c+'=eq.'+encodeURIComponent(v));return this;},
    in:function(c,v){this._f.push(c+'=in.("'+v.join('","')+'")');return this;},
    not:function(c,op,v){this._f.push(c+'=not.'+op+'.'+v);return this;},
    order:function(c,o){this._o='&order='+c+(o&&o.ascending===false?'.desc':'.asc');return this;},
    limit:function(n){this._l='&limit='+n;return this;},
    get:function(){
      var url='/rest/v1/'+this._t+'?select='+encodeURIComponent(this._s);
      if(this._f.length) url+='&'+this._f.join('&');
      url+=this._o+this._l;
      return api(url);
    },
    single:function(){return this.get().then(function(d){return Array.isArray(d)?d[0]:d;});},
    insert:function(data){return api('/rest/v1/'+this._t,{method:'POST',body:data,prefer:'return=representation'});},
    update:function(data){
      var url='/rest/v1/'+this._t+'?'+this._f.join('&');
      return api(url,{method:'PATCH',body:data,prefer:'return=representation'});
    },
    delete:function(){
      var url='/rest/v1/'+this._t+'?'+this._f.join('&');
      return api(url,{method:'DELETE',prefer:'return=representation'});
    }
  };
  return q;
}

var pin='', usuario=null;
var cats={plantaciones:[],tablas:[],tiposLabor:[],subtiposLabor:[],operarios:[],inventario:[]};
var ordenEjecutando=null, pasoEjec=1;

function riegoActualizarEstado(o,cambios){
  Object.keys(cambios).forEach(function(k){o[k]=cambios[k];});
  if(navigator.onLine){
    from('ordenes_trabajo').eq('id',o.id).update(cambios).catch(function(){riegoEncolar(o.id,cambios);});
  } else {
    riegoEncolar(o.id,cambios);
  }
}
function riegoEncolar(id,cambios){
  riegoColaOffline.push({id:id,cambios:cambios});
  localStorage.setItem('mootsil_riego_cola',JSON.stringify(riegoColaOffline));
}
function riegoSincronizar(){
  if(!riegoColaOffline.length) return;
  var pend=riegoColaOffline.slice(); riegoColaOffline=[];
  localStorage.setItem('mootsil_riego_cola','[]');
  pend.forEach(function(p){from('ordenes_trabajo').eq('id',p.id).update(p.cambios).catch(function(){riegoColaOffline.push(p);localStorage.setItem('mootsil_riego_cola',JSON.stringify(riegoColaOffline));});});
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.innerHTML=msg; t.style.display='block';
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(function(){t.style.display='none';},4000);
}
function mostrar(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}

function pinDigit(d){if(pin.length>=4)return;pin+=d;dibujarPin();if(pin.length===4)verificarPin();}
function pinBorrar(){pin=pin.slice(0,-1);setErr('');dibujarPin();}
function dibujarPin(){for(var i=0;i<4;i++){var el=document.getElementById('d'+i);if(i<pin.length){el.textContent='•';el.classList.add('filled');}else{el.textContent='';el.classList.remove('filled');}}}
function setErr(m){document.getElementById('pin-error').textContent=m;}

function verificarPin(){
  setErr('Verificando...');
  rpc('verificar_pin',{p_pin:pin}).then(function(data){
    if(!data||!data.length){setErr('PIN incorrecto.');pin='';dibujarPin();return;}
    usuario={id:data[0].usuario_id,nombre:data[0].nombre,rol:data[0].rol};
    setErr('Cargando...');
    cargarCatalogos().then(function(){
      setErr('');
      if(usuario.rol==='operario'||usuario.rol==='cosechador'||usuario.rol==='galerista'){
        document.getElementById('op-nombre').textContent=usuario.nombre+' · '+usuario.rol;
        mostrar('screen-operario'); cargarTareas();
      } else {
        document.getElementById('enc-nombre').textContent=usuario.nombre+' · '+usuario.rol;
        mostrar('screen-encargado');
        if(usuario.rol==='admin'||usuario.rol==='dueño') document.getElementById('tab-config').style.display='';
        if(usuario.rol==='admin'||usuario.rol==='encargado'||usuario.rol==='ingeniero') document.getElementById('tab-inventario').style.display='';
        if(usuario.rol==='admin'||usuario.rol==='ingeniero') document.getElementById('tab-formulas').style.display='';
        if(usuario.rol==='admin'||usuario.rol==='ingeniero') document.getElementById('tab-validar').style.display='';
        renderTablero();
        setInterval(actualizarBadgeAvisos,15000);
        actualizarBadgeAvisos();
      }
    });
  }).catch(function(e){setErr('Error: '+e.message);pin='';dibujarPin();});
}

function cargarCatalogos(){
  return Promise.all([
    from('plantaciones').select('*').order('nombre').get(),
    from('tablas').select('*').order('nombre').get(),
    from('tipos_labor').select('*').eq('activo',true).order('orden').get(),
    from('subtipos_labor').select('*').get(),
    from('usuarios').select('id,nombre,rol').eq('rol','operario').get(),
    from('inventario_items').select('*').eq('activo',true).order('nombre').get()
  ]).then(function(r){
    cats.plantaciones=r[0]; cats.tablas=r[1]; cats.tiposLabor=r[2];
    cats.subtiposLabor=r[3]; cats.operarios=r[4]; cats.inventario=r[5]||[];
  });
}

function tabEncargado(tab){
  ['tablero','asignar','notif','reporte','inventario','formulas','validar','config'].forEach(function(t){var el=document.getElementById('tab-'+t);if(el)el.classList.remove('active');});
  var el=document.getElementById('tab-'+tab); if(el) el.classList.add('active');
  if(tab==='tablero') renderTablero();
  else if(tab==='asignar') renderFormAsignar();
  else if(tab==='notif') renderNotifs('enc-body');
  else if(tab==='reporte') renderReporte();
  else if(tab==='inventario') renderInventario();
  else if(tab==='formulas') renderFormulas();
  else if(tab==='validar') renderValidar();
  else if(tab==='config') renderConfig();
}

function renderTablero(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="loading">Cargando tablero...</div>';
  from('ordenes_trabajo').select('*,operario:usuarios!operario_id(nombre),tabla:tablas(nombre,plantacion_id),tipo_labor:tipos_labor(nombre),subtipo:subtipos_labor(nombre)').order('creado_en',{ascending:false}).get().then(function(todas){
    var pend=todas.filter(function(o){return o.estado==='pendiente';}).length;
    var enP=todas.filter(function(o){return o.estado==='en_proceso';}).length;
    var comp=todas.filter(function(o){return o.estado==='completada';}).length;
    var html='<div class="stats-row"><div class="stat-card"><div class="stat-num stat-am">'+pend+'</div><div class="stat-lbl">Pendientes</div></div><div class="stat-card"><div class="stat-num stat-vd">'+enP+'</div><div class="stat-lbl">En proceso</div></div><div class="stat-card"><div class="stat-num stat-az">'+comp+'</div><div class="stat-lbl">Completadas</div></div></div>';
    if(!todas.length){html+='<div class="empty">Sin órdenes. Toca "+ Asignar" para crear una.</div>';}
    else{
      var act=todas.filter(function(o){return o.estado!=='completada'&&o.estado!=='cancelada';});
      var cer=todas.filter(function(o){return o.estado==='completada'||o.estado==='cancelada';});
      if(act.length) html+='<div class="seccion-titulo">Activas</div>'+act.map(cardHtml).join('');
      if(cer.length) html+='<div class="seccion-titulo" style="margin-top:1rem">Cerradas</div>'+cer.map(cardHtml).join('');
    }
    body.innerHTML=html;
    body.querySelectorAll('[data-can]').forEach(function(b){b.addEventListener('click',function(){cambiarEstado(this.dataset.can,'cancelada');});});
    body.querySelectorAll('[data-com]').forEach(function(b){b.addEventListener('click',function(){cambiarEstado(this.dataset.com,'completada');});});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function cardHtml(o){
  var p=cats.plantaciones.find(function(x){return x.id===o.tabla.plantacion_id;});
  var ic=ICONOS[o.tipo_labor.nombre]||'🔧';
  var bl={pendiente:'badge-pendiente',en_proceso:'badge-en_proceso',completada:'badge-completada',cancelada:'badge-completada'};
  var lb={pendiente:'Pendiente',en_proceso:'En proceso',completada:'Completada',cancelada:'Cancelada'};
  var ac='';
  if(o.estado==='pendiente') ac='<button class="btn-sm btn-cancelar" data-can="'+o.id+'">Cancelar</button>';
  if(o.estado==='en_proceso') ac='<button class="btn-sm btn-completar" data-com="'+o.id+'">Marcar completa</button> <button class="btn-sm btn-cancelar" data-can="'+o.id+'">Cancelar</button>';
  return '<div class="orden-card '+o.estado+'"><div class="orden-header"><div class="orden-labor">'+ic+' '+o.tipo_labor.nombre+(o.subtipo?' · '+o.subtipo.nombre:'')+'</div><span class="orden-badge '+bl[o.estado]+'">'+lb[o.estado]+'</span></div><div class="orden-meta"><strong>'+o.operario.nombre+'</strong> · '+(p?p.nombre:'')+' '+o.tabla.nombre+'<br/>Surcos: '+((o.surcos_asignados||[]).join(', ')||'todos')+'</div>'+(ac?'<div class="orden-actions">'+ac+'</div>':'')+'</div>';
}

function cambiarEstado(id,estado){
  from('ordenes_trabajo').eq('id',id).update({estado:estado}).then(function(){
    if(estado==='completada') from('notificaciones').insert({titulo:'✅ Labor completada',cuerpo:'Una orden fue marcada como completada.',icono:'✅',leida:false,para_rol:'encargado'}).then(function(){renderTablero();});
    else renderTablero();
  });
}

var asignarLaborSel=null;

function renderFormAsignar(){
  asignarLaborSel=null;
  var body=document.getElementById('enc-body');
  var tiles=cats.tiposLabor.map(function(l){
    return '<div class="labor-tile" data-id="'+l.id+'" data-nombre="'+l.nombre+'"><div class="labor-tile-ic">'+(ICONOS[l.nombre]||'🔧')+'</div><div class="labor-tile-lbl">'+l.nombre+'</div></div>';
  }).join('');
  body.innerHTML='<div class="seccion-titulo">Paso 1 de 2 · Selecciona la labor</div><div class="labor-grid">'+tiles+'<div class="labor-tile labor-tile-otra" id="labor-otra-tile"><div class="labor-tile-ic">➕</div><div class="labor-tile-lbl">Otra</div></div></div><div id="labor-otra-box" style="display:none;margin-top:.75rem;" class="form-card"><label style="display:block;font-size:.75rem;font-weight:600;color:var(--gris-3);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.04em;">Nombre de la labor</label><input type="text" id="labor-otra-input" placeholder="Ej. Fertirriego" style="width:100%;padding:.65rem .75rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.9rem;background:var(--gris-1);margin-bottom:.6rem;"><button class="btn-primary" id="labor-otra-btn">Usar esta labor</button></div>';
  body.querySelectorAll('.labor-tile[data-id]').forEach(function(el){
    el.addEventListener('click',function(){
      var lb=cats.tiposLabor.find(function(l){return l.id===this.dataset.id;}.bind(this));
      asignarLaborSel=lb;
      if(lb&&lb.requiere_tiempo){
        riegoAsigMinutos={};riegoAsigOperarios=[];riegoAsigFecha=new Date().toISOString().slice(0,10);
        renderAsigRiegoPlantaciones();
      } else if(lb&&lb.requiere_formula){
        aplicReset();
        renderAsigAplicPlantaciones();
      } else {
        renderFormAsignarPaso2();
      }
    });
  });
  document.getElementById('labor-otra-tile').addEventListener('click',function(){
    var box=document.getElementById('labor-otra-box');
    box.style.display=box.style.display==='none'?'':'none';
    if(box.style.display!=='none') document.getElementById('labor-otra-input').focus();
  });
  document.getElementById('labor-otra-btn').addEventListener('click',function(){
    var nombre=(document.getElementById('labor-otra-input').value||'').trim();
    if(!nombre){alert('Escribe el nombre de la labor.');return;}
    var existente=cats.tiposLabor.find(function(l){return l.nombre.toLowerCase()===nombre.toLowerCase();});
    if(existente){asignarLaborSel=existente;renderFormAsignarPaso2();return;}
    from('tipos_labor').insert({nombre:nombre,requiere_cantidad_insumo:false,requiere_tiempo:false,activo:true,orden:100}).then(function(){
      return from('tipos_labor').select('*').eq('nombre',nombre).get();
    }).then(function(rows){
      var lb=rows&&rows[0]?rows[0]:{id:null,nombre:nombre,requiere_cantidad_insumo:false,requiere_tiempo:false};
      cats.tiposLabor.push(lb);
      asignarLaborSel=lb;
      renderFormAsignarPaso2();
    }).catch(function(e){alert('Error: '+e.message);});
  });
}

function renderRiegoForm(){
  var cont=document.getElementById('frg-tablas');
  if(!cont) return;
  if(!asignarLaborSel||!asignarLaborSel.requiere_tiempo){cont.innerHTML='';return;}

  var ts=cats.tablas.filter(function(t){return t.plantacion_id===plId;});
  if(!ts.length){cont.innerHTML='<p class="hint">Primero elige una plantación.</p>';return;}
  cont.innerHTML=ts.map(function(t){return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><span style="flex:1;font-size:.85rem;font-weight:600;">'+t.nombre+'</span><input type="number" min="0" class="riego-min" data-tabla="'+t.id+'" placeholder="min" style="width:70px;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;background:var(--gris-1);"></div>';}).join('');

function renderAsigRiegoPlantaciones(){
  var body=document.getElementById('enc-body');
  var html='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">💧 Riego · Elige plantación<button type="button" onclick="renderFormAsignar()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Cambiar labor</button></div><div class="riego-grid">';
  cats.plantaciones.forEach(function(p){
    var tabs=cats.tablas.filter(function(t){return t.plantacion_id===p.id;});
    var asignadas=tabs.filter(function(t){return riegoAsigMinutos[t.id]>0;}).length;
    var cls=asignadas>0?'verde':'neutra';
    html+='<div class="riego-circle '+cls+'" data-pid="'+p.id+'"><span>'+p.nombre+'</span><small>'+asignadas+'/'+tabs.length+' tablas</small></div>';
  });
  html+='</div>';
  var totalAsig=Object.keys(riegoAsigMinutos).filter(function(k){return riegoAsigMinutos[k]>0;}).length;
  html+='<button class="btn-primary" style="margin-top:1.25rem;" '+(totalAsig?'':'disabled')+' onclick="renderAsigRiegoOperarios()">Continuar → ('+totalAsig+' tabla'+(totalAsig===1?'':'s')+' con tiempo)</button>';
  body.innerHTML=html;
  body.querySelectorAll('[data-pid]').forEach(function(el){el.addEventListener('click',function(){renderAsigRiegoTablas(this.dataset.pid);});});
}

function renderAsigRiegoTablas(plantacionId){
  var body=document.getElementById('enc-body');
  var p=cats.plantaciones.find(function(x){return x.id===plantacionId;});
  var tabs=cats.tablas.filter(function(t){return t.plantacion_id===plantacionId;});
  var html='<div class="seccion-titulo">💧 '+(p?p.nombre:'')+' · Elige tabla</div><div class="riego-grid">';
  tabs.forEach(function(t){
    var min=riegoAsigMinutos[t.id];
    var cls=min>0?'verde':'neutra';
    html+='<div class="riego-circle '+cls+'" data-tid="'+t.id+'"><span>'+t.nombre+'</span><small>'+(min>0?min+' min':'sin asignar')+'</small></div>';
  });
  html+='</div><button class="btn-back" style="margin-top:1rem;" onclick="renderAsigRiegoPlantaciones()">← Volver a plantaciones</button>';
  body.innerHTML=html;
  body.querySelectorAll('[data-tid]').forEach(function(el){el.addEventListener('click',function(){renderAsigRiegoMinutos(this.dataset.tid,plantacionId);});});
}

function renderAsigRiegoMinutos(tablaId,plantacionId){
  var body=document.getElementById('enc-body');
  var t=cats.tablas.find(function(x){return x.id===tablaId;});
  var actual=riegoAsigMinutos[tablaId]||'';
  body.innerHTML='<div class="seccion-titulo">💧 '+t.nombre+' · Duración de riego</div><div class="riego-ejec-card"><input type="number" id="riego-min-input" min="0" value="'+actual+'" placeholder="0" style="width:100%;text-align:center;font-size:2.4rem;font-weight:800;color:var(--verde-mid);border:none;background:transparent;outline:none;"><p class="hint">minutos</p><button class="btn-primary" id="riego-min-guardar">Guardar y seguir</button>'+(actual?'<button class="btn-sm btn-cancelar" style="margin-top:.6rem;width:100%;" id="riego-min-quitar">Quitar esta tabla</button>':'')+'</div><button class="btn-back" style="margin-top:1rem;" onclick="renderAsigRiegoTablas(\''+plantacionId+'\')">← Volver a tablas</button>';
  document.getElementById('riego-min-guardar').addEventListener('click',function(){
    var v=parseInt(document.getElementById('riego-min-input').value)||0;
    if(v>0) riegoAsigMinutos[tablaId]=v; else delete riegoAsigMinutos[tablaId];
    renderAsigRiegoTablas(plantacionId);
  });
  var q=document.getElementById('riego-min-quitar');
  if(q) q.addEventListener('click',function(){delete riegoAsigMinutos[tablaId];renderAsigRiegoTablas(plantacionId);});
}

function renderAsigRiegoOperarios(){

  var dur=document.getElementById('fdu').value, fec=document.getElementById('ffe').value, not=document.getElementById('fno').value||null;

  if(lb&&lb.requiere_tiempo){
    var filas=Array.from(document.querySelectorAll('.riego-min')).map(function(i){return {tabla:i.dataset.tabla,min:parseInt(i.value)||0};}).filter(function(r){return r.min>0;});

  }).catch(function(e){alert('Error: '+e.message);});
}

function cargarReporte(){
  var fechaEl=document.getElementById('fecha-rep');
  if(fechaEl&&fechaEl.value) repFecha=fechaEl.value;
  var fecha=repFecha;
  var body=document.getElementById('rep-body'); if(!body) return;
  body.innerHTML='<div class="loading">Cargando...</div>';
  from('ordenes_trabajo').select('*,operario:usuarios!operario_id(nombre),tabla:tablas(nombre,plantacion_id,cantidad_surcos),tipo_labor:tipos_labor(nombre)').eq('fecha_asignacion',fecha).order('creado_en',{ascending:false}).get().then(function(ordenes){
    if(!ordenes||!ordenes.length){body.innerHTML='<div class="empty">Sin actividad para esta fecha.</div>';return;}
    var grupos={};
    ordenes.forEach(function(o){
      var planta=o.tabla?cats.plantaciones.find(function(p){return p.id===o.tabla.plantacion_id;}):null;
      var key, label, sublabel;
      if(repVista==='trabajador'){
        key=o.operario_id;
        label=o.operario?o.operario.nombre:'Sin asignar';
        sublabel=(planta?planta.nombre:'')+' · '+(o.tabla?o.tabla.nombre:'');
      } else if(repVista==='plantacion'){
        key=o.tabla?o.tabla.plantacion_id:'sin-planta';
        label=planta?planta.nombre:'Sin plantación';
        sublabel=(o.tabla?o.tabla.nombre:'');
      } else if(repVista==='tarea'){
        key=o.tipo_labor_id;
        label=o.tipo_labor?o.tipo_labor.nombre:'Sin labor';
        sublabel=(planta?planta.nombre:'')+' · '+(o.tabla?o.tabla.nombre:'');
      } else {
        key=o.tabla_id;
        label=(planta?planta.nombre:'')+' · '+(o.tabla?o.tabla.nombre:'');
        sublabel='';
      }
      if(!grupos[key]){grupos[key]={label:label,ordenes:[]};}
      grupos[key].ordenes.push({o:o,sublabel:sublabel});
    });
    var html='';
    Object.keys(grupos).forEach(function(gid){
      var g=grupos[gid];
      var comp=g.ordenes.filter(function(x){return x.o.estado==='completada';}).length;

      g.ordenes.forEach(function(x){
        var o=x.o;
        var ic=o.estado==='completada'?'✅':o.estado==='en_proceso'?'🔄':'⏳';
        var su=(o.surcos_asignados&&o.surcos_asignados.length)?o.surcos_asignados.join(', '):'Todos';
        var etiqueta=repVista==='trabajador'?(o.tipo_labor?o.tipo_labor.nombre:''):repVista==='plantacion'?(o.tipo_labor?o.tipo_labor.nombre:''):repVista==='tarea'?(o.operario?o.operario.nombre:''):(o.tipo_labor?o.tipo_labor.nombre:'')+' · '+(o.operario?o.operario.nombre:'');
        html+='<div style="font-size:.78rem;padding:.5rem 0;border-bottom:1px solid var(--gris-1);"><div style="display:flex;justify-content:space-between;align-items:center;"><span>'+ic+' '+etiqueta+(x.sublabel?' · '+x.sublabel:'')+'</span><span style="color:var(--gris-3)">'+su+'</span></div><div id="foto-'+o.id+'"></div></div>';
      });
      html+='</div>';
    });
    body.innerHTML=html;
      ordenes.filter(function(o){return o.estado==='completada';}).forEach(function(o){
        fetch(URL_SB+'/rest/v1/registros_labor?select=foto_url&orden_id=eq.'+o.id+'&limit=1',{headers:{'apikey':KEY_SB,'Authorization':'Bearer '+KEY_SB}}).then(function(r){return r.json();}).then(function(regs){
          if(regs&&regs.length&&regs[0].foto_url&&regs[0].foto_url!=='pendiente'&&regs[0].foto_url!==null){
            var d=document.getElementById('foto-'+o.id);
            if(d){
              var url=regs[0].foto_url;
              var esVid=url.indexOf('.webm')>-1||url.indexOf('.mp4')>-1;
              d.innerHTML=esVid?'<div style="margin-top:6px;"><video src="'+url+'" style="width:160px;height:100px;border-radius:8px;" controls playsinline></video><br><a href="'+url+'" target="_blank" style="font-size:.72rem;color:var(--verde-mid);">▶ Abrir video</a></div>':'<img src="'+url+'" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-top:6px;cursor:pointer;" onclick="window.open(this.src)" title="Ver evidencia">';
            }
          }
        });
      });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

e="display:flex;gap:8px;align-items:center;"><input type="number" id="inv-n-min" min="0" value="0" style="flex:1;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;"><span class="hint" id="inv-n-unidad-lbl2" style="margin:0;min-width:40px;">kg</span></div><div style="display:flex;gap:8px;align-items:center;margin-top:.4rem;"><span class="hint" style="margin:0;">o convertir desde</span><input type="number" id="inv-n-min-paq" min="0" placeholder="0" style="width:70px;padding:.4rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.8rem;"><span class="hint" id="inv-n-min-paq-lbl" style="margin:0;">sacos</span></div></div><button class="btn-primary" id="inv-n-guardar">Guardar componente</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderInventario()">← Volver a inventario</button>';

  document.getElementById('inv-n-min-paq').addEventListener('input',function(){
    var f=parseFloat(document.getElementById('inv-n-factor-compra').value)||0;

function renderInventarioItem(itemId){
  var body=document.getElementById('enc-body');
  var it=cats.inventario.find(function(x){return x.id===itemId;});
  if(!it){renderInventario();return;}
  var tienePaquete=it.unidad_compra&&it.factor_compra>0;
  body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">'+it.nombre+'<button type="button" onclick="renderInventarioEditar(\''+itemId+'\')" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">✏️ Editar</button></div><div class="form-card"><div class="resumen-row"><span class="resumen-key">Stock actual</span><span class="resumen-val">'+numFmt(it.stock_actual)+' '+it.unidad+'</span></div><div class="resumen-row"><span class="resumen-key">Stock mínimo</span><span class="resumen-val">'+numFmt(it.stock_minimo)+' '+it.unidad+'</span></div>'+(tienePaquete?'<div class="resumen-row"><span class="resumen-key">Se compra en</span><span class="resumen-val">'+it.unidad_compra+' de '+numFmt(it.factor_compra)+' '+it.unidad+' c/u</span></div>':'')+'</div><div class="form-card"><div class="form-group"><label>¿Qué pasó?</label><select id="inv-mov-tipo"><option value="entrada">➕ Entrada — llegó pedido/compra</option><option value="salida">➖ Salida — se usó o se perdió</option><option value="ajuste">✏️ Ajuste — corregir un conteo mal capturado</option></select></div>'+(tienePaquete?'<div class="form-group"><label>¿Cómo lo vas a contar?</label><div style="display:flex;gap:8px;"><button type="button" class="op-chip sel" id="inv-mov-modo-base" data-modo="base">Por '+it.unidad+'</button><button type="button" class="op-chip" id="inv-mov-modo-paq" data-modo="paquete">Por '+it.unidad_compra+' ('+numFmt(it.factor_compra)+' '+it.unidad+' c/u)</button></div></div>':'')+'<div class="form-group"><label id="inv-mov-cant-lbl">¿Cuánto? (en '+it.unidad+')</label><input type="number" id="inv-mov-cantidad" min="0" placeholder="0" step="any"><p class="hint" id="inv-mov-ejemplo">Ej: si llegaron 12 kg sueltos, escribe 12.</p></div><p class="hint" id="inv-mov-equiv" style="display:none;font-weight:700;color:var(--verde-mid);"></p><div class="form-group"><label>Nota (opcional)</label><input type="text" id="inv-mov-motivo" placeholder="Ej. Proveedor X, factura #123, o para qué se usó"></div><button class="btn-primary" id="inv-mov-guardar">Registrar</button></div><div id="inv-mov-historial"><div class="loading">Cargando movimientos...</div></div><button class="btn-back" style="margin-top:1rem;" onclick="renderInventario()">← Volver a inventario</button>';
  var modoCaptura='base';
  if(tienePaquete){
    document.getElementById('inv-mov-modo-base').addEventListener('click',function(){modoCaptura='base';this.classList.add('sel');document.getElementById('inv-mov-modo-paq').classList.remove('sel');actualizarEtiquetaMov();});
    document.getElementById('inv-mov-modo-paq').addEventListener('click',function(){modoCaptura='paquete';this.classList.add('sel');document.getElementById('inv-mov-modo-base').classList.remove('sel');actualizarEtiquetaMov();});
  }
  function actualizarEtiquetaMov(){
    document.getElementById('inv-mov-cant-lbl').textContent='¿Cuánto? (en '+(modoCaptura==='paquete'?it.unidad_compra:it.unidad)+')';
    document.getElementById('inv-mov-ejemplo').textContent=modoCaptura==='paquete'?('Ej: si llegaron 3 '+it.unidad_compra.toLowerCase()+'s, escribe 3.'):('Ej: si llegaron '+numFmt(it.factor_compra||12)+' '+it.unidad+' sueltos, escribe '+numFmt(it.factor_compra||12)+'.');
    calcularEquivalencia();
  }
  function calcularEquivalencia(){
    var equivEl=document.getElementById('inv-mov-equiv');
    var cant=parseFloat(document.getElementById('inv-mov-cantidad').value)||0;
    if(modoCaptura==='paquete'&&cant>0){
      equivEl.style.display='block';
      equivEl.textContent='= '+numFmt(cant*it.factor_compra)+' '+it.unidad+' en total';
    } else { equivEl.style.display='none'; }
  }
  document.getElementById('inv-mov-cantidad').addEventListener('input',calcularEquivalencia);
  document.getElementById('inv-mov-guardar').addEventListener('click',function(){
    var tipo=document.getElementById('inv-mov-tipo').value;
    var cantInput=parseFloat(document.getElementById('inv-mov-cantidad').value)||0;
    if(cantInput<=0){alert('Captura una cantidad mayor a 0.');return;}
    var cant=modoCaptura==='paquete'?cantInput*it.factor_compra:cantInput;
    var motivoBase=document.getElementById('inv-mov-motivo').value||null;
    var motivo=(modoCaptura==='paquete')?(numFmt(cantInput)+' '+it.unidad_compra+(it.unidad_compra.slice(-1)!=='s'&&cantInput!=1?'s':'')+(motivoBase?' · '+motivoBase:'')):motivoBase;
    var stockAntes=it.stock_actual;
    var nuevoStock=tipo==='entrada'?it.stock_actual+cant:tipo==='salida'?it.stock_actual-cant:cant;
    from('movimientos_inventario').insert({item_id:it.id,tipo:tipo,cantidad:cant,motivo:motivo,usuario_id:usuario.id,stock_anterior:stockAntes,stock_posterior:nuevoStock}).then(function(){
      return from('inventario_items').eq('id',it.id).update({stock_actual:nuevoStock});
    }).then(function(){
      it.stock_actual=nuevoStock;
      showToast('✅ Movimiento registrado');
      renderInventarioItem(itemId);
    }).catch(function(e){alert('Error: '+e.message);});
  });
  from('movimientos_inventario').select('*,usuario:usuarios(nombre)').eq('item_id',itemId).order('creado_en',{ascending:false}).limit(15).get().then(function(movs){
    var cont=document.getElementById('inv-mov-historial');
    if(!cont) return;
    if(!movs||!movs.length){cont.innerHTML='<div class="empty">Sin movimientos registrados.</div>';return;}
    var ic={entrada:'➕',salida:'➖',ajuste:'✏️'};
    cont.innerHTML='<div class="seccion-titulo">Historial reciente</div>'+movs.map(function(m,idx){
      var f=new Date(m.creado_en).toLocaleDateString('es-MX',{day:'2-digit',month:'short'});
      var puedeBorrar=idx===0;
      return '<div style="font-size:.78rem;padding:.5rem 0;border-bottom:1px solid var(--gris-1);display:flex;justify-content:space-between;align-items:center;"><span>'+(ic[m.tipo]||'')+' '+numFmt(m.cantidad)+' '+it.unidad+(m.motivo?' · '+m.motivo:'')+'</span><span style="display:flex;align-items:center;gap:8px;"><span style="color:var(--gris-3)">'+(m.usuario?m.usuario.nombre+' · ':'')+f+'</span>'+(puedeBorrar?'<button type="button" class="inv-mov-borrar" data-mid="'+m.id+'" data-stockanterior="'+(m.stock_anterior==null?'':m.stock_anterior)+'" style="border:none;background:none;color:var(--rojo);font-size:.95rem;cursor:pointer;">✕</button>':'')+'</span></div>';
    }).join('')+'<p class="hint" style="margin-top:.5rem;">Solo se puede eliminar el movimiento más reciente, para no descuadrar el historial. Para corregir uno anterior, usa un "Ajuste".</p>';
    cont.querySelectorAll('.inv-mov-borrar').forEach(function(btn){
      btn.addEventListener('click',function(){
        if(!confirm('¿Eliminar este movimiento? El stock se corregirá automáticamente.')) return;
        var mid=this.dataset.mid;
        var stockAnterior=this.dataset.stockanterior;
        var stockCorregido=stockAnterior!==''?parseFloat(stockAnterior):null;
        if(stockCorregido===null){
          alert('Este movimiento es de antes de esta función y no tiene guardado el stock previo. Corrígelo manualmente con un "Ajuste".');
          return;
        }
        from('movimientos_inventario').eq('id',mid).delete().then(function(){
          return from('inventario_items').eq('id',it.id).update({stock_actual:stockCorregido});
        }).then(function(){
          it.stock_actual=stockCorregido;
          showToast('🗑️ Movimiento eliminado, stock corregido');
          renderInventarioItem(itemId);
        }).catch(function(e){alert('Error: '+e.message);});
      });
    });
  });
}

dad_compra?it.unidad_compra.toLowerCase():'paquetes')+'</span></div></div><button class="btn-primary" id="inv-e-guardar">Guardar cambios</button></div><div class="form-card"><button type="button" id="inv-e-eliminar" style="width:100%;padding:.75rem;border-radius:var(--radio-sm);border:1.5px solid var(--rojo);background:var(--rojo-tenue);color:var(--rojo);font-weight:700;font-size:.85rem;cursor:pointer;">🗑️ Eliminar componente</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderInventarioItem(\''+itemId+'\')">← Cancelar</button>';

var VIA_ICONOS={'Riego':'💧','Foliar':'🌿','Drench':'🧪'};
var CATEGORIA_ICONOS={'Nutrición':'🌱','Plaga':'🐛','Estimulación':'⚡'};
var BOMBA_ICONOS={'inyeccion':'🛢️','motor':'⚙️','manual':'🤲'};
var BOMBA_LABELS={'inyeccion':'Bomba Inyección','motor':'Bomba Motor','manual':'Bomba Manual'};
var formulaVia=null, formulaCategoria=null, formulaBombas=[], formulaCompRows=[], formulaCompSeq=0, formulaEditId=null;
var formulaPlantacionId=null, formulaTablaId=null;

function renderFormulas(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">Fórmulas<button type="button" onclick="renderFormulaForm()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nueva fórmula</button></div><div class="loading">Cargando fórmulas...</div>';
  Promise.all([
    from('formulas_aplicacion').select('*,tabla:tablas(nombre,plantacion_id)').eq('activo',true).order('fecha_programada').get(),
    from('formula_componentes').select('*,item:inventario_items(nombre,unidad,stock_actual)').get()
  ]).then(function(r){
    var rows=r[0]||[], todosComps=r[1]||[];
    if(!rows.length){body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">Fórmulas<button type="button" onclick="renderFormulaForm()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nueva fórmula</button></div><div class="empty">🧪 Aún no hay fórmulas registradas.</div>';return;}
    var html='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">Fórmulas<button type="button" onclick="renderFormulaForm()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nueva fórmula</button></div>';
    html+=rows.map(function(f){
      var bombasTxt=(f.bombas_compatibles||[]).map(function(b){return BOMBA_ICONOS[b]||'';}).join(' ');
      var p=f.tabla?cats.plantaciones.find(function(x){return x.id===f.tabla.plantacion_id;}):null;
      var ubicacion=(p?p.nombre+' · ':'')+(f.tabla?f.tabla.nombre:'sin tabla');
      var comps=todosComps.filter(function(c){return c.formula_id===f.id;});
      var faltantes=comps.filter(function(c){return c.item&&(c.cantidad_base>c.item.stock_actual);});
      var colorBorde=faltantes.length?'var(--rojo)':'var(--verde-mid)';
      var alerta=faltantes.length?'<div style="color:var(--rojo);font-weight:700;font-size:.75rem;margin-top:.25rem;">⚠️ Falta material: '+faltantes.map(function(c){return c.item.nombre;}).join(', ')+' — pedir antes del '+(f.fecha_programada||'?')+'</div>':'';
      return '<div class="orden-card" style="cursor:pointer;border-left-color:'+colorBorde+';" data-fid="'+f.id+'"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.92rem">'+(VIA_ICONOS[f.via]||'')+' '+f.nombre+'</strong><span style="font-size:.72rem;color:var(--gris-3)">'+(CATEGORIA_ICONOS[f.categoria]||'')+' '+f.categoria+'</span></div><div class="orden-meta">📍 '+ubicacion+' · '+f.via+(f.fecha_programada?' · 📅 '+f.fecha_programada:'')+' · Base 🛢️ '+f.volumen_base_litros+' L'+(bombasTxt?' · '+bombasTxt:'')+'</div>'+alerta+'</div>';
    }).join('');
    body.innerHTML=html;
    body.querySelectorAll('[data-fid]').forEach(function(el){el.addEventListener('click',function(){renderFormulaForm(this.dataset.fid);});});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderFormulaForm(formulaId){
  formulaEditId=formulaId||null;
  formulaVia=null; formulaCategoria=null; formulaBombas=[]; formulaCompRows=[]; formulaCompSeq=0;
  formulaPlantacionId=null; formulaTablaId=null;
  if(formulaId){
    Promise.all([
      from('formulas_aplicacion').select('*').eq('id',formulaId).get(),
      from('formula_componentes').select('*,item:inventario_items(nombre,unidad)').eq('formula_id',formulaId).get()
    ]).then(function(r){
      var f=r[0]&&r[0][0], comps=r[1]||[];
      if(!f){renderFormulas();return;}
      formulaVia=f.via; formulaCategoria=f.categoria; formulaBombas=(f.bombas_compatibles||[]).slice();
      formulaTablaId=f.tabla_id||null;
      var tb=cats.tablas.find(function(t){return t.id===formulaTablaId;});
      formulaPlantacionId=tb?tb.plantacion_id:null;
      formulaCompRows=comps.map(function(c){formulaCompSeq++;return {row:formulaCompSeq,item_id:c.item_id,nombre:c.item?c.item.nombre:'',unidad:c.item?c.item.unidad:'',cantidad:c.cantidad_base};});
      window._formulaNombreExistente=f.nombre; window._formulaNotasExistente=f.notas; window._formulaFechaExistente=f.fecha_programada;
      renderFormulaPasoPlantacion();
    });
  } else {
    window._formulaNombreExistente=''; window._formulaNotasExistente=''; window._formulaFechaExistente='';
    renderFormulaPasoPlantacion();
  }
}

function formulaCancelarLink(){return '<button type="button" onclick="renderFormulas()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Cancelar</button>';}

function renderFormulaPasoPlantacion(){
  var body=document.getElementById('enc-body');
  var tiles=cats.plantaciones.map(function(p){
    return '<div class="labor-tile'+(formulaPlantacionId===p.id?' labor-tile-otra':'')+'" data-pid="'+p.id+'"><div class="labor-tile-ic">🌿</div><div class="labor-tile-lbl">'+p.nombre+'</div></div>';
  }).join('');
  body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">Paso 1 de 8 · Plantación'+formulaCancelarLink()+'</div><div class="labor-grid">'+tiles+'</div>';

function renderFormulaPasoFecha(){

    window._formulaFechaExistente=document.getElementById('fm-fecha-input').value||new Date().toISOString().slice(0,10);

function renderFormulaPasoComponentes(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">Paso 8 de 9 · Componentes</div><div id="fm-comp-list"></div><button type="button" onclick="agregarFormulaComponenteRow()" style="padding:6px 14px;border-radius:20px;border:1.5px solid var(--verde-mid);background:var(--verde-tenue);color:var(--verde);font-size:.78rem;font-weight:600;cursor:pointer;">+ Agregar componente</button><button class="btn-primary" id="fm-comp-continuar" style="margin-top:1.25rem;">Continuar →</button><button class="btn-back" style="margin-top:.75rem;" onclick="renderFormulaPasoNombre()">← Volver a nombre</button>';

  document.getElementById('fm-comp-continuar').addEventListener('click',function(){
    var comps=formulaCompRows.filter(function(r){return r.item_id&&r.cantidad>0;});
    if(!comps.length){alert('Agrega al menos un componente con cantidad mayor a 0.');return;}

function pintarFormulaCompList(){
  var cont=document.getElementById('fm-comp-list');
  if(!cont) return;
  var opts=cats.inventario.map(function(it){return '<option value="'+it.id+'">'+it.nombre+' ('+it.unidad+')</option>';}).join('');
  cont.innerHTML=formulaCompRows.map(function(r){
    return '<div class="form-card" style="margin-bottom:.5rem;padding:.75rem;" data-row="'+r.row+'"><select class="fcomp-item" data-row="'+r.row+'"><option value="">Selecciona componente...</option>'+opts+'<option value="__nuevo__">+ Nuevo componente...</option></select><div class="fcomp-nuevo-box" data-row="'+r.row+'" style="display:none;margin-top:.5rem;gap:8px;"><input type="text" class="fcomp-nuevo-nombre" data-row="'+r.row+'" placeholder="Nombre del componente" style="width:100%;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;margin-bottom:.4rem;"><select class="fcomp-nuevo-unidad" data-row="'+r.row+'" style="width:100%;margin-bottom:.4rem;"><option value="litros">Litros</option><option value="ml">Mililitros</option><option value="kg">Kilogramos</option><option value="gr">Gramos</option><option value="pza">Piezas</option></select><div style="display:flex;gap:6px;margin-bottom:.4rem;"><input type="text" class="fcomp-nuevo-unidadcompra" data-row="'+r.row+'" placeholder="¿Se compra en? Ej. Saco (opcional)" style="flex:1;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.8rem;"><input type="number" class="fcomp-nuevo-factorcompra" data-row="'+r.row+'" min="0" placeholder="Ej. 25" style="width:70px;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.8rem;"></div><button type="button" class="fcomp-crear" data-row="'+r.row+'" style="padding:6px 14px;border-radius:20px;border:1.5px solid var(--verde-mid);background:var(--verde-tenue);color:var(--verde);font-size:.78rem;font-weight:600;cursor:pointer;">Crear y usar</button></div><div style="display:flex;gap:8px;align-items:center;margin-top:.5rem;"><input type="number" class="fcomp-cant" data-row="'+r.row+'" min="0" placeholder="cantidad para 200L" value="'+(r.cantidad||'')+'" style="flex:1;padding:.5rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.85rem;"><span style="font-size:.78rem;color:var(--gris-3);min-width:40px;" class="fcomp-unidad-lbl" data-row="'+r.row+'">'+(r.unidad||'')+'</span><button type="button" class="fcomp-quitar" data-row="'+r.row+'" style="border:none;background:none;color:var(--rojo);font-size:1.1rem;cursor:pointer;">✕</button></div><p class="hint" style="margin:.3rem 0 0;">La cantidad de arriba es lo que la fórmula usa, no el stock — el stock se registra aparte en Inventario.</p></div>';
  }).join('');
  cont.querySelectorAll('.fcomp-item').forEach(function(sel){
    var rid=parseInt(sel.dataset.row);
    var row=formulaCompRows.find(function(x){return x.row===rid;});
    if(row&&row.item_id) sel.value=row.item_id;
    sel.addEventListener('change',function(){
      var box=cont.querySelector('.fcomp-nuevo-box[data-row="'+rid+'"]');
      if(this.value==='__nuevo__'){box.style.display='flex';box.style.flexDirection='column';row.item_id=null;}
      else{
        box.style.display='none';
        var it=cats.inventario.find(function(x){return x.id===this.value;}.bind(this));
        row.item_id=this.value||null; row.nombre=it?it.nombre:''; row.unidad=it?it.unidad:'';
        cont.querySelector('.fcomp-unidad-lbl[data-row="'+rid+'"]').textContent=row.unidad;
      }
    });
  });
  cont.querySelectorAll('.fcomp-crear').forEach(function(btn){
    btn.addEventListener('click',function(){
      var rid=parseInt(this.dataset.row);
      var nombre=(cont.querySelector('.fcomp-nuevo-nombre[data-row="'+rid+'"]').value||'').trim();
      var unidad=cont.querySelector('.fcomp-nuevo-unidad[data-row="'+rid+'"]').value;
      var unidadCompra=(cont.querySelector('.fcomp-nuevo-unidadcompra[data-row="'+rid+'"]').value||'').trim()||null;
      var factorCompra=parseFloat(cont.querySelector('.fcomp-nuevo-factorcompra[data-row="'+rid+'"]').value)||null;
      if(!nombre){alert('Escribe el nombre del componente.');return;}
      var existente=cats.inventario.find(function(x){return x.nombre.toLowerCase()===nombre.toLowerCase();});
      if(existente){aplicarComponenteCreado(rid,existente);return;}
      from('inventario_items').insert({nombre:nombre,unidad:unidad,stock_actual:0,stock_minimo:0,unidad_compra:unidadCompra,factor_compra:factorCompra,activo:true}).then(function(){
        return from('inventario_items').select('*').eq('activo',true).order('nombre').get();
      }).then(function(rows){
        cats.inventario=rows||[];
        var it=cats.inventario.find(function(x){return x.nombre.toLowerCase()===nombre.toLowerCase();});
        aplicarComponenteCreado(rid,it);
      }).catch(function(e){alert('Error: '+e.message);});
    });
  });
  cont.querySelectorAll('.fcomp-cant').forEach(function(inp){
    inp.addEventListener('input',function(){
      var rid=parseInt(this.dataset.row);
      var row=formulaCompRows.find(function(x){return x.row===rid;});
      if(row) row.cantidad=parseFloat(this.value)||0;
    });
  });
  cont.querySelectorAll('.fcomp-quitar').forEach(function(btn){
    btn.addEventListener('click',function(){
      var rid=parseInt(this.dataset.row);
      formulaCompRows=formulaCompRows.filter(function(x){return x.row!==rid;});
      if(!formulaCompRows.length) agregarFormulaComponenteRow(); else pintarFormulaCompList();
    });
  });
}

function aplicarComponenteCreado(rid,item){
  var row=formulaCompRows.find(function(x){return x.row===rid;});
  if(row&&item){row.item_id=item.id;row.nombre=item.nombre;row.unidad=item.unidad;}
  pintarFormulaCompList();
  showToast('📦 Componente creado con 0 en stock: '+(item?item.nombre:''));
}

function agregarFormulaComponenteRow(){
  formulaCompSeq++;
  formulaCompRows.push({row:formulaCompSeq,item_id:null,nombre:'',unidad:'',cantidad:null});
  pintarFormulaCompList();
}

function renderFormulaPasoNotas(){
  var body=document.getElementById('enc-body');
  var comps=formulaCompRows.filter(function(r){return r.item_id&&r.cantidad>0;});
  var bombasTxt=formulaBombas.map(function(b){return BOMBA_ICONOS[b]+' '+BOMBA_LABELS[b];}).join(', ');
  var p=cats.plantaciones.find(function(x){return x.id===formulaPlantacionId;});
  var t=cats.tablas.find(function(x){return x.id===formulaTablaId;});
  var faltantes=[];
  var resumenComp=comps.map(function(c){
    var it=cats.inventario.find(function(x){return x.id===c.item_id;});
    var stock=it?it.stock_actual:0;
    var falta=c.cantidad-stock;
    var alerta='';
    if(falta>0){faltantes.push({nombre:c.nombre,falta:falta,unidad:c.unidad});alerta=' · <span style="color:var(--rojo);font-weight:700;">⚠️ faltan '+numFmt(falta)+' '+c.unidad+'</span>';}
    return c.nombre+' · '+c.cantidad+' '+c.unidad+' (hay '+numFmt(stock)+')'+alerta;
  }).join('<br>');
  var fechaTxt=window._formulaFechaExistente||'';
  var alertaHtml='';
  if(faltantes.length){
    alertaHtml='<div style="background:var(--rojo-tenue);border:1.5px solid var(--rojo);border-radius:var(--radio-sm);padding:.75rem;margin-bottom:1rem;font-size:.82rem;"><strong style="color:var(--rojo);">⚠️ No alcanza el inventario para el '+fechaTxt+'</strong><br>Hay que pedir antes de esa fecha: '+faltantes.map(function(f){return f.nombre+' ('+numFmt(f.falta)+' '+f.unidad+')';}).join(', ')+'</div>';
  }
  body.innerHTML='<div class="seccion-titulo">Paso 9 de 9 · Notas y confirmar</div>'+alertaHtml+'<div class="form-card"><div class="resumen-card" style="margin-bottom:1rem;"><div class="resumen-row"><span class="resumen-key">Nombre</span><span class="resumen-val">'+window._formulaNombreExistente+'</span></div><div class="resumen-row"><span class="resumen-key">Ubicación</span><span class="resumen-val">📍 '+(p?p.nombre:'')+' · '+(t?t.nombre:'')+'</span></div><div class="resumen-row"><span class="resumen-key">Fecha de aplicación</span><span class="resumen-val">'+fechaTxt+'</span></div><div class="resumen-row"><span class="resumen-key">Vía</span><span class="resumen-val">'+VIA_ICONOS[formulaVia]+' '+formulaVia+'</span></div><div class="resumen-row"><span class="resumen-key">Tipo</span><span class="resumen-val">'+CATEGORIA_ICONOS[formulaCategoria]+' '+formulaCategoria+'</span></div><div class="resumen-row"><span class="resumen-key">Bomba</span><span class="resumen-val">'+bombasTxt+'</span></div><div class="resumen-row"><span class="resumen-key">Componentes</span></div><div style="font-size:.82rem;padding:.35rem 0;">'+resumenComp+'</div></div><p class="hint" style="margin-bottom:1rem;">ℹ️ Guardar esta fórmula <strong>no descuenta inventario todavía</strong> — solo es la receta planeada. El descuento real se hará cuando la asignes a un operario, en el módulo de Aplicaciones.</p><div class="form-group"><label>Notas (opcional)</label><input type="text" id="fm-notas-input" value="'+(window._formulaNotasExistente?window._formulaNotasExistente.replace(/"/g,'&quot;'):'')+'" placeholder="Instrucciones adicionales..."></div><button class="btn-primary" id="fm-guardar">'+(formulaEditId?'Guardar cambios':'Crear fórmula')+'</button></div>'+(formulaEditId?'<div class="form-card"><button type="button" id="fm-eliminar" style="width:100%;padding:.75rem;border-radius:var(--radio-sm);border:1.5px solid var(--rojo);background:var(--rojo-tenue);color:var(--rojo);font-weight:700;font-size:.85rem;cursor:pointer;">🗑️ Eliminar fórmula</button></div>':'')+'<button class="btn-back" style="margin-top:1rem;" onclick="renderFormulaPasoComponentes()">← Volver a componentes</button>';
  document.getElementById('fm-guardar').addEventListener('click',guardarFormula);
  if(formulaEditId){
    document.getElementById('fm-eliminar').addEventListener('click',function(){
      if(!confirm('¿Eliminar la fórmula "'+window._formulaNombreExistente+'"? Esta acción no se puede deshacer.')) return;
      from('formulas_aplicacion').eq('id',formulaEditId).update({activo:false}).then(function(){
        showToast('🗑️ Fórmula eliminada');
        renderFormulas();
      }).catch(function(e){alert('Error: '+e.message);});
    });
  }
}

function guardarFormula(){
  var nombre=window._formulaNombreExistente;
  var notas=document.getElementById('fm-notas-input').value||null;
  var comps=formulaCompRows.filter(function(r){return r.item_id&&r.cantidad>0;});
  var btn=document.getElementById('fm-guardar'); btn.disabled=true; btn.textContent='Guardando...';
  var payload={nombre:nombre,via:formulaVia,categoria:formulaCategoria,bombas_compatibles:formulaBombas,tabla_id:formulaTablaId,fecha_programada:window._formulaFechaExistente||null,volumen_base_litros:200,notas:notas,creado_por:usuario.id,activo:true};
  var guardar=formulaEditId?from('formulas_aplicacion').eq('id',formulaEditId).update(payload):from('formulas_aplicacion').insert(payload);
  guardar.then(function(resp){
    var fid=formulaEditId||(resp&&resp[0]&&resp[0].id);
    if(!fid){throw new Error('No se pudo obtener la fórmula guardada.');}
    var borrarViejos=formulaEditId?from('formula_componentes').eq('formula_id',fid).delete():Promise.resolve();
    return borrarViejos.then(function(){
      return Promise.all(comps.map(function(c){return from('formula_componentes').insert({formula_id:fid,item_id:c.item_id,cantidad_base:c.cantidad});}));
    });
  }).then(function(){
    showToast('✅ Fórmula guardada: '+nombre);
    renderFormulas();
  }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent=formulaEditId?'Guardar cambios':'Crear fórmula';});
}

}

function renderAsigAplicTablas(){
  var body=document.getElementById('enc-body');
  var p=cats.plantaciones.find(function(x){return x.id===aplic.plantacionId;});
  var tabs=cats.tablas.filter(function(t){return t.plantacion_id===aplic.plantacionId;});
  body.innerHTML='<div class="seccion-titulo">🧪 '+(p?p.nombre:'')+' · Elige tabla</div><div class="riego-grid" id="aplic-tablas-grid"><div class="loading">Buscando fórmulas...</div></div><button class="btn-back" style="margin-top:1rem;" onclick="renderAsigAplicPlantaciones()">← Volver a plantación</button>';
  from('formulas_aplicacion').select('id,tabla_id').eq('activo',true).get().then(function(formulas){

function cargarFormulaParaAsignar(formulaId){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="loading">Cargando fórmula...</div>';
  Promise.all([
    from('formulas_aplicacion').select('*').eq('id',formulaId).get(),
    from('formula_componentes').select('*,item:inventario_items(nombre,unidad,stock_actual)').eq('formula_id',formulaId).get()
  ]).then(function(r){
    aplic.formula=r[0]&&r[0][0];
    aplic.componentes=r[1]||[];
    if(!aplic.fecha) aplic.fecha=aplic.formula.fecha_programada||new Date().toISOString().slice(0,10);
    renderAsigAplicBomba();
  });
}

function renderAsigAplicBomba(){
  var body=document.getElementById('enc-body');
  var sugerida=(aplic.formula.bombas_compatibles||[])[0];
  var tiles=['inyeccion','motor','manual'].map(function(b){

    return '<div class="labor-tile'+(aplic.bomba===b?' labor-tile-otra':'')+'" data-bomba="'+b+'"><div class="labor-tile-ic">'+BOMBA_ICONOS[b]+'</div><div class="labor-tile-lbl">'+BOMBA_LABELS[b]+(esSugerida?' ⭐':'')+'</div></div>';
  }).join('');

function renderAsigAplicCantidadBombas(){

function renderAsigAplicComponentes(){
  var body=document.getElementById('enc-body');
  var faltantes=[];
  var filas=aplic.componentes.map(function(c){
    var cantEscalada=c.cantidad_base*aplic.factor;
    var stock=c.item?c.item.stock_actual:0;
    var falta=cantEscalada-stock;
    if(falta>0) faltantes.push({nombre:c.item?c.item.nombre:'',falta:falta,unidad:c.item?c.item.unidad:''});
    return '<div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--gris-1);font-size:.85rem;"><span>'+(c.item?c.item.nombre:'')+'</span><strong>'+numFmt(cantEscalada)+' '+(c.item?c.item.unidad:'')+'</strong></div>';
  }).join('');
  var alertaHtml=faltantes.length?'<div style="background:var(--rojo-tenue);border:1.5px solid var(--rojo);border-radius:var(--radio-sm);padding:.75rem;margin-bottom:1rem;font-size:.82rem;"><strong style="color:var(--rojo);">⚠️ No alcanza el inventario</strong><br>'+faltantes.map(function(f){return f.nombre+' (faltan '+numFmt(f.falta)+' '+f.unidad+')';}).join(', ')+'</div>':'';
  body.innerHTML='<div class="seccion-titulo">🧪 Receta ajustada · '+numFmt(aplic.volumen)+' L ('+Math.round(aplic.factor*100)+'% de la base)</div>'+alertaHtml+'<div class="form-card">'+filas+'</div><button class="btn-primary" style="margin-top:1.25rem;" id="aplic-comp-continuar">Continuar →</button><button class="btn-back" style="margin-top:.75rem;" onclick="'+(aplic.bomba==='inyeccion'?'renderAsigAplicBomba()':'renderAsigAplicCantidadBombas()')+'">← Volver</button>';
  document.getElementById('aplic-comp-continuar').addEventListener('click',function(){
    if(faltantes.length&&!confirm('El inventario no alcanza para esta cantidad. ¿Asignar de todas formas? (tendrás que comprar antes de aplicar)')) return;
    renderAsigAplicOperarios();
  });
}

function guardarAplicacion(){
  var btn=document.getElementById('aplic-finalizar'); btn.disabled=true; btn.textContent='Guardando...';
  var notas=document.getElementById('aplic-notas-input').value||null;
  var lbAplic=cats.tiposLabor.find(function(l){return l.requiere_formula;});
  var payloadBase={asignado_por:usuario.id,tabla_id:aplic.tablaId,tipo_labor_id:lbAplic.id,formula_id:aplic.formula.id,bomba_usada:aplic.bomba,volumen_aplicado_litros:aplic.volumen,factor_escala:aplic.factor,fecha_asignacion:aplic.fecha,notas_encargado:notas,estado:'pendiente',validado_ingeniero:false,duracion:'dia'};
  var ordenesPromesa=Promise.all(aplic.operarios.map(function(oid){
    return from('ordenes_trabajo').insert(Object.assign({},payloadBase,{operario_id:oid}));
  }));
  ordenesPromesa.then(function(resultados){
    var primeraOrdenId=resultados&&resultados[0]&&resultados[0][0]&&resultados[0][0].id;
    var movs=aplic.componentes.map(function(c){
      var cant=c.cantidad_base*aplic.factor;
      var nuevoStock=(c.item?c.item.stock_actual:0)-cant;
      return from('movimientos_inventario').insert({item_id:c.item_id,tipo:'salida',cantidad:cant,motivo:'Aplicación: '+aplic.formula.nombre,referencia_orden_id:primeraOrdenId,usuario_id:usuario.id,stock_anterior:c.item?c.item.stock_actual:0,stock_posterior:nuevoStock}).then(function(){
        return from('inventario_items').eq('id',c.item_id).update({stock_actual:nuevoStock});
      });
    });
    return Promise.all(movs);
  }).then(function(){
    return from('inventario_items').select('*').eq('activo',true).order('nombre').get();
  }).then(function(rows){
    cats.inventario=rows||[];
    return Promise.all(aplic.operarios.map(function(oid){
      return from('notificaciones').insert({titulo:'🧪 Aplicación asignada',cuerpo:usuario.nombre+' asignó a '+(cats.operarios.find(function(o){return o.id===oid;})||{}).nombre+': '+aplic.formula.nombre,icono:'🧪',leida:false,para_rol:'operario',para_usuario:oid});
    }));
  }).then(function(){
    showToast('✅ Aplicación asignada. Inventario descontado, pendiente de validar.');
    renderFormAsignar();
  }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='✅ Asignar aplicación';});
}

function renderValidar(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">Validar aplicaciones</div><div class="loading">Cargando...</div>';
  from('ordenes_trabajo').select('*,tabla:tablas(nombre,plantacion_id),formula:formulas_aplicacion(nombre,via,categoria),operario:usuarios!operario_id(nombre),asignador:usuarios!asignado_por(nombre)').eq('validado_ingeniero',false).not('formula_id','is','null').order('creado_en',{ascending:false}).get().then(function(rows){
    if(!rows||!rows.length){body.innerHTML='<div class="seccion-titulo">Validar aplicaciones</div><div class="empty">✅ No hay aplicaciones pendientes de validar.</div>';return;}
    var html='<div class="seccion-titulo">Validar aplicaciones <span style="font-size:.75rem;color:var(--gris-3);font-weight:600;">('+rows.length+' pendientes)</span></div>';
    html+=rows.map(function(o){
      var p=cats.plantaciones.find(function(x){return x.id===o.tabla.plantacion_id;});
      return '<div class="orden-card" data-oid="'+o.id+'"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.92rem">'+(o.formula?o.formula.nombre:'')+'</strong><span style="font-size:.72rem;color:var(--gris-3)">'+(o.formula?o.formula.via:'')+'</span></div><div class="orden-meta">📍 '+(p?p.nombre:'')+' · '+o.tabla.nombre+'<br>👤 Asignó: '+(o.asignador?o.asignador.nombre:'')+' · Operario: '+(o.operario?o.operario.nombre:'')+'<br>💧 '+numFmt(o.volumen_aplicado_litros)+' L con '+(BOMBA_LABELS[o.bomba_usada]||o.bomba_usada)+' · 📅 '+o.fecha_asignacion+'</div><button type="button" class="btn-sm btn-completar" data-validar="'+o.id+'" style="margin-top:.5rem;">✅ Validar</button></div>';
    }).join('');
    body.innerHTML=html;
    body.querySelectorAll('[data-validar]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var oid=this.dataset.validar;
        from('ordenes_trabajo').eq('id',oid).update({validado_ingeniero:true,validado_por:usuario.id,validado_en:new Date().toISOString()}).then(function(){
          showToast('✅ Aplicación validada');
          renderValidar();
        }).catch(function(e){alert('Error: '+e.message);});
      });
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function pararRiegoTimer(){if(riegoTimer){clearInterval(riegoTimer);riegoTimer=null;}riegoAlarmaActiva=false;}

function cargarTareas(){
  pararRiegoTimer();
  riegoSincronizar();
  var body=document.getElementById('op-body');
  body.innerHTML='<div class="loading">Cargando tus tareas...</div>';
  var hoy=new Date().toISOString().slice(0,10);
  Promise.all([
    from('ordenes_trabajo').select('*,tabla:tablas(nombre,plantacion_id,cantidad_surcos),tipo_labor:tipos_labor(nombre,requiere_cantidad_insumo,unidad_insumo,requiere_tiempo),subtipo:subtipos_labor(nombre)').eq('operario_id',usuario.id).in('estado',['pendiente','en_proceso']).order('creado_en',{ascending:false}).get(),
    from('ordenes_trabajo').select('*,tabla:tablas(nombre,plantacion_id),tipo_labor:tipos_labor(nombre,requiere_tiempo)').eq('operario_id',usuario.id).eq('fecha_asignacion',hoy).order('creado_en',{ascending:false}).get()
  ]).then(function(res){
    var todas=res[0]||[], hoyOrdenes=res[1]||[];
    riegoOrdenes=hoyOrdenes.filter(function(o){return o.tipo_labor&&o.tipo_labor.requiere_tiempo;});
    var tareas=todas.filter(function(t){return !(t.tipo_labor&&t.tipo_labor.requiere_tiempo);});
    var html='';
    if(riegoOrdenes.length){
      var comp=riegoOrdenes.filter(function(o){return o.estado==='completada';}).length;
      html+='<div class="tarea-card" style="border-left-color:var(--tierra);cursor:pointer;" onclick="renderRiegoPlantaciones()"><div class="tarea-title">💧 Riego de hoy</div><div class="tarea-meta">'+comp+' de '+riegoOrdenes.length+' tablas regadas · toca para entrar</div></div>';
    }
