function renderSolicitudesOperarioRevision(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">📨 Solicitudes de colaboradores</div><div class="loading">Cargando...</div>';
  from('solicitudes_operario').select('*,operario:usuarios!operario_id(nombre),activo_rancho:activos_rancho(nombre)').order('creado_en',{ascending:false}).get().then(function(rows){
    rows=rows||[];
    var headerHtml='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">📨 Solicitudes de colaboradores<button type="button" onclick="renderEmpleadosMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Empleados</button></div>';
    if(!rows.length){body.innerHTML=headerHtml+'<div class="empty">Sin solicitudes por ahora.</div>';return;}
    var pend=rows.filter(function(s){return s.estado==='pendiente';});
    var resueltos=rows.filter(function(s){return s.estado!=='pendiente';});
    var estLbl={pendiente:'⏳ Pendiente',atendida:'✅ Atendida',rechazada:'❌ Rechazada'};
    var estColor={pendiente:'var(--tierra)',atendida:'var(--verde-mid)',rechazada:'var(--rojo)'};
    var tipoLbl={prestamo:'💰 Préstamo',herramienta:'⚠️ Herramienta',otro:'💬 Otro'};
    function tarjeta(s){
      var partesMsg=s.mensaje.split('\n');
      var textoMsg=partesMsg[0];
      var fotoMsg=partesMsg[1]&&partesMsg[1].indexOf('http')===0?partesMsg[1]:null;
      var ac=s.estado==='pendiente'?'<div style="display:flex;gap:8px;margin-top:.6rem;flex-wrap:wrap;">'+(s.tipo==='prestamo'?'<button class="btn-sm btn-completar" data-aprob-prestamo="'+s.id+'" data-op="'+s.operario_id+'" data-monto="'+s.monto_solicitado+'" data-motivo="'+s.mensaje.replace(/"/g,'&quot;')+'">✅ Aprobar y registrar</button>':'<button class="btn-sm btn-completar" data-atender="'+s.id+'">✅ Marcar atendida</button>')+'<button class="btn-sm btn-cancelar" data-rechazar="'+s.id+'">❌ Rechazar</button></div>':'';
      return '<div class="orden-card" style="border-left-color:'+estColor[s.estado]+';"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem">'+(tipoLbl[s.tipo]||s.tipo)+(s.activo_rancho?' — '+s.activo_rancho.nombre:'')+' · '+(s.operario?s.operario.nombre:'')+'</strong><span style="font-size:.72rem;font-weight:700;color:'+estColor[s.estado]+';">'+estLbl[s.estado]+'</span></div><div class="orden-meta">'+(s.monto_solicitado?'$'+parseFloat(s.monto_solicitado).toFixed(2)+' · ':'')+textoMsg+(fotoMsg?'<br/><a href="'+fotoMsg+'" target="_blank" style="color:var(--verde-mid);font-weight:700;">📎 Ver foto</a>':'')+(s.respuesta?'<br/>📩 '+s.respuesta:'')+'</div>'+ac+'</div>';
    }
    var html=headerHtml+'<div class="seccion-titulo" style="margin-top:0;">'+(pend.length?'<span style="font-size:.75rem;color:var(--rojo);font-weight:700;">('+pend.length+' pendientes)</span>':'Solicitudes')+'</div>';
    if(pend.length) html+=pend.map(tarjeta).join('');
    if(resueltos.length) html+='<div class="seccion-titulo" style="margin-top:1rem;">Resueltas</div>'+resueltos.map(tarjeta).join('');
    body.innerHTML=html;
    body.querySelectorAll('[data-aprob-prestamo]').forEach(function(b){
      b.addEventListener('click',function(){
        renderNuevoPrestamo({operarioId:this.dataset.op,monto:this.dataset.monto,concepto:this.dataset.motivo,solicitudId:this.dataset.aprobPrestamo});
      });
    });
    body.querySelectorAll('[data-atender]').forEach(function(b){b.addEventListener('click',function(){resolverSolicitudOperario(this.dataset.atender,'atendida');});});
    body.querySelectorAll('[data-rechazar]').forEach(function(b){b.addEventListener('click',function(){resolverSolicitudOperario(this.dataset.rechazar,'rechazada');});});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function resolverSolicitudOperario(id,estado){
  var respuesta=prompt(estado==='atendida'?'¿Algún comentario para el colaborador? (opcional)':'¿Por qué se rechaza? (se le va a mostrar)');
  if(respuesta===null) return;
  from('solicitudes_operario').select('*').eq('id',id).get().then(function(rows){
    var s=rows&&rows[0];
    return from('solicitudes_operario').eq('id',id).update({estado:estado,respuesta:respuesta||null,atendido_por:usuario.id,atendido_en:new Date().toISOString()}).then(function(){
      if(s) return from('notificaciones').insert({titulo:estado==='atendida'?'✅ Solicitud atendida':'❌ Solicitud rechazada',cuerpo:'Tu solicitud fue '+(estado==='atendida'?'atendida':'rechazada')+(respuesta?': '+respuesta:''),icono:estado==='atendida'?'✅':'❌',leida:false,para_rol:'operario',para_usuario:s.operario_id});
    });
  }).then(function(){
    showToast(estado==='atendida'?'✅ Marcada como atendida':'❌ Rechazada');
    renderSolicitudesOperarioRevision();
  }).catch(function(e){alert('Error: '+e.message);});
}

function renderPermisosRevision(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">Permisos</div><div class="loading">Cargando...</div>';
  var headerHtml='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">Permisos<button type="button" onclick="renderEmpleadosMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Empleados</button></div><div style="display:flex;flex-wrap:wrap;gap:.4rem 1rem;margin-bottom:1rem;">'+
    '<button type="button" onclick="renderEvaluarComportamiento()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">🤝 Comportamiento</button>'+
  '</div>';
  from('permisos').select('*,operario:usuarios!usuario_id(nombre)').order('creado_en',{ascending:false}).get().then(function(rows){
    if(!rows||!rows.length){body.innerHTML=headerHtml+'<div class="empty">Sin solicitudes de permiso.</div>';return;}
    var pend=rows.filter(function(p){return p.estado==='pendiente';});
    var resueltos=rows.filter(function(p){return p.estado!=='pendiente';});
    var estLbl={pendiente:'⏳ Pendiente',aprobado:'✅ Aprobado',rechazado:'❌ Rechazado'};
    var estColor={pendiente:'var(--tierra)',aprobado:'var(--verde-mid)',rechazado:'var(--rojo)'};
    function tarjeta(p){
      var ac=p.estado==='pendiente'?'<div style="display:flex;gap:8px;margin-top:.6rem;flex-wrap:wrap;"><button class="btn-sm btn-completar" data-aprob-goce="'+p.id+'">✅ Aprobar con goce</button><button class="btn-sm" style="background:var(--gris-1);color:var(--negro);" data-aprob-sin="'+p.id+'">✅ Aprobar sin goce</button><button class="btn-sm btn-cancelar" data-rech="'+p.id+'">❌ Rechazar</button></div>':'';
      var goceTxt=p.estado==='aprobado'?(p.con_goce?'<br>💰 Con goce de sueldo (se paga el día)':'<br>🚫 Sin goce de sueldo (no se paga, no cuenta como falta)'):'';
      return '<div class="orden-card" style="border-left-color:'+estColor[p.estado]+';"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem">'+(p.tipo==='medico'?'🩺 Médico':'👤 Personal')+' · '+(p.operario?p.operario.nombre:'')+'</strong><span style="font-size:.72rem;font-weight:700;color:'+estColor[p.estado]+';">'+estLbl[p.estado]+'</span></div><div class="orden-meta">'+(p.folio?'🔖 '+p.folio+'<br>':'')+'📅 '+p.fecha_inicio+' a '+p.fecha_fin+(p.motivo?'<br>📝 '+p.motivo:'')+(p.evidencia_url?'<br><a href="'+p.evidencia_url+'" target="_blank" style="color:var(--verde-mid);font-weight:700;">📎 Ver comprobante</a>':'')+goceTxt+'</div>'+ac+'</div>';
    }
    var html=headerHtml+'<div class="seccion-titulo" style="margin-top:0;">'+(pend.length?'<span style="font-size:.75rem;color:var(--rojo);font-weight:700;">('+pend.length+' pendientes)</span>':'Solicitudes')+'</div>';
    if(pend.length) html+=pend.map(tarjeta).join('');
    if(resueltos.length) html+='<div class="seccion-titulo" style="margin-top:1rem;">Resueltos</div>'+resueltos.map(tarjeta).join('');
    body.innerHTML=html;
    body.querySelectorAll('[data-aprob-goce]').forEach(function(b){b.addEventListener('click',function(){resolverPermiso(this.dataset.aprobGoce,'aprobado',true);});});
    body.querySelectorAll('[data-aprob-sin]').forEach(function(b){b.addEventListener('click',function(){resolverPermiso(this.dataset.aprobSin,'aprobado',false);});});
    body.querySelectorAll('[data-rech]').forEach(function(b){b.addEventListener('click',function(){resolverPermiso(this.dataset.rech,'rechazado',null);});});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function resolverPermiso(id,estado,conGoce){
  from('permisos').select('*').eq('id',id).get().then(function(rows){
    var p=rows&&rows[0];
    var payload={estado:estado,revisado_por:usuario.id,revisado_en:new Date().toISOString()};
    if(estado==='aprobado') payload.con_goce=!!conGoce;
    return from('permisos').eq('id',id).update(payload).then(function(){
      var goceMsg=estado==='aprobado'?(conGoce?' (con goce de sueldo)':' (sin goce de sueldo)'):'';
      if(p) return from('notificaciones').insert({titulo:estado==='aprobado'?'✅ Permiso aprobado':'❌ Permiso rechazado',cuerpo:'Tu solicitud de permiso '+p.tipo+' ('+p.fecha_inicio+' a '+p.fecha_fin+') fue '+(estado==='aprobado'?'aprobada'+goceMsg:'rechazada')+'.',icono:estado==='aprobado'?'✅':'❌',leida:false,para_rol:'operario',para_usuario:p.usuario_id});
    });
  }).then(function(){
    showToast(estado==='aprobado'?'✅ Permiso aprobado':'❌ Permiso rechazado');
    renderPermisosRevision();
  }).catch(function(e){alert('Error: '+e.message);});
}

var ALARMA_LABELS={plantacion:'🌱 Plantación',plagas:'🐛 Plagas',infraestructura:'🏗️ Infraestructura',accidente:'🤕 Accidente'};

var alarmaEvidenciaBlob=null;

function capturarEvidenciaAlarma(e){
  var f=e.target.files&&e.target.files[0];
  if(!f) return;
  alarmaEvidenciaBlob=f;
  var ind=document.getElementById('al-ev-status');
  if(ind){
    var url=URL.createObjectURL(f);
    ind.innerHTML='✅ Foto lista<br><img src="'+url+'" style="max-width:120px;max-height:120px;border-radius:8px;margin-top:.4rem;border:1px solid var(--gris-2);">';
  }
}

function renderAlarmaForm(categoria){
  var body=document.getElementById('op-body');
  var necesitaUbicacion = categoria!=='accidente';
  var pO=cats.plantaciones.map(function(p){return '<option value="'+p.id+'">'+p.nombre+'</option>';}).join('');
  alarmaEvidenciaBlob=null;
  body.innerHTML='<div class="seccion-titulo">'+ALARMA_LABELS[categoria]+'</div><div class="form-card">'+
  (necesitaUbicacion?'<div class="form-group"><label>Plantación</label><select id="al-pl"><option value="">Selecciona...</option>'+pO+'</select></div><div class="form-group"><label>Tabla</label><select id="al-tb"><option value="">Selecciona plantación primero</option></select></div>':'')+
  '<div class="form-group"><label>¿Qué encontraste?</label><textarea id="al-desc" rows="4" placeholder="Ej. Encontré fuga en surco 30 / Surcos 1-20 con hormigas / Surco 24 línea de tutoreo trozada" style="width:100%;padding:.6rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.9rem;"></textarea></div>'+
  '<div class="form-group"><label>Foto (muy recomendada)</label><div style="display:flex;gap:8px;"><button type="button" onclick="document.getElementById(\'al-ev-cam\').click()" style="flex:1;padding:.75rem;border:1.5px solid var(--verde-mid);border-radius:var(--radio-sm);background:var(--verde-tenue);color:var(--verde);font-weight:600;cursor:pointer;">📷 Cámara</button><button type="button" onclick="document.getElementById(\'al-ev-gal\').click()" style="flex:1;padding:.75rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);background:var(--gris-1);cursor:pointer;">🖼️ Galería</button></div><div id="al-ev-status" class="hint" style="margin-top:.4rem;"></div></div>'+
  '<button class="btn-primary" id="al-enviar">🚨 Enviar reporte</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderAlarmasMenu()">← Volver a Alarmas</button><input type="file" id="al-ev-cam" accept="image/*" capture="environment" style="display:none" onchange="capturarEvidenciaAlarma(event)"><input type="file" id="al-ev-gal" accept="image/*" style="display:none" onchange="capturarEvidenciaAlarma(event)">';
  if(necesitaUbicacion){
    document.getElementById('al-pl').addEventListener('change',function(){
      var tabs=cats.tablas.filter(function(t){return t.plantacion_id===this.value;}.bind(this));
      document.getElementById('al-tb').innerHTML='<option value="">Selecciona...</option>'+tabs.map(function(t){return '<option value="'+t.id+'">'+t.nombre+'</option>';}).join('');
    });
  }
  document.getElementById('al-enviar').addEventListener('click',function(){
    var desc=document.getElementById('al-desc').value.trim();
    if(!desc){alert('Describe lo que encontraste.');return;}
    var plId=necesitaUbicacion?(document.getElementById('al-pl').value||null):null;
    var tbId=necesitaUbicacion?(document.getElementById('al-tb').value||null):null;
    if(necesitaUbicacion&&(!plId||!tbId)){alert('Selecciona la plantación y la tabla para poder dar seguimiento.');return;}
    var p=plId?cats.plantaciones.find(function(x){return x.id===plId;}):null;
    var t=tbId?cats.tablas.find(function(x){return x.id===tbId;}):null;
    var ubicacionTxt=(p&&t)?(' · 📍 '+p.nombre+' · '+t.nombre):'';
    var btn=this; btn.disabled=true; btn.textContent='Enviando...';
    var subirFoto = alarmaEvidenciaBlob ? subirComprobantePermiso(alarmaEvidenciaBlob).catch(function(){return null;}) : Promise.resolve(null);
    subirFoto.then(function(url){
      return from('alertas_campo').insert({usuario_id:usuario.id,categoria:categoria,descripcion:desc,plantacion_id:plId,tabla_id:tbId,evidencia_url:url});
    }).then(function(){
      return from('notificaciones').insert({titulo:'🚨 '+ALARMA_LABELS[categoria],cuerpo:usuario.nombre+' reportó: '+desc+ubicacionTxt+(alarmaEvidenciaBlob?' 📷':''),icono:'🚨',leida:false,para_rol:'encargado'});
    }).then(function(){
      alert('✅ Reporte enviado. El encargado ya fue notificado.');
      renderAlarmasMenu();
    }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='🚨 Enviar reporte';});
  });
}

var EMERGENCIA_TIPOS={medica:'🩺 Médica',seguridad:'🚨 Seguridad',incendio:'🔥 Incendio',otra:'⚠️ Otra'};

function renderEmergencia(){
  var body=document.getElementById('op-body');
  var tiles=Object.keys(EMERGENCIA_TIPOS).map(function(k){
    return '<div class="labor-tile" data-tipo="'+k+'"><div class="labor-tile-lbl" style="font-size:.85rem;">'+EMERGENCIA_TIPOS[k]+'</div></div>';
  }).join('');
  body.innerHTML='<div class="seccion-titulo" style="color:var(--rojo);">🆘 Emergencia</div><p class="hint" style="margin-bottom:1rem;">Esto avisa de inmediato a dueño, encargado y admin — ellos hacen la llamada a las autoridades. No marca ningún número por ti.</p><div class="labor-grid" style="grid-template-columns:repeat(2,1fr);">'+tiles+'</div><div id="emerg-detalle" style="display:none;margin-top:1rem;"><div class="form-card"><div class="form-group"><label>¿Qué pasó? (opcional)</label><textarea id="emerg-desc" rows="3" placeholder="Ej. Compañero con piquete de avispa, cerca de Tabla 2" style="width:100%;padding:.6rem;border:1.5px solid var(--gris-2);border-radius:var(--radio-sm);font-size:.9rem;"></textarea></div><button class="btn-primary" id="emerg-enviar" style="background:var(--rojo);">🆘 Avisar AHORA</button></div></div><button class="btn-back" style="margin-top:1.25rem;" onclick="renderAlarmasMenu()">← Volver a Alarmas</button>';
  var tipoSel=null;
  body.querySelectorAll('[data-tipo]').forEach(function(el){
    el.addEventListener('click',function(){
      tipoSel=this.dataset.tipo;
      body.querySelectorAll('[data-tipo]').forEach(function(x){x.classList.remove('labor-tile-otra');});
      this.classList.add('labor-tile-otra');
      document.getElementById('emerg-detalle').style.display='block';
    });
  });
  document.getElementById('emerg-enviar').addEventListener('click',function(){
    if(!tipoSel){alert('Selecciona qué tipo de emergencia es.');return;}
    if(!confirm('¿Confirmas que es una emergencia real?\n\nSe avisará de inmediato a dueño, encargado y admin.')) return;
    var desc=document.getElementById('emerg-desc').value.trim()||null;
    notificarEmergencia(tipoSel,desc);
  });
}

function notificarEmergencia(tipo,desc){
  from('alertas_campo').insert({usuario_id:usuario.id,categoria:'emergencia',descripcion:(EMERGENCIA_TIPOS[tipo]||tipo)+(desc?' — '+desc:'')}).catch(function(){});
  from('notificaciones').insert({titulo:'🆘 EMERGENCIA — '+(EMERGENCIA_TIPOS[tipo]||tipo),cuerpo:usuario.nombre+' reportó una emergencia'+(desc?': '+desc:'')+'. ¡Llama ya!',icono:'🆘',leida:false,para_rol:'encargado'}).then(function(){

function renderMisHerramientas(){

    rows=rows||[];

    var hoy=fechaHoyLocal();
    var html='<div class="seccion-titulo">🔧 Mis herramientas y equipo</div><p class="hint" style="margin-bottom:.75rem;">Aquí solo consultas — el mantenimiento se hace desde tus tareas asignadas en "Mis tareas".</p>';
    html+=rows.map(function(it){
      var requiereMant=false;

        '<div class="orden-meta">'+ultMant+'</div>'+

    }).join('');

    body.querySelectorAll('.mh-reportar').forEach(function(btn){
      btn.addEventListener('click',function(){

function renderResumenNomina(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">📊 Historial nómina</div><div class="loading">Calculando...</div>';
  var hoyD=new Date();
  var primerDiaMes=new Date(hoyD.getFullYear(),hoyD.getMonth(),1).toISOString().slice(0,10);
  var nombreMes=hoyD.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
  Promise.all([
    from('asistencia_registros').select('*').gte('fecha',primerDiaMes).get(),
    from('permisos').select('*').eq('estado','aprobado').get()
  ]).then(function(r){
    var registros=r[0]||[];
    var permisosAprobados=r[1]||[];
    var porOperario={};
    var permisosPorOperario={};
    cats.operarios.forEach(function(o){porOperario[o.id]=[];permisosPorOperario[o.id]=[];});
    registros.forEach(function(reg){if(porOperario[reg.usuario_id]) porOperario[reg.usuario_id].push(reg);});
    permisosAprobados.forEach(function(p){if(permisosPorOperario[p.usuario_id]) permisosPorOperario[p.usuario_id].push(p);});
    var html='<div class="seccion-titulo" style="text-transform:capitalize;">'+nombreMes+'</div><p class="hint" style="margin-bottom:.75rem;">Para ver los montos $ pagados o pendientes por semana, entra a "Generar Nómina" y navega entre semanas.</p>';
    html+=cats.operarios.map(function(o){
      var regs=porOperario[o.id]||[];
      var resumen=calcularResumenAsistencia(regs,primerDiaMes,permisosPorOperario[o.id]);
      var horasExtra=0;
      var porDia={};
      regs.forEach(function(reg){
        if(reg.modalidad!=='extras') return;
        if(!porDia[reg.fecha]) porDia[reg.fecha]={entrada:null,salida:null};
        if(reg.tipo==='entrada'&&(!porDia[reg.fecha].entrada||reg.registrado_en<porDia[reg.fecha].entrada)) porDia[reg.fecha].entrada=reg.registrado_en;
        if(reg.tipo==='salida'&&(!porDia[reg.fecha].salida||reg.registrado_en>porDia[reg.fecha].salida)) porDia[reg.fecha].salida=reg.registrado_en;
      });
      Object.keys(porDia).forEach(function(f){var d=porDia[f];if(d.entrada&&d.salida) horasExtra+=(new Date(d.salida)-new Date(d.entrada))/3600000;});
      var permisoTxt=(resumen.diasPermisoConGoce||resumen.diasPermisoSinGoce)?('<span>🩺 '+(resumen.diasPermisoConGoce+resumen.diasPermisoSinGoce)+' permiso(s)</span>'):'';
      return '<div class="orden-card"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem">'+o.nombre+'</strong></div><div class="orden-meta" style="display:flex;gap:1rem;margin-top:.3rem;flex-wrap:wrap;"><span>✅ '+resumen.trabajados+' trabajados</span><span style="color:var(--rojo);">❌ '+resumen.faltas+' faltas</span><span style="color:var(--tierra);">⏰ '+resumen.retardos+' retardos</span>'+permisoTxt+'</div>'+(horasExtra>0?'<div class="orden-meta" style="margin-top:.2rem;">💰 '+horasExtra.toFixed(1)+' h extra</div>':'')+'</div>';
    }).join('');
    body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderNominasMenu()">← Volver a Nóminas</button>';
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderGenerarNomina(fechaRef){
  fechaRef=fechaRef||new Date();
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo">💰 Generar Nómina</div><div class="loading">Calculando...</div>';
  var lunes=inicioDeSemana(fechaRef);
  var domingo=new Date(lunes); domingo.setDate(lunes.getDate()+6);
  var semanaInicio=lunes.toISOString().slice(0,10), semanaFin=domingo.toISOString().slice(0,10);
  var numSemana=numeroSemanaISO(lunes);
  var hoy=fechaHoyLocal();
  var esSemanaActual = hoy>=semanaInicio && hoy<=semanaFin;
  Promise.all([
    from('usuarios').select('id,nombre,sueldo_base').eq('rol','operario').get(),
    from('asistencia_registros').select('*').gte('fecha',semanaInicio).lte('fecha',semanaFin).get(),
    from('pagos_semana_estado').select('*').eq('semana_inicio',semanaInicio).get(),
    from('pagos_extra_estado').select('*').eq('semana_inicio',semanaInicio).get(),
    from('config_app').select('*').get(),
    from('permisos').select('*').eq('estado','aprobado').get(),
    from('bonos').select('*').eq('estado','activo').get(),
    from('bono_beneficiarios').select('*').get(),
    from('prestamos').select('*').eq('estado','activo').get(),
    from('prestamo_pagos').select('*').eq('semana_inicio',semanaInicio).get()
  ]).then(function(r){
    var operarios=r[0]||[], registros=r[1]||[], estados=r[2]||[], estadosExtra=r[3]||[];
    var cfg={}; (r[4]||[]).forEach(function(c){cfg[c.clave]=c.valor;});
    var tarifa=parseFloat(cfg.tarifa_hora_extra)||70;
    var permisosAprobados=r[5]||[];
    var bonosActivos=r[6]||[];
    var bonoBeneficiarios=r[7]||[];
    var prestamosActivos=r[8]||[];
    var pagosSemanaPrestamos=r[9]||[];
    var estadoPorOp={}; estados.forEach(function(e){estadoPorOp[e.operario_id]=e;});
    var estadoExtraPorOp={}; estadosExtra.forEach(function(e){estadoExtraPorOp[e.operario_id]=e;});
    var bonosDeLaSemana=bonosActivos.filter(function(b){return !(b.periodo_fin<semanaInicio||b.periodo_inicio>semanaFin);});
    var bonosSinUmbral=bonosDeLaSemana.filter(function(b){return b.tipo==='equipo'||!b.umbral_minimo;});
    var bonosConUmbral=bonosDeLaSemana.filter(function(b){return b.tipo==='individual'&&b.umbral_minimo;});
    var bonosYaOtorgadosPorOp={};
    bonoBeneficiarios.forEach(function(bb){
      if(!bonosYaOtorgadosPorOp[bb.operario_id]) bonosYaOtorgadosPorOp[bb.operario_id]={};
      bonosYaOtorgadosPorOp[bb.operario_id][bb.bono_id]=true;
    });

    Promise.all(operarios.map(function(o){
      return Promise.all(bonosConUmbral.map(function(b){
        return calcularScoreOperario(o.id,b.periodo_inicio,b.periodo_fin).then(function(score){return {bono:b,score:score.final};});
      }));
    })).then(function(scoresPorOp){
      var html='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">💰 Generar Nómina<button type="button" onclick="renderNominasMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Nóminas</button></div>';
      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:8px;"><button type="button" id="gn-ant" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;">← Semana anterior</button><span class="hint" style="margin:0;">Semana '+numSemana+' · '+semanaInicio+' a '+semanaFin+' · Extra: $'+tarifa+'/h</span>'+(esSemanaActual?'':'<button type="button" id="gn-sig" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;">Semana siguiente →</button>')+'</div>';

      if(!operarios.length) html+='<div class="empty">No hay operarios registrados.</div>';

      var accionesPago={};

      html+=operarios.map(function(o,idx){
        var regsOp=registros.filter(function(x){return x.usuario_id===o.id;});
        var permisosOp=permisosAprobados.filter(function(p){return p.usuario_id===o.id;});
        var resumen=calcularResumenAsistencia(regsOp,semanaInicio,permisosOp);
        var sueldoBase=o.sueldo_base||0;
        var totalSueldo=resumen.diasPagados*sueldoBase;
        var est=estadoPorOp[o.id];
        var pagado=est&&est.estado==='pagado';

        var porDiaExtra={};
        regsOp.filter(function(x){return x.modalidad==='extras';}).forEach(function(reg){
          if(!porDiaExtra[reg.fecha]) porDiaExtra[reg.fecha]={entrada:null,salida:null};
          if(reg.tipo==='entrada'&&(!porDiaExtra[reg.fecha].entrada||reg.registrado_en<porDiaExtra[reg.fecha].entrada)) porDiaExtra[reg.fecha].entrada=reg.registrado_en;
          if(reg.tipo==='salida'&&(!porDiaExtra[reg.fecha].salida||reg.registrado_en>porDiaExtra[reg.fecha].salida)) porDiaExtra[reg.fecha].salida=reg.registrado_en;
        });
        var horasExtra=0;
        Object.keys(porDiaExtra).forEach(function(f){var d=porDiaExtra[f];if(d.entrada&&d.salida) horasExtra+=(new Date(d.salida)-new Date(d.entrada))/3600000;});
        var totalExtra=horasExtra*tarifa;
        var estExtra=estadoExtraPorOp[o.id];
        var pagadoExtra=estExtra&&estExtra.estado==='pagado';

        var yaOtorgados=bonosYaOtorgadosPorOp[o.id]||{};
        var scoresOp=scoresPorOp[idx];
        var bonosUmbralCalifican=scoresOp.filter(function(x){return x.score>=parseFloat(x.bono.umbral_minimo);}).map(function(x){return x.bono;});
        var bonosQueCalifican=bonosSinUmbral.concat(bonosUmbralCalifican).filter(function(b){return !yaOtorgados[b.id];});
        var totalBonos=bonosQueCalifican.reduce(function(s,b){return s+(parseFloat(b.monto)||0);},0);

        var prestamosOp=prestamosActivos.filter(function(p){return p.operario_id===o.id;});
        var prestamoIdsOp={}; prestamosOp.forEach(function(p){prestamoIdsOp[p.id]=p;});
        var deduccionesOp=pagosSemanaPrestamos.filter(function(pp){return prestamoIdsOp[pp.prestamo_id]&&pp.estado==='pendiente';});
        var totalDeducciones=deduccionesOp.reduce(function(s,d){return s+parseFloat(d.monto);},0);

        var granTotal=totalSueldo+totalExtra+totalBonos-totalDeducciones;
        var nominaCompleta = pagado && (!horasExtra||pagadoExtra);

        var idAccion='gn-acc-'+o.id;
        accionesPago[idAccion]={operarioId:o.id,nombre:o.nombre,totalSueldo:totalSueldo,horasExtra:horasExtra,totalExtra:totalExtra,deducciones:deduccionesOp,bonosQueCalifican:bonosQueCalifican,scoresOp:scoresOp,nominaCompleta:nominaCompleta,granTotal:granTotal,
          recibo:{nombre:o.nombre,numSemana:numSemana,semanaInicio:semanaInicio,semanaFin:semanaFin,resumen:resumen,sueldoBase:sueldoBase,totalSueldo:totalSueldo,tarifa:tarifa,horasExtra:horasExtra,totalExtra:totalExtra,bonos:bonosQueCalifican.map(function(b){return {descripcion:b.descripcion,monto:parseFloat(b.monto||0)};}),deducciones:deduccionesOp.map(function(d){var pr=prestamoIdsOp[d.prestamo_id];return {concepto:pr?pr.concepto:'Préstamo',numero:d.numero_pago,monto:parseFloat(d.monto)};}),granTotal:granTotal,nominaCompleta:nominaCompleta}};

        var filas='<div class="resumen-row"><span class="resumen-key">💵 Sueldo ('+resumen.trabajados+' días'+(resumen.diasPermisoConGoce?' + '+resumen.diasPermisoConGoce+' permiso c/goce':'')+')</span><span class="resumen-val">+$'+totalSueldo.toFixed(2)+'</span></div>';
        if(horasExtra>0) filas+='<div class="resumen-row"><span class="resumen-key">⏰ Horas extra ('+horasExtra.toFixed(1)+'h)</span><span class="resumen-val">+$'+totalExtra.toFixed(2)+'</span></div>';
        bonosQueCalifican.forEach(function(b){
          filas+='<div class="resumen-row"><span class="resumen-key">🎁 '+b.descripcion+'</span><span class="resumen-val">+$'+parseFloat(b.monto||0).toFixed(2)+'</span></div>';
        });
        deduccionesOp.forEach(function(d){
          var pr=prestamoIdsOp[d.prestamo_id];
          filas+='<div class="resumen-row"><span class="resumen-key">📝 '+(pr?pr.concepto:'Préstamo')+' (pago '+d.numero_pago+')</span><span class="resumen-val" style="color:var(--rojo);">-$'+parseFloat(d.monto).toFixed(2)+'</span></div>';
        });

        var metaExtra=[];
        if(resumen.faltas) metaExtra.push('<span style="color:var(--rojo);">❌ '+resumen.faltas+' falta(s)</span>');
        if(resumen.retardos) metaExtra.push('<span style="color:var(--tierra);">🕐 '+resumen.retardos+' retardo(s)</span>');
        if(resumen.diasPermisoConGoce) metaExtra.push('🩺 '+resumen.diasPermisoConGoce+' permiso c/goce');
        if(resumen.diasPermisoSinGoce) metaExtra.push('🩺 '+resumen.diasPermisoSinGoce+' permiso s/goce');
        if(!sueldoBase) metaExtra.push('<span style="color:var(--rojo);">⚠️ sin sueldo base</span>');

        return '<div class="orden-card" style="border-left-color:'+(nominaCompleta?'var(--verde-mid)':'var(--tierra)')+';">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.95rem">'+o.nombre+'</strong><span style="font-size:.72rem;font-weight:700;color:'+(nominaCompleta?'var(--verde-mid)':'var(--tierra)')+';">'+(nominaCompleta?'✅ Pagada':'⏳ Pendiente')+'</span></div>'+
          (metaExtra.length?'<div class="orden-meta" style="margin-top:.15rem;">'+metaExtra.join(' · ')+'</div>':'')+
          '<div style="margin-top:.6rem;padding-top:.5rem;border-top:1px dashed var(--gris-2);">'+filas+'</div>'+
          '<div class="resumen-row" style="border-top:2px solid var(--gris-1);margin-top:.3rem;padding-top:.5rem;"><strong style="font-size:.85rem;">Total nómina</strong><strong style="font-size:1rem;color:'+(nominaCompleta?'var(--verde-mid)':'var(--tierra)')+';">$'+granTotal.toFixed(2)+'</strong></div>'+
          '<div style="display:flex;gap:8px;margin-top:.6rem;flex-wrap:wrap;">'+
          (nominaCompleta?'<button class="btn-sm btn-cancelar" data-despagar="'+idAccion+'">Marcar como pendiente</button>':'<button class="btn-sm btn-completar" data-pagar="'+idAccion+'">✅ Marcar nómina completa como pagada</button>')+
          '<button type="button" class="btn-sm" style="background:var(--gris-1);color:var(--negro);" data-recibo="'+idAccion+'">🧾 Recibo</button>'+
          '</div>'+
          '</div>';
      }).join('');

      body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderNominasMenu()">← Volver a Nóminas</button>';

      var btnAnt=document.getElementById('gn-ant');
      if(btnAnt) btnAnt.addEventListener('click',function(){var d=new Date(lunes);d.setDate(d.getDate()-7);renderGenerarNomina(d);});
      var btnSig=document.getElementById('gn-sig');
      if(btnSig) btnSig.addEventListener('click',function(){var d=new Date(lunes);d.setDate(d.getDate()+7);renderGenerarNomina(d);});

      body.querySelectorAll('[data-pagar]').forEach(function(btn){
        btn.addEventListener('click',function(){
          var acc=accionesPago[this.dataset.pagar];
          btn.disabled=true; btn.textContent='Guardando...';
          var opId=acc.operarioId;
          var existenteSueldo=estadoPorOp[opId];
          var payloadSueldo={operario_id:opId,semana_inicio:semanaInicio,semana_fin:semanaFin,estado:'pagado',monto_pagado:acc.totalSueldo,pagado_por:usuario.id,pagado_en:new Date().toISOString()};
          var pasos=[existenteSueldo?from('pagos_semana_estado').eq('id',existenteSueldo.id).update(payloadSueldo):from('pagos_semana_estado').insert(payloadSueldo)];
          if(acc.horasExtra>0){
            var existenteExtra=estadoExtraPorOp[opId];
            var payloadExtra={operario_id:opId,semana_inicio:semanaInicio,semana_fin:semanaFin,estado:'pagado',horas:acc.horasExtra,monto_pagado:acc.totalExtra,pagado_por:usuario.id,pagado_en:new Date().toISOString()};
            pasos.push(existenteExtra?from('pagos_extra_estado').eq('id',existenteExtra.id).update(payloadExtra):from('pagos_extra_estado').insert(payloadExtra));
          }
          acc.deducciones.forEach(function(d){
            pasos.push(from('prestamo_pagos').eq('id',d.id).update({estado:'descontado',descontado_en:new Date().toISOString()}));
          });
          acc.bonosQueCalifican.forEach(function(b){
            var scoreDe=acc.scoresOp.find(function(x){return x.bono.id===b.id;});
            pasos.push(from('bono_beneficiarios').insert({bono_id:b.id,operario_id:opId,puntaje_obtenido:scoreDe?scoreDe.score:null}));
          });
          Promise.all(pasos).then(function(){
            var prestamoIds=Object.keys(acc.deducciones.reduce(function(s,d){s[d.prestamo_id]=true;return s;},{}));
            return Promise.all(prestamoIds.map(function(pid){
              return from('prestamo_pagos').select('*').eq('prestamo_id',pid).get().then(function(todos){
                if(todos&&todos.length&&todos.every(function(x){return x.estado==='descontado';})) return from('prestamos').eq('id',pid).update({estado:'liquidado'});
              });
            }));
          }).then(function(){
            return from('notificaciones').insert({titulo:'💳 Nómina pagada',cuerpo:'Tu nómina de la semana '+numSemana+' ($'+acc.granTotal.toFixed(2)+') fue marcada como pagada.',icono:'💳',leida:false,para_rol:'operario',para_usuario:opId});
          }).then(function(){showToast('✅ Nómina de '+acc.nombre+' marcada como pagada');renderGenerarNomina(lunes);}).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='✅ Marcar nómina completa como pagada';});
        });
      });
      body.querySelectorAll('[data-despagar]').forEach(function(btn){
        btn.addEventListener('click',function(){
          var acc=accionesPago[this.dataset.despagar];
          var opId=acc.operarioId;
          var pasos=[];
          var existenteSueldo=estadoPorOp[opId];
          if(existenteSueldo) pasos.push(from('pagos_semana_estado').eq('id',existenteSueldo.id).update({estado:'pendiente'}));
          var existenteExtra=estadoExtraPorOp[opId];
          if(existenteExtra) pasos.push(from('pagos_extra_estado').eq('id',existenteExtra.id).update({estado:'pendiente'}));
          Promise.all(pasos).then(function(){showToast('Marcado como pendiente');renderGenerarNomina(lunes);}).catch(function(e){alert('Error: '+e.message);});
        });
      });
      body.querySelectorAll('[data-recibo]').forEach(function(btn){
        btn.addEventListener('click',function(){
          var acc=accionesPago[this.dataset.recibo];
          abrirRecibo(acc.recibo);
        });
      });
    }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function abrirRecibo(d){
  var folio='NOM-'+d.semanaInicio.replace(/-/g,'')+'-S'+d.numSemana;
  var hoyD=new Date();
  var fechaEmision=hoyD.toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});
  var r=d.resumen;
  var filas='<div class="recibo-fila"><span>💵 Sueldo ('+r.trabajados+' día'+(r.trabajados===1?'':'s')+' × $'+d.sueldoBase.toFixed(2)+(r.diasPermisoConGoce?' + '+r.diasPermisoConGoce+' permiso c/goce':'')+')</span><span>$'+d.totalSueldo.toFixed(2)+'</span></div>';
  if(r.diasPermisoSinGoce) filas+='<div class="recibo-fila"><span>🩺 Permiso sin goce (no pagado)</span><span>'+r.diasPermisoSinGoce+' día(s)</span></div>';
  if(r.faltas) filas+='<div class="recibo-fila"><span>❌ Faltas</span><span>'+r.faltas+'</span></div>';
  if(r.retardos) filas+='<div class="recibo-fila"><span>🕐 Retardos</span><span>'+r.retardos+'</span></div>';
  if(d.horasExtra>0) filas+='<div class="recibo-fila"><span>⏰ Horas extra ('+d.horasExtra.toFixed(1)+'h × $'+d.tarifa.toFixed(2)+')</span><span>$'+d.totalExtra.toFixed(2)+'</span></div>';
  d.bonos.forEach(function(b){
    filas+='<div class="recibo-fila"><span>🎁 '+b.descripcion+'</span><span>+$'+b.monto.toFixed(2)+'</span></div>';
  });
  d.deducciones.forEach(function(x){
    filas+='<div class="recibo-fila"><span>📝 '+x.concepto+' (pago '+x.numero+')</span><span>-$'+x.monto.toFixed(2)+'</span></div>';
  });
  filas+='<div class="recibo-fila recibo-total"><span>Total a pagar</span><span>$'+d.granTotal.toFixed(2)+'</span></div>';

  var html='<div class="recibo-encabezado"><h2>🫐 Mootsil</h2><div style="font-size:.85rem;color:#444;">Recibo de Nómina</div><div class="recibo-folio">Folio '+folio+' · Emitido el '+fechaEmision+'</div></div>'+
    '<div class="recibo-datos"><div><strong>Colaborador:</strong> '+d.nombre+'</div><div><strong>Periodo:</strong> Semana '+d.numSemana+' · '+d.semanaInicio+' a '+d.semanaFin+'</div><div><strong>Estatus:</strong> '+(d.nominaCompleta?'✅ Pagada':'⏳ Pendiente de pago')+'</div></div>'+
    filas+
    '<div class="recibo-firmas"><div>Entregó</div><div>Recibí conforme<br>'+d.nombre+'</div></div>'+
    '<div class="recibo-nota">Generado por Mootsil · Administración · '+fechaEmision+'</div>';

  document.getElementById('recibo-contenido').innerHTML=html;
  document.getElementById('recibo-overlay').classList.add('active');
  window._tituloOriginal = window._tituloOriginal || document.title;
  var nombreArchivo=d.nombre.replace(/[^\p{L}0-9]+/gu,'_').replace(/^_+|_+$/g,'');
  document.title='Recibo_'+nombreArchivo+'_Semana'+d.numSemana+'_'+d.semanaInicio;
}

function cerrarRecibo(){
  document.getElementById('recibo-overlay').classList.remove('active');
  if(window._tituloOriginal) document.title=window._tituloOriginal;
}

function renderPrestamos(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">📝 Préstamos<button type="button" onclick="renderNuevoPrestamo()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nuevo préstamo</button></div><div class="loading">Cargando...</div>';
  from('prestamos').select('*,operario:usuarios!operario_id(nombre)').order('creado_en',{ascending:false}).get().then(function(prestamos){
    var header='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">📝 Préstamos<button type="button" onclick="renderNuevoPrestamo()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nuevo préstamo</button></div>';
    if(!prestamos||!prestamos.length){body.innerHTML=header+'<div class="empty">Sin préstamos registrados.</div><button class="btn-back" style="margin-top:1rem;" onclick="renderNominasMenu()">← Volver a Nóminas</button>';return;}
    var ids=prestamos.map(function(p){return p.id;});
    from('prestamo_pagos').select('*').in('prestamo_id',ids).order('numero_pago',{ascending:true}).get().then(function(pagos){
      var html=header;
      html+=prestamos.map(function(p){
        var pagosDe=pagos.filter(function(x){return x.prestamo_id===p.id;});
        var pendientes=pagosDe.filter(function(x){return x.estado==='pendiente';});
        var restante=pendientes.reduce(function(s,x){return s+parseFloat(x.monto);},0);
        var filas=pagosDe.map(function(pg){
          var ns=numeroSemanaISO(new Date(pg.semana_inicio+'T00:00:00'));
          var pagado=pg.estado==='descontado';
          return '<div style="display:flex;justify-content:space-between;align-items:center;font-size:.8rem;padding:.3rem 0;border-bottom:1px solid var(--gris-1);"><span>Pago '+pg.numero_pago+'/'+p.num_pagos+' · Sem '+ns+' · $'+parseFloat(pg.monto).toFixed(2)+'</span>'+(pagado?'<span style="color:var(--verde-mid);font-weight:700;">✅ Descontado</span>':'<button class="btn-sm btn-completar" data-descontar="'+pg.id+'" data-prestamo="'+p.id+'">Marcar descontado</button>')+'</div>';
        }).join('');
        return '<div class="orden-card" style="border-left-color:'+(p.estado==='activo'?'var(--tierra)':'var(--gris-3)')+';"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:.9rem">'+(p.operario?p.operario.nombre:'')+' · '+p.concepto+'</strong><span style="font-size:.72rem;font-weight:700;color:'+(p.estado==='activo'?'var(--tierra)':'var(--verde-mid)')+';">'+(p.estado==='activo'?'Activo':'Liquidado')+'</span></div><div class="orden-meta">Total: $'+parseFloat(p.monto_total).toFixed(2)+' · Restante: $'+restante.toFixed(2)+'</div><div style="margin-top:.5rem;">'+filas+'</div></div>';
      }).join('');
      body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderNominasMenu()">← Volver a Nóminas</button>';
      body.querySelectorAll('[data-descontar]').forEach(function(btn){
        btn.addEventListener('click',function(){
          var pagoId=this.dataset.descontar, prestamoId=this.dataset.prestamo;
          from('prestamo_pagos').eq('id',pagoId).update({estado:'descontado',descontado_en:new Date().toISOString()}).then(function(){
            return from('prestamo_pagos').select('*').eq('prestamo_id',prestamoId).get();
          }).then(function(todosPagos){
            var todosDescontados=todosPagos.every(function(x){return x.estado==='descontado';});
            if(todosDescontados) return from('prestamos').eq('id',prestamoId).update({estado:'liquidado'});
          }).then(function(){showToast('✅ Pago marcado como descontado');renderPrestamos();}).catch(function(e){alert('Error: '+e.message);});
        });
      });
    });
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function renderNuevoPrestamo(prefill){
  prefill=prefill||{};
  var body=document.getElementById('enc-body');
  var opO=cats.operarios.map(function(o){return '<button type="button" class="op-chip'+(prefill.operarioId===o.id?' sel':'')+'" data-id="'+o.id+'" onclick="seleccionUnica(this)">'+o.nombre+'</button>';}).join('');
  body.innerHTML='<div class="seccion-titulo">+ Nuevo préstamo</div><div class="form-card">'+(prefill.solicitudId?'<p class="hint" style="margin-bottom:.75rem;">Completando la solicitud del colaborador — ajusta pagos y fecha antes de registrar.</p>':'')+'<div class="form-group"><label>Colaborador</label><div style="display:flex;flex-wrap:wrap;gap:8px;">'+opO+'</div></div><div class="form-group"><label>Concepto</label><input type="text" id="pr-concepto" value="'+(prefill.concepto||'').replace(/"/g,'&quot;')+'" placeholder="Ej. Préstamo personal / Anticipo de nómina"></div><div class="form-group"><label>Monto total ($)</label><input type="number" id="pr-monto" min="0" step="1" value="'+(prefill.monto||'')+'" placeholder="Ej. 600"></div><div class="form-group"><label>Número de pagos semanales</label><input type="number" id="pr-pagos" min="1" step="1" placeholder="Ej. 3"></div><div class="form-group"><label>Semana en que inicia el descuento</label><input type="date" id="pr-fecha" value="'+fechaHoyLocal()+'"></div><button class="btn-primary" id="pr-guardar">Registrar préstamo</button></div><button class="btn-back" style="margin-top:1rem;" onclick="renderPrestamos()">← Volver a Préstamos</button>';
  document.getElementById('pr-guardar').addEventListener('click',function(){
    var opBtn=document.querySelector('.op-chip.sel');
    var concepto=document.getElementById('pr-concepto').value.trim();
    var monto=parseFloat(document.getElementById('pr-monto').value);
    var numPagos=parseInt(document.getElementById('pr-pagos').value);
    var fechaIni=document.getElementById('pr-fecha').value;
    if(!opBtn){alert('Selecciona un colaborador.');return;}
    if(!concepto){alert('Describe el concepto.');return;}
    if(!monto||monto<=0){alert('Captura un monto válido.');return;}
    if(!numPagos||numPagos<1){alert('Captura el número de pagos.');return;}
    var btn=this; btn.disabled=true; btn.textContent='Guardando...';
    from('prestamos').insert({operario_id:opBtn.dataset.id,concepto:concepto,monto_total:monto,num_pagos:numPagos,fecha_inicio:fechaIni,estado:'activo',creado_por:usuario.id}).then(function(rows){
      var promesaSolicitud = prefill.solicitudId ? from('solicitudes_operario').eq('id',prefill.solicitudId).update({estado:'atendida',respuesta:'Préstamo registrado y aprobado.',atendido_por:usuario.id,atendido_en:new Date().toISOString()}) : Promise.resolve();
      return promesaSolicitud.then(function(){
        return from('prestamos').select('*').eq('operario_id',opBtn.dataset.id).order('creado_en',{ascending:false}).limit(1).get();
      });
    }).then(function(nuevoPrestamoRows){
      var prestamo=nuevoPrestamoRows[0];
      var montoPorPago=Math.round((monto/numPagos)*100)/100;
      var lunes=inicioDeSemana(new Date(fechaIni+'T00:00:00'));
      var pagosArr=[];
      for(var i=0;i<numPagos;i++){
        var sem=new Date(lunes); sem.setDate(sem.getDate()+i*7);
        var esUltimo=i===numPagos-1;
        var montoEste = esUltimo ? Math.round((monto-montoPorPago*(numPagos-1))*100)/100 : montoPorPago;
        pagosArr.push({prestamo_id:prestamo.id,numero_pago:i+1,semana_inicio:sem.toISOString().slice(0,10),monto:montoEste,estado:'pendiente'});
      }
      return Promise.all(pagosArr.map(function(p){return from('prestamo_pagos').insert(p);}));
    }).then(function(){
      return from('notificaciones').insert({titulo:'📝 Nuevo préstamo registrado',cuerpo:usuario.nombre+' te registró: '+concepto+' — $'+monto+' en '+numPagos+' pago(s) semanales',icono:'📝',leida:false,para_rol:'operario',para_usuario:opBtn.dataset.id});
    }).then(function(){
      showToast('✅ Préstamo registrado');
      renderPrestamos();
    }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Registrar préstamo';});
  });
}

function renderBonos(){
  var body=document.getElementById('enc-body');
  body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">🎁 Bonos<button type="button" onclick="renderNuevoBono()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nuevo bono</button></div><div class="loading">Cargando...</div>';
  from('bonos').select('*').order('creado_en',{ascending:false}).get().then(function(rows){
    if(!rows||!rows.length){body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">🎁 Bonos<button type="button" onclick="renderNuevoBono()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">+ Nuevo bono</button></div><div class="empty">Sin bonos registrados.</div><button class="btn-back" style="margin-top:1rem;" onclick="renderNominasMenu()">← Volver a Nóminas</button>';return;}

function renderPagosHistorial(){
  var body=document.getElementById('op-body');
  body.innerHTML='<div class="seccion-titulo">📊 Historial de pagos</div><div class="loading">Cargando...</div>';
  Promise.all([
    from('pagos_semana_estado').select('*').eq('operario_id',usuario.id).eq('estado','pagado').order('semana_inicio',{ascending:false}).limit(25).get(),
    from('pagos_extra_estado').select('*').eq('operario_id',usuario.id).eq('estado','pagado').order('semana_inicio',{ascending:false}).limit(25).get()
  ]).then(function(r){
    var normales=r[0]||[], extras=r[1]||[];
    var porSemana={};
    normales.forEach(function(p){
      if(!porSemana[p.semana_inicio]) porSemana[p.semana_inicio]={semana_inicio:p.semana_inicio,semana_fin:p.semana_fin,sueldo:0,extra:0,pagado_en:p.pagado_en};
      porSemana[p.semana_inicio].sueldo=parseFloat(p.monto_pagado)||0;
      if(p.pagado_en>porSemana[p.semana_inicio].pagado_en) porSemana[p.semana_inicio].pagado_en=p.pagado_en;
    });
    extras.forEach(function(p){
      if(!porSemana[p.semana_inicio]) porSemana[p.semana_inicio]={semana_inicio:p.semana_inicio,semana_fin:p.semana_fin,sueldo:0,extra:0,pagado_en:p.pagado_en};
      porSemana[p.semana_inicio].extra=parseFloat(p.monto_pagado)||0;
      if(p.pagado_en>porSemana[p.semana_inicio].pagado_en) porSemana[p.semana_inicio].pagado_en=p.pagado_en;
    });
    var semanas=Object.values(porSemana).sort(function(a,b){return b.semana_inicio.localeCompare(a.semana_inicio);});
    if(!semanas.length){body.innerHTML='<div class="seccion-titulo">📊 Historial de pagos</div><div class="empty">Aún no tienes pagos registrados.</div><button class="btn-back" style="margin-top:1rem;" onclick="renderPagosMenu()">← Volver a Pagos</button>';return;}
    var totalHistorico=semanas.reduce(function(s,w){return s+w.sueldo+w.extra;},0);
    var html='<div class="seccion-titulo">📊 Historial de pagos</div><p class="hint" style="margin-bottom:.75rem;">Total pagado (últimas '+semanas.length+' semanas): <strong>$'+totalHistorico.toFixed(2)+'</strong></p>';
    html+=semanas.map(function(w){
      var f=w.pagado_en?new Date(w.pagado_en).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}):'';

    }).join('');
    body.innerHTML=html+'<button class="btn-back" style="margin-top:1rem;" onclick="renderPagosMenu()">← Volver a Pagos</button>';
  }).catch(function(e){body.innerHTML='<div class="loading">Error: '+e.message+'</div>';});
}

function inicioDeSemana(fecha){
  var d=new Date(fecha); d.setHours(0,0,0,0);
  var dia=d.getDay();
  d.setDate(d.getDate()-((dia+6)%7));
  return d;
}

function renderPagoHorasExtras(fechaRef){
  var body=document.getElementById('op-body');
  body.innerHTML='<div class="seccion-titulo">⏰ Pago de horas extra</div><div class="loading">Calculando...</div>';
  var lunes=inicioDeSemana(fechaRef);
  var domingo=new Date(lunes); domingo.setDate(lunes.getDate()+6);
  var semanaInicio=lunes.toISOString().slice(0,10), semanaFin=domingo.toISOString().slice(0,10);
  var numSemana=numeroSemanaISO(lunes);
  Promise.all([
    from('config_app').select('*').get(),
    from('asistencia_registros').select('*').eq('usuario_id',usuario.id).eq('modalidad','extras').gte('fecha',semanaInicio).lte('fecha',semanaFin).get(),
    from('pagos_extra_estado').select('*').eq('operario_id',usuario.id).eq('semana_inicio',semanaInicio).get()
  ]).then(function(r){
    var cfg={}; (r[0]||[]).forEach(function(c){cfg[c.clave]=c.valor;});
    var tarifa=parseFloat(cfg.tarifa_hora_extra)||70;
    var registros=r[1]||[];
    var estadoRow=r[2]&&r[2][0];
    var porDia={};
    registros.forEach(function(reg){
      if(!porDia[reg.fecha]) porDia[reg.fecha]={entrada:null,salida:null};
      if(reg.tipo==='entrada'&&(!porDia[reg.fecha].entrada||reg.registrado_en<porDia[reg.fecha].entrada)) porDia[reg.fecha].entrada=reg.registrado_en;
      if(reg.tipo==='salida'&&(!porDia[reg.fecha].salida||reg.registrado_en>porDia[reg.fecha].salida)) porDia[reg.fecha].salida=reg.registrado_en;
    });
    var dias=Object.keys(porDia).sort();
    var totalHoras=0;
    var detalle=dias.map(function(f){
      var d=porDia[f];
      var horas=(d.entrada&&d.salida)?(new Date(d.salida)-new Date(d.entrada))/3600000:0;
      totalHoras+=horas;
      var hE=d.entrada?new Date(d.entrada).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true}):'—';
      var hS=d.salida?new Date(d.salida).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true}):'—';
      return {fecha:f,horas:horas,texto:f+' · '+hE+' → '+hS+' ('+horas.toFixed(1)+'h)'};
    });
    var total=totalHoras*tarifa;
    var pagado=estadoRow&&estadoRow.estado==='pagado';
    var mesInicio=lunes.toLocaleDateString('es-MX',{month:'long'});
    var mesFin=domingo.toLocaleDateString('es-MX',{month:'long'});
    var rango=(mesInicio===mesFin)?('del '+lunes.getDate()+' al '+domingo.getDate()+' de '+mesFin+' '+domingo.getFullYear()):('del '+lunes.getDate()+' '+mesInicio+' al '+domingo.getDate()+' '+mesFin+' '+domingo.getFullYear());

function renderDebo(){
  var body=document.getElementById('op-body');
  body.innerHTML='<div class="seccion-titulo">📝 Debo</div><div class="loading">Cargando...</div>';
  from('prestamos').select('*').eq('operario_id',usuario.id).eq('estado','activo').order('creado_en',{ascending:false}).get().then(function(prestamos){
    if(!prestamos||!prestamos.length){
      body.innerHTML='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">📝 Debo<button type="button" onclick="renderPagosMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Pagos</button></div><div class="empty">🎉 No tienes préstamos ni adelantos activos.</div>';
      return;
    }
    var ids=prestamos.map(function(p){return p.id;});
    from('prestamo_pagos').select('*').in('prestamo_id',ids).order('numero_pago',{ascending:true}).get().then(function(pagos){
      var html='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">📝 Debo<button type="button" onclick="renderPagosMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Pagos</button></div>';

        var pendientes=pagosDe.filter(function(x){return x.estado==='pendiente';});

        var proximo=pendientes.sort(function(a,b){return a.semana_inicio.localeCompare(b.semana_inicio);})[0];
        var numSemProx=proximo?numeroSemanaISO(new Date(proximo.semana_inicio+'T00:00:00')):null;
        html+='<div class="form-card" style="margin-bottom:.75rem;"><div style="font-weight:800;font-size:.95rem;">'+p.concepto+'</div><div class="hint" style="margin:.2rem 0 .6rem;">Monto total: $'+parseFloat(p.monto_total).toFixed(2)+'</div>';
        html+=pagosDe.map(function(pg){
          var ns=numeroSemanaISO(new Date(pg.semana_inicio+'T00:00:00'));
          var pagado=pg.estado==='descontado';
          return '<div style="display:flex;justify-content:space-between;font-size:.82rem;padding:.35rem 0;border-bottom:1px solid var(--gris-1);"><span>Pago '+pg.numero_pago+' de '+p.num_pagos+' · Sem '+ns+'</span><span style="font-weight:700;color:'+(pagado?'var(--verde-mid)':'var(--tierra)')+';">$'+parseFloat(pg.monto).toFixed(2)+' '+(pagado?'✅':'⏳')+'</span></div>';
        }).join('');
        html+='<div style="margin-top:.6rem;padding-top:.5rem;border-top:2px solid var(--gris-1);display:flex;justify-content:space-between;"><strong style="font-size:.85rem;">Resta por pagar</strong><strong style="font-size:.95rem;color:var(--tierra);">$'+restante.toFixed(2)+'</strong></div>';
        if(proximo) html+='<div class="hint" style="margin-top:.2rem;">Próximo descuento: semana '+numSemProx+' ('+proximo.semana_inicio+')</div>';
        html+='</div>';
      });

    });

function renderCartera(fechaRef){
  var body=document.getElementById('op-body');
  body.innerHTML='<div class="seccion-titulo">👛 Cartera</div><div class="loading">Calculando...</div>';
  var lunes=inicioDeSemana(fechaRef);
  var domingo=new Date(lunes); domingo.setDate(lunes.getDate()+6);
  var semanaInicio=lunes.toISOString().slice(0,10), semanaFin=domingo.toISOString().slice(0,10);
  var numSemana=numeroSemanaISO(lunes);
  Promise.all([
    from('usuarios').select('sueldo_base').eq('id',usuario.id).get(),
    from('asistencia_registros').select('*').eq('usuario_id',usuario.id).gte('fecha',semanaInicio).lte('fecha',semanaFin).get(),
    from('pagos_semana_estado').select('*').eq('operario_id',usuario.id).eq('semana_inicio',semanaInicio).get(),
    from('pagos_extra_estado').select('*').eq('operario_id',usuario.id).eq('semana_inicio',semanaInicio).get(),
    from('config_app').select('*').get(),
    from('bonos').select('*').eq('estado','activo').get(),
    from('prestamos').select('*').eq('operario_id',usuario.id).eq('estado','activo').get(),
    from('permisos').select('*').eq('usuario_id',usuario.id).eq('estado','aprobado').get(),
    from('bono_beneficiarios').select('*').eq('operario_id',usuario.id).get()
  ]).then(function(r){
    var sueldoBase=(r[0]&&r[0][0]&&r[0][0].sueldo_base)||0;
    var registros=r[1]||[];
    var estSemana=r[2]&&r[2][0];
    var estExtra=r[3]&&r[3][0];
    var cfg={}; (r[4]||[]).forEach(function(c){cfg[c.clave]=c.valor;});
    var tarifa=parseFloat(cfg.tarifa_hora_extra)||70;
    var bonosActivos=r[5]||[];
    var prestamosActivos=r[6]||[];
    var permisosAprobados=r[7]||[];
    var bonosYaOtorgadosIds={}; (r[8]||[]).forEach(function(bb){bonosYaOtorgadosIds[bb.bono_id]=true;});

    var resumen=calcularResumenAsistencia(registros,semanaInicio,permisosAprobados);
    var totalSueldo=resumen.diasPagados*sueldoBase;
    var pagadoSueldo=estSemana&&estSemana.estado==='pagado';

    var porDiaExtra={};
    registros.filter(function(x){return x.modalidad==='extras';}).forEach(function(reg){
      if(!porDiaExtra[reg.fecha]) porDiaExtra[reg.fecha]={entrada:null,salida:null};
      if(reg.tipo==='entrada'&&(!porDiaExtra[reg.fecha].entrada||reg.registrado_en<porDiaExtra[reg.fecha].entrada)) porDiaExtra[reg.fecha].entrada=reg.registrado_en;
      if(reg.tipo==='salida'&&(!porDiaExtra[reg.fecha].salida||reg.registrado_en>porDiaExtra[reg.fecha].salida)) porDiaExtra[reg.fecha].salida=reg.registrado_en;
    });
    var horasExtra=0;
    Object.keys(porDiaExtra).forEach(function(f){var d=porDiaExtra[f];if(d.entrada&&d.salida) horasExtra+=(new Date(d.salida)-new Date(d.entrada))/3600000;});
    var totalExtra=horasExtra*tarifa;
    var hayExtra=horasExtra>0;
    var pagadoExtra=estExtra&&estExtra.estado==='pagado';

    var bonosDeLaSemana=bonosActivos.filter(function(b){return !bonosYaOtorgadosIds[b.id]&&!(b.periodo_fin<semanaInicio||b.periodo_inicio>semanaFin);});
    var bonosSinUmbral=bonosDeLaSemana.filter(function(b){return b.tipo==='equipo'||!b.umbral_minimo;});
    var bonosConUmbral=bonosDeLaSemana.filter(function(b){return b.tipo==='individual'&&b.umbral_minimo;});

    Promise.all(bonosConUmbral.map(function(b){
      return calcularScoreOperario(usuario.id,b.periodo_inicio,b.periodo_fin).then(function(score){return {bono:b,score:score};});
    })).then(function(resultadosUmbral){
      var bonosUmbralCalifican=resultadosUmbral.filter(function(r){return r.score.final>=parseFloat(r.bono.umbral_minimo);}).map(function(r){return r.bono;});
      var bonosQueCalifican=bonosSinUmbral.concat(bonosUmbralCalifican);
      var totalBonos=bonosQueCalifican.reduce(function(s,b){return s+(parseFloat(b.monto)||0);},0);

      return from('prestamo_pagos').select('*').in('prestamo_id',prestamosActivos.map(function(p){return p.id;})||['00000000-0000-0000-0000-000000000000']).eq('semana_inicio',semanaInicio).get().then(function(deduccionesRows){
      var deducciones=deduccionesRows||[];
      var totalDeducciones=deducciones.reduce(function(s,d){return s+parseFloat(d.monto);},0);

      var total=totalSueldo+totalExtra+totalBonos-totalDeducciones;
      var todoLoAplicablePagado = pagadoSueldo && (!hayExtra||pagadoExtra);

      var mesInicio=lunes.toLocaleDateString('es-MX',{month:'long'});
      var mesFin=domingo.toLocaleDateString('es-MX',{month:'long'});
      var rango=(mesInicio===mesFin)?('del '+lunes.getDate()+' al '+domingo.getDate()+' de '+mesFin+' '+domingo.getFullYear()):('del '+lunes.getDate()+' '+mesInicio+' al '+domingo.getDate()+' '+mesFin+' '+domingo.getFullYear());
      var hoy=fechaHoyLocal();
      var esSemanaActual = hoy>=semanaInicio && hoy<=semanaFin;

      var html='<div class="seccion-titulo" style="display:flex;justify-content:space-between;align-items:center;">👛 Cartera<button type="button" onclick="renderPagosMenu()" style="border:none;background:none;color:var(--verde-mid);font-size:.78rem;font-weight:600;cursor:pointer;">← Pagos</button></div>';
      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;"><button type="button" id="cart-ant" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;">← Semana anterior</button>'+(esSemanaActual?'':'<button type="button" id="cart-sig" style="border:none;background:var(--gris-1);border-radius:20px;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;">Semana siguiente →</button>')+'</div>';

      html+='<div class="form-card" style="text-align:center;'+(todoLoAplicablePagado?'border:2px solid var(--verde-mid);':'border:2px solid var(--tierra);')+'">';
      html+='<div style="font-size:.8rem;color:var(--gris-3);">Cartera semana '+numSemana+'</div>';
      html+='<div style="font-size:.85rem;font-weight:700;margin-bottom:.75rem;">'+rango+'</div>';
      html+='<div style="font-size:2rem;font-weight:800;color:'+(todoLoAplicablePagado?'var(--verde-mid)':'var(--tierra)')+';">$'+total.toFixed(2)+'</div>';
      html+='<div style="display:inline-block;margin-top:.5rem;padding:.3rem 1rem;border-radius:20px;background:'+(todoLoAplicablePagado?'var(--verde-tenue)':'var(--tierra-tenue)')+';color:'+(todoLoAplicablePagado?'var(--verde-mid)':'var(--tierra)')+';font-weight:700;font-size:.8rem;">'+(todoLoAplicablePagado?'✅ Depositado':'⏳ Pendiente de depósito')+'</div>';
      html+='</div>';

      html+='<div class="form-card" style="margin-top:.75rem;">';
      html+='<div class="resumen-row"><span class="resumen-key">💵 Sueldo ('+resumen.trabajados+' días'+(resumen.diasPermisoConGoce?' + '+resumen.diasPermisoConGoce+' permiso c/goce':'')+')</span><span class="resumen-val" style="color:var(--verde-mid);">+$'+totalSueldo.toFixed(2)+' '+(pagadoSueldo?'✅':'⏳')+'</span></div>';
      if(resumen.diasPermisoSinGoce) html+='<div class="resumen-row"><span class="resumen-key">🩺 Permiso sin goce</span><span class="resumen-val" style="color:var(--gris-3);">'+resumen.diasPermisoSinGoce+' día(s) no pagado(s)</span></div>';
      if(hayExtra) html+='<div class="resumen-row"><span class="resumen-key">⏰ Horas extra ('+horasExtra.toFixed(1)+'h)</span><span class="resumen-val" style="color:var(--verde-mid);">+$'+totalExtra.toFixed(2)+' '+(pagadoExtra?'✅':'⏳')+'</span></div>';
      bonosQueCalifican.forEach(function(b){
        html+='<div class="resumen-row"><span class="resumen-key">🎁 '+b.descripcion+(b.umbral_minimo?' (cumpliste '+b.umbral_minimo+'/10)':'')+'</span><span class="resumen-val" style="color:var(--verde-mid);">+$'+parseFloat(b.monto||0).toFixed(2)+'</span></div>';
      });
      deducciones.forEach(function(d){
        var pr=prestamosActivos.find(function(p){return p.id===d.prestamo_id;});
        html+='<div class="resumen-row"><span class="resumen-key">📝 '+(pr?pr.concepto:'Préstamo')+' (pago '+d.numero_pago+')</span><span class="resumen-val" style="color:var(--rojo);">-$'+parseFloat(d.monto).toFixed(2)+'</span></div>';
      });
      html+='<div class="resumen-row" style="border-top:2px solid var(--gris-1);margin-top:.4rem;padding-top:.6rem;"><span class="resumen-key" style="font-weight:800;">Total a tu Cartera</span><span class="resumen-val" style="font-weight:800;font-size:1rem;">$'+total.toFixed(2)+'</span></div>';
      html+='</div>';

      body.innerHTML=html;
      var btnAnt=document.getElementById('cart-ant');
      if(btnAnt) btnAnt.addEventListener('click',function(){var d=new Date(lunes);d.setDate(d.getDate()-7);renderCartera(d);});
      var btnSig=document.getElementById('cart-sig');
      if(btnSig) btnSig.addEventListener('click',function(){var d=new Date(lunes);d.setDate(d.getDate()+7);renderCartera(d);});
    });
    });
  }).catch(function(e){body.innerHTML='<div class="empty">No se pudo calcular tu cartera.<br/><span style="font-size:.7rem;color:var(--gris-3);">('+e.message+')</span></div><button class="btn-back" style="margin-top:1rem;" onclick="renderPagosMenu()">← Volver a Pagos</button>';});
}

function cargarUltimoRegistroHoy(tipo){
  var hoy=fechaHoyLocal();
  from('asistencia_registros').select('*').eq('usuario_id',usuario.id).eq('tipo',tipo).eq('fecha',hoy).order('registrado_en',{ascending:false}).limit(1).get().then(function(rows){

function pintarMensajeAsistencia(tipo,modalidad,hora,retardo){
  var lab=document.getElementById('asis-btn-lab'), ext=document.getElementById('asis-btn-ext'), msg=document.getElementById('asis-msg');
  if(!lab) return;
  lab.classList.remove('labor-tile-otra'); ext.classList.remove('labor-tile-otra');
  var hh=new Date(hora).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit',hour12:true});
  var verbo=tipo==='entrada'?'Iniciamos':'Terminaste';
  var tag=modalidad==='labores'?'Labores':'Horas Extra';
  if(modalidad==='labores') lab.classList.add('labor-tile-otra'); else ext.classList.add('labor-tile-otra');
  msg.innerHTML='<strong style="color:'+(modalidad==='labores'?'var(--verde-mid)':'var(--tierra)')+';">'+verbo+' '+tag+' '+usuario.nombre+'</strong><br>'+(tipo==='entrada'?'Entrada':'Salida')+' '+hh+(retardo?' <span style="color:var(--rojo);font-weight:700;">⚠️ Retardo</span>':'');
}

function haversineMetros(lat1,lng1,lat2,lng2){
  var R=6371000;
  var toRad=function(d){return d*Math.PI/180;};
  var dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function marcarAsistencia(tipo,modalidad){
  var hoy=fechaHoyLocal();
  var ahoraDate=new Date();
  var ahora=ahoraDate.toISOString();
  var retardo=false;
  if(tipo==='entrada'&&modalidad==='labores'){
    var minutos=ahoraDate.getHours()*60+ahoraDate.getMinutes();
    retardo = minutos > (7*60+30);
  }
  var payload={usuario_id:usuario.id,tipo:tipo,modalidad:modalidad,registrado_en:ahora,fecha:hoy,retardo:retardo};
  if(modalidad==='extras'&&window._extraHoyId) payload.horas_extra_id=window._extraHoyId;

  function guardarConUbicacion(lat,lng){
    if(lat!=null) payload.lat=lat;
    if(lng!=null) payload.lng=lng;
    var chequeoZona = (lat!=null&&lng!=null) ? from('config_app').select('*').get() : Promise.resolve(null);
    chequeoZona.then(function(rows){
      if(rows){
        var cfg={}; rows.forEach(function(r){cfg[r.clave]=r.valor;});
        if(cfg.rancho_lat&&cfg.rancho_lng){
          var d=haversineMetros(lat,lng,parseFloat(cfg.rancho_lat),parseFloat(cfg.rancho_lng));
          payload.fuera_de_zona = d > (parseFloat(cfg.rancho_radio_metros)||800);
        }
      }
      return from('asistencia_registros').insert(payload);
    }).then(function(){
      pintarMensajeAsistencia(tipo,modalidad,ahora,retardo);
      showToast('✅ '+(tipo==='entrada'?'Entrada':'Salida')+' registrada'+(retardo?' — con retardo':'')+(payload.fuera_de_zona?' ⚠️ fuera de zona':''));
    }).catch(function(e){alert('Error: '+e.message);});
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){guardarConUbicacion(pos.coords.latitude,pos.coords.longitude);},
      function(){guardarConUbicacion(null,null);},
      {timeout:6000,maximumAge:60000}
    );
  } else {
    guardarConUbicacion(null,null);
  }
}

function permisoEnFecha(permisosAprobados,fechaStr){
  if(!permisosAprobados) return null;
  for(var i=0;i<permisosAprobados.length;i++){
    var p=permisosAprobados[i];
    if(p.fecha_inicio<=fechaStr&&fechaStr<=p.fecha_fin) return p;
  }
  return null;
}

function calcularResumenAsistencia(registros,primerDia,permisosAprobados){
  permisosAprobados=permisosAprobados||[];
  var hoy=new Date(); hoy.setHours(0,0,0,0);
  var trabajadosSet={};
  var retardosFechas=[];
  registros.forEach(function(r){
    if(r.modalidad==='labores'&&r.tipo==='entrada'){
      trabajadosSet[r.fecha]=r.registrado_en;
      if(r.retardo) retardosFechas.push({fecha:r.fecha,hora:r.registrado_en});
    }
  });
  var faltasFechas=[];
  var permisoConGoceFechas=[], permisoSinGoceFechas=[];
  var d=new Date(primerDia+'T00:00:00');
  while(d<hoy){
    if(d.getDay()!==0){
      var fStr=d.toISOString().slice(0,10);
      if(!trabajadosSet[fStr]){
        var perm=permisoEnFecha(permisosAprobados,fStr);
        if(perm){
          if(perm.con_goce) permisoConGoceFechas.push(fStr);
          else permisoSinGoceFechas.push(fStr);
        } else {
          faltasFechas.push(fStr);
        }
      }
    }
    d.setDate(d.getDate()+1);
  }
  var trabajadosFechas=Object.keys(trabajadosSet).sort().reverse();
  return {trabajados:trabajadosFechas.length,retardos:retardosFechas.length,faltas:faltasFechas.length,diasPermisoConGoce:permisoConGoceFechas.length,diasPermisoSinGoce:permisoSinGoceFechas.length,diasPagados:trabajadosFechas.length+permisoConGoceFechas.length,trabajadosFechas:trabajadosFechas,retardosFechas:retardosFechas.sort(function(a,b){return b.fecha.localeCompare(a.fecha);}),faltasFechas:faltasFechas.sort().reverse(),permisoConGoceFechas:permisoConGoceFechas.sort().reverse(),permisoSinGoceFechas:permisoSinGoceFechas.sort().reverse(),trabajadosHoras:trabajadosSet};
}

function fechaLarga(fechaStr){
  if(!fechaStr) return '';
  var d=new Date(fechaStr+'T00:00:00');
  var txt=d.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return txt.charAt(0).toUpperCase()+txt.slice(1);
}

function numeroSemanaISO(fecha){
  var d=new Date(Date.UTC(fecha.getFullYear(),fecha.getMonth(),fecha.getDate()));
  var dayNum=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-dayNum);
  var yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-yearStart)/86400000)+1)/7);
}
